<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Defender: City Savior</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            margin: 0;
            color: white;
            user-select: none;
        }

        canvas {
            display: block;
        }

        .font-mono-game {
            font-family: 'Fira Code', monospace;
        }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #input-display {
            letter-spacing: 0.2em;
        }

        .active-letter {
            color: #38bdf8;
            text-shadow: 0 0 8px #38bdf8;
        }
    </style>
</head>
<body>

    <div id="game-container" class="relative w-full h-screen overflow-hidden bg-slate-950">
        
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- HUD (Heads Up Display) -->
        <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none">
            <div class="glass p-4 rounded-2xl flex flex-col gap-1">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Score</span>
                <span id="score-val" class="text-3xl font-black text-white glow-text leading-none">0000</span>
            </div>
            
            <div class="flex flex-col items-center gap-4">
                <div id="current-word-display" class="glass px-8 py-4 rounded-2xl text-4xl font-mono-game font-bold tracking-widest opacity-0 transition-opacity duration-200">
                    <!-- Word will appear here -->
                </div>
                <div class="text-slate-500 text-sm italic" id="typing-hint">Type to start defending</div>
            </div>

            <div class="glass p-4 rounded-2xl flex flex-col items-end gap-1">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">City Integrity</span>
                <div class="w-48 h-3 bg-slate-800 rounded-full overflow-hidden mt-2">
                    <div id="health-bar" class="h-full bg-gradient-to-r from-red-500 via-yellow-400 to-emerald-400 transition-all duration-300 w-full"></div>
                </div>
            </div>
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="absolute inset-0 flex items-center justify-center z-50 bg-slate-950/80 backdrop-blur-sm">
            <div class="text-center max-w-md p-8 glass rounded-3xl border-t border-white/20 shadow-2xl">
                <h1 class="text-5xl font-black mb-4 bg-gradient-to-br from-white to-slate-500 bg-clip-text text-transparent">WORD DEFENDER</h1>
                <p class="text-slate-400 mb-8 leading-relaxed">Incoming word-missiles are targeting the city. Type the words as fast as you can to intercept them before impact.</p>
                <button id="start-btn" class="group relative px-8 py-4 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-all hover:scale-105 active:scale-95 shadow-lg shadow-sky-500/20">
                    INITIALIZE DEFENSE
                </button>
            </div>
        </div>

        <!-- Game Over Screen Overlay -->
        <div id="game-over-screen" class="absolute inset-0 hidden flex items-center justify-center z-50 bg-red-950/90 backdrop-blur-md">
            <div class="text-center max-w-md p-10 glass rounded-3xl border-t border-red-500/30 shadow-2xl">
                <h2 class="text-6xl font-black text-white mb-2">CITY FALLEN</h2>
                <p class="text-red-300 mb-8 uppercase tracking-widest font-bold">The defense was breached</p>
                <div class="mb-8">
                    <span class="text-slate-400 block mb-1">FINAL SCORE</span>
                    <span id="final-score" class="text-5xl font-black text-white">0</span>
                </div>
                <button id="restart-btn" class="px-8 py-4 bg-white text-slate-950 font-bold rounded-xl transition-all hover:scale-105 active:scale-95">
                    TRY AGAIN
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreDisplay = document.getElementById('score-val');
        const finalScoreDisplay = document.getElementById('final-score');
        const healthBar = document.getElementById('health-bar');
        const wordDisplay = document.getElementById('current-word-display');
        const gameContainer = document.getElementById('game-container');

        const WORD_LIST = [
            "sky", "fire", "city", "data", "code", "neon", "grid", "pixel", "pulse", "cyber",
            "shield", "matrix", "vector", "binary", "system", "signal", "hazard", "threat", "breach", "server",
            "intercept", "terminal", "protocol", "firewall", "hardware", "software", "network", "command", "control",
            "overload", "shutdown", "critical", "database", "security", "encryption", "algorithm", "processor",
            "integrity", "mainframe", "bandwidth", "satellite", "broadband", "component", "interface", "structure"
        ];

        let gameState = 'START';
        let score = 0;
        let health = 100;
        let words = [];
        let particles = [];
        let currentInput = "";
        let targetWord = null;
        let spawnRate = 2000;
        let lastSpawn = 0;
        let gameSpeed = 1;
        let cityBuildings = [];

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateCity();
        }

        window.addEventListener('resize', resize);
        resize();

        function generateCity() {
            cityBuildings = [];
            const buildingCount = 15;
            const widthPerBuilding = canvas.width / buildingCount;
            
            for (let i = 0; i < buildingCount; i++) {
                const h = 80 + Math.random() * 150;
                cityBuildings.push({
                    x: i * widthPerBuilding,
                    width: widthPerBuilding + 2,
                    height: h,
                    windows: Array.from({length: 10}, () => Math.random() > 0.5)
                });
            }
        }

        class Word {
            constructor(text) {
                this.text = text;
                this.x = 100 + Math.random() * (canvas.width - 200);
                this.y = -50;
                this.speed = (0.5 + Math.random() * 0.8) * gameSpeed;
                this.isTargeted = false;
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height - 100) {
                    this.onHitCity();
                    return true; // Mark for removal
                }
                return false;
            }

            onHitCity() {
                health -= 15;
                updateHealth();
                createExplosion(this.x, canvas.height - 100, '#ff4444');
                gameContainer.classList.add('shake');
                setTimeout(() => gameContainer.classList.remove('shake'), 500);
            }

            draw() {
                ctx.save();
                ctx.textAlign = 'center';
                
                // Shadow / Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.isTargeted ? '#38bdf8' : 'rgba(255,255,255,0.2)';
                
                // Box
                const padding = 12;
                const textWidth = ctx.measureText(this.text).width;
                ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
                ctx.beginPath();
                ctx.roundRect(this.x - textWidth - padding, this.y - 20, (textWidth + padding) * 2, 40, 8);
                ctx.fill();
                ctx.strokeStyle = this.isTargeted ? '#38bdf8' : 'rgba(255,255,255,0.3)';
                ctx.lineWidth = this.isTargeted ? 2 : 1;
                ctx.stroke();

                // Text
                ctx.font = 'bold 20px "Fira Code"';
                ctx.fillStyle = '#94a3b8';
                
                if (this.isTargeted) {
                    // Draw untyped part
                    ctx.fillText(this.text, this.x, this.y + 8);
                    // Draw typed highlight
                    ctx.fillStyle = '#38bdf8';
                    const typedPart = this.text.substring(0, currentInput.length);
                    const fullWidth = ctx.measureText(this.text).width;
                    const startX = this.x - fullWidth / 2;
                    ctx.textAlign = 'left';
                    ctx.fillText(typedPart, startX, this.y + 8);
                } else {
                    ctx.fillText(this.text, this.x, this.y + 8);
                }

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.alpha = 1;
                this.color = color;
                this.size = 2 + Math.random() * 4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
                return this.alpha <= 0;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING') return;

            const char = e.key.toLowerCase();
            if (char.length !== 1 || !/[a-z]/.test(char)) return;

            if (!targetWord) {
                // Find a word starting with this char
                const match = words.find(w => w.text.startsWith(char));
                if (match) {
                    targetWord = match;
                    targetWord.isTargeted = true;
                    currentInput = char;
                    showWordDisplay();
                }
            } else {
                // Verify next char in target
                const nextChar = targetWord.text[currentInput.length];
                if (char === nextChar) {
                    currentInput += char;
                    
                    // Check completion
                    if (currentInput === targetWord.text) {
                        onWordComplete();
                    }
                }
            }
            updateWordDisplay();
        });

        function onWordComplete() {
            createExplosion(targetWord.x, targetWord.y, '#38bdf8');
            score += targetWord.text.length * 10;
            scoreDisplay.textContent = score.toString().padStart(4, '0');
            
            // Speed scaling
            gameSpeed += 0.02;
            spawnRate = Math.max(800, 2000 - (score / 10));

            words = words.filter(w => w !== targetWord);
            targetWord = null;
            currentInput = "";
            hideWordDisplay();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function updateHealth() {
            healthBar.style.width = health + '%';
            if (health <= 0) {
                endGame();
            }
        }

        function showWordDisplay() {
            wordDisplay.classList.remove('opacity-0');
        }

        function hideWordDisplay() {
            wordDisplay.classList.add('opacity-0');
        }

        function updateWordDisplay() {
            if (!targetWord) return;
            let html = "";
            for (let i = 0; i < targetWord.text.length; i++) {
                if (i < currentInput.length) {
                    html += `<span class="active-letter">${targetWord.text[i]}</span>`;
                } else {
                    html += `<span class="text-slate-500">${targetWord.text[i]}</span>`;
                }
            }
            wordDisplay.innerHTML = html;
        }

        function spawnWord() {
            const text = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
            words.push(new Word(text));
        }

        function drawCity() {
            const hBase = canvas.height - 100;
            
            // Ground
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, hBase, canvas.width, 100);

            // Buildings
            cityBuildings.forEach(b => {
                const gradient = ctx.createLinearGradient(b.x, hBase - b.height, b.x, hBase);
                gradient.addColorStop(0, '#1e293b');
                gradient.addColorStop(1, '#0f172a');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(b.x, hBase - b.height, b.width, b.height, [8, 8, 0, 0]);
                ctx.fill();

                // Windows
                ctx.fillStyle = health > 30 ? '#1e293b' : '#450a0a';
                if (Math.random() > 0.99) ctx.fillStyle = '#fde047'; // Flickering light

                const winCols = 3;
                const winRows = 6;
                const wSpace = b.width / (winCols + 1);
                const hSpace = b.height / (winRows + 1);

                for (let r = 1; r <= winRows; r++) {
                    for (let c = 1; c <= winCols; c++) {
                        if (Math.random() > 0.3) {
                            ctx.fillStyle = (Math.random() > 0.98) ? '#38bdf8' : '#0f172a';
                            ctx.fillRect(b.x + c * wSpace - 2, hBase - b.height + r * hSpace, 4, 6);
                        }
                    }
                }
            });
        }

        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spawn logic
            if (timestamp - lastSpawn > spawnRate) {
                spawnWord();
                lastSpawn = timestamp;
            }

            // Draw Background Elements
            drawCity();

            // Update & Draw Words
            for (let i = words.length - 1; i >= 0; i--) {
                const hit = words[i].update();
                if (hit) {
                    if (words[i] === targetWord) {
                        targetWord = null;
                        currentInput = "";
                        hideWordDisplay();
                    }
                    words.splice(i, 1);
                } else {
                    words[i].draw();
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const finished = particles[i].update();
                if (finished) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            health = 100;
            words = [];
            particles = [];
            targetWord = null;
            currentInput = "";
            gameSpeed = 1;
            spawnRate = 2000;
            
            scoreDisplay.textContent = "0000";
            updateHealth();
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState = 'OVER';
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initial setup
        generateCity();
        drawCity();

    </script>
</body>
</html>
