<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix Breakout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fafaf9; }
        .game-canvas {
            background-color: #1c1917;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: none;
            touch-action: none;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans overflow-hidden">

    <div id="loading" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwGODnCy&_nc_oc=AdqdVkG_VLNmSb8AnL8cFGXEKw1SUyQivNB9lXGNwFEpnhMd_XTTsYoIeL6jSWs6fi4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=NitylyVfvXU5I7nHDBYDTg&_nc_ss=7c2a8&oh=00_Af9Er0CMINn2Laf0DWkeVLYIeT4WjAlJZNNF6JsE0zR3cg&oe=6A2C7D41" 
             onerror="this.src='https://placehold.co/150x150/e7e5e4/57534e?text=Codenix'"
             class="w-32 h-32 rounded-full mb-6 border-4 border-stone-200 shadow-lg">
        <h1 class="text-4xl font-extrabold text-stone-800">Codenix Breakout</h1>
        <p class="text-stone-500 mt-2 tracking-widest uppercase text-sm">by Codenix</p>
    </div>

    <div class="text-center mb-4">
        <h1 class="text-4xl font-extrabold text-stone-700 mb-1">Codenix Breakout</h1>
        <div class="text-xl text-stone-500">Score: <span id="score" class="font-bold text-stone-800">0</span></div>
    </div>

    <div class="relative">
        <canvas id="gameCanvas" width="400" height="500" class="game-canvas"></canvas>
        
        <!-- Game Over Overlay -->
        <div id="game-over" class="hidden absolute inset-0 bg-stone-900/90 rounded-xl flex flex-col items-center justify-center z-20">
            <h2 id="result-text" class="text-white text-3xl font-bold mb-4">Game Over!</h2>
            <button onclick="resetGame()" class="px-6 py-2 bg-yellow-500 text-stone-900 font-bold rounded-lg hover:bg-yellow-400 transition shadow-lg">Play Again</button>
        </div>
    </div>

    <div class="mt-6 text-stone-400 text-sm">Move Mouse/Swipe or use Arrow Keys</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const resultText = document.getElementById('result-text');

        let audioCtx = null;
        let gameRunning = false;
        let score = 0;
        
        // Paddle & Ball
        const paddle = { width: 80, height: 12, x: 160, y: 460 };
        let ball = { x: 200, y: 400, dx: 4, dy: -4, radius: 6 };
        
        // Bricks
        const brickRowCount = 5;
        const brickColumnCount = 6;
        const brickWidth = 60;
        const brickHeight = 20;
        const brickPadding = 5;
        const bricks = [];

        function initBricks() {
            for(let c=0; c<brickColumnCount; c++) {
                bricks[c] = [];
                for(let r=0; r<brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'hit') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'break') {
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        function update() {
            if (!gameRunning) return;

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall bounce
            if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
            if (ball.y < 0) ball.dy *= -1;

            // Paddle bounce
            if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                ball.dy = -Math.abs(ball.dy);
                playSound('hit');
            }

            // Brick collision
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status === 1) {
                        let brickX = (c*(brickWidth+brickPadding)) + 15;
                        let brickY = (r*(brickHeight+brickPadding)) + 30;
                        if(ball.x > brickX && ball.x < brickX+brickWidth && ball.y > brickY && ball.y < brickY+brickHeight) {
                            ball.dy *= -1;
                            b.status = 0;
                            score += 10;
                            scoreEl.textContent = score;
                            playSound('break');
                        }
                    }
                }
            }

            // Game over
            if (ball.y > canvas.height) endGame(false);
            if (score === brickColumnCount * brickRowCount * 10) endGame(true);
        }

        function draw() {
            ctx.fillStyle = '#1c1917';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Paddle
            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            // Ball
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Bricks
            for(let c=0; c<brickColumnCount; c++) {
                for(let r=0; r<brickRowCount; r++) {
                    if(bricks[c][r].status === 1) {
                        let brickX = (c*(brickWidth+brickPadding)) + 15;
                        let brickY = (r*(brickHeight+brickPadding)) + 30;
                        ctx.fillStyle = ['#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#ec4899'][r % 5];
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                    }
                }
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function endGame(won) {
            gameRunning = false;
            resultText.textContent = won ? "You Won!" : "Game Over!";
            gameOverEl.classList.remove('hidden');
        }

        function resetGame() {
            score = 0;
            scoreEl.textContent = "0";
            ball = { x: 200, y: 400, dx: 4, dy: -4, radius: 6 };
            paddle.x = 160;
            initBricks();
            gameOverEl.classList.add('hidden');
            gameRunning = true;
        }

        // Controls
        window.addEventListener('keydown', e => {
            initAudio();
            if (e.key === 'ArrowLeft' && paddle.x > 0) paddle.x -= 20;
            if (e.key === 'ArrowRight' && paddle.x < canvas.width - paddle.width) paddle.x += 20;
            if (!gameRunning && gameOverEl.classList.contains('hidden')) gameRunning = true;
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, e.clientX - rect.left - paddle.width/2));
        });

        canvas.addEventListener('touchmove', e => {
            initAudio();
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, e.touches[0].clientX - rect.left - paddle.width/2));
            if (!gameRunning && gameOverEl.classList.contains('hidden')) gameRunning = true;
            e.preventDefault();
        }, { passive: false });

        window.onload = () => {
            initBricks();
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            }, 1500);
            draw();
        };
    </script>
</body>
</html>
