<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <header class="sticky top-0 z-40 glass-panel border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="gamepad-2" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="font-bold text-xl tracking-wide bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">Games Center</h1>
            </div>
            <div id="status-badge" class="flex items-center space-x-1 bg-amber-500/10 text-amber-400 text-xs px-2.5 py-1 rounded-full border border-amber-500/20">
                <span id="status-icon" class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
        <section id="games-section" class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div id="filter-container" class="flex items-center space-x-1 overflow-x-auto pb-2 md:pb-0">
                <!-- Filters injected dynamically -->
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search games..." class="w-full bg-slate-900/80 border border-slate-800 rounded-xl pl-4 pr-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
            </div>
        </section>

        <section>
            <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <div id="debug-info" class="hidden text-center py-16 bg-red-900/10 border border-red-900/30 rounded-2xl p-6">
                <h4 class="text-red-400 font-bold mb-2">Data Load Issue</h4>
                <p id="debug-text" class="text-sm text-slate-400"></p>
            </div>
        </section>
    </main>

    <script>
        const SPREADSHEET_ID = '115NKXqTqsbgM0CmgokQY0JihjU8PO9Q4n-8kr1Baw6A';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq=SELECT%20*%20LIMIT%201000`;

        let allGames = [];
        let activeCategory = 'All';
        let searchQuery = '';

        async function fetchGamesSheet() {
            try {
                const response = await fetch(SHEET_URL);
                const rawText = await response.text();
                const jsonText = rawText.substring(rawText.indexOf('(') + 1, rawText.lastIndexOf(')'));
                const payload = JSON.parse(jsonText);
                
                if (!payload.table || !payload.table.rows) {
                    throw new Error("No data found in spreadsheet. Ensure it is published to the web.");
                }

                const rows = payload.table.rows;
                const fetchedList = [];

                rows.forEach((row, idx) => {
                    // Try to extract columns safely (handles potential empty cells)
                    const getCol = (i) => (row.c[i] && row.c[i].v !== null) ? String(row.c[i].v).trim() : '';
                    
                    const type = getCol(0) || 'Casual';
                    const name = getCol(1);
                    const photo = getCol(2);
                    const link = getCol(3);

                    // Skip the header row if it contains 'Type' or similar header text in column 0
                    if (idx === 0 && type.toLowerCase() === 'type') return;
                    if (name && link && link !== '#') {
                        fetchedList.push({ type, name, photoUrl: parseGoogleDriveUrl(photo), link });
                    }
                });

                allGames = fetchedList;
                document.getElementById('status-text').textContent = `${allGames.length} Games Loaded`;
                document.getElementById('status-badge').className = "flex items-center space-x-1 bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-full border border-emerald-500/20";
                
                renderFilters();
                renderCatalog();
            } catch (err) {
                console.error(err);
                document.getElementById('status-text').textContent = "Failed to load";
                document.getElementById('debug-info').classList.remove('hidden');
                document.getElementById('debug-text').textContent = `Error: ${err.message}. Ensure your sheet is public and correctly formatted.`;
            }
        }

        function parseGoogleDriveUrl(url) {
            if (!url || !url.includes('drive.google.com')) return url;
            const matches = url.match(/\/file\/d\/([^\/]+)|\bid=([^\/&]+)/);
            return matches ? `https://drive.google.com/thumbnail?id=${matches[1] || matches[2]}&sz=w1000` : url;
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            const categories = ['All', ...new Set(allGames.map(g => g.type))];
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl text-sm font-medium transition-all ${activeCategory === cat ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`;
                btn.textContent = cat;
                btn.onclick = () => { activeCategory = cat; renderFilters(); renderCatalog(); };
                container.appendChild(btn);
            });
        }

        function renderCatalog() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';
            const filtered = allGames.filter(g => (activeCategory === 'All' || g.type === activeCategory) && g.name.toLowerCase().includes(searchQuery.toLowerCase()));
            
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = "bg-slate-900/40 rounded-2xl border border-slate-800 p-4 hover:border-indigo-500/30 transition-all";
                card.innerHTML = `
                    <div class="aspect-video w-full overflow-hidden rounded-lg mb-4 bg-slate-950 flex items-center justify-center">
                        <img src="${game.photoUrl}" onerror="this.src='https://placehold.co/400x200/1e293b/white?text=No+Img'" class="object-cover w-full h-full">
                    </div>
                    <h3 class="font-bold text-slate-100 line-clamp-1">${game.name}</h3>
                    <p class="text-xs text-indigo-400 mt-1 uppercase tracking-wider">${game.type}</p>
                    <a href="${game.link}" target="_blank" class="block w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white text-center text-xs font-bold py-2 rounded-lg">Play</a>
                `;
                grid.appendChild(card);
            });
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value;
            renderCatalog();
        }

        window.onload = () => { lucide.createIcons(); fetchGamesSheet(); };
    </script>
</body>
</html>
