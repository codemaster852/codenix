<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Arcade Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-600/20">
                    <i data-lucide="layout-grid" class="text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Arcade<span class="text-indigo-400">Hub</span></h1>
            </div>
            
            <div id="status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs text-slate-400 font-medium">
                <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                <span id="status-text">Connecting to Spreadsheet...</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- Controls -->
        <section class="flex flex-col lg:flex-row gap-6 mb-12 items-center justify-between">
            <div id="filter-container" class="flex items-center gap-2 overflow-x-auto scrollbar-hide pb-2 lg:pb-0 w-full lg:w-auto">
                <!-- Filters injected here -->
            </div>
            <div class="relative w-full lg:w-96">
                <i data-lucide="search" class="absolute left-3 top-3 text-slate-500 w-4 h-4"></i>
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search through 300+ titles..." class="w-full bg-slate-900 border border-slate-800 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
            </div>
        </section>

        <!-- Grid -->
        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Loading -->
        </div>
    </main>

    <script>
        // Use the exact ID provided
        const SPREADSHEET_ID = '115NKXqTqsbgM0CmgokQY0JihjU8PO9Q4n-8kr1Baw6A';
        // Added LIMIT 1000 to ensure we capture more than the default
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq=SELECT%20*%20LIMIT%201000`;

        let allGames = [];
        let activeCategory = 'All';

        async function fetchGames() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                
                const rows = json.table.rows;
                const totalFetched = rows.length;
                
                // Update diagnostic status
                document.getElementById('status-text').textContent = `Loaded ${totalFetched} items from Sheet`;
                document.getElementById('status-badge').className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-950/30 border border-emerald-900 text-xs text-emerald-400 font-medium";

                allGames = rows.map(row => ({
                    type: row.c[0]?.v || 'Uncategorized',
                    name: row.c[1]?.v || 'Untitled Game',
                    img: row.c[2]?.v || '',
                    link: row.c[3]?.v || '#'
                })).filter(g => g.name !== 'Untitled Game');

                renderFilters();
                renderGames();
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                document.getElementById('status-text').textContent = "Error loading data";
            }
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            const categories = ['All', ...new Set(allGames.map(g => g.type))];
            container.innerHTML = categories.map(cat => `
                <button onclick="setActiveCategory('${cat}')" 
                    class="px-5 py-2 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${activeCategory === cat ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'bg-slate-900 hover:bg-slate-800 text-slate-400 border border-slate-800'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setActiveCategory(cat) {
            activeCategory = cat;
            renderFilters();
            renderGames();
        }

        function renderGames() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('games-grid');
            
            const filtered = allGames.filter(g => 
                (activeCategory === 'All' || g.type === activeCategory) &&
                (g.name.toLowerCase().includes(query) || g.type.toLowerCase().includes(query))
            );

            grid.innerHTML = filtered.map(game => `
                <div class="group bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-indigo-500/50 transition-all duration-300 flex flex-col">
                    <div class="aspect-video relative overflow-hidden bg-slate-950">
                        <img src="${game.img}" alt="${game.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x225/1e293b/475569?text=Image'">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">${game.type}</span>
                        <h3 class="font-semibold text-slate-200 mb-4 flex-grow line-clamp-1">${game.name}</h3>
                        <a href="${game.link}" target="_blank" class="w-full py-2.5 bg-white text-slate-950 rounded-lg text-sm font-bold text-center hover:bg-indigo-500 hover:text-white transition-colors">
                            Play Now
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function handleSearch() {
            renderGames();
        }

        window.onload = () => {
            fetchGames();
            lucide.createIcons();
        };
    </script>
</body>
</html>
