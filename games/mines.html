<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fafaf9; }
        .cell {
            width: 35px;
            height: 35px;
            background-color: #e7e5e4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.1s;
        }
        .cell.revealed { background-color: #d6d3d1; cursor: default; }
        .cell.mine { background-color: #ef4444; color: white; }
        .cell.flagged { background-color: #f59e0b; }
        .cell:hover:not(.revealed):not(.flagged) { background-color: #d6d3d1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans p-4">

    <div id="loading" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwGODnCy&_nc_oc=AdqdVkG_VLNmSb8AnL8cFGXEKw1SUyQivNB9lXGNwFEpnhMd_XTTsYoIeL6jSWs6fi4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=NitylyVfvXU5I7nHDBYDTg&_nc_ss=7c2a8&oh=00_Af9Er0CMINn2Laf0DWkeVLYIeT4WjAlJZNNF6JsE0zR3cg&oe=6A2C7D41" 
             onerror="this.src='https://placehold.co/150x150/e7e5e4/57534e?text=Codenix'"
             class="w-32 h-32 rounded-full mb-6 border-4 border-stone-200 shadow-lg">
        <h1 class="text-4xl font-extrabold text-stone-800">Codenix Minesweeper</h1>
        <p class="text-stone-500 mt-2 tracking-widest uppercase text-sm">by Codenix</p>
    </div>

    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold text-stone-700 mb-1">Minesweeper</h1>
        <div class="text-xl text-stone-500">Mines Left: <span id="mine-count" class="font-bold text-stone-800">10</span></div>
    </div>

    <div id="grid" class="grid grid-cols-9 gap-1 bg-stone-300 p-2 rounded-lg shadow-inner">
        <!-- Cells generated by JS -->
    </div>

    <div id="game-over" class="hidden fixed inset-0 bg-stone-900/90 flex flex-col items-center justify-center z-20">
        <h2 id="result-text" class="text-white text-3xl font-bold mb-4">Game Over!</h2>
        <button onclick="resetGame()" class="px-6 py-2 bg-yellow-500 text-stone-900 font-bold rounded-lg hover:bg-yellow-400 transition shadow-lg">Play Again</button>
    </div>

    <script>
        const GRID_SIZE = 9;
        const MINE_COUNT = 10;
        let board = [];
        let minesLeft = MINE_COUNT;
        let gameOver = false;
        let audioCtx = null;

        const gridEl = document.getElementById('grid');
        const mineCountEl = document.getElementById('mine-count');
        const gameOverEl = document.getElementById('game-over');
        const resultText = document.getElementById('result-text');

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'mine') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function createBoard() {
            board = Array(GRID_SIZE * GRID_SIZE).fill(0).map(() => ({ mine: false, revealed: false, flagged: false, count: 0 }));
            let minesPlaced = 0;
            while (minesPlaced < MINE_COUNT) {
                let idx = Math.floor(Math.random() * board.length);
                if (!board[idx].mine) {
                    board[idx].mine = true;
                    minesPlaced++;
                }
            }
            
            for (let i = 0; i < board.length; i++) {
                if (board[i].mine) continue;
                let count = 0;
                getNeighbors(i).forEach(n => { if (board[n].mine) count++; });
                board[i].count = count;
            }
        }

        function getNeighbors(idx) {
            let neighbors = [];
            let r = Math.floor(idx / GRID_SIZE);
            let c = idx % GRID_SIZE;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) neighbors.push(nr * GRID_SIZE + nc);
                }
            }
            return neighbors;
        }

        function render() {
            gridEl.innerHTML = '';
            board.forEach((cell, idx) => {
                const el = document.createElement('div');
                el.className = 'cell';
                if (cell.revealed) {
                    el.classList.add('revealed');
                    if (cell.mine) { el.classList.add('mine'); el.textContent = '💣'; }
                    else if (cell.count > 0) el.textContent = cell.count;
                } else if (cell.flagged) {
                    el.classList.add('flagged');
                    el.textContent = '🚩';
                }
                el.onclick = () => reveal(idx);
                el.oncontextmenu = (e) => { e.preventDefault(); flag(idx); };
                gridEl.appendChild(el);
            });
        }

        function reveal(idx) {
            if (gameOver || board[idx].revealed || board[idx].flagged) return;
            initAudio();
            playSound('click');
            
            board[idx].revealed = true;
            if (board[idx].mine) {
                gameOver = true;
                playSound('mine');
                resultText.textContent = "Game Over!";
                gameOverEl.classList.remove('hidden');
            } else if (board[idx].count === 0) {
                getNeighbors(idx).forEach(n => reveal(n));
            }
            render();
            checkWin();
        }

        function flag(idx) {
            if (gameOver || board[idx].revealed) return;
            board[idx].flagged = !board[idx].flagged;
            minesLeft += board[idx].flagged ? -1 : 1;
            mineCountEl.textContent = minesLeft;
            render();
        }

        function checkWin() {
            if (board.filter(b => !b.mine && !b.revealed).length === 0) {
                gameOver = true;
                resultText.textContent = "You Won!";
                gameOverEl.classList.remove('hidden');
            }
        }

        function resetGame() {
            gameOver = false;
            minesLeft = MINE_COUNT;
            mineCountEl.textContent = minesLeft;
            gameOverEl.classList.add('hidden');
            createBoard();
            render();
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            }, 1000);
            createBoard();
            render();
        };
    </script>
</body>
</html>
