<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix Whack-a-Mole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fafaf9; }
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .hole {
            width: 100px;
            height: 100px;
            background-color: #a8a29e;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            touch-action: manipulation;
        }
        .mole {
            font-size: 3rem;
            position: absolute;
            bottom: -100px;
            transition: bottom 0.2s ease-out;
            width: 100%;
            text-align: center;
        }
        .mole.up { bottom: 10px; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .hit { animation: pop 0.2s; }
    </style>
</head>
<body class="p-4 sm:p-8 font-sans">

    <div id="loading" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwGODnCy&_nc_oc=AdqdVkG_VLNmSb8AnL8cFGXEKw1SUyQivNB9lXGNwFEpnhMd_XTTsYoIeL6jSWs6fi4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=NitylyVfvXU5I7nHDBYDTg&_nc_ss=7c2a8&oh=00_Af9Er0CMINn2Laf0DWkeVLYIeT4WjAlJZNNF6JsE0zR3cg&oe=6A2C7D41" 
             onerror="this.src='https://placehold.co/150x150/e7e5e4/57534e?text=Codenix'"
             class="w-32 h-32 rounded-full mb-6 border-4 border-stone-200 shadow-lg">
        <h1 class="text-4xl font-extrabold text-stone-800">Codenix Whack-a-Mole</h1>
        <p class="text-stone-500 mt-2 tracking-widest uppercase text-sm">by Codenix</p>
    </div>

    <div class="max-w-xl mx-auto text-center">
        <h1 class="text-4xl font-extrabold text-stone-700 mb-2">Whack-a-Mole</h1>
        <div class="text-xl text-stone-500 mb-6">Score: <span id="score" class="font-bold text-stone-800">0</span></div>
        
        <div class="mole-grid" id="grid">
            <!-- Holes -->
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
            <div class="hole"><div class="mole" onclick="whack(this)">🐹</div></div>
        </div>
    </div>

    <script>
        const scoreEl = document.getElementById('score');
        const holes = document.querySelectorAll('.mole');
        let score = 0;
        let lastHole;
        let timeUp = false;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function pop() {
            const time = randomTime(500, 1000);
            const hole = randomHole(holes);
            hole.classList.add('up');
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) pop();
            }, time);
        }

        function whack(mole) {
            if (!mole.classList.contains('up')) return;
            initAudio();
            playSound(600);
            score++;
            scoreEl.textContent = score;
            mole.classList.remove('up');
            mole.classList.add('hit');
            setTimeout(() => mole.classList.remove('hit'), 200);
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            }, 1000);
            setTimeout(pop, 1500);
        };
    </script>
</body>
</html>
