<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .tile-new { animation: pop 0.2s ease-out; }
        .game-over-shake { animation: shake 0.5s ease-in-out; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }
        .cell {
            width: 70px;
            height: 70px;
            background-color: #cdc1b4;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease-in-out;
        }
        .tile-2 { background-color: #eee4da; }
        .tile-4 { background-color: #ede0c8; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; font-size: 20px; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; font-size: 20px; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; font-size: 20px; }
        .tile-1024 { background-color: #edc53f; color: #f9f6f2; font-size: 16px; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; font-size: 16px; }
    </style>
</head>
<body class="bg-stone-100 flex flex-col items-center justify-center min-h-screen font-sans overflow-hidden">

    <div id="loading" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwGODnCy&_nc_oc=AdqdVkG_VLNmSb8AnL8cFGXEKw1SUyQivNB9lXGNwFEpnhMd_XTTsYoIeL6jSWs6fi4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=NitylyVfvXU5I7nHDBYDTg&_nc_ss=7c2a8&oh=00_Af9Er0CMINn2Laf0DWkeVLYIeT4WjAlJZNNF6JsE0zR3cg&oe=6A2C7D41" 
             onerror="this.src='https://placehold.co/150x150/e7e5e4/57534e?text=Codenix'"
             class="w-32 h-32 rounded-full mb-6 border-4 border-stone-200 shadow-lg">
        <h1 class="text-4xl font-extrabold text-stone-800">Codenix 2048</h1>
        <p class="text-stone-500 mt-2 tracking-widest uppercase text-sm">by Codenix</p>
    </div>

    <div class="text-center mb-6">
        <h1 class="text-5xl font-extrabold text-stone-700 mb-2">Codenix 2048</h1>
        <div id="score-container" class="text-xl text-stone-600">Score: <span id="score">0</span></div>
    </div>

    <div class="relative">
        <div class="grid-container" id="grid"></div>
        
        <!-- Game Over Modal -->
        <div id="game-over" class="hidden absolute inset-0 bg-stone-900/80 rounded-lg flex flex-col items-center justify-center z-20">
            <h2 class="text-white text-4xl font-bold mb-4">Game Over!</h2>
            <button onclick="resetGame()" class="px-6 py-2 bg-yellow-500 text-stone-900 font-bold rounded-lg hover:bg-yellow-400 transition shadow-lg">Try Again</button>
        </div>
    </div>

    <button onclick="resetGame()" class="mt-8 px-6 py-2 bg-stone-700 text-white rounded-lg hover:bg-stone-600 transition shadow-md">New Game</button>

    <script>
        let board = Array(16).fill(0);
        let score = 0;
        let audioCtx = null;

        // Initialize Audio context on first click
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'move') {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'merge') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 1000);
            }, 1500);
            init();
        };

        function init() {
            board = Array(16).fill(0);
            score = 0;
            document.getElementById('game-over').classList.add('hidden');
            spawnTile();
            spawnTile();
            updateBoard();
        }

        function spawnTile() {
            let emptyCells = board.map((val, idx) => val === 0 ? idx : -1).filter(idx => idx !== -1);
            if (emptyCells.length > 0) {
                let randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = 4 - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            let merged = false;
            for (let i = 0; i < 3; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                    merged = true;
                }
            }
            return { row, merged };
        }

        function move(direction) {
            initAudio();
            let oldBoard = [...board];
            let anyChange = false;
            let anyMerge = false;

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let row = board.slice(i * 4, i * 4 + 4);
                    if (direction === 'right') row.reverse();
                    let { row: combinedRow, merged } = combine(slide(row));
                    if (merged) anyMerge = true;
                    if (direction === 'right') combinedRow.reverse();
                    for (let j = 0; j < 4; j++) board[i * 4 + j] = combinedRow[j];
                }
            } else {
                for (let i = 0; i < 4; i++) {
                    let col = [board[i], board[i + 4], board[i + 8], board[i + 12]];
                    if (direction === 'down') col.reverse();
                    let { row: combinedCol, merged } = combine(slide(col));
                    if (merged) anyMerge = true;
                    if (direction === 'down') combinedCol.reverse();
                    for (let j = 0; j < 4; j++) board[i + j * 4] = combinedCol[j];
                }
            }

            if (JSON.stringify(oldBoard) !== JSON.stringify(board)) {
                spawnTile();
                updateBoard();
                playSound(anyMerge ? 'merge' : 'move');
                checkGameOver();
            }
        }

        function updateBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board.forEach(val => {
                const cell = document.createElement('div');
                cell.className = `cell ${val ? 'tile-' + val : ''} ${val ? 'tile-new' : ''}`;
                cell.textContent = val || '';
                grid.appendChild(cell);
            });
            document.getElementById('score').textContent = score;
        }

        function checkGameOver() {
            if (board.includes(0)) return;
            // Simplified check: if no neighbors match
            for (let i = 0; i < 16; i++) {
                if (i % 4 !== 3 && board[i] === board[i + 1]) return;
                if (i < 12 && board[i] === board[i + 4]) return;
            }
            // Game Over
            playSound('gameover');
            document.getElementById('grid').classList.add('game-over-shake');
            setTimeout(() => {
                document.getElementById('game-over').classList.remove('hidden');
            }, 500);
        }

        function resetGame() {
            document.getElementById('grid').classList.remove('game-over-shake');
            init();
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
                if (e.key === 'ArrowLeft') move('left');
                if (e.key === 'ArrowRight') move('right');
                if (e.key === 'ArrowUp') move('up');
                if (e.key === 'ArrowDown') move('down');
            }
        });
    </script>
</body>
</html>
