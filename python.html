<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codenix Python - Free Online Python IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .code-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-slate-950 border-b border-slate-800 px-4 py-2.5 flex items-center justify-between z-10 flex-shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-amber-400 to-blue-500 p-2 rounded-xl shadow-lg">
                <i class="fab fa-python text-slate-950 text-xl"></i>
            </div>
            <span class="font-bold text-lg tracking-wider bg-gradient-to-r from-amber-400 via-blue-400 to-blue-500 bg-clip-text text-transparent">CODENIX</span>
        </div>
        <div class="flex items-center space-x-4">
            <div id="pyodide-status" class="flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-800 text-sm">
                <span id="status-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span>
                <span id="status-text" class="text-slate-300 text-xs font-medium">Booting engine...</span>
            </div>
            <button onclick="clearTerminal()" class="text-slate-400 hover:text-slate-200 text-sm"><i class="fas fa-trash-alt mr-1"></i> Clear</button>
            <button id="btn-run" onclick="runPython()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-1.5 rounded-lg font-semibold transition" disabled>Run</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside id="sidebar" class="w-64 min-w-[180px] max-w-[400px] bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                <span class="text-xs font-bold uppercase text-slate-400">Files</span>
                <div class="flex space-x-2">
                    <button onclick="createNewFilePrompt()" class="text-slate-400 hover:text-white"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div id="file-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <div id="resizer-sidebar" class="w-1.5 cursor-col-resize hover:bg-blue-500 bg-slate-800 z-20"></div>

        <section id="editor-section" class="flex-1 min-w-[300px] flex flex-col border-r border-slate-800">
            <div id="editor-container" class="flex-1 w-full bg-[#1e1e1e]"></div>
        </section>

        <div id="resizer-output" class="w-1.5 cursor-col-resize hover:bg-blue-500 bg-slate-800 z-20"></div>

        <section id="output-section" class="w-[480px] min-w-[300px] bg-slate-950 flex flex-col">
            <div id="console-output" class="flex-1 p-4 overflow-y-auto code-font text-xs text-slate-300"></div>
        </section>
    </main>

    <script>
        function setupResizers() {
            const sidebar = document.getElementById('sidebar');
            const outputSection = document.getElementById('output-section');
            document.getElementById('resizer-sidebar').addEventListener('mousedown', (e) => {
                const onMouseMove = (e) => {
                    sidebar.style.width = `${Math.max(180, Math.min(400, e.clientX))}px`;
                    if (window.editor) window.editor.layout();
                };
                const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp, {once: true});
            });
            document.getElementById('resizer-output').addEventListener('mousedown', (e) => {
                const onMouseMove = (e) => {
                    const newWidth = Math.max(300, Math.min(800, window.innerWidth - e.clientX));
                    outputSection.style.width = `${newWidth}px`;
                    if (window.editor) window.editor.layout();
                };
                const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp, {once: true});
            });
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: "print('Hello Codenix!')\nx = 10\nprint(f'The value of x is {x}')",
                language: 'python',
                theme: 'vs-dark'
            });
            setupResizers();
        });

        async function loadPyodideEngine() {
            try {
                const tempDefine = window.define;
                const tempRequire = window.require;
                window.define = undefined;
                window.require = undefined;
                window.pyodide = await loadPyodide();
                window.define = tempDefine;
                window.require = tempRequire;

                document.getElementById('status-dot').className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500";
                document.getElementById('status-text').innerText = "Engine Active";
                document.getElementById('btn-run').disabled = false;
            } catch (err) { console.error(err); }
        }

        window.onload = loadPyodideEngine;
        
        function appendToConsole(text) { 
            const consoleDiv = document.getElementById('console-output');
            consoleDiv.innerText += text; 
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('console-output').innerText = "";
        }

        async function runPython() {
            clearTerminal();
            const code = window.editor.getValue();
            try {
                await window.pyodide.runPythonAsync(`
import sys
import io

class Printer:
    def write(self, data):
        import js
        js.appendToConsole(data)
    def flush(self): pass

sys.stdout = Printer()
sys.stderr = Printer()

try:
    exec("""${code.replace(/\\/g, '\\\\').replace(/"/g, '\\"')}""")
except Exception as e:
    print(e)
                `);
            } catch (err) {
                appendToConsole("Error: " + err);
            }
        }
    </script>
</body>
</html>
