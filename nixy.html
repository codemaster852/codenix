<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix | Professional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #050507;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
            --surface: #121215;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #fafafa;
            overflow: hidden;
        }

        /* Professional Scrollbars */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #a1a1aa;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:hover { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff;
            border-color: #3b82f6;
        }
        .btn-icon.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .btn-action {
            background: #fafafa;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 10px 20px;
            transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.96); }

        /* Code Blocks Styling */
        .code-container {
            margin: 1.5rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
        }
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }
        pre {
            padding: 1.25rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        code { font-family: 'JetBrains Mono', monospace !important; color: #cbd5e1; }

        .msg-bubble { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .input-container {
            background: #111113;
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        #sandboxOverlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); }

        /* Loader Animation */
        .loader-dots span {
            width: 5px; height: 5px; background: #3b82f6; border-radius: 50%; display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* Image Loading & Skeleton */
        .img-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
            background: #111;
            border: 1px solid var(--border);
            aspect-ratio: 1/1;
        }
        .img-skeleton {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .chat-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .chat-img.loaded { opacity: 1; }
        .chat-img.loaded + .img-skeleton { display: none; }
    </style>
</head>
<body class="flex h-screen w-full">

    <!-- Feature Toast -->
    <div id="featureToast" class="fixed top-6 right-6 z-[100] bg-zinc-900 border border-blue-500/30 p-5 rounded-2xl shadow-2xl max-w-sm hidden">
        <div class="flex gap-4">
            <div class="bg-blue-500/20 p-2.5 rounded-xl h-fit"><i data-lucide="sparkles" class="w-5 h-5 text-blue-400"></i></div>
            <div>
                <h4 class="text-sm font-bold text-white">Nix Memory v4.5</h4>
                <p class="text-[12px] text-zinc-400 mt-1 leading-relaxed">Synthesis now incorporates your neural history for personalized logic generation.</p>
                <button onclick="closeToast()" class="mt-4 text-[11px] font-black text-blue-500 uppercase tracking-widest">Acknowledge</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-[#050507] border-r border-white/[0.05] flex flex-col hidden lg:flex">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]">N</div>
            <span class="font-bold text-sm tracking-widest text-white uppercase">Nix Core</span>
        </div>
        
        <div class="px-4 mb-4">
            <button onclick="startNewChat()" class="btn-action w-full flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="plus" class="w-4 h-4"></i> New Synthesis
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-2 space-y-1" id="chatHistory">
            <div class="text-center py-10 text-zinc-600 text-[10px] uppercase tracking-widest font-bold">History Synchronizing...</div>
        </div>

        <div class="p-4 border-t border-white/[0.05]">
            <div class="flex items-center gap-3 p-3 bg-white/[0.03] rounded-xl border border-white/[0.05]">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] text-white font-bold" id="userInitial">?</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[11px] font-bold text-zinc-200 truncate" id="userEmail">User</p>
                    <button onclick="signOut()" class="text-[9px] text-zinc-500 hover:text-red-400 uppercase font-bold transition-colors">Terminate Session</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col relative h-full">
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/[0.05] bg-black/50 backdrop-blur-xl sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-zinc-400"><i data-lucide="menu" class="w-5 h-5"></i></button>
                <div id="fileBadge" class="hidden flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-3 py-1.5 rounded-lg">
                    <i data-lucide="file-text" class="w-3.5 h-3.5 text-blue-400"></i>
                    <span id="fileName" class="text-[10px] font-bold text-blue-400 uppercase truncate max-w-[120px]">File</span>
                    <button onclick="clearFile()" class="ml-1 text-blue-400 hover:text-white"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="importMemory()" class="text-[10px] font-black uppercase text-zinc-500 hover:text-white transition-colors border border-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <i data-lucide="database" class="w-3 h-3"></i> Neural Memory
                </button>
            </div>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto">
            <div class="max-w-3xl mx-auto px-6 py-12" id="messagesWrapper">
                <div id="emptyState" class="py-20 text-center space-y-6">
                    <div class="w-16 h-16 bg-blue-600/10 rounded-2xl mx-auto flex items-center justify-center border border-blue-500/20">
                        <i data-lucide="cpu" class="w-8 h-8 text-blue-500"></i>
                    </div>
                    <h1 class="text-3xl font-bold tracking-tight text-white">Synthesize intelligence.</h1>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-xl mx-auto">
                        <button onclick="prefill('Create a responsive analytics dashboard in HTML/CSS')" class="p-4 bg-white/[0.02] border border-white/5 rounded-xl text-left hover:border-blue-500/50 transition-all group">
                            <i data-lucide="layout" class="w-4 h-4 text-zinc-500 mb-2 group-hover:text-blue-400"></i>
                            <p class="text-sm font-bold text-zinc-200">Dashboard UI</p>
                            <p class="text-[11px] text-zinc-500 mt-1">Full code synthesis with live preview.</p>
                        </button>
                        <button onclick="prefill('Draw a futuristic workspace with blue holographic displays')" class="p-4 bg-white/[0.02] border border-white/5 rounded-xl text-left hover:border-blue-500/50 transition-all group">
                            <i data-lucide="palette" class="w-4 h-4 text-zinc-500 mb-2 group-hover:text-purple-400"></i>
                            <p class="text-sm font-bold text-zinc-200">Visual Vision</p>
                            <p class="text-[11px] text-zinc-500 mt-1">Generate high-fidelity imagery.</p>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-3xl mx-auto input-container p-3 flex flex-col gap-3">
                <textarea 
                    id="userInput"
                    rows="1"
                    placeholder="Message Nix Core..."
                    class="w-full bg-transparent px-3 py-2 resize-none outline-none text-[15px] text-white placeholder-zinc-700"
                    oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"
                ></textarea>
                
                <div class="flex items-center justify-between border-t border-white/5 pt-3 px-1">
                    <div class="flex gap-2">
                        <input type="file" id="fileInput" class="hidden" onchange="handleFile(event)">
                        <button onclick="document.getElementById('fileInput').click()" class="btn-icon" title="Attach Data">
                            <i data-lucide="paperclip" class="w-4 h-4"></i>
                        </button>
                        <button onclick="toggleVisualMode()" id="visualBtn" class="btn-icon" title="Render Visual">
                            <i data-lucide="image" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <button id="sendBtn" onclick="send()" class="btn-action flex items-center gap-2">
                        SYNTHESIZE <i data-lucide="zap" class="w-3.5 h-3.5 fill-current"></i>
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center text-zinc-700 mt-4 uppercase tracking-[0.25em] font-black">Codenix Intelligent Systems v4.5</p>
        </div>
    </main>

    <div id="sandboxOverlay">
        <div class="h-full flex flex-col">
            <div class="h-14 bg-zinc-900 border-b border-white/10 flex items-center justify-between px-6">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-amber-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-4">Nix Runtime Environment</span>
                </div>
                <button onclick="closeSandbox()" class="text-zinc-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <iframe id="sandboxFrame" class="flex-1 w-full bg-white"></iframe>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";

        let client, user, activeConversation, activeFile, isVisual = false, memory = [];

        async function init() {
            try {
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data } = await client.auth.getUser();
                if (!data.user) {
                    window.location.href = 'auth.html';
                    return;
                }
                user = data.user;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userInitial').innerText = user.email[0].toUpperCase();
                
                await syncHistory();
                await syncMemory();
                checkAlert();
                refresh();
            } catch (err) {
                console.error("Init Failure:", err);
            }
        }

        async function syncHistory() {
            const { data } = await client.from('conversations').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
            const list = document.getElementById('chatHistory');
            if (!data?.length) {
                list.innerHTML = `<p class="text-[9px] text-zinc-700 p-4 font-bold uppercase tracking-widest text-center">Empty Memory Banks</p>`;
                return;
            }
            list.innerHTML = data.map(c => `
                <button onclick="loadConv('${c.id}')" class="w-full text-left p-3 rounded-xl text-xs text-zinc-500 hover:bg-white/[0.03] hover:text-white transition-all flex items-center gap-2 ${activeConversation === c.id ? 'bg-blue-600/10 text-blue-400 border border-blue-500/20' : ''}">
                    <i data-lucide="message-circle" class="w-3 h-3"></i>
                    <span class="truncate">${c.title}</span>
                </button>
            `).join('');
            refresh();
        }

        async function syncMemory() {
            const { data } = await client.from('user_memories').select('*').eq('user_id', user.id);
            if (data) memory = data;
        }

        function checkAlert() {
            if (!localStorage.getItem('nix_alert_v45')) {
                document.getElementById('featureToast').classList.remove('hidden');
            }
        }

        function closeToast() {
            document.getElementById('featureToast').classList.add('hidden');
            localStorage.setItem('nix_alert_v45', 'true');
        }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val && !activeFile) return;

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('emptyState')?.remove();

            if (!activeConversation) {
                const { data } = await client.from('conversations').insert({ user_id: user.id, title: val.substring(0, 30) || 'Active Synthesis' }).select();
                activeConversation = data[0].id;
                await syncHistory();
            }

            const content = val + (activeFile ? `\n\n[ATTACHED_CONTENT: ${activeFile.name}]` : '');
            append('user', content);
            await saveMsg('user', content);

            if (isVisual || val.toLowerCase().match(/(generate|photo|draw|image|picture|render) (of |a )/)) {
                await renderVisual(val);
            } else {
                await compute(val);
            }
        }

        async function compute(text) {
            showLoading("Synthesizing Response...");
            try {
                const memContext = memory.map(m => m.content).join(" | ");
                const sys = `You are Nix, a professional intelligence built by Codenix. User Memory: ${memContext}. File: ${activeFile ? activeFile.content : 'None'}. Output only Markdown. Ensure code blocks use triple backticks with language tags.`;

                const res = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [{ role: "system", content: sys }, { role: "user", content: text }]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                hideLoading();
                append('assistant', reply);
                await saveMsg('assistant', reply);
            } catch (e) {
                hideLoading();
                append('assistant', "Fatal Error: Neural core synchronization failure.");
            }
        }

        async function renderVisual(prompt) {
            showLoading("Allocating GPU resources...");
            const clean = prompt.replace(/(generate|photo|draw|image|picture|render) (of |a )/gi, "").trim() || "Deep Neural Network Abstract";
            const url = `https://pollinations.ai/p/${encodeURIComponent(clean)}?width=1024&height=1024&nologo=true&seed=${Date.now()}`;
            
            setTimeout(async () => {
                hideLoading();
                const md = `Visual Synthesis Result: **"${clean}"**\n\n![Nix Generation](${url})`;
                append('assistant', md);
                await saveMsg('assistant', md);
                isVisual = false;
                document.getElementById('visualBtn').classList.remove('active');
            }, 3000);
        }

        async function saveMsg(role, content) {
            await client.from('messages').insert({ conversation_id: activeConversation, role, content });
        }

        function append(role, content) {
            const container = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            const isAI = role === 'assistant';
            div.className = `msg-bubble mb-10 ${isAI ? 'pl-5 border-l-[3px] border-blue-600/30' : 'bg-white/[0.03] p-6 rounded-2xl border border-white/5'}`;
            
            div.innerHTML = `
                ${isAI ? `<div class="flex items-center gap-2 mb-4"><div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div><div class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em]">Nix Engine</div></div>` : ''}
                <div class="text-[15px] leading-relaxed text-zinc-300">${parse(content)}</div>
            `;
            
            container.appendChild(div);
            refresh();
            const scroller = document.getElementById('chatContainer');
            scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
        }

        function parse(text) {
            // Updated Image Parser with Skeleton Loader
            text = text.replace(/!\[.*?\]\((.*?)\)/g, (m, url) => `
                <div class="img-wrapper">
                    <img src="${url}" class="chat-img" onload="this.classList.add('loaded')" onerror="handleImgError(this)" />
                    <div class="img-skeleton">
                        <div class="loader-dots"><span></span><span></span><span></span></div>
                        <span class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest">Rendering via Pollinations.ai</span>
                    </div>
                </div>
            `);
            
            // Clean Code Blocks
            text = text.replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => {
                const id = 'c' + Math.random().toString(36).substr(2, 5);
                const safeCode = code.trim().replace(/`/g, '\\`').replace(/\$/g, '\\$');
                return `
                    <div class="code-container">
                        <div class="code-header">
                            <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">${lang || 'plaintext'}</span>
                            <div class="flex gap-4">
                                <button onclick="copyCode(this, \`${safeCode}\`)" class="text-[9px] font-black text-zinc-500 hover:text-blue-400 uppercase tracking-widest">Copy</button>
                                <button onclick="preview(\`${safeCode}\`)" class="text-[9px] font-black text-blue-500 hover:text-blue-300 uppercase tracking-widest">Preview</button>
                            </div>
                        </div>
                        <pre><code>${code.trim()}</code></pre>
                    </div>`;
            });

            return text.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>').replace(/\n/g, '<br>');
        }

        function handleImgError(img) {
            img.src = `https://pollinations.ai/p/error_generating_image?seed=${Math.random()}`;
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code);
            const original = btn.innerText;
            btn.innerText = "Copied!";
            btn.classList.add('text-green-500');
            setTimeout(() => {
                btn.innerText = original;
                btn.classList.remove('text-green-500');
            }, 2000);
        }

        function showLoading(msg) {
            const div = document.createElement('div');
            div.id = "loader";
            div.className = "flex items-center gap-4 py-8 px-6";
            div.innerHTML = `<div class="loader-dots"><span></span><span></span><span></span></div><span class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em]">${msg}</span>`;
            document.getElementById('messagesWrapper').appendChild(div);
        }

        function hideLoading() { document.getElementById('loader')?.remove(); }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                activeFile = { name: file.name, content: ev.target.result };
                document.getElementById('fileBadge').classList.remove('hidden');
                document.getElementById('fileName').innerText = file.name;
            };
            reader.readAsText(file);
        }

        function clearFile() {
            activeFile = null;
            document.getElementById('fileBadge').classList.add('hidden');
        }

        function toggleVisualMode() {
            isVisual = !isVisual;
            document.getElementById('visualBtn').classList.toggle('active', isVisual);
        }

        function preview(code) {
            document.getElementById('sandboxOverlay').style.display = 'block';
            const frame = document.getElementById('sandboxFrame');
            frame.srcdoc = code.includes('<html>') ? code : `<html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="bg-zinc-50 p-10 font-sans">${code.replace(/\n/g, '<br>')}</body></html>`;
        }

        function closeSandbox() { document.getElementById('sandboxOverlay').style.display = 'none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
        function startNewChat() { location.reload(); }
        function prefill(txt) {
            const input = document.getElementById('userInput');
            input.value = txt;
            input.focus();
            input.dispatchEvent(new Event('input'));
        }
        function refresh() { if (window.lucide) window.lucide.createIcons(); }
        async function signOut() {
            await client.auth.signOut();
            window.location.href = 'auth.html';
        }

        window.onload = init;
    </script>
</body>
</html>
