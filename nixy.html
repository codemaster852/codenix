<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix | Professional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --nix-accent: #3b82f6;
            --nix-bg: #050507;
            --nix-surface: #0e0e11;
            --nix-border: rgba(255, 255, 255, 0.08);
            --code-bg: #1a1a1c;
            --code-header: #252529;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--nix-bg);
            color: #fafafa;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .glass-panel {
            background: rgba(14, 14, 17, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid var(--nix-border);
        }

        .nix-gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-nix {
            background: #fafafa;
            color: #000;
            transition: all 0.2s ease;
        }
        .btn-nix:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        /* Modern Dark Code Block Styles */
        .code-container {
            background: var(--code-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin: 1.5rem 0;
            overflow: hidden;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.7);
        }
        .code-header {
            padding: 10px 16px;
            background: var(--code-header);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-header .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }
        .copy-btn {
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .code-layout {
            display: flex;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .line-numbers {
            padding: 1.25rem 0.75rem;
            text-align: right;
            background: rgba(0,0,0,0.2);
            color: #4b5563;
            user-select: none;
            min-width: 45px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        pre {
            padding: 1.25rem;
            color: #d1d5db;
            overflow-x: auto;
            flex: 1;
            margin: 0;
        }

        /* Basic Pseudo-Highlighting */
        .hl-keyword { color: #c678dd; }
        .hl-func { color: #61afef; }
        .hl-string { color: #98c379; }
        .hl-comment { color: #5c6370; font-style: italic; }
        .hl-tag { color: #e06c75; }
        .hl-attr { color: #d19a66; }

        .msg-bubble {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #mobileOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 45;
        }

        @media (max-width: 1024px) {
            #sidebar { position: fixed; left: -100%; top: 0; height: 100%; z-index: 50; transition: left 0.3s; }
            #sidebar.open { left: 0; }
            #mobileOverlay.show { display: block; }
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row bg-[#050507]">

    <div id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] lg:w-80 glass-panel border-r border-white/5 flex flex-col p-6 h-full">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                    <span class="font-black text-xl">N</span>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter">Nix <span class="nix-gradient-text">Core</span></h1>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-zinc-500 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">
                <i class="fa-solid fa-plus"></i> New Session
            </button>

            <div class="pt-4 border-t border-white/5">
                <div id="chatHistoryList" class="space-y-2"></div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] font-bold">U</div>
                <div class="flex-1 overflow-hidden">
                    <p id="userEmail" class="text-[10px] font-bold text-white truncate">User</p>
                    <button onclick="signOut()" class="text-[9px] text-zinc-500 hover:text-red-400 uppercase tracking-widest font-black">Sign Out</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-screen w-full bg-[#050507]">
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 border-b border-white/5 bg-black/20 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-lg border border-white/10 text-zinc-400">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <span class="text-[11px] font-black uppercase tracking-[0.4em] text-zinc-500">Neural Sync Active</span>
            </div>
        </header>

        <!-- Chat Window -->
        <div id="chatWindow" class="flex-1 overflow-y-auto p-4 lg:p-12 space-y-8 scroll-smooth">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center border border-blue-500/20">
                    <i class="fa-solid fa-brain text-4xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">System Online.</h2>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 lg:p-10 bg-gradient-to-t from-[#050507] via-[#050507]/90 to-transparent shrink-0">
            <div class="max-w-4xl mx-auto">
                <div class="glass-panel p-2 rounded-[24px] flex flex-col gap-2 border-white/10">
                    <div class="px-3 pt-2">
                        <textarea id="promptInput" rows="1" 
                            class="w-full bg-transparent border-none outline-none text-[15px] p-2 text-white placeholder-zinc-700 resize-none"
                            placeholder="Message Nix..."
                            onkeydown="handleKeyDown(event)"></textarea>
                    </div>
                    <div class="flex items-center justify-between p-2 border-t border-white/5">
                        <div class="flex gap-2">
                            <label class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 cursor-pointer">
                                <input type="file" class="hidden" id="fileInput">
                                <i class="fa-solid fa-paperclip"></i>
                            </label>
                        </div>
                        <button onclick="handleInput()" class="btn-nix px-8 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">
                            <span>Execute</span>
                            <i class="fa-solid fa-bolt-lightning text-[10px]"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        
        let currentConvId = null;
        let currentUser = null;

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = "auth.html"; }
            else { 
                currentUser = session.user; 
                document.getElementById('userEmail').innerText = currentUser.email;
                loadConversations();
            }
        }

        async function loadConversations() {
            const { data } = await supabaseClient.from('conversations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const list = document.getElementById('chatHistoryList');
            list.innerHTML = (data || []).map(conv => `
                <button onclick="loadChat('${conv.id}')" class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition text-[11px] text-zinc-400 truncate">
                    <i class="fa-regular fa-message mr-2 opacity-40"></i> ${conv.title || 'Untitled Session'}
                </button>
            `).join('');
        }

        async function createNewChat(title = "New Session") {
            const { data } = await supabaseClient.from('conversations').insert([{ user_id: currentUser.id, title: title.substring(0, 30) }]).select().single();
            currentConvId = data.id;
            document.getElementById('chatWindow').innerHTML = "";
            loadConversations();
        }

        async function loadChat(id) {
            currentConvId = id;
            document.getElementById('chatWindow').innerHTML = "";
            document.getElementById('emptyState')?.remove();
            const { data } = await supabaseClient.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
            (data || []).forEach(msg => appendMsg(msg.role, msg.content));
        }

        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleInput(); } }

        async function handleInput() {
            const input = document.getElementById('promptInput');
            const text = input.value.trim();
            if (!text) return;
            if (!currentConvId) await createNewChat(text);
            document.getElementById('emptyState')?.remove();
            appendMsg('user', text);
            await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'user', content: text }]);
            input.value = '';
            await computeResponse(text);
        }

        async function computeResponse(text) {
            const id = 'msg-' + Date.now();
            appendMsg('assistant', "...", id);
            try {
                const res = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [{ role: "system", content: "You are Nix Core. Use code blocks for code snippets." }, { role: "user", content: text }]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById(id).innerHTML = formatMarkdown(reply);
                await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'assistant', content: reply }]);
            } catch (e) { document.getElementById(id).innerHTML = "Sync Interrupted."; }
        }

        function appendMsg(role, content, id = null) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-bubble flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[85%] ${role === 'user' ? 'bg-white/5 border border-white/10 p-4 rounded-2xl' : ''}">
                    ${role === 'assistant' ? `<div class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-2">Nix Core</div>` : ''}
                    <div id="${id || ''}" class="text-[14px] leading-relaxed text-zinc-300">${role === 'user' ? content : formatMarkdown(content)}</div>
                </div>
            `;
            win.appendChild(div);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function formatMarkdown(text) {
            if (!text) return "";
            const blocks = [];
            text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (match, lang, code) => {
                const id = `__CODE_${blocks.length}__`;
                const cleanCode = code.trim();
                const lines = cleanCode.split('\n');
                const lineNums = lines.map((_, i) => i + 1).join('\n');
                
                // Enhanced Syntax Coloring (Simple Regex)
                let highlighted = cleanCode
                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                    .replace(/\b(const|let|var|function|return|if|else|for|while|import|export|class|await|async)\b/g, '<span class="hl-keyword">$1</span>')
                    .replace(/(\b\w+)(?=\()/g, '<span class="hl-func">$1</span>')
                    .replace(/(".*?"|'.*?'|`.*?`)/g, '<span class="hl-string">$1</span>')
                    .replace(/(\/\/.+)/g, '<span class="hl-comment">$1</span>')
                    .replace(/(&lt;\/?[a-z1-6]+)/gi, '<span class="hl-tag">$1</span>')
                    .replace(/(\s[a-z-]+(?==))/gi, '<span class="hl-attr">$1</span>');

                const html = `
                    <div class="code-container">
                        <div class="code-header">
                            <div class="file-info"><i class="fa-solid fa-code"></i> <span>${lang || 'code'}</span></div>
                            <button onclick="copyCode(this)" class="copy-btn">Copy</button>
                        </div>
                        <div class="code-layout">
                            <div class="line-numbers">${lineNums}</div>
                            <pre><code>${highlighted}</code></pre>
                        </div>
                    </div>
                `;
                blocks.push(html);
                return id;
            });

            let processed = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>').replace(/\n/g, '<br>');
            blocks.forEach((h, i) => processed = processed.replace(`__CODE_${i}__`, h));
            return processed;
        }

        function copyCode(btn) {
            const code = btn.closest('.code-container').querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy", 2000);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function signOut() { supabaseClient.auth.signOut().then(() => window.location.reload()); }

        window.onload = checkAuth;
    </script>
</body>
</html>
