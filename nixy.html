<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix | Professional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --nix-accent: #3b82f6;
            --nix-bg: #050507;
            --nix-surface: #0e0e11;
            --nix-border: rgba(255, 255, 255, 0.08);
            --melon-primary: #bef264;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--nix-bg);
            color: #fafafa;
            overflow: hidden;
            height: 100vh;
        }

        .glass-panel {
            background: rgba(14, 14, 17, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid var(--nix-border);
        }

        .nix-gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .skeleton {
            background: linear-gradient(90deg, #121215 25%, #1c1c22 50%, #121215 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .btn-nix {
            background: #fafafa;
            color: #000;
            transition: all 0.2s ease;
        }
        .btn-nix:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .code-container {
            background: #000;
            border: 1px solid var(--nix-border);
            border-radius: 12px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .code-header {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--nix-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        pre {
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #d1d5db;
            overflow-x: auto;
        }

        .msg-bubble {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .img-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--nix-border);
            background: #000;
        }
        .img-display {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .img-display.loaded { opacity: 1; }
        
        .active-visual {
            color: var(--melon-primary) !important;
            border-color: rgba(190, 242, 100, 0.3) !important;
            background: rgba(190, 242, 100, 0.05) !important;
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <!-- Left Sidebar: Nix Identity & TinyMelon Controls -->
    <aside class="w-full lg:w-80 glass-panel border-r flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                <span class="font-black text-xl">N</span>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter">Nix <span class="nix-gradient-text">Core</span></h1>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto pr-2">
            <div class="p-4 bg-white/[0.03] rounded-2xl border border-white/[0.05] mb-4">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Status</p>
                <p class="text-xs font-bold text-blue-400">Professional Intelligence v4.5</p>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-lemon text-lime-400 text-[10px]"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest text-lime-400/70">Tiny Melon Engine</span>
                </div>
                
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest text-zinc-600 mb-2 block">Neural Model</label>
                    <select id="modelSelect" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none focus:border-blue-500/50">
                        <option value="flux">TinyMelon Flux High-Res</option>
                        <option value="flux-realism">TinyMelon Reality</option>
                        <option value="any">Standard Synthetic</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-bold uppercase tracking-widest text-zinc-600 mb-2 block">Output Ratio</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setRatio('1024x1024')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold transition active" id="btn-1-1">1:1 Square</button>
                        <button onclick="setRatio('1280x720')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold transition" id="btn-16-9">16:9 HD</button>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-white/5">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-4">Synthesis History</h3>
                <div id="historyTray" class="grid grid-cols-3 gap-2"></div>
            </div>
        </div>

        <div class="mt-auto pt-6 text-center">
            <p class="text-[9px] font-bold text-zinc-700 uppercase tracking-widest">Codenix Intelligent Systems</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-screen">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 bg-black/20 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                    <span class="text-[11px] font-black uppercase tracking-[0.4em] text-zinc-500">Neural Sync Active</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button class="text-[10px] font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest px-3 py-1.5 border border-white/10 rounded-lg">Documentation</button>
            </div>
        </header>

        <!-- Chat Window -->
        <div id="chatWindow" class="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center border border-blue-500/20">
                    <i class="fa-solid fa-brain text-4xl text-blue-500"></i>
                </div>
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight">I am Nix.</h2>
                    <p class="text-zinc-500 mt-2 max-w-sm mx-auto">Your professional partner in code, logic, and visual synthesis through the Tiny Melon engine.</p>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="p-6 lg:p-10 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="glass-panel p-2 rounded-[24px] flex flex-col gap-2 border-white/10 shadow-2xl">
                    <div class="px-3 pt-2">
                        <textarea id="promptInput" rows="1" 
                            class="w-full bg-transparent border-none outline-none text-[15px] p-2 text-white placeholder-zinc-700 resize-none"
                            placeholder="Message Nix or request a TinyMelon harvest..."
                            oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"></textarea>
                    </div>
                    <div class="flex items-center justify-between p-2 border-t border-white/5">
                        <div class="flex gap-2">
                            <button onclick="toggleVisual()" id="visualBtn" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 transition border border-transparent" title="TinyMelon Visual Harvest">
                                <i class="fa-solid fa-image"></i>
                            </button>
                        </div>
                        <button id="sendBtn" onclick="handleInput()" class="btn-nix px-8 py-2.5 rounded-xl font-black text-xs uppercase tracking-[0.2em] flex items-center gap-2">
                            <span>Execute</span>
                            <i class="fa-solid fa-bolt-lightning text-[10px]"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        let activeRatio = "1024x1024";
        let visualMode = false;
        const history = [];

        function setRatio(res) {
            activeRatio = res;
            document.querySelectorAll('.ratio-btn').forEach(b => {
                b.classList.remove('border-blue-500/50', 'bg-blue-500/10', 'text-blue-400');
            });
            const activeId = res === '1024x1024' ? 'btn-1-1' : 'btn-16-9';
            document.getElementById(activeId).classList.add('border-blue-500/50', 'bg-blue-500/10', 'text-blue-400');
        }

        function toggleVisual() {
            visualMode = !visualMode;
            document.getElementById('visualBtn').classList.toggle('active-visual', visualMode);
        }

        async function handleInput() {
            const input = document.getElementById('promptInput');
            const text = input.value.trim();
            if (!text) return;

            document.getElementById('emptyState')?.remove();
            appendMsg('user', text);
            input.value = '';
            input.style.height = 'auto';

            const imageTriggers = ['generate', 'draw', 'harvest', 'image', 'photo', 'picture', 'melon'];
            const needsImage = visualMode || imageTriggers.some(t => text.toLowerCase().includes(t));

            if (needsImage) {
                await generateImage(text);
                visualMode = false;
                document.getElementById('visualBtn').classList.remove('active-visual');
            } else {
                await computeResponse(text);
            }
        }

        async function generateImage(prompt) {
            const id = 'img-' + Date.now();
            const cleanPrompt = prompt.replace(/(generate|draw|harvest|image of|photo|picture|melon)/gi, "").trim() || prompt;
            
            appendMsg('assistant', `Nix is initiating a TinyMelon harvest for: **"${cleanPrompt}"**`, id);
            
            const model = document.getElementById('modelSelect').value;
            const [w, h] = activeRatio.split('x');
            const seed = Math.floor(Math.random() * 1000000);
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt)}?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true`;

            const container = document.getElementById(id);
            container.innerHTML += `
                <div class="img-wrapper mt-4 aspect-square max-w-xl">
                    <div class="absolute inset-0 skeleton flex flex-col items-center justify-center gap-3">
                        <i class="fa-solid fa-lemon text-lime-400 text-3xl animate-bounce"></i>
                        <span class="text-[9px] font-black text-lime-400 uppercase tracking-[0.3em]">Harvesting via Tiny Melon...</span>
                    </div>
                    <img src="${url}" class="img-display relative z-10 w-full h-full object-cover" onload="this.classList.add('loaded')">
                </div>
            `;
            addToHistory(url);
        }

        async function computeResponse(text) {
            const id = 'msg-' + Date.now();
            appendMsg('assistant', `<div class="flex gap-1"><span class="w-1 h-1 bg-blue-500 animate-pulse"></span><span class="w-1 h-1 bg-blue-500 animate-pulse [animation-delay:0.2s]"></span><span class="w-1 h-1 bg-blue-500 animate-pulse [animation-delay:0.4s]"></span></div>`, id);

            try {
                const res = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [
                            { role: "system", content: "You are Nix, a professional intelligence core. You communicate with clarity and expertise. Use markdown for all output. If the user asks for visuals, tell them you'll use the Tiny Melon engine." },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById(id).innerHTML = formatMarkdown(reply);
            } catch (e) {
                document.getElementById(id).innerHTML = "Critical: Nix Core synchronization failure.";
            }
        }

        function appendMsg(role, content, id = null) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-bubble flex gap-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const inner = `
                <div class="max-w-[85%] ${role === 'user' ? 'bg-white/[0.03] border border-white/10 p-4 rounded-2xl rounded-tr-none' : ''}">
                    ${role === 'assistant' ? `<div class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mb-3 flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> Nix Core Analysis</div>` : ''}
                    <div id="${id || ''}" class="text-[14px] leading-relaxed text-zinc-300">${role === 'user' ? content : formatMarkdown(content)}</div>
                </div>
            `;
            
            div.innerHTML = inner;
            win.appendChild(div);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function formatMarkdown(text) {
            text = text.replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => `
                <div class="code-container">
                    <div class="code-header">
                        <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">${lang || 'plaintext'}</span>
                        <button onclick="copyToClipboard(this, \`${code.trim().replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="text-[9px] font-bold text-blue-500 hover:text-white transition">COPY CODE</button>
                    </div>
                    <pre><code>${code.trim()}</code></pre>
                </div>
            `);
            return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>').replace(/\n/g, '<br>');
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text);
            const old = btn.innerText;
            btn.innerText = 'COPIED';
            setTimeout(() => btn.innerText = old, 2000);
        }

        function addToHistory(url) {
            history.unshift(url);
            if (history.length > 9) history.pop();
            const tray = document.getElementById('historyTray');
            tray.innerHTML = history.map(u => `
                <div class="aspect-square rounded-lg overflow-hidden border border-white/5 hover:border-blue-500/40 cursor-pointer transition" onclick="window.open('${u}', '_blank')">
                    <img src="${u}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        setRatio('1024x1024');
    </script>
</body>
</html>
