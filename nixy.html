<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix AI | Codenix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Quicksand:wght@600;700&display=swap');
        
        :root {
            --nix-primary: #6366f1;
            --nix-secondary: #a855f7;
            --melon-primary: #a3e635;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #e5e5e5;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nix-gradient {
            background: linear-gradient(135deg, var(--nix-primary) 0%, var(--nix-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Message Bubbles & Animations */
        .msg-container {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Dots */
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #6366f1;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Image Generation Overlay */
        .melon-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }

        .melon-scanner {
            width: 100%;
            height: 2px;
            background: var(--melon-primary);
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px var(--melon-primary);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .code-block {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'monospace';
            margin: 1rem 0;
            position: relative;
        }

        .chat-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid var(--nix-primary);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-80 glass-panel p-6 flex flex-col gap-6 border-r border-white/5">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg">
                    <i class="fas fa-terminal text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight nix-gradient">Nix AI</h1>
            </div>
            <button onclick="createNewChat()" class="text-gray-500 hover:text-white transition">
                <i class="fas fa-edit"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-4 pr-2">
            <div id="chat-history-list" class="space-y-1">
                <!-- History populated by JS -->
            </div>
        </div>

        <div id="user-profile" class="pt-4 border-t border-white/5 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center font-bold" id="user-initial">?</div>
            <div class="flex-1 truncate">
                <p id="user-email" class="text-xs font-semibold truncate">User</p>
                <button onclick="signOut()" class="text-[10px] text-gray-500 uppercase font-bold">Sign Out</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative bg-[#050505]">
        
        <!-- Header -->
        <header class="h-14 border-b border-white/5 flex items-center justify-between px-6 bg-black/40 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="px-2 py-1 rounded bg-indigo-500/10 text-[10px] font-bold text-indigo-400 border border-indigo-500/20 uppercase tracking-widest">Model: Omni-2603</div>
                <div class="px-2 py-1 rounded bg-lime-500/10 text-[10px] font-bold text-lime-400 border border-lime-500/20 uppercase tracking-widest">Engine: Tiny Melon</div>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-12 space-y-8">
            <!-- Welcome or History -->
        </div>

        <!-- Typing Indicator (Hidden by default) -->
        <div id="typing-indicator" class="hidden px-12 py-2 flex gap-2 items-center">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span class="text-[10px] text-gray-600 font-bold uppercase ml-2">Nix is thinking...</span>
        </div>

        <!-- Input -->
        <div class="p-6 bg-gradient-to-t from-black via-black to-transparent">
            <div class="max-w-4xl mx-auto">
                <div id="file-previews" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="relative group glass-panel rounded-3xl p-2 transition-all focus-within:ring-2 focus-within:ring-indigo-500/30">
                    <div class="flex items-end gap-2 px-2">
                        <button onclick="triggerFile()" class="p-3 text-gray-500 hover:text-white transition">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <input type="file" id="file-input" class="hidden" multiple onchange="handleFiles(event)">
                        
                        <textarea 
                            id="user-input"
                            rows="1" 
                            placeholder="Type a message or /draw with Tiny Melon..." 
                            class="flex-1 bg-transparent py-4 px-2 resize-none focus:outline-none text-sm"
                            onkeydown="handleKey(event)"
                            oninput="autoResize(this)"
                        ></textarea>

                        <button onclick="sendMessage()" class="p-3 w-12 h-12 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg transition-all flex items-center justify-center mb-1">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // Provided by environment
        const LONGCAT_API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let currentChatId = null;
        let attachedFiles = [];

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "auth.html"; return; }
            currentUser = session.user;
            document.getElementById('user-email').innerText = currentUser.email;
            document.getElementById('user-initial').innerText = currentUser.email[0].toUpperCase();
            loadHistory();
            createNewChat();
        }

        // --- History Logic ---
        async function loadHistory() {
            const { data } = await supabase.from('conversations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const list = document.getElementById('chat-history-list');
            list.innerHTML = (data || []).map(chat => `
                <button onclick="loadChat('${chat.id}')" class="chat-item w-full text-left p-3 rounded-xl transition text-xs truncate flex items-center gap-3 ${chat.id === currentChatId ? 'active' : 'text-gray-400 hover:bg-white/5'}">
                    <i class="fas fa-message opacity-30"></i>
                    <span class="truncate">${chat.title}</span>
                </button>
            `).join('');
        }

        async function loadChat(id) {
            currentChatId = id;
            const container = document.getElementById('chat-container');
            container.innerHTML = '<div class="h-full flex items-center justify-center text-xs text-gray-600 uppercase tracking-widest animate-pulse">Syncing Conversation...</div>';
            
            const { data: msgs } = await supabase.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
            container.innerHTML = '';
            msgs?.forEach(m => addMessageUI(m.role, m.content, [], false));
            loadHistory();
        }

        function createNewChat() {
            currentChatId = null;
            document.getElementById('chat-container').innerHTML = `
                <div class="max-w-2xl mx-auto text-center py-24 space-y-6">
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-xl">
                        <i class="fas fa-robot text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold nix-gradient">New Project</h2>
                    <p class="text-gray-500 text-sm">Upload files or ask Tiny Melon to generate designs.</p>
                </div>
            `;
        }

        // --- Chat & Multi-Modal Logic ---
        function triggerFile() { document.getElementById('file-input').click(); }

        async function handleFiles(e) {
            for (const file of Array.from(e.target.files)) {
                const base64 = await toBase64(file);
                attachedFiles.push({ name: file.name, type: file.type, data: base64 });
            }
            renderFileChips();
        }

        function renderFileChips() {
            const container = document.getElementById('file-previews');
            container.innerHTML = attachedFiles.map((f, i) => `
                <div class="px-3 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 flex items-center gap-2 text-[10px]">
                    <i class="fas ${f.type.includes('image') ? 'fa-image' : 'fa-file-alt'} text-indigo-400"></i>
                    <span>${f.name}</span>
                    <button onclick="removeFile(${i})" class="hover:text-red-400"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        function removeFile(i) { attachedFiles.splice(i, 1); renderFileChips(); }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if (!prompt && attachedFiles.length === 0) return;

            // Clear UI for first msg
            if (!currentChatId) document.getElementById('chat-container').innerHTML = '';

            addMessageUI('user', prompt, attachedFiles);
            input.value = '';
            input.style.height = 'auto';

            const userFiles = [...attachedFiles];
            attachedFiles = [];
            renderFileChips();

            if (prompt.toLowerCase().startsWith('/draw')) {
                const drawPrompt = prompt.replace('/draw', '').trim();
                generateImage(drawPrompt);
                return;
            }

            // Normal Multi-modal Chat
            showLoading(true);
            const contents = [];
            if (prompt) contents.push({ type: "text", text: prompt });
            userFiles.forEach(f => {
                if(f.type.includes('image')) contents.push({ type: "input_image", input_image: { type: "base64", data: [f.data] } });
            });

            try {
                // Ensure conversation exists
                if (!currentChatId) {
                    const { data } = await supabase.from('conversations').insert([{ user_id: currentUser.id, title: prompt.substring(0, 30) || "File Analysis" }]).select().single();
                    currentChatId = data.id;
                }
                await supabase.from('messages').insert([{ conversation_id: currentChatId, role: 'user', content: prompt || "Uploaded files" }]);

                const response = await fetch('https://api.longcat.chat/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${LONGCAT_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Omni-2603",
                        messages: [{ role: "user", content: contents }],
                        stream: false
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                showLoading(false);
                addMessageUI('assistant', reply);
                await supabase.from('messages').insert([{ conversation_id: currentChatId, role: 'assistant', content: reply }]);
                loadHistory();
            } catch (e) {
                showLoading(false);
                addMessageUI('assistant', "I encountered a communication error. Please try again.");
            }
        }

        // --- Tiny Melon Logic ---
        async function generateImage(prompt) {
            const container = document.getElementById('chat-container');
            const placeholder = document.createElement('div');
            placeholder.className = 'msg-container max-w-4xl mx-auto relative h-80 w-full glass-panel rounded-2xl overflow-hidden';
            placeholder.innerHTML = `
                <div class="melon-overlay">
                    <div class="melon-scanner"></div>
                    <i class="fas fa-seedling text-4xl text-lime-400 mb-4 animate-pulse"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-lime-400">Tiny Melon: Rendering Neural Layers</p>
                    <p class="text-xs text-gray-500 mt-2">"${prompt}"</p>
                </div>
            `;
            container.appendChild(placeholder);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                });
                
                const data = await response.json();
                const b64 = data.predictions[0].bytesBase64Encoded;
                const imgUrl = `data:image/png;base64,${b64}`;

                placeholder.innerHTML = `
                    <div class="flex items-center gap-2 mb-4 p-4">
                        <i class="fas fa-seedling text-lime-400"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-500">Tiny Melon Art</span>
                    </div>
                    <div class="px-4 pb-4">
                        <img src="${imgUrl}" class="rounded-xl shadow-2xl border border-white/5 w-full object-cover">
                        <div class="flex gap-4 mt-4">
                            <button onclick="downloadImg('${imgUrl}')" class="text-[10px] font-bold text-lime-400 hover:text-white transition uppercase">Save Frame</button>
                        </div>
                    </div>
                `;
            } catch (e) {
                placeholder.innerHTML = `<div class="p-8 text-center text-red-400 text-xs uppercase font-bold">Tiny Melon Engine Overloaded</div>`;
            }
        }

        // --- UI Helpers ---
        function addMessageUI(role, text, files = [], scroll = true) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg-container max-w-4xl mx-auto ${role === 'assistant' ? 'bg-white/2 p-6 rounded-3xl border border-white/5' : 'py-4'}`;
            
            let filesHtml = '';
            if (files.length > 0) {
                filesHtml = `<div class="flex gap-2 mb-3">` + files.map(f => `
                    <div class="h-20 w-20 rounded-lg border border-white/10 overflow-hidden">
                        <img src="data:${f.type};base64,${f.data}" class="w-full h-full object-cover">
                    </div>
                `).join('') + `</div>`;
            }

            const contentHtml = text ? `<div class="text-sm leading-relaxed text-gray-200">${text.replace(/
