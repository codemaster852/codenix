<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix | Professional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --nix-accent: #3b82f6;
            --nix-bg: #050507;
            --nix-surface: #0e0e11;
            --nix-border: rgba(255, 255, 255, 0.08);
            --melon-primary: #bef264;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--nix-bg);
            color: #fafafa;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        .glass-panel {
            background: rgba(14, 14, 17, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--nix-border);
        }

        .nix-gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-nix {
            background: #fafafa;
            color: #000;
            transition: all 0.2s ease;
        }
        .btn-nix:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .code-container {
            background: #000;
            border: 1px solid var(--nix-border);
            border-radius: 12px;
            margin: 1rem 0;
            overflow: hidden;
        }
        .code-header {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--nix-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        pre {
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #d1d5db;
            overflow-x: auto;
        }

        .msg-bubble {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #mobileOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 60;
        }

        @media (max-width: 1024px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100%;
                z-index: 70;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #sidebar.open { left: 0; }
            #mobileOverlay.show { display: block; }
        }

        .active-visual {
            color: var(--melon-primary) !important;
            border-color: rgba(190, 242, 100, 0.3) !important;
            background: rgba(190, 242, 100, 0.05) !important;
        }

        .ratio-btn.active {
            border-color: var(--melon-primary);
            color: var(--melon-primary);
        }
        
        .input-container-sticky {
            z-index: 40;
            pointer-events: none;
        }
        .input-container-sticky > * {
            pointer-events: auto;
        }

        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--melon-primary);
        }
    </style>
</head>
<body class="bg-[#050507]">

    <div id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] lg:w-80 glass-panel border-r flex flex-col p-6 h-full shadow-2xl shrink-0">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                    <span class="font-black text-xl">N</span>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter">Nix <span class="nix-gradient-text">Core</span></h1>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>

        <div class="flex-1 space-y-6 overflow-y-auto pr-2">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">
                <i class="fa-solid fa-plus"></i> New Session
            </button>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-400/70 block">Saved Visuals</span>
                <div id="visualGallery" class="grid grid-cols-3 gap-2 pb-2">
                    <!-- Images from localstorage -->
                </div>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block">History</span>
                <div id="chatHistoryList" class="space-y-2"></div>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-lime-400/70 block">Settings</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setRatio('1024x1024')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold active" id="btn-1-1">1:1</button>
                    <button onclick="setRatio('1280x720')" class="ratio-btn p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] font-bold" id="btn-16-9">16:9</button>
                </div>
                <div class="p-3 bg-white/5 rounded-xl border border-white/5 space-y-2">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase">Visual Style</span>
                    <select id="visualStyle" class="w-full bg-transparent text-[10px] text-white outline-none">
                        <option value="" class="bg-zinc-900">Standard</option>
                        <option value="cinematic, 8k resolution, highly detailed" class="bg-zinc-900">Cinematic</option>
                        <option value="minimalist, clean lines, professional" class="bg-zinc-900">Minimalist</option>
                        <option value="cyberpunk, neon, futuristic" class="bg-zinc-900">Cyberpunk</option>
                        <option value="oil painting, textured, classical" class="bg-zinc-900">Artistic</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div id="userProfile" class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] font-bold">U</div>
                <div class="flex-1 overflow-hidden">
                    <p id="userEmail" class="text-[10px] font-bold text-white truncate">User</p>
                    <button onclick="signOut()" class="text-[9px] text-zinc-500 hover:text-red-400 uppercase tracking-widest font-black transition">Sign Out</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-full w-full overflow-hidden">
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 border-b border-white/5 bg-[#050507]/80 backdrop-blur-md shrink-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-lg border border-white/10 text-zinc-400 hover:bg-white/5">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    <span id="systemStatus" class="text-[10px] font-black uppercase tracking-widest text-zinc-500">System Ready</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="memoryStatus" class="hidden md:flex items-center gap-2 px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                    <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Neural Link</span>
                </div>
                <div class="flex items-center gap-1">
                    <div class="gallery-dot"></div>
                    <span id="savedCount" class="text-[9px] font-black text-zinc-500">0</span>
                </div>
            </div>
        </header>

        <!-- Chat Window -->
        <div id="chatWindow" class="flex-1 overflow-y-auto p-4 lg:p-12 space-y-8 scroll-smooth pb-44 lg:pb-52">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center space-y-6 py-20">
                <div class="w-20 h-20 bg-blue-600/10 rounded-[32px] flex items-center justify-center border border-blue-500/20">
                    <i class="fa-solid fa-brain text-4xl text-blue-500"></i>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-white tracking-tight">Intelligence Initialized.</h2>
                    <p class="text-zinc-500 text-xs uppercase tracking-widest font-bold">Persistence Engine Online</p>
                </div>
            </div>
        </div>

        <!-- Floating Input Area -->
        <div class="input-container-sticky fixed lg:absolute bottom-0 left-0 right-0 p-4 lg:p-8 bg-gradient-to-t from-[#050507] via-[#050507]/90 to-transparent">
            <div class="max-w-4xl mx-auto">
                <div id="filePreview" class="hidden p-3 mb-2 glass-panel rounded-xl flex items-center justify-between border-blue-500/20">
                    <span id="fileName" class="text-[10px] font-bold text-blue-400 truncate uppercase tracking-widest"></span>
                    <button onclick="clearFile()" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <div class="glass-panel p-2 rounded-[28px] lg:rounded-[32px] border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col">
                    <textarea id="promptInput" rows="1" 
                        class="w-full bg-transparent border-none outline-none text-[15px] p-3 text-white placeholder-zinc-700 resize-none max-h-[160px] overflow-y-auto"
                        placeholder="Ask anything or request an image..."
                        onkeydown="handleKeyDown(event)"
                        oninput="adjustInputHeight(this)"></textarea>
                    
                    <div class="flex items-center justify-between p-2 border-t border-white/5 mt-1">
                        <div class="flex gap-1 lg:gap-2">
                            <label title="Attach File" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 cursor-pointer transition">
                                <input type="file" class="hidden" id="fileInput" onchange="handleFile(event)">
                                <i class="fa-solid fa-paperclip"></i>
                            </label>
                            <button title="Toggle Image Mode" onclick="toggleVisual()" id="visualBtn" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 transition">
                                <i class="fa-solid fa-image"></i>
                            </button>
                            <button title="Clear Context" onclick="createNewChat()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-zinc-500 transition">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                        </div>
                        <button id="sendBtn" onclick="handleInput()" class="btn-nix px-6 lg:px-10 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-xl shadow-white/5 active:scale-95 transition-transform">
                            <span>Execute</span>
                            <i class="fa-solid fa-bolt-lightning text-[10px]"></i>
                        </button>
                    </div>
                </div>
                <div class="h-2 lg:hidden"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        let activeRatio = "1024x1024";
        let visualMode = false;
        let currentConvId = null;
        let userMemories = "";
        let attachedFileContent = "";
        let currentUser = null;

        // Local Storage Key
        const GALLERY_STORAGE_KEY = "nix_visual_vault";

        async function checkAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = "auth.html";
                } else {
                    currentUser = session.user;
                    document.getElementById('userEmail').innerText = currentUser.email;
                    initializeSession();
                }
            } catch (err) { console.error(err); }
        }

        async function initializeSession() {
            loadMemories();
            loadConversations();
            loadVisualVault();
        }

        async function loadMemories() {
            const { data } = await supabaseClient.from('user_memories').select('content').eq('user_id', currentUser.id);
            if (data?.length) {
                userMemories = data.map(m => m.content).join("\n");
                document.getElementById('memoryStatus').classList.remove('hidden');
            }
        }

        async function loadConversations() {
            const { data } = await supabaseClient.from('conversations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const list = document.getElementById('chatHistoryList');
            list.innerHTML = (data || []).map(conv => `
                <button onclick="loadChat('${conv.id}')" class="w-full text-left p-3 rounded-xl hover:bg-white/5 transition group flex items-center gap-3">
                    <i class="fa-regular fa-message text-zinc-600 group-hover:text-blue-400 transition"></i>
                    <span class="text-[11px] text-zinc-400 truncate flex-1">${conv.title || 'Untitled Session'}</span>
                </button>
            `).join('');
        }

        // New: Load Image Gallery from LocalStorage
        function loadVisualVault() {
            const vault = JSON.parse(localStorage.getItem(GALLERY_STORAGE_KEY) || "[]");
            const gallery = document.getElementById('visualGallery');
            document.getElementById('savedCount').innerText = vault.length;
            
            gallery.innerHTML = vault.slice(-6).reverse().map(img => `
                <div class="aspect-square rounded-lg overflow-hidden border border-white/10 cursor-pointer group relative" onclick="relaunchImage('${img.url}')">
                    <img src="${img.url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                         <i class="fa-solid fa-eye text-white text-[10px]"></i>
                    </div>
                </div>
            `).join('');
        }

        function saveToVault(url, prompt) {
            const vault = JSON.parse(localStorage.getItem(GALLERY_STORAGE_KEY) || "[]");
            vault.push({ url, prompt, timestamp: Date.now() });
            localStorage.setItem(GALLERY_STORAGE_KEY, JSON.stringify(vault));
            loadVisualVault();
        }

        function relaunchImage(url) {
            const win = document.getElementById('chatWindow');
            document.getElementById('emptyState')?.remove();
            appendMsg('assistant', `Recalling visual from vault... <div class="mt-4 rounded-xl overflow-hidden"><img src="${url}" class="w-full"></div>`);
        }

        async function createNewChat(title = "New Session") {
            const { data } = await supabaseClient.from('conversations').insert([{ user_id: currentUser.id, title: title.substring(0, 30) }]).select().single();
            currentConvId = data.id;
            document.getElementById('chatWindow').innerHTML = "";
            loadConversations();
            return data.id;
        }

        async function loadChat(id) {
            currentConvId = id;
            const win = document.getElementById('chatWindow');
            win.innerHTML = "";
            document.getElementById('emptyState')?.remove();
            toggleSidebar(); // Close on mobile

            const { data } = await supabaseClient.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
            (data || []).forEach(msg => appendMsg(msg.role, msg.content, null, false));
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleInput(); 
            }
        }

        function adjustInputHeight(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                attachedFileContent = ev.target.result;
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('filePreview').classList.remove('hidden');
            };
            reader.readAsText(file);
        }

        function clearFile() {
            attachedFileContent = "";
            document.getElementById('filePreview').classList.add('hidden');
            document.getElementById('fileInput').value = "";
        }

        function toggleVisual() {
            visualMode = !visualMode;
            document.getElementById('visualBtn').classList.toggle('active-visual', visualMode);
            if(visualMode) {
                document.getElementById('promptInput').placeholder = "Describe the visual you want to generate...";
            } else {
                document.getElementById('promptInput').placeholder = "Ask anything or request an image...";
            }
        }

        async function handleInput() {
            const input = document.getElementById('promptInput');
            const text = input.value.trim();
            if (!text && !attachedFileContent) return;

            if (!currentConvId) await createNewChat(text || "Intelligence Session");
            document.getElementById('emptyState')?.remove();
            
            let fullText = text;
            if (attachedFileContent) fullText = `[File Uploaded]\nContext:\n${attachedFileContent}\n\nQuery: ${text}`;

            appendMsg('user', text || "[File Transmission]");
            await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'user', content: text || "[Attached Data]" }]);
            
            input.value = '';
            input.style.height = 'auto';
            clearFile();

            const isImageReq = visualMode || ['draw', 'generate', 'image', 'picture', 'create a visual'].some(t => text.toLowerCase().includes(t));

            if (isImageReq) {
                await generateImage(text);
                visualMode = false;
                document.getElementById('visualBtn').classList.remove('active-visual');
            } else {
                await computeResponse(fullText);
            }
        }

        async function generateImage(prompt) {
            const id = 'img-' + Date.now();
            const style = document.getElementById('visualStyle').value;
            const refinedPrompt = style ? `${prompt}, ${style}` : prompt;
            
            appendMsg('assistant', `Synthesizing visual: **"${prompt}"**`, id);
            const [w, h] = activeRatio.split('x');
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(refinedPrompt)}?width=${w}&height=${h}&seed=${Math.floor(Math.random()*99999)}&model=flux&nologo=true`;
            
            const container = document.getElementById(id);
            const imgDiv = document.createElement('div');
            imgDiv.className = "mt-4 rounded-2xl overflow-hidden border border-white/10 bg-white/5 animate-pulse min-h-[300px] flex items-center justify-center relative";
            imgDiv.innerHTML = `
                <img src="${url}" class="w-full h-auto opacity-0 transition-opacity duration-700" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('animate-pulse')">
                <button onclick="saveToVault('${url}', '${prompt.replace(/'/g, "\\'")}')" class="absolute top-4 right-4 bg-black/60 backdrop-blur-md p-2 rounded-lg text-white opacity-0 group-hover:opacity-100 transition border border-white/10">
                    <i class="fa-solid fa-bookmark"></i>
                </button>
            `;
            imgDiv.classList.add('group');
            container.appendChild(imgDiv);
            
            // Auto save to vault
            saveToVault(url, prompt);
            await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'assistant', content: `[Image Generated: ${prompt}]` }]);
        }

        async function computeResponse(text) {
            const id = 'msg-' + Date.now();
            appendMsg('assistant', `<div class="flex items-center gap-2 py-2"><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div></div>`, id);
            
            document.getElementById('systemStatus').innerText = "Processing...";
            
            try {
                const res = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [{ role: "system", content: `You are Nix, professional AI. Be direct, accurate, and expert. Memories: ${userMemories}` }, { role: "user", content: text }]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById(id).innerHTML = formatMarkdown(reply);
                await supabaseClient.from('messages').insert([{ conversation_id: currentConvId, role: 'assistant', content: reply }]);
                document.getElementById('systemStatus').innerText = "System Ready";
            } catch (e) { 
                document.getElementById(id).innerHTML = "<span class='text-red-400 font-bold'>Interface desync.</span>"; 
                document.getElementById('systemStatus').innerText = "Sync Error";
            }
        }

        function appendMsg(role, content, id = null) {
            const win = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg-bubble flex gap-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[88%] lg:max-w-[80%] ${role === 'user' ? 'bg-white/5 px-5 py-4 rounded-[24px] rounded-tr-none border border-white/10 shadow-xl' : ''}">
                    ${role === 'assistant' ? `<div class="flex items-center gap-2 mb-2"><div class="w-4 h-4 bg-blue-600 rounded flex items-center justify-center text-[8px] font-black">N</div><div class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Nix Response</div></div>` : ''}
                    <div id="${id || ''}" class="text-[14px] lg:text-[15px] leading-relaxed text-zinc-300 font-medium">${role === 'user' ? content : formatMarkdown(content)}</div>
                </div>
            `;
            win.appendChild(div);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(btn) {
            const code = btn.parentElement.nextElementSibling.innerText;
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            btn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i>'; }, 2000);
        }

        function formatMarkdown(text) {
            text = text.replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => `
                <div class="code-container">
                    <div class="code-header">
                        <span class="text-[9px] uppercase font-bold text-zinc-500">${lang || 'Script'}</span>
                        <button onclick="copyCode(this)" class="text-[10px] text-zinc-500 hover:text-white transition"><i class="fa-regular fa-copy"></i></button>
                    </div>
                    <pre><code>${code.trim()}</code></pre>
                </div>
            `);
            return text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
                       .replace(/\n/g, '<br>');
        }

        async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }
        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sb.classList.toggle('open'); 
            overlay.classList.toggle('show'); 
        }
        function setRatio(r) { 
            activeRatio = r; 
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b.id === (r === '1024x1024' ? 'btn-1-1' : 'btn-16-9'))); 
        }
        
        window.onload = checkAuth;
    </script>
