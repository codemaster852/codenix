<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix | Intelligence Refined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f11;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #efeff1;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel { background: rgba(15, 15, 17, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .sidebar-item { transition: all 0.2s ease; border-radius: 12px; }
        .sidebar-item:active { scale: 0.98; }
        .sidebar-active { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.2); }
        
        .msg-bubble { max-width: 90%; position: relative; }
        .nix-bubble { background: transparent; border-left: 2px solid var(--accent); padding-left: 1rem; }
        .user-bubble { background: #1a1a1e; border: 1px solid var(--border); border-radius: 20px 20px 4px 20px; }

        /* Code & Sandbox */
        .code-container { position: relative; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); margin: 12px 0; }
        .code-header { background: #161618; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        pre { font-family: 'Fira Code', monospace; font-size: 0.85rem; padding: 1rem; overflow-x: auto; color: #9cdcfe; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Mobile specific fixes */
        @media (max-width: 768px) {
            .mobile-hide { display: none; }
            .msg-bubble { max-width: 95%; }
        }

        #sandboxOverlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; }
    </style>
</head>
<body class="flex h-screen w-full overflow-hidden">

    <!-- Code Sandbox Overlay -->
    <div id="sandboxOverlay">
        <div class="h-14 flex items-center justify-between px-4 border-b border-zinc-800">
            <span class="text-sm font-semibold">Nix Code Sandbox</span>
            <button onclick="closeSandbox()" class="p-2 text-zinc-400 hover:text-white"><i data-lucide="x"></i></button>
        </div>
        <iframe id="sandboxFrame" class="w-full h-[calc(100%-3.5rem)] bg-white"></iframe>
    </div>

    <!-- Mobile Navigation Toggle -->
    <button id="mobileMenuBtn" onclick="toggleSidebar()" class="fixed top-4 left-4 z-50 lg:hidden p-3 bg-zinc-900 rounded-2xl border border-zinc-800">
        <i data-lucide="menu" class="w-5 h-5 text-white"></i>
    </button>

    <!-- Sidebar (History & User) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 glass-panel z-40 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i data-lucide="sparkles" class="w-6 h-6 text-white"></i>
            </div>
            <span class="font-bold text-xl">Nix AI</span>
        </div>

        <div class="px-4 mb-4">
            <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-white text-black font-bold hover:bg-zinc-200 transition-all active:scale-95 shadow-xl">
                <i data-lucide="plus" class="w-5 h-5"></i> New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-2">
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-3 px-2">Recent History</p>
            <div id="chatHistory" class="space-y-1">
                <!-- Loaded items -->
            </div>
        </div>

        <div class="p-4 mt-auto border-t border-zinc-800/50 space-y-3">
            <div id="userCard" class="flex items-center gap-3 p-3 bg-zinc-900/50 rounded-2xl border border-zinc-800/50">
                <img id="userAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nix" class="w-10 h-10 rounded-xl bg-zinc-800 border border-zinc-700" />
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold text-white truncate" id="userEmail">User</p>
                    <p class="text-[10px] text-zinc-500 font-medium">Verified Identity</p>
                </div>
                <button onclick="signOut()" class="text-zinc-500 hover:text-red-400 p-1.5"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative h-full">
        <!-- Messages Area -->
        <div id="chatContainer" class="flex-1 overflow-y-auto pt-20 pb-4 px-4 md:px-6">
            <div class="max-w-4xl mx-auto space-y-8" id="messagesWrapper">
                <!-- Welcome UI -->
                <div id="emptyState" class="text-center py-12 md:py-32 space-y-6">
                    <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl animate-pulse">
                        <i data-lucide="cpu" class="w-12 h-12 text-white"></i>
                    </div>
                    <div class="space-y-2">
                        <h1 class="text-3xl md:text-4xl font-extrabold text-white">Nix Intelligence</h1>
                        <p class="text-zinc-400 text-sm md:text-base max-w-md mx-auto">Upload documents, generate hyper-realistic art, or build applications.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sticky Input Container -->
        <div class="p-4 md:pb-8">
            <div class="max-w-4xl mx-auto">
                <!-- File Attachment Pill -->
                <div id="attachmentPill" class="hidden flex items-center gap-2 mb-3 animate-msg">
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-blue-600/10 border border-blue-600/20 rounded-full">
                        <i data-lucide="file-text" class="w-3.5 h-3.5 text-blue-400"></i>
                        <span id="fileName" class="text-[10px] font-bold text-blue-200">document.pdf</span>
                        <button onclick="clearAttachment()" class="text-blue-400/50 hover:text-white"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                    </div>
                </div>

                <!-- Input Interface -->
                <div class="glass-panel rounded-[2rem] p-2 flex flex-col shadow-2xl">
                    <div class="flex items-end gap-2 pr-2">
                        <div class="flex gap-1 p-1">
                            <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(event)">
                            <button onclick="document.getElementById('fileInput').click()" class="p-3 text-zinc-400 hover:text-blue-400 hover:bg-blue-500/5 rounded-2xl transition-all">
                                <i data-lucide="paperclip" class="w-5 h-5"></i>
                            </button>
                            <button onclick="toggleVoice()" id="micBtn" class="p-3 text-zinc-400 hover:text-red-400 hover:bg-red-500/5 rounded-2xl transition-all">
                                <i data-lucide="mic" class="w-5 h-5"></i>
                            </button>
                        </div>

                        <textarea 
                            id="userInput"
                            rows="1"
                            placeholder="Ask Nix anything..."
                            class="flex-1 bg-transparent py-4 px-2 resize-none outline-none text-[16px] text-white placeholder-zinc-500"
                            oninput="adjustHeight(this)"
                        ></textarea>
                        
                        <button id="sendBtn" onclick="sendMessage()" class="mb-2 p-4 bg-white text-black hover:bg-blue-600 hover:text-white rounded-[1.5rem] transition-all transform active:scale-90 shadow-lg">
                            <i data-lucide="arrow-up" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
                <div class="mt-3 flex justify-between px-6">
                    <p class="text-[9px] text-zinc-600 font-bold tracking-[0.2em] uppercase">Security Level: High</p>
                    <p class="text-[9px] text-zinc-600 font-bold tracking-[0.2em] uppercase">LongCat Flash Chat</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIG ---
        const LONGCAT_API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        
        // Safety wrapper for Lucide initialization
        function refreshIcons() {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }
        }

        let client = null;
        let currentUser = null;
        let currentConversationId = null;
        let attachedFileContent = "";
        let isRecording = false;

        async function init() {
            // Ensure Supabase is loaded
            if (window.supabase) {
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } else {
                console.error("Supabase not found");
                return;
            }

            refreshIcons();
            
            try {
                const { data: { session } } = await client.auth.getSession();
                if (!session) { 
                    // Silent fail or redirect to auth if you have one
                    // window.location.href = 'auth.html'; 
                    console.warn("No active session found.");
                    document.getElementById('userEmail').innerText = "Guest User";
                    return; 
                }
                currentUser = session.user;
                
                document.getElementById('userEmail').innerText = currentUser.email;
                if (currentUser.user_metadata?.avatar_url) {
                    document.getElementById('userAvatar').src = currentUser.user_metadata.avatar_url;
                }

                loadChatHistory();
            } catch (err) {
                console.error("Initialization error:", err);
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
        }

        function adjustHeight(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }

        async function loadChatHistory() {
            if (!client || !currentUser) return;
            const { data } = await client.from('conversations').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const container = document.getElementById('chatHistory');
            container.innerHTML = '';
            if (data) {
                data.forEach(chat => {
                    const active = currentConversationId === chat.id;
                    const btn = document.createElement('button');
                    btn.className = `sidebar-item w-full flex items-center gap-3 p-3 text-sm truncate ${active ? 'sidebar-active font-bold' : 'text-zinc-400 hover:bg-white/5'}`;
                    btn.onclick = () => loadConversation(chat.id);
                    btn.innerHTML = `<i data-lucide="message-circle" class="w-4 h-4 shrink-0"></i><span class="truncate">${chat.title}</span>`;
                    container.appendChild(btn);
                });
            }
            refreshIcons();
        }

        async function loadConversation(id) {
            if (window.innerWidth < 1024) toggleSidebar();
            currentConversationId = id;
            if (!client) return;
            const { data: messages } = await client.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
            document.getElementById('messagesWrapper').innerHTML = '';
            if (messages) messages.forEach(msg => appendMessage(msg.role, msg.content));
            loadChatHistory();
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                attachedFileContent = event.target.result;
                document.getElementById('attachmentPill').classList.remove('hidden');
                document.getElementById('fileName').innerText = file.name;
            };
            reader.readAsText(file);
        }

        function clearAttachment() {
            attachedFileContent = "";
            document.getElementById('attachmentPill').classList.add('hidden');
            document.getElementById('fileInput').value = "";
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !attachedFileContent) return;

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('emptyState')?.remove();

            if (!currentConversationId && client && currentUser) {
                const { data } = await client.from('conversations').insert([{ user_id: currentUser.id, title: text.substring(0, 40) }]).select().single();
                currentConversationId = data.id;
            }

            appendMessage('user', text + (attachedFileContent ? '\n\n📎 Context Attached' : ''));
            
            if (client && currentConversationId) {
                await client.from('messages').insert([{ conversation_id: currentConversationId, role: 'user', content: text }]);
            }

            if (text.toLowerCase().match(/(draw|generate|make|render) (a |an |some )?(image|photo|picture)/)) {
                generatePhoto(text);
            } else {
                callAI(text);
            }
        }

        async function callAI(text) {
            showTyping();
            try {
                const response = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${LONGCAT_API_KEY}` },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [
                            { role: "system", content: "You are Nix, a high-end AI assistant. User data context: " + attachedFileContent },
                            { role: "user", content: text }
                        ]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                hideTyping();
                appendMessage('assistant', aiText);
                if (client && currentConversationId) {
                    await client.from('messages').insert([{ conversation_id: currentConversationId, role: 'assistant', content: aiText }]);
                }
            } catch (e) {
                hideTyping();
                appendMessage('assistant', "Connectivity error. Service unavailable.");
            }
            clearAttachment();
        }

        async function generatePhoto(prompt) {
            showTyping("Developing high-res visual...");
            const seed = Math.floor(Math.random() * 1000000);
            const clean = prompt.replace(/(draw|generate|make|render|a |an |some |image|photo|picture)/gi, "").trim();
            const enhancedPrompt = `masterpiece, 8k, highly detailed, professional photography, ${clean}`;
            const url = `https://pollinations.ai/p/${encodeURIComponent(enhancedPrompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;
            
            setTimeout(async () => {
                hideTyping();
                const content = `Created for you: **"${clean}"**\n\n![Generated](${url})`;
                appendMessage('assistant', content);
                if (client && currentConversationId) {
                    await client.from('messages').insert([{ conversation_id: currentConversationId, role: 'assistant', content }]);
                }
            }, 3500);
        }

        function appendMessage(role, content) {
            const wrapper = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            const isAI = role === 'assistant';
            div.className = `animate-msg flex gap-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            let html = `
                <div class="msg-bubble ${isAI ? 'nix-bubble' : 'user-bubble p-4'}">
                    ${isAI ? `<p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-1">Nix Intelligence</p>` : ''}
                    <div class="text-[15px] leading-relaxed text-zinc-100">${formatMarkdown(content)}</div>
                    ${isAI ? `
                        <div class="flex gap-4 mt-4 border-t border-zinc-800/50 pt-3">
                            <button onclick="copyMsg(this)" class="flex items-center gap-1.5 text-[10px] text-zinc-500 hover:text-white font-bold uppercase tracking-tighter">
                                <i data-lucide="copy" class="w-3 h-3"></i> Copy
                            </button>
                            <button onclick="hearMsg(this)" class="flex items-center gap-1.5 text-[10px] text-zinc-500 hover:text-white font-bold uppercase tracking-tighter">
                                <i data-lucide="volume-2" class="w-3 h-3"></i> Hear
                            </button>
                            <button class="flex items-center gap-1.5 text-[10px] text-zinc-500 hover:text-white font-bold uppercase tracking-tighter">
                                <i data-lucide="share" class="w-3 h-3"></i> Share
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
            
            div.innerHTML = html;
            wrapper.appendChild(div);
            refreshIcons();
            document.getElementById('chatContainer').scrollTo({ top: document.getElementById('chatContainer').scrollHeight, behavior: 'smooth' });
        }

        function formatMarkdown(text) {
            // Images
            text = text.replace(/!\[.*?\]\((.*?)\)/g, `
                <div class="rounded-2xl overflow-hidden border border-zinc-800 my-4 shadow-2xl group relative">
                    <img src="$1" class="w-full h-auto" />
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                        <button onclick="window.open('$1')" class="bg-white text-black px-4 py-2 rounded-xl text-xs font-bold">HD View</button>
                    </div>
                </div>
            `);
            // Code blocks
            text = text.replace(/```(\w+)?([\s\S]*?)```/g, (match, lang, code) => {
                const id = 'code_' + Math.random().toString(36).substr(2, 9);
                return `
                    <div class="code-container">
                        <div class="code-header">
                            <span class="text-[10px] font-bold text-zinc-500 uppercase">${lang || 'code'}</span>
                            <div class="flex gap-3">
                                <button onclick="copyCode('${id}')" class="text-[10px] text-zinc-400 hover:text-white font-bold">COPY</button>
                                <button onclick="runCode('${id}')" class="text-[10px] text-blue-500 hover:text-blue-400 font-bold">RUN</button>
                            </div>
                        </div>
                        <pre id="${id}"><code>${code.trim()}</code></pre>
                    </div>
                `;
            });
            // Bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-400">$1</strong>');
            return text.replace(/\n/g, '<br>');
        }

        function copyCode(id) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code);
            const btn = event.target;
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }

        function runCode(id) {
            const code = document.getElementById(id).innerText;
            document.getElementById('sandboxOverlay').style.display = 'block';
            const frame = document.getElementById('sandboxFrame');
            frame.srcdoc = code.includes('<html>') ? code : `<html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="p-8">${code}</body></html>`;
        }

        function closeSandbox() {
            document.getElementById('sandboxOverlay').style.display = 'none';
        }

        function showTyping(msg = "Nix is calculating...") {
            const wrapper = document.getElementById('messagesWrapper');
            const div = document.createElement('div');
            div.id = "typingInd";
            div.className = "flex gap-4 items-start";
            div.innerHTML = `<div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0"><i data-lucide="bot" class="w-4 h-4 text-white"></i></div><p class="text-xs text-zinc-500 mt-2 italic">${msg}</p>`;
            wrapper.appendChild(div);
            refreshIcons();
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function hideTyping() { document.getElementById('typingInd')?.remove(); }

        async function hearMsg(btn) {
            const bubble = btn.closest('.msg-bubble');
            const textElement = bubble.querySelector('.text-[15px]');
            const text = textElement ? textElement.innerText : "";
            
            btn.innerHTML = `<i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Loading...`;
            refreshIcons();
            
            // Note: In a real environment, you'd convert this to audio and play it.
            // This is a placeholder for the TTS logic mentioned in system instructions.
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="volume-2" class="w-3 h-3"></i> Hear`;
                refreshIcons();
            }, 2000);
        }

        function copyMsg(btn) {
            const text = btn.closest('.msg-bubble').querySelector('.text-[15px]').innerText;
            navigator.clipboard.writeText(text);
            const original = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Copied`;
            refreshIcons();
            setTimeout(() => {
                btn.innerHTML = original;
                refreshIcons();
            }, 2000);
        }

        function startNewChat() {
            currentConversationId = null;
            document.getElementById('messagesWrapper').innerHTML = `
                <div id="emptyState" class="text-center py-12 md:py-32 space-y-6">
                    <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl animate-pulse">
                        <i data-lucide="cpu" class="w-12 h-12 text-white"></i>
                    </div>
                    <div class="space-y-2">
                        <h1 class="text-3xl md:text-4xl font-extrabold text-white">Nix Intelligence</h1>
                        <p class="text-zinc-400 text-sm md:text-base max-w-md mx-auto">Upload documents, generate hyper-realistic art, or build applications.</p>
                    </div>
                </div>`;
            refreshIcons();
        }

        function toggleVoice() {
            isRecording = !isRecording;
            const btn = document.getElementById('micBtn');
            btn.classList.toggle('text-red-500');
            btn.classList.toggle('bg-red-500/10');
            btn.innerHTML = isRecording ? `<i data-lucide="square" class="w-5 h-5"></i>` : `<i data-lucide="mic" class="w-5 h-5"></i>`;
            refreshIcons();
        }

        async function signOut() {
            if (client) {
                await client.auth.signOut();
                // window.location.reload();
            }
        }

        // Wait for both DOM and scripts to load
        window.addEventListener('load', init);
    </script>
</body>
</html>
