<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0-0 | Master the Basics of Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            border: 6px solid #374151;
            background: #374151;
            gap: 1px;
        }
        .square {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 3vw, 2.5rem);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .bg-light { background-color: #f3f4f6; color: #1f2937; }
        .bg-dark { background-color: #9ca3af; color: #1f2937; }
        .valid-move::after {
            content: '';
            width: 30%;
            height: 30%;
            background: rgba(16, 185, 129, 0.5);
            border-radius: 50%;
            position: absolute;
        }
        .selected { background-color: #fbbf24 !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen pb-20">

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-3xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">0-0</h1>
        <div class="space-x-4 text-sm font-medium text-gray-400">
            <a href="#learn" class="hover:text-white transition">Learn</a>
            <a href="#puzzle" class="hover:text-white transition">Daily Puzzle</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h2 class="text-5xl font-bold mb-6">Interactive <span class="text-blue-500">Practice</span></h2>
            <p class="text-xl text-gray-400">Select a piece to master its movement and capture mechanics.</p>
        </header>

        <section id="learn" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Piece Selector -->
            <div class="space-y-4">
                <h3 class="text-xl font-bold text-gray-400 mb-4">Choose a Piece</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setupLesson('King', '♔')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♔ King</button>
                    <button onclick="setupLesson('Queen', '♕')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♕ Queen</button>
                    <button onclick="setupLesson('Rook', '♖')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♖ Rook</button>
                    <button onclick="setupLesson('Bishop', '♗')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♗ Bishop</button>
                    <button onclick="setupLesson('Knight', '♘')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♘ Knight</button>
                    <button onclick="setupLesson('Pawn', '♙')" class="p-4 bg-gray-800 rounded-xl border border-gray-700 hover:border-blue-500 transition">♙ Pawn</button>
                </div>
            </div>

            <!-- Board Area -->
            <div class="lg:col-span-2">
                <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700">
                    <div class="flex justify-between items-center mb-6">
                        <h4 id="lesson-title" class="text-2xl font-bold">Select a piece to start</h4>
                        <div id="lesson-nav" class="space-x-2 hidden">
                            <button onclick="changeScenario(0)" class="px-3 py-1 bg-gray-700 rounded-lg hover:bg-gray-600 text-sm">Movement</button>
                            <button onclick="changeScenario(1)" class="px-3 py-1 bg-gray-700 rounded-lg hover:bg-gray-600 text-sm">Capture</button>
                        </div>
                    </div>
                    <div id="chess-board" class="chess-board w-full max-w-lg mx-auto"></div>
                    <p id="lesson-desc" class="mt-6 text-center text-gray-400 italic">Select a piece above to begin your training.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentPiece = null;
        let currentScenario = 0; // 0 = movement, 1 = capture
        let boardState = Array(64).fill(null);
        let selectedIdx = -1;
        let validMoves = [];

        function getValidMoves(idx, piece, scenario) {
            const moves = [];
            const r = Math.floor(idx / 8);
            const c = idx % 8;

            // Simplified move logic for demonstration
            if (piece === '♔') {
                for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++) {
                    if(dr===0 && dc===0) continue;
                    const nr = r+dr, nc = c+dc;
                    if(nr>=0 && nr<8 && nc>=0 && nc<8) moves.push(nr*8+nc);
                }
            } else if (piece === '♖') {
                for(let i=0; i<8; i++) { if(i!==c) moves.push(r*8+i); if(i!==r) moves.push(i*8+c); }
            } else if (piece === '♗') {
                for(let i=-7; i<=7; i++) {
                    if(i===0) continue;
                    [r+i, c+i].every(x => x>=0 && x<8) && moves.push((r+i)*8+(c+i));
                    [r+i, c-i].every(x => x>=0 && x<8) && moves.push((r+i)*8+(c-i));
                }
            } else if (piece === '♕') {
                // Combine Rook and Bishop
                // (Logic simplified for brevity)
                for(let i=0; i<8; i++) { if(i!==c) moves.push(r*8+i); if(i!==r) moves.push(i*8+c); }
                for(let i=-7; i<=7; i++) {
                    if(i===0) continue;
                    [r+i, c+i].every(x => x>=0 && x<8) && moves.push((r+i)*8+(c+i));
                    [r+i, c-i].every(x => x>=0 && x<8) && moves.push((r+i)*8+(c-i));
                }
            } else if (piece === '♘') {
                const jumps = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                jumps.forEach(([dr, dc]) => {
                    const nr = r+dr, nc = c+dc;
                    if(nr>=0 && nr<8 && nc>=0 && nc<8) moves.push(nr*8+nc);
                });
            } else if (piece === '♙') {
                if(r>0) moves.push((r-1)*8+c);
            }
            return moves.filter(m => scenario === 1 || !boardState[m]); // Capture logic simplified
        }

        function renderBoard() {
            const boardEl = document.getElementById('chess-board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const sq = document.createElement('div');
                const row = Math.floor(i / 8);
                const col = i % 8;
                sq.className = `square ${(row + col) % 2 === 0 ? 'bg-light' : 'bg-dark'} ${selectedIdx === i ? 'selected' : ''} ${validMoves.includes(i) ? 'valid-move' : ''}`;
                sq.innerText = boardState[i] || '';
                sq.onclick = () => handleSquareClick(i);
                boardEl.appendChild(sq);
            }
        }

        function handleSquareClick(idx) {
            if (validMoves.includes(idx)) {
                // Move piece
                boardState[idx] = boardState[selectedIdx];
                boardState[selectedIdx] = null;
                selectedIdx = -1;
                validMoves = [];
                renderBoard();
                checkWin();
            } else if (boardState[idx] === currentPiece) {
                selectedIdx = idx;
                validMoves = getValidMoves(idx, currentPiece, currentScenario);
                renderBoard();
            }
        }

        function setupLesson(piece, symbol) {
            currentPiece = symbol;
            document.getElementById('lesson-title').innerText = piece + ' Training';
            document.getElementById('lesson-nav').classList.remove('hidden');
            changeScenario(0);
        }

        function changeScenario(s) {
            currentScenario = s;
            boardState.fill(null);
            // Reset board based on piece
            boardState[27] = currentPiece;
            if (s === 1) boardState[19] = 'x'; // Target to eat
            
            selectedIdx = -1;
            validMoves = [];
            document.getElementById('lesson-desc').innerText = s === 0 ? "Goal: Move the piece across the board." : "Goal: Capture the 'x' target.";
            renderBoard();
        }

        function checkWin() {
            if(currentScenario === 1 && !boardState.includes('x')) {
                alert("Great job! Target captured.");
                changeScenario(1);
            }
        }

        // Initialize board
        renderBoard();
    </script>
</body>
</html>
