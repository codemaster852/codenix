<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix 4 | Codenix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --purple-primary: #8B5CF6;
            --purple-dark: #6D28D9;
            --bg-light: #FFFFFF;
            --bg-dark: #0A0A0A;
        }

        body { transition: background-color 0.3s, color 0.3s; }
        
        .dark-mode {
            background-color: var(--bg-dark);
            color: #E5E7EB;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #8B5CF633;
            border-radius: 10px;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-sidebar {
            background: rgba(249, 250, 251, 0.8);
            backdrop-filter: blur(10px);
        }
        .dark-mode .glass-sidebar {
            background: rgba(18, 18, 18, 0.8);
        }
        
        .ai-bubble {
            border: 1px solid rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] bg-white dark:bg-black flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin"></div>
            <p class="mt-4 text-purple-600 font-medium animate-pulse">Initializing Nix 4...</p>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app-content" class="hidden flex h-full">
        
        <!-- Sidebar -->
        <aside class="w-72 flex-shrink-0 glass-sidebar border-r border-neutral-200 dark:border-neutral-800 hidden md:flex flex-col">
            <div class="p-5 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-9 h-9 purple-gradient rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="text-xl font-bold dark:text-white tracking-tight">Nix <span class="text-purple-600 italic">4</span></span>
                </div>
                <button id="theme-btn" class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors dark:text-white">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <div class="p-4">
                <button onclick="window.location.reload()" class="w-full flex items-center justify-center space-x-2 p-3 rounded-xl border border-neutral-200 dark:border-neutral-800 hover:bg-white dark:hover:bg-neutral-900 transition-all text-sm font-medium dark:text-white">
                    <i class="fas fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-4 py-2 space-y-2" id="chat-history">
                <div class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest px-2 pb-2">Recent Threads</div>
                <!-- History Items -->
            </div>

            <div class="p-4 border-t border-neutral-200 dark:border-neutral-800">
                <div class="flex items-center p-3 rounded-2xl bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 shadow-sm">
                    <div id="user-initials" class="w-10 h-10 purple-gradient rounded-full flex items-center justify-center text-white font-bold text-sm mr-3">U</div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name-display" class="text-sm font-semibold truncate dark:text-white">User</p>
                        <p class="text-[10px] text-purple-500 font-bold uppercase tracking-tighter">Codenix Member</p>
                    </div>
                    <button id="logout-btn" class="text-neutral-400 hover:text-red-500 transition-colors ml-2">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col bg-white dark:bg-black relative">
            
            <div id="chat-window" class="flex-1 overflow-y-auto chat-container p-6">
                <!-- Welcome/Empty State -->
                <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center space-y-6 fade-in">
                    <div class="w-20 h-20 purple-gradient rounded-3xl flex items-center justify-center text-white text-4xl shadow-2xl shadow-purple-500/20 rotate-3">
                        <span class="italic font-black">N</span>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold dark:text-white tracking-tight">How can I assist you, <span id="welcome-name" class="text-purple-600">User</span>?</h1>
                        <p class="text-neutral-500 mt-2 max-w-md mx-auto">Access the Codenix knowledge base and advanced AI reasoning in one secure workspace.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl w-full">
                        <button onclick="fillPrompt('Explain the Nix 4 infrastructure')" class="p-4 text-left border border-neutral-200 dark:border-neutral-800 rounded-2xl hover:border-purple-400 transition-all group">
                            <i class="fas fa-network-wired text-purple-500 mb-2"></i>
                            <p class="text-sm font-semibold dark:text-white">Explain Architecture</p>
                            <p class="text-xs text-neutral-500">Understand the Nix 4 core</p>
                        </button>
                        <button onclick="fillPrompt('Search spreadsheet for project status')" class="p-4 text-left border border-neutral-200 dark:border-neutral-800 rounded-2xl hover:border-purple-400 transition-all">
                            <i class="fas fa-table text-purple-500 mb-2"></i>
                            <p class="text-sm font-semibold dark:text-white">Sheet Query</p>
                            <p class="text-xs text-neutral-500">Retrieve data from Google Sheets</p>
                        </button>
                    </div>
                </div>

                <div id="messages" class="max-w-4xl mx-auto space-y-8 py-10 hidden">
                    <!-- Chat bubbles injected here -->
                </div>
            </div>

            <!-- Input Section -->
            <div class="p-4 md:p-8 bg-gradient-to-t from-white dark:from-black via-white dark:via-black to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <div class="relative bg-neutral-50 dark:bg-neutral-900 rounded-3xl border border-neutral-200 dark:border-neutral-800 shadow-xl overflow-hidden focus-within:border-purple-500 transition-colors">
                        <textarea id="chat-input" rows="1" placeholder="Type a message or search sheets..." 
                            class="w-full p-4 pr-16 bg-transparent text-neutral-900 dark:text-white outline-none resize-none max-h-60"></textarea>
                        
                        <div class="absolute right-3 bottom-3 flex items-center space-x-2">
                            <button id="send-btn" class="w-10 h-10 purple-gradient text-white rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg shadow-purple-500/20">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-center text-[10px] text-neutral-400 mt-4 tracking-wide font-medium">
                        POWERED BY CODENIX INTELLIGENCE &bull; V4.0.1
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const SPREADSHEET_ID = "1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU";

        // Initialize Supabase - FIXED: Ensuring it's only declared once
        let sbClient;
        try {
            sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase initialization failed", e);
        }

        // State
        let currentUser = null;
        let isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // Dom Elements
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages');
        const welcomeView = document.getElementById('welcome-view');
        const chatWindow = document.getElementById('chat-window');

        // 1. Auth & Redirect Logic
        async function checkAuth() {
            if (!sbClient) return;
            const { data: { session } } = await sbClient.auth.getSession();
            
            if (!session) {
                // Not logged in: Redirect to auth.html
                window.location.href = `auth.html?redirect=nix4.html`;
            } else {
                currentUser = session.user;
                setupUI();
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        function setupUI() {
            const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
            document.getElementById('user-name-display').innerText = name;
            document.getElementById('welcome-name').innerText = name;
            document.getElementById('user-initials').innerText = name.charAt(0).toUpperCase();
            
            if (isDarkMode) document.body.classList.add('dark-mode');
        }

        // 2. Chat Logic
        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            welcomeView.classList.add('hidden');
            messagesContainer.classList.remove('hidden');

            // Add User Message
            appendMessage(text, 'user');

            // Add AI Message (Loading)
            const aiMsgId = appendMessage('...', 'ai', true);

            try {
                // Search Sheets First
                const answer = await searchSheets(text);
                
                if (answer) {
                    updateAIMessage(aiMsgId, answer);
                } else {
                    // Fallback to General Logic
                    setTimeout(() => {
                        updateAIMessage(aiMsgId, "I searched the Codenix knowledge base but couldn't find a specific match. As your Nix 4 assistant, I recommend checking the internal documentation for: " + text);
                    }, 800);
                }
            } catch (e) {
                updateAIMessage(aiMsgId, "System error: Unable to reach the knowledge base at this time.");
            }
        }

        // 3. Search Logic (Google Sheets)
        async function searchSheets(query) {
            try {
                // Fetch sheet data using the public visualization API for public sheets
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`);
                const resText = await response.text();
                // Strip the Google JSON prefix
                const json = JSON.parse(resText.substring(47).slice(0, -2));
                
                const rows = json.table.rows;
                let foundAnswer = null;
                
                // Question in first column (c[0]), Answer in second column (c[1])
                rows.forEach(row => {
                    const qValue = row.c[0] ? row.c[0].v : "";
                    const aValue = row.c[1] ? row.c[1].v : "";
                    
                    if (qValue && qValue.toString().toLowerCase().trim() === query.toLowerCase().trim()) {
                        foundAnswer = aValue;
                    }
                });
                
                return foundAnswer;
            } catch (err) {
                console.error("Sheet Fetch Error:", err);
                return null;
            }
        }

        function appendMessage(text, sender, isLoading = false) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = `flex w-full mb-8 fade-in ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const inner = `
                <div class="flex max-w-[85%] md:max-w-2xl space-x-4 ${sender === 'user' ? 'flex-row-reverse space-x-reverse' : ''}">
                    <div class="w-8 h-8 flex-shrink-0 rounded-lg flex items-center justify-center font-bold text-[10px] ${sender === 'user' ? 'bg-neutral-200 dark:bg-neutral-800' : 'purple-gradient text-white'}">
                        ${sender === 'user' ? 'ME' : 'N4'}
                    </div>
                    <div class="space-y-1">
                        <div class="px-4 py-3 rounded-2xl ${sender === 'user' ? 'bg-neutral-100 dark:bg-neutral-900 dark:text-white' : 'ai-bubble dark:text-neutral-100'}">
                            ${isLoading ? '<div class="flex space-x-1 py-1"><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.2s"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.4s"></div></div>' : text}
                        </div>
                    </div>
                </div>
            `;
            
            msgDiv.innerHTML = inner;
            messagesContainer.appendChild(msgDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateAIMessage(id, text) {
            const msg = document.getElementById(id);
            if (msg) {
                const bubble = msg.querySelector('.ai-bubble') || msg.querySelector('.rounded-2xl');
                bubble.innerHTML = text;
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }
        }

        function fillPrompt(text) {
            chatInput.value = text;
            chatInput.focus();
        }

        // Theme Toggle
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-btn').querySelector('i');
            icon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Event Listeners
        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (!sbClient) return;
            await sbClient.auth.signOut();
            window.location.reload();
        });

        // Run Check
        window.onload = checkAuth;

    </script>
</body>
</html>
