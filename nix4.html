<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix 4 - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #000000;
            --accent: #6366f1;
            --text-primary: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
        }

        .light-mode {
            --bg-main: #fcfcfc;
            --bg-sidebar: #f3f4f6;
            --accent: #4f46e5;
            --text-primary: #0f172a;
            --border: rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .sidebar-item-active {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid var(--accent);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
    </style>
</head>
<body class="dark-mode">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const API_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        const SHEET_ID = "1BwS2zO3IGppDo2r_ROZVW74iSmu6aGSyE8j1O63UjbE";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3YKf3u6KoxvHJc3bBRJzWYg1CPcpHAFXUTTWTh28FR2XcOJlqzcIsJC19_9X7ozH8/exec";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [uiLang, setUiLang] = useState('en');
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            
            const scrollRef = useRef(null);

            // Auth Check
            useEffect(() => {
                const checkUser = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (!session) {
                        window.location.href = "auth.html";
                    } else {
                        setUser(session.user);
                        fetchConversations(session.user.id);
                    }
                };
                checkUser();
            }, []);

            useEffect(() => {
                document.body.className = theme === 'light' ? 'light-mode' : 'dark-mode';
            }, [theme]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isTyping]);

            const fetchConversations = async (userId) => {
                const { data, error } = await supabase
                    .from('conversations')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (!error) setConversations(data);
            };

            const loadConversation = async (id) => {
                setActiveConvId(id);
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', id)
                    .order('created_at', { ascending: true });
                if (!error) setMessages(data);
            };

            const generateTitle = async (query) => {
                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [{ role: "system", content: "Summarize this query into a 3-word title." }, { role: "user", content: query }],
                            max_tokens: 10
                        })
                    });
                    const data = await res.json();
                    return data.choices[0].message.content.replace(/"/g, '');
                } catch (e) { return "New Chat"; }
            };

            const processQuery = async (query) => {
                if (!query.trim() || !user) return;

                let currentConvId = activeConvId;
                
                // Create new conversation if none active
                if (!currentConvId) {
                    const title = await generateTitle(query);
                    const { data, error } = await supabase
                        .from('conversations')
                        .insert([{ user_id: user.id, title }])
                        .select()
                        .single();
                    if (error) return;
                    currentConvId = data.id;
                    setActiveConvId(currentConvId);
                    setConversations([data, ...conversations]);
                }

                const userMsg = { conversation_id: currentConvId, role: 'user', content: query };
                setMessages(prev => [...prev, userMsg]);
                setInput("");
                setIsTyping(true);

                // Save user msg to Supabase
                await supabase.from('messages').insert([userMsg]);

                try {
                    // Check local sheet first
                    const localResponse = await checkLocal(query);
                    let aiResponseText;

                    if (localResponse) {
                        aiResponseText = localResponse;
                    } else {
                        const res = await fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                            body: JSON.stringify({
                                model: "LongCat-Flash-Chat",
                                messages: [
                                    { role: "system", content: "You are Nix 4, a high-performance AI by CodeNix." },
                                    ...messages.map(m => ({ role: m.role, content: m.content })),
                                    { role: "user", content: query }
                                ]
                            })
                        });
                        const data = await res.json();
                        aiResponseText = data.choices[0].message.content;
                        saveToSheet(query, aiResponseText);
                    }

                    const aiMsg = { conversation_id: currentConvId, role: 'assistant', content: aiResponseText };
                    setMessages(prev => [...prev, aiMsg]);
                    await supabase.from('messages').insert([aiMsg]);

                } catch (e) {
                    console.error(e);
                } finally {
                    setIsTyping(false);
                }
            };

            const checkLocal = async (q) => {
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent("SELECT A, B")}&headers=0&t=${Date.now()}`;
                    const res = await fetch(url);
                    const text = await res.text();
                    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1]);
                    const norm = q.toLowerCase().trim();
                    const match = json.table.rows.find(r => r.c && r.c[0] && String(r.c[0].v).toLowerCase().trim() === norm);
                    return match ? String(match.c[1].v) : null;
                } catch(e) { return null; }
            };

            const saveToSheet = (q, a) => {
                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ values: [[q, a]] }) });
            };

            const handleSignOut = async () => {
                await supabase.auth.signOut();
                window.location.href = "auth.html";
            };

            const isArabic = (text) => /[\u0600-\u06FF]/.test(text);

            return (
                <div className={`flex h-[100dvh] w-full ${uiLang === 'ar' ? 'rtl' : 'ltr'}`}>
                    {/* Sidebar */}
                    <aside className="hidden md:flex w-72 bg-black border-r border-white/5 flex-col overflow-hidden">
                        <div className="p-6">
                            <button 
                                onClick={() => { setActiveConvId(null); setMessages([]); }}
                                className="w-full flex items-center justify-between p-3 px-4 rounded-xl border border-white/10 hover:bg-white/5 transition-all group"
                            >
                                <span className="text-sm font-bold">New Chat</span>
                                <svg className="w-4 h-4 opacity-50 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto px-3 space-y-1 chat-scroll">
                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 px-3 mb-2 block">Recent History</label>
                            {conversations.map(conv => (
                                <button 
                                    key={conv.id}
                                    onClick={() => loadConversation(conv.id)}
                                    className={`w-full text-left p-3 px-4 rounded-xl text-xs font-medium truncate transition-all ${activeConvId === conv.id ? 'sidebar-item-active text-white' : 'text-zinc-500 hover:text-zinc-300 hover:bg-white/5'}`}
                                >
                                    {conv.title}
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-white/5 bg-zinc-950/50">
                            <div className="flex items-center gap-3 p-2">
                                <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-bold text-[10px]">U</div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-[10px] font-bold truncate">{user?.email}</p>
                                </div>
                                <button onClick={() => setShowSettings(true)} className="p-2 text-zinc-500 hover:text-white transition-colors">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                </button>
                            </div>
                        </div>
                    </aside>

                    {/* Chat Area */}
                    <main className="flex-1 flex flex-col relative bg-transparent overflow-hidden">
                        <header className="flex items-center justify-between p-4 px-6 border-b border-white/5 backdrop-blur-md">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-black text-[10px]">N4</div>
                                <h2 className="text-sm font-bold tracking-tight">
                                    {activeConvId ? conversations.find(c => c.id === activeConvId)?.title : 'Nix 4'}
                                </h2>
                            </div>
                            <div className="flex items-center gap-2">
                                <button className="md:hidden p-2 text-zinc-500" onClick={() => setShowSettings(true)}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                                </button>
                            </div>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll p-4 md:p-8 space-y-8 pb-40">
                            <div className="max-w-3xl mx-auto space-y-8">
                                {messages.length === 0 && (
                                    <div className="h-[60vh] flex flex-col items-center justify-center text-center opacity-30">
                                        <div className="w-16 h-16 rounded-3xl bg-indigo-600/20 mb-6 flex items-center justify-center text-3xl">✦</div>
                                        <h1 className="text-xl font-bold">Ready to assist</h1>
                                        <p className="text-xs font-medium uppercase tracking-[0.3em] mt-2">Nix 4 Next-Gen Intelligence</p>
                                    </div>
                                )}
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-5 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center text-[10px] font-black mt-1 ${msg.role === 'user' ? 'bg-zinc-800' : 'bg-indigo-600'}`}>
                                            {msg.role === 'user' ? 'U' : 'N4'}
                                        </div>
                                        <div className={`message-bubble ${isArabic(msg.content) ? 'rtl' : 'ltr'}`}>
                                            <div className={`p-4 px-5 rounded-2xl text-[14px] leading-relaxed ${msg.role === 'user' ? 'bg-zinc-900 border border-white/5 rounded-tr-none' : 'bg-transparent'}`}>
                                                <div className="whitespace-pre-wrap">{msg.content}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex gap-2 p-2 px-12 opacity-30">
                                        <div className="w-1 h-1 bg-white rounded-full animate-bounce"></div>
                                        <div className="w-1 h-1 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div className="w-1 h-1 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Input */}
                        <div className="absolute bottom-0 left-0 right-0 p-4 md:pb-10 bg-gradient-to-t from-black via-black/80 to-transparent">
                            <div className="max-w-3xl mx-auto relative group">
                                <textarea 
                                    rows="1"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Ask Nix anything..."
                                    className="w-full bg-zinc-900 border border-white/10 rounded-2xl p-4 pr-16 outline-none focus:border-indigo-500/50 focus:ring-4 focus:ring-indigo-500/5 transition-all resize-none shadow-2xl"
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            processQuery(input);
                                        }
                                    }}
                                />
                                <button 
                                    onClick={() => processQuery(input)}
                                    disabled={!input.trim()}
                                    className="absolute right-3 top-3 p-2 bg-white text-black rounded-xl hover:scale-105 active:scale-95 transition-all disabled:opacity-20 disabled:grayscale"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
                            <div className="w-full max-w-sm bg-zinc-950 border border-white/10 rounded-3xl p-8 animate-in zoom-in-95 duration-200">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-bold">Workspace Settings</h3>
                                    <button onClick={() => setShowSettings(false)}><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Interface</label>
                                        <div className="grid grid-cols-2 gap-2 bg-black p-1 rounded-xl">
                                            <button onClick={() => setUiLang('en')} className={`p-2 rounded-lg text-xs font-bold ${uiLang === 'en' ? 'bg-indigo-600' : 'text-zinc-600'}`}>English</button>
                                            <button onClick={() => setUiLang('ar')} className={`p-2 rounded-lg text-xs font-bold ${uiLang === 'ar' ? 'bg-indigo-600' : 'text-zinc-600'}`}>العربية</button>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={handleSignOut}
                                        className="w-full p-4 rounded-xl border border-red-500/20 text-red-500 text-xs font-bold hover:bg-red-500 hover:text-white transition-all"
                                    >
                                        Sign Out Session
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
