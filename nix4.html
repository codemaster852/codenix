<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix 4 Pro - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #000000;
            --accent: #6366f1;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 15, 15, 0.7);
            --bubble-user: #18181b;
        }

        .light {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --accent: #4f46e5;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(255, 255, 255, 0.8);
            --bubble-user: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .sidebar-item-active { background: rgba(99, 102, 241, 0.1); color: var(--accent); box-shadow: inset 3px 0 0 0 var(--accent); }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .quiz-option {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }
        .quiz-option:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent);
            transform: scale(1.01);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        .mindmap-node {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 0.5rem;
            border-left: 1px solid rgba(99, 102, 241, 0.3);
        }
        .mindmap-node::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.75rem;
            width: 1rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SHEET_ID = "1BwS2zO3IGppDo2r_ROZVW74iSmu6aGSyE8j1O63UjbE";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3YKf3u6KoxvHJc3bBRJzWYg1CPcpHAFXUTTWTh28FR2XcOJlqzcIsJC19_9X7ozH8/exec";
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const API_URL = "https://api.longcat.chat/openai/v1/chat/completions";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('chat');
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [attachedFile, setAttachedFile] = useState(null);
            
            const [myClasses, setMyClasses] = useState([]);
            const [selectedClass, setSelectedClass] = useState(null);
            const [activeLesson, setActiveLesson] = useState(null);
            
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [quizFinished, setQuizFinished] = useState(false);
            const [showFeedback, setShowFeedback] = useState(null);

            const scrollRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) { window.location.href = "auth.html"; return; }
                    setUser(session.user);
                    fetchConversations(session.user.id);
                    fetchClasses(session.user.id);
                };
                init();
            }, []);

            useEffect(() => { document.body.className = theme; }, [theme]);
            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' }); }, [messages, isTyping]);

            const fetchConversations = async (uid) => {
                const { data } = await supabaseClient.from('conversations').select('*').eq('user_id', uid).order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const fetchClasses = async (uid) => {
                const { data: teacherClasses } = await supabaseClient.from('classes').select('*').eq('teacher_id', uid);
                const { data: joinedClasses } = await supabaseClient.from('class_members').select('classes(*)').eq('user_id', uid);
                const combined = [
                    ...(teacherClasses || []).map(c => ({ ...c, role: 'teacher' })),
                    ...(joinedClasses || []).map(item => ({ ...item.classes, role: 'student' }))
                ];
                const enriched = await Promise.all(combined.map(async (cls) => {
                    const { data: content } = await supabaseClient.from('class_content').select('*').eq('class_id', cls.id).order('created_at', { ascending: false });
                    return { ...cls, content: content || [] };
                }));
                setMyClasses(enriched);
            };

            const searchLocalSheet = async (q) => {
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent("SELECT A, B")}&headers=0&t=${Date.now()}`;
                    const res = await fetch(url);
                    const text = await res.text();
                    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1]);
                    const queryNorm = q.toLowerCase().trim();
                    const match = json.table.rows.find(r => r.c && r.c[0] && String(r.c[0].v).toLowerCase().trim() === queryNorm);
                    return match ? String(match.c[1].v) : null;
                } catch(e) { return null; }
            };

            const saveToSheet = (q, a) => {
                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ values: [[q, a]] }) });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    setAttachedFile({
                        name: file.name,
                        type: file.type,
                        base64: event.target.result,
                        size: (file.size / 1024).toFixed(1) + ' KB'
                    });
                };
                if (file.type.startsWith('image/')) {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            };

            const processQuery = async () => {
                if ((!input.trim() && !attachedFile) || isTyping) return;
                const q = input;
                const file = attachedFile;
                setInput("");
                setAttachedFile(null);
                setIsTyping(true);

                let currentConvId = activeConvId;
                if (!currentConvId) {
                    const { data } = await supabaseClient.from('conversations').insert([{ user_id: user.id, title: q.substring(0, 30) || "File Analysis" }]).select().single();
                    currentConvId = data.id;
                    setActiveConvId(currentConvId);
                    fetchConversations(user.id);
                }

                const displayContent = file ? (q ? `${q}\n[Attached: ${file.name}]` : `[Attached: ${file.name}]`) : q;
                const userMsg = { conversation_id: currentConvId, role: 'user', content: displayContent };
                setMessages(prev => [...prev, userMsg]);

                try {
                    // Check local sheet first ONLY if no file is attached
                    let finalResponse;
                    if (!file) {
                        const localResponse = await searchLocalSheet(q);
                        if (localResponse) finalResponse = localResponse;
                    }

                    if (!finalResponse) {
                        let aiPayload = {
                            model: "LongCat-Flash-Chat",
                            messages: [...messages.map(m => ({ role: m.role, content: m.content }))]
                        };

                        if (file && file.type.startsWith('image/')) {
                            aiPayload.messages.push({
                                role: "user",
                                content: [
                                    { type: "text", text: q || "Analyze this image." },
                                    { type: "image_url", image_url: { url: file.base64 } }
                                ]
                            });
                        } else if (file) {
                            aiPayload.messages.push({
                                role: "user",
                                content: `User uploaded a file named ${file.name} with content:\n\n${file.base64}\n\nUser Question: ${q || "Summarize this file."}`
                            });
                        } else {
                            aiPayload.messages.push({ role: "user", content: q });
                        }

                        const res = await fetch(API_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                            body: JSON.stringify(aiPayload)
                        });
                        const data = await res.json();
                        finalResponse = data.choices[0].message.content;
                        
                        if (!file) saveToSheet(q, finalResponse);
                    }

                    const aiMsg = { conversation_id: currentConvId, role: 'assistant', content: finalResponse };
                    setMessages(prev => [...prev, aiMsg]);
                    await supabaseClient.from('messages').insert([userMsg, aiMsg]);
                } catch(e) {
                    console.error(e);
                } finally { setIsTyping(false); }
            };

            const generateClassContent = async (type, topic) => {
                if (!topic) return;
                setIsTyping(true);
                let prompt = type === 'test' ? `Create a 5-question JSON quiz for ${topic}` : `Create a lesson for ${topic}`;
                if (type === 'mindmap') prompt = `Create a markdown bullet mindmap for ${topic}`;

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [{ role: "user", content: prompt }]
                        })
                    });
                    const data = await res.json();
                    await supabaseClient.from('class_content').insert([{ class_id: selectedClass.id, type, title: topic, content: data.choices[0].message.content }]);
                    fetchClasses(user.id);
                } finally { setIsTyping(false); }
            };

            const handleQuizAnswer = (idx, correctIdx) => {
                if (showFeedback) return;
                if (idx === correctIdx) { setScore(s => s + 1); setShowFeedback('correct'); } else { setShowFeedback('wrong'); }
                setTimeout(() => {
                    setShowFeedback(null);
                    if (quizIndex < JSON.parse(activeLesson.content).length - 1) setQuizIndex(quizIndex + 1); else setQuizFinished(true);
                }, 1000);
            };

            return (
                <div className="flex h-screen w-full bg-[var(--bg-main)] text-[var(--text-primary)] transition-all">
                    
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-[var(--bg-sidebar)] border-r border-[var(--border)] transition-transform lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex flex-col h-full">
                            <div className="p-6">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg">N4</div>
                                    <h1 className="font-bold tracking-tight">Nix 4 Pro</h1>
                                </div>
                                <button onClick={() => { setActiveConvId(null); setMessages([]); setView('chat'); setIsSidebarOpen(false); }} className="w-full flex items-center justify-center gap-2 p-3.5 mb-6 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all font-bold text-[10px] uppercase tracking-widest text-indigo-400">
                                    + New Chat
                                </button>
                                <nav className="space-y-1">
                                    <button onClick={() => { setView('chat'); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'chat' ? 'sidebar-item-active' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                        <span className="text-sm font-semibold">AI Assistant</span>
                                    </button>
                                    <button onClick={() => { setView('class'); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'class' ? 'sidebar-item-active' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeWidth="2" d="M12 14l9-5-9-5-9 5 9 5z"/></svg>
                                        <span className="text-sm font-semibold">Nix Class</span>
                                    </button>
                                </nav>
                            </div>
                            <div className="flex-1 overflow-y-auto px-4 chat-scroll">
                                <p className="px-3 text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 mt-4">History</p>
                                <div className="space-y-1">
                                    {view === 'chat' ? conversations.map(c => (
                                        <button key={c.id} onClick={() => { setActiveConvId(c.id); setView('chat'); fetchConversations(user.id); }} className={`w-full text-left p-3 rounded-xl text-xs truncate ${activeConvId === c.id ? 'bg-indigo-600/20 text-indigo-400' : 'opacity-40 hover:opacity-100'}`}>
                                            {c.title || "Untitled Chat"}
                                        </button>
                                    )) : myClasses.map(c => (
                                        <button key={c.id} onClick={() => { setSelectedClass(c); setActiveLesson(null); }} className={`w-full text-left p-3 rounded-xl text-xs truncate ${selectedClass?.id === c.id ? 'bg-indigo-600/20 text-indigo-400' : 'opacity-40 hover:opacity-100'}`}>
                                            {c.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative overflow-hidden bg-[var(--bg-main)]">
                        <header className="h-16 flex items-center justify-between px-6 glass-panel shrink-0 z-20">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 text-zinc-400"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" strokeWidth="2"/></svg></button>
                                <h2 className="text-xs font-black uppercase tracking-[0.2em] opacity-40">{view === 'chat' ? 'Intelligent Assistant' : 'Nix Classroom'}</h2>
                            </div>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 md:px-10 py-10 chat-scroll">
                            <div className="max-w-4xl mx-auto space-y-8 pb-40">
                                {view === 'chat' ? (
                                    messages.map((m, i) => (
                                        <div key={i} className={`flex gap-5 animate-fade ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                            <div className={`w-10 h-10 shrink-0 rounded-2xl flex items-center justify-center font-bold text-[10px] ${m.role === 'user' ? 'bg-white/5' : 'bg-indigo-600 text-white'}`}>{m.role === 'user' ? 'ME' : 'N4'}</div>
                                            <div className={`p-6 rounded-[2rem] max-w-[80%] leading-relaxed text-[15px] ${m.role === 'user' ? 'bg-[var(--bubble-user)] border border-[var(--border)] rounded-tr-none' : 'bg-white/5 border border-white/5 rounded-tl-none'}`}>
                                                {m.content}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    selectedClass ? (
                                        activeLesson ? (
                                            <div className="animate-fade">
                                                <button onClick={() => setActiveLesson(null)} className="mb-8 text-[10px] font-black uppercase tracking-widest text-indigo-400">← Back</button>
                                                <div className="p-10 bg-white/5 border border-[var(--border)] rounded-[3rem]">
                                                    <h3 className="text-3xl font-black mb-6">{activeLesson.title}</h3>
                                                    {activeLesson.type === 'test' ? (
                                                        !quizFinished ? (
                                                            <div className="space-y-6">
                                                                <p className="text-lg mb-8">{JSON.parse(activeLesson.content)[quizIndex].question}</p>
                                                                <div className="grid gap-3">
                                                                    {JSON.parse(activeLesson.content)[quizIndex].options.map((opt, oIdx) => (
                                                                        <button key={oIdx} onClick={() => handleQuizAnswer(oIdx, JSON.parse(activeLesson.content)[quizIndex].correct)} className={`quiz-option p-5 rounded-2xl bg-black/20 text-left ${showFeedback && oIdx === JSON.parse(activeLesson.content)[quizIndex].correct ? 'border-green-500 bg-green-500/10' : ''}`}>{opt}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ) : <div className="text-center py-10">Score: {score} / {JSON.parse(activeLesson.content).length}</div>
                                                    ) : <div className="whitespace-pre-wrap leading-loose opacity-70">{activeLesson.content}</div>}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-12">
                                                <div className="p-12 bg-indigo-600 rounded-[3.5rem] text-white">
                                                    <h3 className="text-4xl font-black">{selectedClass.name}</h3>
                                                    <p className="opacity-70 mt-2">Materials & Quizzes</p>
                                                </div>
                                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                    {selectedClass.content.map((item, idx) => (
                                                        <div key={idx} onClick={() => setActiveLesson(item)} className="p-8 bg-white/5 border border-white/5 rounded-[2.5rem] cursor-pointer hover:bg-indigo-600/5 transition-all">
                                                            <span className="text-[9px] font-black px-2 py-1 bg-indigo-600/20 text-indigo-400 rounded uppercase">{item.type}</span>
                                                            <h4 className="text-xl font-bold mt-4">{item.title}</h4>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )
                                    ) : <div className="text-center opacity-20 py-20">Select a course to view lessons.</div>
                                )}
                            </div>
                        </div>

                        {view === 'chat' && (
                            <div className="p-6 bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent absolute bottom-0 left-0 right-0 z-30">
                                <div className="max-w-4xl mx-auto">
                                    {attachedFile && (
                                        <div className="mb-3 px-6 py-3 bg-indigo-600/20 border border-indigo-600/30 rounded-2xl flex items-center justify-between animate-fade">
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-[10px] font-bold">DOC</div>
                                                <div className="text-xs">
                                                    <p className="font-bold truncate max-w-[200px]">{attachedFile.name}</p>
                                                    <p className="opacity-50">{attachedFile.size}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => setAttachedFile(null)} className="p-2 opacity-50 hover:opacity-100">✕</button>
                                        </div>
                                    )}
                                    <div className="relative bg-zinc-900/50 backdrop-blur-3xl rounded-[2.5rem] p-2 flex items-center shadow-2xl border border-white/10 ring-1 ring-white/5">
                                        <button onClick={() => fileInputRef.current.click()} className="w-12 h-12 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" strokeWidth="2"/></svg>
                                        </button>
                                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                        <input 
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && processQuery()}
                                            placeholder="Message Nix or attach files..."
                                            className="flex-1 bg-transparent p-5 outline-none text-[15px]"
                                        />
                                        <button onClick={processQuery} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all shadow-xl mr-1 ${isTyping ? 'bg-zinc-800' : 'bg-indigo-600 hover:bg-indigo-500'}`}>
                                            {isTyping ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" strokeWidth="3"/></svg>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
