<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix 4 | codenix</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@400;600&display=swap');
        
        :root {
            --brand-purple: #8b5cf6;
            --brand-purple-dark: #6d28d9;
            --bg-main: #000000;
            --bg-card: #0a0a0a;
            --text-main: #f3f4f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-main: #ffffff;
            --bg-card: #f9fafb;
            --text-main: #111827;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            margin: 0;
            height: 100dvh;
            overflow: hidden;
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--brand-purple); border-radius: 10px; }

        .glass-header {
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-main), 0.8);
            border-bottom: 1px solid var(--border);
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        .prose pre {
            background: #111 !important;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 0.5rem 0;
        }

        .input-area {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            transition: border-color 0.2s;
        }

        .input-area:focus-within {
            border-color: var(--brand-purple);
        }

        .rtl { direction: rtl; font-family: 'Noto Sans Arabic', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU/gviz/tq?tqx=out:csv';
        const LONGCAT_URL = "https://api.longcat.app/v1/chat/completions";
        const LONGCAT_KEY = 'ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [isVerifying, setIsVerifying] = useState(true);
            const scrollRef = useRef(null);

            // Auth Check
            useEffect(() => {
                const checkAuth = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (!session) {
                        window.location.href = `auth.html?redirect=nix4.html`;
                    } else {
                        setIsVerifying(false);
                    }
                };
                checkAuth();
            }, []);

            // Auto Scroll
            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages, isLoading]);

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                document.documentElement.className = newTheme;
            };

            const isArabic = (text) => /[\u0600-\u06FF]/.test(text);

            const searchSheets = async (query) => {
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    const csvText = await response.text();
                    // Basic CSV Parser (handling quotes)
                    const rows = csvText.split('\n').map(row => {
                        return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
                    });

                    const normalizedQuery = query.toLowerCase().trim();
                    
                    for (let i = 0; i < rows.length; i++) {
                        const question = rows[i][0]?.toLowerCase().trim();
                        if (question === normalizedQuery || normalizedQuery.includes(question) && question.length > 3) {
                            console.log(`Nix 4 Analytics - Tokens for this match: ${rows[i][2] || '0'}`);
                            return rows[i][1]; // Column 2 is the answer
                        }
                    }
                    return null;
                } catch (err) {
                    console.error("Sheets Error:", err);
                    return null;
                }
            };

            const askLongcat = async (query) => {
                const res = await fetch(LONGCAT_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${LONGCAT_KEY}` 
                    },
                    body: JSON.stringify({
                        model: "longcat-v1",
                        messages: [{ role: "user", content: query }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMsg = input.trim();
                setInput("");
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                try {
                    // 1. Search Knowledge Base (Sheets)
                    const sheetAnswer = await searchSheets(userMsg);
                    
                    let finalAnswer;
                    if (sheetAnswer) {
                        finalAnswer = sheetAnswer;
                    } else {
                        // 2. Fallback to Longcat AI
                        finalAnswer = await askLongcat(userMsg);
                    }

                    setMessages(prev => [...prev, { role: 'assistant', content: finalAnswer }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "I encountered an error connecting to my core systems. Please try again." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isVerifying) return null;

            return (
                <div className={`flex flex-col h-full w-full ${theme === 'light' ? 'light-mode' : ''}`}>
                    {/* Header */}
                    <header className="glass-header h-16 flex items-center justify-between px-6 shrink-0 z-20">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-black text-white text-xs">N4</div>
                            <span className="font-bold tracking-tight text-lg">Nix 4</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-white/10 transition-colors">
                                {theme === 'dark' ? '🌞' : '🌙'}
                            </button>
                            <button className="text-xs font-bold uppercase opacity-50 hover:opacity-100 transition-opacity">
                                Codenix
                            </button>
                        </div>
                    </header>

                    {/* Chat Area */}
                    <main ref={scrollRef} className="flex-1 overflow-y-auto chat-container p-4 md:p-8">
                        <div className="max-w-3xl mx-auto space-y-8 pb-20">
                            {messages.length === 0 && (
                                <div className="h-[50vh] flex flex-col items-center justify-center text-center px-4">
                                    <div className="w-20 h-20 bg-violet-600/10 rounded-3xl flex items-center justify-center mb-6 border border-violet-500/20">
                                        <span className="text-4xl">🔮</span>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-3">Welcome to Nix 4</h2>
                                    <p className="opacity-50 max-w-sm">How can I assist you today? I have access to the codenix knowledge base and advanced AI reasoning.</p>
                                </div>
                            )}

                            {messages.map((m, i) => (
                                <div key={i} className={`flex gap-4 md:gap-6 ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-8 h-8 rounded-lg shrink-0 flex items-center justify-center text-[10px] font-bold ${m.role === 'user' ? 'bg-white/10' : 'bg-violet-600 text-white'}`}>
                                        {m.role === 'user' ? 'U' : 'N'}
                                    </div>
                                    <div className={`message-bubble ${isArabic(m.content) ? 'rtl' : ''}`}>
                                        <div className={`text-base leading-relaxed prose prose-invert max-w-none`}>
                                            <div dangerouslySetInnerHTML={{ __html: marked.parse(m.content) }} />
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {isLoading && (
                                <div className="flex gap-4 md:gap-6 animate-pulse">
                                    <div className="w-8 h-8 rounded-lg bg-violet-600/20 shrink-0"></div>
                                    <div className="space-y-2 flex-1">
                                        <div className="h-4 bg-white/5 rounded w-3/4"></div>
                                        <div className="h-4 bg-white/5 rounded w-1/2"></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Input Area */}
                    <div className="shrink-0 p-4 md:p-6 bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent">
                        <div className="max-w-3xl mx-auto relative">
                            <div className="input-area flex items-end p-2 pr-3">
                                <textarea 
                                    rows="1"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSend();
                                        }
                                    }}
                                    placeholder="Message Nix 4..."
                                    className="flex-1 bg-transparent border-none outline-none py-3 px-4 resize-none max-h-48 text-base"
                                    style={{ height: 'auto' }}
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim() || isLoading}
                                    className="mb-1 w-10 h-10 bg-violet-600 text-white rounded-xl flex items-center justify-center hover:bg-violet-500 disabled:opacity-20 disabled:hover:bg-violet-600 transition-all active:scale-95 shadow-lg shadow-violet-600/20"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                                    </svg>
                                </button>
                            </div>
                            <p className="text-[10px] text-center mt-3 opacity-30 uppercase font-bold tracking-widest">
                                Nix 4 may search knowledge bases to provide accurate results.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
