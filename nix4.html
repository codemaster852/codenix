<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix 4 Pro - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #000000;
            --accent: #6366f1;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 15, 15, 0.7);
            --bubble-user: #18181b;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel { background: var(--glass); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
        .sidebar-item-active { background: rgba(99, 102, 241, 0.1); color: var(--accent); border-right: 2px solid var(--accent); }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .markdown-content p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-content ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const API_URL = "https://api.longcat.chat/openai/v1/chat/completions";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('chat');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [attachedFile, setAttachedFile] = useState(null);
            
            const [myClasses, setMyClasses] = useState([]);
            const [selectedClass, setSelectedClass] = useState(null);
            const [showManualModal, setShowManualModal] = useState(false);
            const [manualContent, setManualContent] = useState({ type: 'lesson', title: '', content: '' });

            const scrollRef = useRef(null);
            const fileInputRef = useRef(null);

            // Auth Check & Initial Load
            useEffect(() => {
                const init = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        // Use a safe check to ensure auth.html exists or use root
                        window.location.href = "./auth.html";
                        return;
                    }
                    setUser(session.user);
                    fetchConversations(session.user.id);
                    fetchClasses(session.user.id);
                };
                init();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_OUT') {
                        window.location.href = "./auth.html";
                    }
                    if (session) setUser(session.user);
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            // Scroll to bottom on new messages
            useEffect(() => { 
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            // Fetch Conversation Messages
            useEffect(() => {
                if (activeConvId) {
                    fetchMessages(activeConvId);
                } else {
                    setMessages([]);
                }
            }, [activeConvId]);

            const fetchConversations = async (uid) => {
                const { data, error } = await supabaseClient
                    .from('conversations')
                    .select('*')
                    .eq('user_id', uid)
                    .order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const fetchMessages = async (convId) => {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', convId)
                    .order('created_at', { ascending: true });
                if (data) setMessages(data);
            };

            const fetchClasses = async (uid) => {
                const { data: teacherClasses } = await supabaseClient.from('classes').select('*').eq('teacher_id', uid);
                const enriched = await Promise.all((teacherClasses || []).map(async (cls) => {
                    const { data: content } = await supabaseClient.from('class_content').select('*').eq('class_id', cls.id).order('created_at', { ascending: false });
                    return { ...cls, role: 'teacher', content: content || [] };
                }));
                setMyClasses(enriched);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setAttachedFile({ name: file.name, type: file.type, base64: event.target.result });
                };
                file.type.startsWith('image/') ? reader.readAsDataURL(file) : reader.readAsText(file);
            };

            const processQuery = async () => {
                if ((!input.trim() && !attachedFile) || isTyping) return;
                const q = input;
                const file = attachedFile;
                setInput(""); setAttachedFile(null); setIsTyping(true);

                let currentConvId = activeConvId;
                
                // 1. Create conversation if it doesn't exist
                if (!currentConvId) {
                    const { data, error } = await supabaseClient
                        .from('conversations')
                        .insert([{ user_id: user.id, title: q.substring(0, 40) || "New Conversation" }])
                        .select()
                        .single();
                    if (error) { console.error(error); setIsTyping(false); return; }
                    currentConvId = data.id;
                    setActiveConvId(currentConvId);
                    fetchConversations(user.id);
                }

                const userMsgContent = file ? `${q} [Attached: ${file.name}]` : q;
                
                // 2. Optimistic UI update
                const tempUserMsg = { conversation_id: currentConvId, role: 'user', content: userMsgContent };
                setMessages(prev => [...prev, tempUserMsg]);

                try {
                    // 3. Prepare AI Payload
                    let aiPayload = {
                        model: "LongCat-Flash-Chat",
                        messages: [
                            ...messages.map(m => ({ role: m.role, content: m.content })),
                            { 
                                role: "user", 
                                content: file && file.type.startsWith('image/') ? [
                                    { type: "text", text: q || "Describe this image" },
                                    { type: "image_url", image_url: { url: file.base64 } }
                                ] : userMsgContent 
                            }
                        ]
                    };

                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify(aiPayload)
                    });
                    
                    const data = await res.json();
                    const aiResponse = data.choices[0].message.content;

                    const aiMsg = { conversation_id: currentConvId, role: 'assistant', content: aiResponse };
                    
                    // 4. Save both messages to DB
                    await supabaseClient.from('messages').insert([
                        { ...tempUserMsg, user_id: user.id },
                        { ...aiMsg, user_id: user.id }
                    ]);

                    setMessages(prev => [...prev, aiMsg]);
                } catch(err) {
                    console.error("AI Error:", err);
                } finally {
                    setIsTyping(false);
                }
            };

            const saveContent = async (type, title, content) => {
                await supabaseClient.from('class_content').insert([{ class_id: selectedClass.id, type, title, content }]);
                await fetchClasses(user.id);
                setShowManualModal(false);
            };

            const startNewChat = () => {
                setActiveConvId(null);
                setMessages([]);
                setView('chat');
                setIsSidebarOpen(false);
            };

            const userName = user?.user_metadata?.full_name || user?.email?.split('@')[0] || 'User';

            return (
                <div className="flex h-screen w-full bg-[#0a0a0a] text-white">
                    {/* Sidebar */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-80 bg-black border-r border-white/5 transition-transform duration-300 lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex flex-col h-full">
                            <div className="p-8">
                                <div className="flex items-center gap-3 mb-10">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center font-bold text-lg shadow-lg shadow-indigo-600/20">N4</div>
                                    <h1 className="font-extrabold text-xl tracking-tight">Nix 4 Pro</h1>
                                </div>
                                
                                <button onClick={startNewChat} className="w-full mb-8 py-3.5 px-4 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl flex items-center justify-center gap-2 transition-all group">
                                    <span className="text-indigo-400 group-hover:scale-110 transition-transform text-xl">+</span>
                                    <span className="text-xs font-black uppercase tracking-widest text-indigo-400">New Chat</span>
                                </button>

                                <nav className="space-y-1">
                                    <button onClick={() => { setView('chat'); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${view === 'chat' ? 'bg-white/5 text-indigo-400' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                        <div className="w-2 h-2 rounded-full bg-current"></div>
                                        <span className="text-sm font-bold">Intelligence</span>
                                    </button>
                                    <button onClick={() => { setView('class'); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${view === 'class' ? 'bg-white/5 text-indigo-400' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                        <div className="w-2 h-2 rounded-full bg-current"></div>
                                        <span className="text-sm font-bold">Class Mode</span>
                                    </button>
                                </nav>
                            </div>

                            <div className="flex-1 overflow-y-auto px-6 chat-scroll pb-10">
                                <p className="px-4 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-4">
                                    {view === 'chat' ? 'Recent History' : 'Your Classes'}
                                </p>
                                <div className="space-y-1">
                                    {view === 'chat' ? conversations.map(c => (
                                        <button key={c.id} onClick={() => { setActiveConvId(c.id); setIsSidebarOpen(false); }} className={`w-full text-left p-4 rounded-2xl text-[13px] truncate transition-all ${activeConvId === c.id ? 'bg-indigo-600/10 text-indigo-400 border-l-2 border-indigo-600' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                            {c.title || "Untitled Chat"}
                                        </button>
                                    )) : myClasses.map(c => (
                                        <button key={c.id} onClick={() => setSelectedClass(c)} className={`w-full text-left p-4 rounded-2xl text-[13px] truncate transition-all ${selectedClass?.id === c.id ? 'bg-indigo-600/10 text-indigo-400' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}>
                                            {c.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="p-6 border-t border-white/5 bg-zinc-950/50">
                                <button onClick={() => supabaseClient.auth.signOut()} className="w-full p-4 rounded-2xl text-xs font-bold opacity-40 hover:opacity-100 hover:bg-red-500/10 hover:text-red-400 transition-all text-left">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative overflow-hidden bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/5 via-black to-black">
                        <header className="h-20 flex items-center justify-between px-8 glass-panel shrink-0 z-20">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 text-zinc-400 hover:text-white transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" strokeWidth="2" strokeLinecap="round"/></svg>
                                </button>
                                <span className="text-[10px] font-black tracking-[0.3em] text-indigo-400 uppercase">{view === 'chat' ? 'Neural Network' : 'Academic Hub'}</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="hidden md:block text-[11px] font-bold opacity-40">{userName}</span>
                                <div className="w-10 h-10 rounded-2xl bg-indigo-600/10 border border-indigo-600/20 flex items-center justify-center font-bold text-indigo-400 shadow-xl">{userName[0]}</div>
                            </div>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto px-6 md:px-12 py-12 chat-scroll">
                            <div className="max-w-4xl mx-auto">
                                {view === 'chat' && messages.length === 0 && (
                                    <div className="h-[65vh] flex flex-col items-center justify-center text-center animate-fade">
                                        <div className="w-24 h-24 bg-indigo-600/5 rounded-[2.5rem] flex items-center justify-center mb-10 border border-indigo-600/10 shadow-2xl">
                                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-600/40"></div>
                                        </div>
                                        <h2 className="text-5xl md:text-7xl font-black mb-6 tracking-tight leading-[1.1] bg-gradient-to-b from-white via-white to-zinc-600 bg-clip-text text-transparent">
                                            How can I assist<br/> today, {userName}?
                                        </h2>
                                        <p className="text-zinc-500 font-medium text-lg max-w-lg mx-auto leading-relaxed">
                                            Nix 4 Pro is ready to help you analyze files, generate code, or manage your classes.
                                        </p>
                                    </div>
                                )}

                                {view === 'chat' ? (
                                    <div className="space-y-10 pb-40">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex gap-6 ${m.role === 'user' ? 'flex-row-reverse' : ''} animate-fade`}>
                                                <div className={`w-10 h-10 shrink-0 rounded-2xl flex items-center justify-center font-bold text-[11px] border shadow-sm ${m.role === 'user' ? 'bg-zinc-900 border-zinc-800' : 'bg-indigo-600 border-indigo-500 text-white'}`}>
                                                    {m.role === 'user' ? 'YOU' : 'N4'}
                                                </div>
                                                <div className={`p-8 rounded-[2.5rem] max-w-[85%] leading-relaxed text-[16px] markdown-content ${m.role === 'user' ? 'bg-zinc-900/50 border border-white/5 rounded-tr-none' : 'bg-white/[0.03] border border-white/5 rounded-tl-none shadow-2xl'}`}>
                                                    {m.content}
                                                </div>
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="flex gap-6 animate-pulse">
                                                <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center font-bold text-[11px] text-white">N4</div>
                                                <div className="p-6 bg-white/5 rounded-[2.5rem] w-32 flex gap-1 justify-center items-center">
                                                    <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce"></div>
                                                    <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                                    <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="pb-40 animate-fade">
                                        {selectedClass ? (
                                            <div className="space-y-12">
                                                <div className="p-16 bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-[4rem] text-white shadow-2xl shadow-indigo-600/20">
                                                    <h3 className="text-5xl font-black tracking-tight">{selectedClass.name}</h3>
                                                    <div className="mt-6 flex items-center gap-4">
                                                        <span className="px-4 py-2 bg-white/10 rounded-full text-xs font-bold uppercase tracking-widest border border-white/10">Teacher Dashboard</span>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                    {['lesson', 'mindmap', 'test'].map(type => (
                                                        <div key={type} className="p-8 bg-zinc-900/40 border border-white/5 rounded-[3rem] hover:border-indigo-600/30 transition-all">
                                                            <div className="w-12 h-12 bg-indigo-600/10 rounded-2xl flex items-center justify-center mb-6 text-indigo-400 font-bold text-xs uppercase tracking-tighter">
                                                                {type[0]}
                                                            </div>
                                                            <h4 className="text-xl font-bold mb-6 capitalize">{type}s</h4>
                                                            <div className="space-y-3">
                                                                <button onClick={() => { setManualContent({ type, title: '', content: '' }); setShowManualModal(true); }} className="w-full p-4 bg-white/5 hover:bg-white/10 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">Manual Add</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="grid md:grid-cols-2 gap-6">
                                                    {selectedClass.content.map((item, idx) => (
                                                        <div key={idx} className="p-10 bg-white/[0.02] rounded-[3rem] border border-white/5 hover:bg-white/[0.04] transition-all cursor-pointer">
                                                            <div className="flex items-center justify-between mb-4">
                                                                <span className="text-[10px] font-black uppercase text-indigo-400 tracking-widest">{item.type}</span>
                                                                <span className="text-[10px] opacity-20">{new Date(item.created_at).toLocaleDateString()}</span>
                                                            </div>
                                                            <h5 className="text-2xl font-bold tracking-tight">{item.title}</h5>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="text-center py-40 bg-white/[0.01] rounded-[4rem] border border-dashed border-white/5">
                                                <p className="text-zinc-600 font-bold uppercase tracking-[0.4em] text-xs">Select a course to manage your workspace</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Input Area */}
                        {view === 'chat' && (
                            <div className="absolute bottom-0 left-0 right-0 p-8 md:p-12 bg-gradient-to-t from-black via-black/95 to-transparent z-30">
                                <div className="max-w-4xl mx-auto">
                                    {attachedFile && (
                                        <div className="mb-4 px-6 py-4 bg-indigo-600/10 border border-indigo-600/20 rounded-2xl flex items-center justify-between animate-fade">
                                            <div className="flex items-center gap-3">
                                                <div className="text-xl">📎</div>
                                                <span className="text-xs font-bold text-indigo-400 truncate max-w-xs">{attachedFile.name}</span>
                                            </div>
                                            <button onClick={()=>setAttachedFile(null)} className="text-xs opacity-50 hover:opacity-100 p-2">✕</button>
                                        </div>
                                    )}
                                    <div className="bg-zinc-900/60 backdrop-blur-3xl rounded-[3rem] p-3 flex items-center border border-white/5 shadow-2xl ring-1 ring-white/5 focus-within:ring-indigo-600/30 transition-all">
                                        <button onClick={() => fileInputRef.current.click()} className="w-14 h-14 flex items-center justify-center opacity-40 hover:opacity-100 hover:scale-110 transition-all text-2xl">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" strokeWidth="2.5" strokeLinecap="round"/></svg>
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                                        <input 
                                            value={input} 
                                            onChange={e => setInput(e.target.value)} 
                                            onKeyDown={e => e.key === 'Enter' && processQuery()} 
                                            placeholder="Message Nix Pro or drop a file..." 
                                            className="flex-1 bg-transparent px-4 outline-none text-lg placeholder:text-zinc-600"
                                        />
                                        <button onClick={processQuery} className="w-14 h-14 bg-indigo-600 rounded-[1.5rem] flex items-center justify-center shadow-2xl shadow-indigo-600/40 hover:bg-indigo-500 active:scale-95 transition-all">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" strokeWidth="3" strokeLinecap="round" strokejoin="round"/></svg>
                                        </button>
                                    </div>
                                    <p className="text-center mt-6 text-[10px] font-bold uppercase tracking-[0.3em] opacity-20">Nix 4 Pro Neural Workspace</p>
                                </div>
                            </div>
                        )}

                        {/* Manual Add Modal */}
                        {showManualModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-xl p-8">
                                <div className="bg-[#0f0f0f] border border-white/10 p-12 rounded-[4rem] w-full max-w-2xl animate-fade shadow-2xl">
                                    <h3 className="text-3xl font-black mb-8 tracking-tight">Create {manualContent.type}</h3>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Content Title</label>
                                            <input placeholder="Ex: Advanced Quantum Mechanics" value={manualContent.title} onChange={e => setManualContent({...manualContent, title: e.target.value})} className="w-full bg-white/5 border border-white/5 p-5 rounded-2xl outline-none focus:border-indigo-600/50 transition-all"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Detailed Body</label>
                                            <textarea placeholder="Enter full text or structured JSON..." rows="8" value={manualContent.content} onChange={e => setManualContent({...manualContent, content: e.target.value})} className="w-full bg-white/5 border border-white/5 p-5 rounded-3xl outline-none focus:border-indigo-600/50 transition-all chat-scroll"></textarea>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 mt-10">
                                        <button onClick={() => setShowManualModal(false)} className="flex-1 p-5 bg-white/5 hover:bg-white/10 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">Cancel</button>
                                        <button onClick={() => saveContent(manualContent.type, manualContent.title, manualContent.content)} className="flex-1 p-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl shadow-indigo-600/20">Publish Content</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
