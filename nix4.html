<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix 4 | by codenix</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #0a0a0a;
            --text-primary: #e5e7eb;
            --brand-purple: #8b5cf6;
        }

        .light-mode {
            --bg-primary: #ffffff;
            --text-primary: #111827;
        }

        body {
            font-family: 'Inter', 'Noto+Sans+Arabic', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(15, 15, 15, 0.7);
        }
        .light-mode .glass {
            background: rgba(245, 245, 245, 0.7);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }

        .voice-wave {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 60px;
        }

        .bar {
            width: 6px;
            height: 12px;
            background: #8b5cf6;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .bar-active {
            animation: wave 1.2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 12px; transform: scaleY(1); }
            50% { height: 48px; transform: scaleY(1.2); }
        }

        .message-anim {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
        
        .prose pre {
            background-color: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Nix 4 Credentials
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const SHEET_ID = '1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU';
        const LONGCAT_API_KEY = 'ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J';
        const LONGCAT_URL = "https://api.longcat.app/v1/chat/completions";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [uiLang, setUiLang] = useState('en');
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [isVoiceMode, setIsVoiceMode] = useState(false);
            const [voiceStatus, setVoiceStatus] = useState("Idle");
            const [hasActivatedVoice, setHasActivatedVoice] = useState(false);
            const [userEmail, setUserEmail] = useState("User");
            const [isVerifying, setIsVerifying] = useState(true);

            const recognitionRef = useRef(null);
            const synth = window.speechSynthesis;
            const scrollRef = useRef(null);

            const translations = {
                en: {
                    title: "Nix 4",
                    welcome: "How can I help you today?",
                    sub: "I'm Nix 4 by codenix. I search our knowledge base first.",
                    placeholder: "Message Nix 4...",
                    startVoice: "Start Session",
                    endVoice: "End Voice Mode",
                    listening: "Listening...",
                    speaking: "Speaking...",
                    processing: "Processing...",
                    copy: "Copy",
                    hear: "Hear",
                    backToText: "Switch to Typing"
                },
                ar: {
                    title: "نيكس 4",
                    welcome: "كيف يمكنني مساعدتك اليوم؟",
                    sub: "أنا نيكس 4 من كودنيكس. أبحث في قاعدة معرفتنا أولاً.",
                    placeholder: "أرسل رسالة لنيكس 4...",
                    startVoice: "بدء الجلسة",
                    endVoice: "إيقاف الوضع الصوتي",
                    listening: "جاري الاستماع...",
                    speaking: "جاري التحدث...",
                    processing: "جاري المعالجة...",
                    copy: "نسخ",
                    hear: "استماع",
                    backToText: "العودة للكتابة"
                }
            };

            const t = translations[uiLang];

            // 1. Auth Logic
            useEffect(() => {
                const checkAuth = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = `auth.html?redirect=nix4.html`;
                    } else {
                        setUserEmail(session.user.email.split('@')[0]);
                        setIsVerifying(false);
                    }
                };
                checkAuth();
            }, []);

            // 2. Theme & UI Effects
            useEffect(() => {
                document.documentElement.className = theme === 'dark' ? 'dark' : 'light';
                document.body.className = theme === 'dark' ? 'dark-mode' : 'light-mode';
            }, [theme]);

            // 3. Speech Recognition Setup
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;
                    recognitionRef.current.lang = uiLang === 'ar' ? 'ar-SA' : 'en-US';

                    recognitionRef.current.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setVoiceStatus(t.processing);
                        processQuery(transcript);
                    };

                    recognitionRef.current.onend = () => {
                        if (isVoiceMode && (voiceStatus === t.listening || voiceStatus === "Idle")) {
                            startRecognition();
                        }
                    };
                    recognitionRef.current.onerror = () => setVoiceStatus(t.listening);
                }
            }, [isVoiceMode, voiceStatus, uiLang]);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const startRecognition = () => {
                try { recognitionRef.current?.start(); } catch (e) {}
            };

            const isArabicText = (text) => /[\u0600-\u06FF]/.test(text);

            const speak = (text) => {
                synth.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = synth.getVoices();
                const textIsArabic = isArabicText(text);
                
                if (textIsArabic) {
                    utterance.voice = voices.find(v => v.lang.startsWith('ar')) || voices[0];
                    utterance.lang = 'ar-SA';
                } else {
                    utterance.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
                    utterance.lang = 'en-US';
                }

                utterance.onstart = () => setVoiceStatus(t.speaking);
                utterance.onend = () => {
                    setVoiceStatus(t.listening);
                    if (isVoiceMode) setTimeout(() => startRecognition(), 400);
                };
                synth.speak(utterance);
            };

            const processQuery = async (query) => {
                if (!query.trim()) return;
                setMessages(prev => [...prev, { role: 'user', content: query, id: Date.now() }]);
                setIsTyping(true);

                try {
                    const local = await checkSheet(query);
                    let response;
                    if (local) {
                        response = local;
                    } else {
                        response = await askLongcat(query);
                    }
                    
                    setMessages(prev => [...prev, { role: 'assistant', content: response, id: Date.now() + 1 }]);
                    if (isVoiceMode) speak(response);
                    else setVoiceStatus("Idle");
                } catch (e) {
                    const err = uiLang === 'ar' ? "عذراً، أواجه مشكلة." : "I'm having a connection issue.";
                    setMessages(prev => [...prev, { role: 'assistant', content: err, id: Date.now() + 2 }]);
                    if (isVoiceMode) speak(err);
                } finally {
                    setIsTyping(false);
                }
            };

            const checkSheet = async (q) => {
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
                    const res = await fetch(url);
                    const text = await res.text();
                    const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/^"|"$/g, '')));
                    const norm = q.toLowerCase().trim();
                    
                    for(let i = 1; i < rows.length; i++) {
                        const question = (rows[i][0] || "").toLowerCase().trim();
                        if (question === norm || norm.includes(question)) {
                            return rows[i][1];
                        }
                    }
                    return null;
                } catch(e) { return null; }
            };

            const askLongcat = async (q) => {
                const res = await fetch(LONGCAT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${LONGCAT_API_KEY}` },
                    body: JSON.stringify({
                        model: "longcat-v1",
                        messages: [{ role: "user", content: q }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            };

            const toggleVoiceMode = () => {
                if (!isVoiceMode) {
                    setIsVoiceMode(true);
                    setHasActivatedVoice(false);
                } else {
                    setIsVoiceMode(false);
                    setVoiceStatus("Idle");
                    synth.cancel();
                    recognitionRef.current?.stop();
                }
            };

            const activateVoiceSession = () => {
                setHasActivatedVoice(true);
                setVoiceStatus(t.listening);
                const welcome = uiLang === 'ar' ? "مرحباً، أنا نيكس 4. كيف يمكنني مساعدتك؟" : "Hello, I am Nix 4. How can I help you?";
                setMessages(prev => [...prev, { role: 'assistant', content: welcome, id: Date.now() }]);
                speak(welcome);
            };

            if (isVerifying) {
                return (
                    <div className="h-screen flex items-center justify-center bg-brand-bgDark">
                        <div className="animate-pulse text-brand-purple font-bold">Verifying Session...</div>
                    </div>
                );
            }

            return (
                <div className={`flex flex-col h-[100dvh] w-full transition-all ${uiLang === 'ar' ? 'rtl' : 'ltr'}`}>
                    {/* Header */}
                    <header className="flex items-center justify-between p-4 glass border-b border-white/5 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-500/20">
                                <span className="text-white font-bold text-xs">N4</span>
                            </div>
                            <h1 className="font-bold text-sm tracking-widest uppercase text-violet-500">{t.title}</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setUiLang(uiLang === 'en' ? 'ar' : 'en')} className="text-[10px] font-bold uppercase opacity-60 hover:opacity-100">
                                {uiLang === 'en' ? 'Arabic' : 'English'}
                            </button>
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 hover:bg-white/10 rounded-full">
                                {theme === 'dark' ? '🌞' : '🌙'}
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main ref={scrollRef} className="flex-1 overflow-y-auto px-4 pt-6 pb-32 chat-container relative">
                        <div className="max-w-3xl mx-auto space-y-6">
                            
                            {messages.length === 0 && !isVoiceMode && (
                                <div className="h-[60vh] flex flex-col items-center justify-center text-center">
                                    <div className="w-16 h-16 bg-violet-600 rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-violet-600/20">
                                        <span className="text-3xl text-white">✨</span>
                                    </div>
                                    <h2 className="text-2xl font-bold mb-2">{t.welcome}</h2>
                                    <p className="text-sm opacity-50 max-w-sm">{t.sub}</p>
                                </div>
                            )}

                            {!isVoiceMode ? (
                                messages.map((msg) => (
                                    <div key={msg.id} className={`flex gap-4 message-anim ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center text-[10px] font-bold ${msg.role === 'user' ? 'bg-white/10' : 'bg-violet-600 text-white'}`}>
                                            {msg.role === 'user' ? 'U' : 'N'}
                                        </div>
                                        <div className={`max-w-[85%] ${msg.role === 'user' ? 'text-right' : 'text-left'}`}>
                                            <div className={`p-4 rounded-2xl text-[15px] leading-relaxed shadow-sm ${isArabicText(msg.content) ? 'rtl text-right' : 'ltr text-left'} ${msg.role === 'user' ? 'bg-violet-600/10 border border-violet-500/20' : 'bg-black/20 dark:bg-white/5 border border-white/5'}`}>
                                                <div dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }} className="prose prose-invert prose-sm max-w-none prose-p:my-0" />
                                            </div>
                                            <div className={`flex gap-3 mt-2 px-1 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                <button onClick={() => speak(msg.content)} className="text-[9px] uppercase font-bold opacity-40 hover:opacity-100">{t.hear}</button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="h-[60vh] flex flex-col items-center justify-center text-center">
                                    {!hasActivatedVoice ? (
                                        <div className="space-y-6">
                                            <div className="w-24 h-24 bg-violet-600/20 rounded-full flex items-center justify-center mx-auto animate-pulse">
                                                <span className="text-4xl">🎙️</span>
                                            </div>
                                            <h2 className="text-xl font-bold">{t.title} Voice Mode</h2>
                                            <button onClick={activateVoiceSession} className="bg-violet-600 hover:bg-violet-500 px-10 py-4 rounded-2xl font-bold tracking-widest uppercase shadow-xl shadow-violet-600/30 transition-all active:scale-95">
                                                {t.startVoice}
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="voice-wave mb-8">
                                                {[...Array(8)].map((_, i) => (
                                                    <div key={i} className={`bar ${voiceStatus === t.listening || voiceStatus === t.speaking ? 'bar-active' : ''}`} style={{ animationDelay: `${i * 0.15}s` }}></div>
                                                ))}
                                            </div>
                                            <div className="text-xs font-black tracking-[0.5em] uppercase opacity-40 animate-pulse">{voiceStatus}</div>
                                            <button onClick={toggleVoiceMode} className="mt-12 px-8 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-500 text-[10px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                                                {t.endVoice}
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}

                            {isTyping && !isVoiceMode && (
                                <div className="flex gap-2 items-center opacity-40">
                                    <div className="w-1.5 h-1.5 bg-violet-500 rounded-full animate-bounce"></div>
                                    <div className="w-1.5 h-1.5 bg-violet-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                    <div className="w-1.5 h-1.5 bg-violet-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Input Fixed Bottom */}
                    {!isVoiceMode && (
                        <div className="fixed bottom-0 left-0 right-0 p-4 pb-8 glass border-t border-white/5">
                            <div className="max-w-3xl mx-auto flex gap-3">
                                <button onClick={toggleVoiceMode} className="w-12 h-12 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center hover:bg-violet-600 transition-colors">
                                    🎙️
                                </button>
                                <input 
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder={t.placeholder}
                                    className={`flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-violet-500/50 text-sm transition-all ${isArabicText(input) ? 'text-right' : 'text-left'}`}
                                    onKeyDown={(e) => e.key === 'Enter' && processQuery(input) && setInput("")}
                                />
                                <button 
                                    onClick={() => { processQuery(input); setInput(""); }}
                                    disabled={!input.trim()}
                                    className="bg-violet-600 disabled:opacity-30 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg shadow-violet-600/20 active:scale-95 transition-all"
                                >
                                    <span className={uiLang === 'ar' ? 'rotate-180' : ''}>➡️</span>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
