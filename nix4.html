<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix 4 - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #000000;
            --accent: #6366f1;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 15, 15, 0.7);
            --bubble-user: #18181b;
        }

        .light {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --accent: #4f46e5;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(255, 255, 255, 0.8);
            --bubble-user: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .input-glass {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .sidebar-item-active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            box-shadow: inset 3px 0 0 0 var(--accent);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .message-bubble {
            max-width: 85%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        textarea {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        textarea::-webkit-scrollbar { display: none; }

        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const API_URL = "https://api.longcat.chat/openai/v1/chat/completions";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [uiLang, setUiLang] = useState('en');
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // File Upload State
            const [attachedFiles, setAttachedFiles] = useState([]);
            const fileInputRef = useRef(null);
            
            const scrollRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                const checkUser = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = "auth.html";
                    } else {
                        setUser(session.user);
                        fetchConversations(session.user.id);
                    }
                };
                checkUser();
            }, []);

            useEffect(() => {
                document.body.className = theme;
            }, [theme]);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({
                        top: scrollRef.current.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, [messages, isTyping]);

            const fetchConversations = async (userId) => {
                const { data, error } = await supabaseClient
                    .from('conversations')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (!error) setConversations(data);
            };

            const loadConversation = async (id) => {
                setActiveConvId(id);
                setIsSidebarOpen(false);
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', id)
                    .order('created_at', { ascending: true });
                if (!error) setMessages(data);
            };

            const generateTitle = async (query) => {
                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [
                                { role: "system", content: "Summarize the chat in exactly 2 words. No punctuation." }, 
                                { role: "user", content: `Query: ${query}` }
                            ],
                            max_tokens: 10
                        })
                    });
                    const data = await res.json();
                    return data.choices[0].message.content.replace(/[".]/g, '').trim();
                } catch (e) { return "Active Chat"; }
            };

            const updateConversationTitle = async (id, newTitle) => {
                const { error } = await supabaseClient
                    .from('conversations')
                    .update({ title: newTitle })
                    .eq('id', id);
                if (!error) {
                    setConversations(prev => prev.map(c => c.id === id ? { ...c, title: newTitle } : c));
                }
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                setAttachedFiles(prev => [...prev, ...files]);
                // Reset input so same file can be selected again
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const removeFile = (index) => {
                setAttachedFiles(prev => prev.filter((_, i) => i !== index));
            };

            const readFileAsText = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsText(file);
                });
            };

            const processQuery = async () => {
                if ((!input.trim() && attachedFiles.length === 0) || !user || isTyping) return;

                let currentQuery = input;
                const filesToProcess = [...attachedFiles];
                setAttachedFiles([]); // Clear UI immediately

                let currentConvId = activeConvId;
                const isFirstMsg = !currentConvId;
                
                if (isFirstMsg) {
                    const { data, error } = await supabaseClient
                        .from('conversations')
                        .insert([{ user_id: user.id, title: "Drafting..." }])
                        .select()
                        .single();
                    if (error) return;
                    currentConvId = data.id;
                    setActiveConvId(currentConvId);
                    setConversations([data, ...conversations]);
                }

                // If files are present, read them and append to query
                let contextFromFiles = "";
                if (filesToProcess.length > 0) {
                    for (const file of filesToProcess) {
                        try {
                            const content = await readFileAsText(file);
                            contextFromFiles += `\n--- File: ${file.name} ---\n${content}\n`;
                        } catch (err) {
                            console.error("Error reading file", file.name, err);
                        }
                    }
                }

                const fullContent = currentQuery + (contextFromFiles ? `\n\n[System: The user attached the following files:]\n${contextFromFiles}` : "");

                const userMsg = { conversation_id: currentConvId, role: 'user', content: currentQuery + (filesToProcess.length > 0 ? ` [Attached ${filesToProcess.length} files]` : "") };
                setMessages(prev => [...prev, userMsg]);
                setInput("");
                if(textareaRef.current) textareaRef.current.style.height = 'auto';
                setIsTyping(true);

                await supabaseClient.from('messages').insert([userMsg]);

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [
                                { role: "system", content: "You are Nix 4, a world-class AI assistant. Provide expert-level, concise responses. You can see the content of uploaded files if provided." },
                                ...messages.map(m => ({ role: m.role, content: m.content })),
                                { role: "user", content: fullContent }
                            ]
                        })
                    });
                    const data = await res.json();
                    const aiResponseText = data.choices[0].message.content;

                    const aiMsg = { conversation_id: currentConvId, role: 'assistant', content: aiResponseText };
                    setMessages(prev => [...prev, aiMsg]);
                    await supabaseClient.from('messages').insert([aiMsg]);

                    if (messages.length <= 2) {
                        const newTitle = await generateTitle(currentQuery || "File Analysis");
                        await updateConversationTitle(currentConvId, newTitle);
                    }
                } catch (e) { console.error(e); } 
                finally { setIsTyping(false); }
            };

            const handleSignOut = async () => {
                await supabaseClient.auth.signOut();
                window.location.href = "auth.html";
            };

            const isArabic = (text) => /[\u0600-\u06FF]/.test(text);

            const SidebarContent = () => (
                <div className="flex flex-col h-full bg-[var(--bg-sidebar)]">
                    <div className="p-6">
                        <button 
                            onClick={() => { setActiveConvId(null); setMessages([]); setIsSidebarOpen(false); }}
                            className="w-full flex items-center gap-3 p-4 rounded-2xl bg-[var(--accent)] text-white font-bold hover:scale-[1.02] transition-all shadow-lg shadow-indigo-500/20 active:scale-95"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 4v16m8-8H4"/></svg>
                            <span className="text-sm">New Session</span>
                        </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto px-4 py-2 chat-scroll space-y-1">
                        <p className="text-[10px] font-black uppercase tracking-widest text-[var(--text-secondary)] px-3 mb-4 opacity-50">Conversation History</p>
                        {conversations.map(conv => (
                            <button 
                                key={conv.id}
                                onClick={() => loadConversation(conv.id)}
                                className={`w-full text-left p-3 px-4 rounded-xl text-sm font-medium truncate transition-all ${activeConvId === conv.id ? 'sidebar-item-active' : 'text-[var(--text-secondary)] hover:bg-[var(--border)]'}`}
                            >
                                {conv.title}
                            </button>
                        ))}
                    </div>

                    <div className="p-6 border-t border-[var(--border)]">
                        <div className="flex items-center gap-4 p-3 bg-[var(--border)] rounded-2xl">
                            <div className="w-10 h-10 rounded-xl bg-[var(--accent)] text-white flex items-center justify-center font-black text-sm">
                                {user?.email?.[0].toUpperCase()}
                            </div>
                            <div className="flex-1 min-w-0">
                                <p className="text-xs font-bold truncate opacity-90">{user?.email}</p>
                                <p className="text-[10px] text-[var(--text-secondary)] font-medium">Enterprise Tier</p>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="p-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className={`flex h-[100dvh] w-full bg-[var(--bg-main)] ${uiLang === 'ar' ? 'rtl' : 'ltr'}`}>
                    {/* PC Sidebar */}
                    <aside className="hidden lg:flex w-72 border-r border-[var(--border)] flex-col shrink-0">
                        <SidebarContent />
                    </aside>

                    {/* Mobile Sidebar */}
                    <div className={`fixed inset-0 z-50 lg:hidden ${isSidebarOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity ${isSidebarOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsSidebarOpen(false)} />
                        <div className={`absolute left-0 top-0 bottom-0 w-80 sidebar-transition ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <SidebarContent />
                        </div>
                    </div>

                    <main className="flex-1 flex flex-col relative min-w-0">
                        {/* Header */}
                        <header className="flex items-center justify-between h-16 px-4 lg:px-10 glass-panel z-10 shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 -ml-2 text-[var(--text-secondary)]">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                                </button>
                                <div className="flex items-center gap-3">
                                    <div className="w-9 h-9 rounded-xl bg-[var(--accent)] flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                        <span className="text-[10px] font-black text-white">N4</span>
                                    </div>
                                    <h2 className="text-sm font-bold truncate max-w-[150px] md:max-w-none">
                                        {activeConvId ? conversations.find(c => c.id === activeConvId)?.title : 'Nix 4'}
                                    </h2>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                    className="p-2.5 rounded-xl border border-[var(--border)] hover:bg-[var(--border)] transition-all"
                                >
                                    {theme === 'dark' ? (
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" strokeWidth="2" strokeLinecap="round"/></svg>
                                    ) : (
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" strokeWidth="2" strokeLinecap="round"/></svg>
                                    )}
                                </button>
                            </div>
                        </header>

                        {/* Chat Window */}
                        <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll px-4 md:px-12 py-8 space-y-10">
                            <div className="max-w-4xl mx-auto pb-48">
                                {messages.length === 0 && (
                                    <div className="h-[60vh] flex flex-col items-center justify-center text-center">
                                        <div className="w-24 h-24 rounded-[2.5rem] bg-[var(--accent)] flex items-center justify-center text-5xl mb-8 shadow-2xl animate-pulse">✦</div>
                                        <h1 className="text-3xl font-extrabold tracking-tight mb-4">Strategic Intelligence</h1>
                                        <p className="text-[var(--text-secondary)] text-sm max-w-xs mx-auto leading-relaxed">
                                            How can I assist your workflow today? I'm optimized for analysis and creative coding.
                                        </p>
                                    </div>
                                )}
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-4 md:gap-8 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center text-[10px] font-black mt-1 ${msg.role === 'user' ? 'bg-[var(--border)]' : 'bg-[var(--accent)] text-white shadow-lg shadow-indigo-500/20'}`}>
                                            {msg.role === 'user' ? 'USER' : 'N4'}
                                        </div>
                                        <div className={`message-bubble ${isArabic(msg.content) ? 'rtl' : 'ltr'}`}>
                                            <div className={`p-5 md:p-6 rounded-[2rem] text-[15px] leading-relaxed tracking-tight ${msg.role === 'user' ? 'bg-[var(--bubble-user)] border border-[var(--border)] rounded-tr-none' : 'bg-transparent border-none'}`}>
                                                <div className="whitespace-pre-wrap">{msg.content}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex gap-2.5 px-16 opacity-50">
                                        <div className="w-1.5 h-1.5 bg-[var(--accent)] rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-[var(--accent)] rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div className="w-1.5 h-1.5 bg-[var(--accent)] rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Input Area (Pinned) */}
                        <div className="absolute bottom-0 left-0 right-0 p-4 md:p-8 bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent pointer-events-none">
                            <div className="max-w-4xl mx-auto pointer-events-auto">
                                
                                {/* File Pills Preview */}
                                {attachedFiles.length > 0 && (
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {attachedFiles.map((file, idx) => (
                                            <div key={idx} className="flex items-center gap-2 bg-[var(--accent)]/10 border border-[var(--accent)]/30 px-3 py-1.5 rounded-full text-[11px] font-bold text-[var(--accent)]">
                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                                <span className="truncate max-w-[120px]">{file.name}</span>
                                                <button onClick={() => removeFile(idx)} className="hover:text-red-500"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" strokeWidth="2" strokeLinecap="round"/></svg></button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="relative input-glass rounded-[2rem] overflow-hidden focus-within:ring-2 ring-[var(--accent)] ring-opacity-30 transition-all shadow-2xl">
                                    <textarea 
                                        ref={textareaRef}
                                        rows="1"
                                        value={input}
                                        onChange={(e) => {
                                            setInput(e.target.value);
                                            e.target.style.height = 'auto';
                                            e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';
                                        }}
                                        placeholder="Type your message..."
                                        className="w-full bg-transparent p-5 pl-14 pr-16 text-[15px] outline-none resize-none max-h-[200px] leading-relaxed"
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                processQuery();
                                            }
                                        }}
                                    />
                                    
                                    {/* Upload Button */}
                                    <div className="absolute left-3 bottom-3">
                                        <input 
                                            type="file" 
                                            ref={fileInputRef} 
                                            onChange={handleFileUpload} 
                                            className="hidden" 
                                            multiple
                                        />
                                        <button 
                                            onClick={() => fileInputRef.current?.click()}
                                            className="w-11 h-11 flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--border)] rounded-2xl transition-all"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                        </button>
                                    </div>

                                    {/* Send Button */}
                                    <div className="absolute right-3 bottom-3">
                                        <button 
                                            onClick={processQuery}
                                            disabled={(!input.trim() && attachedFiles.length === 0) || isTyping}
                                            className="w-11 h-11 flex items-center justify-center bg-[var(--text-primary)] text-[var(--bg-main)] rounded-2xl hover:scale-105 active:scale-95 transition-all disabled:opacity-20 shadow-xl"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <p className="text-[9px] text-center mt-4 text-[var(--text-secondary)] font-black uppercase tracking-[0.3em] opacity-40">Nix 4 Next-Gen AI System</p>
                            </div>
                        </div>
                    </main>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-xl">
                            <div className="w-full max-w-sm bg-[var(--bg-main)] border border-[var(--border)] rounded-[2.5rem] p-10 shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-xl font-black">Workspace</h3>
                                    <button onClick={() => setShowSettings(false)} className="p-2 bg-[var(--border)] rounded-xl"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" strokeWidth="2" strokeLinecap="round"/></svg></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-50">Interface Language</label>
                                        <div className="grid grid-cols-2 gap-2 bg-[var(--border)] p-1 rounded-2xl">
                                            <button onClick={() => setUiLang('en')} className={`p-3 rounded-xl text-xs font-bold ${uiLang === 'en' ? 'bg-[var(--accent)] text-white' : ''}`}>English</button>
                                            <button onClick={() => setUiLang('ar')} className={`p-3 rounded-xl text-xs font-bold ${uiLang === 'ar' ? 'bg-[var(--accent)] text-white' : ''}`}>العربية</button>
                                        </div>
                                    </div>
                                    <button onClick={handleSignOut} className="w-full p-4 rounded-2xl border border-red-500/20 text-red-500 text-xs font-bold hover:bg-red-500 hover:text-white transition-all">Terminate Session</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
