<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nix 4 | codenix</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@400;600&display=swap');
        
        :root {
            --brand-purple: #8b5cf6;
            --brand-purple-dark: #6d28d9;
            --bg-main: #000000;
            --bg-card: #0a0a0a;
            --text-main: #f3f4f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-main: #ffffff;
            --bg-card: #f9fafb;
            --text-main: #111827;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
            margin: 0;
            height: 100dvh;
            overflow: hidden;
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--brand-purple); border-radius: 10px; }

        .glass-header {
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-main), 0.8);
            border-bottom: 1px solid var(--border);
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        .prose pre {
            background: #111 !important;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 0.5rem 0;
        }

        .input-area {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            transition: border-color 0.2s;
        }

        .input-area:focus-within {
            border-color: var(--brand-purple);
        }

        .rtl { direction: rtl; font-family: 'Noto Sans Arabic', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU/gviz/tq?tqx=out:csv';
        const LONGCAT_URL = "https://api.longcat.app/v1/chat/completions";
        const LONGCAT_KEY = 'ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [isVerifying, setIsVerifying] = useState(true);
            const scrollRef = useRef(null);

            // Auth Check
            useEffect(() => {
                const checkAuth = async () => {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (!session) {
                        window.location.href = `auth.html?redirect=nix4.html`;
                    } else {
                        setIsVerifying(false);
                    }
                };
                checkAuth();
            }, []);

            // Auto Scroll
            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages, isLoading]);

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                document.documentElement.className = newTheme;
            };

            const isArabic = (text) => /[\u0600-\u06FF]/.test(text);

            // Robust CSV Parser
            const parseCSV = (text) => {
                const lines = text.split(/\r?\n/);
                return lines.filter(l => l.trim()).map(line => {
                    const result = [];
                    let cur = "";
                    let insideQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            insideQuotes = !insideQuotes;
                        } else if (char === ',' && !insideQuotes) {
                            result.push(cur.trim());
                            cur = "";
                        } else {
                            cur += char;
                        }
                    }
                    result.push(cur.trim());
                    return result.map(val => val.replace(/^"|"$/g, '').trim());
                });
            };

            const searchSheets = async (query) => {
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    const csvText = await response.text();
                    const rows = parseCSV(csvText);

                    const normalizedQuery = query.toLowerCase().trim();
                    let bestMatch = null;

                    for (let i = 0; i < rows.length; i++) {
                        const rowQuestion = (rows[i][0] || "").toLowerCase().trim();
                        const rowAnswer = rows[i][1] || "";
                        const rowTokens = rows[i][2] || "0";

                        if (!rowQuestion) continue;

                        // 1. Strict Exact Match
                        if (rowQuestion === normalizedQuery) {
                            console.log(`%c[Nix4 KB] Exact Match: ${rows[i][0]}`, "color: #8b5cf6; font-weight: bold;");
                            console.log(`Tokens: ${rowTokens}`);
                            return rowAnswer;
                        }

                        // 2. Fuzzy Match Logic: Find best containing match
                        if (rowQuestion.includes(normalizedQuery) || normalizedQuery.includes(rowQuestion)) {
                           // Prefer the match that is closer in length to the user's query
                           if (!bestMatch || Math.abs(rowQuestion.length - normalizedQuery.length) < Math.abs(bestMatch.q.length - normalizedQuery.length)) {
                               bestMatch = { q: rowQuestion, originalQ: rows[i][0], a: rowAnswer, t: rowTokens };
                           }
                        }
                    }

                    if (bestMatch) {
                        console.log(`%c[Nix4 KB] Fuzzy Match: ${bestMatch.originalQ}`, "color: #8b5cf6; font-weight: bold;");
                        console.log(`Tokens: ${bestMatch.t}`);
                        return bestMatch.a;
                    }

                    return null;
                } catch (err) {
                    console.error("Sheets Access Error:", err);
                    return null;
                }
            };

            const askLongcat = async (query) => {
                const res = await fetch(LONGCAT_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${LONGCAT_KEY}` 
                    },
                    body: JSON.stringify({
                        model: "longcat-v1",
                        messages: [{ role: "user", content: query }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMsg = input.trim();
                setInput("");
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                try {
                    const sheetAnswer = await searchSheets(userMsg);
                    
                    let finalAnswer;
                    if (sheetAnswer !== null && sheetAnswer !== undefined && String(sheetAnswer).trim() !== "") {
                        // Ensure we treat the answer as a string to display properly even if it looks like a number
                        finalAnswer = String(sheetAnswer);
                    } else {
                        finalAnswer = await askLongcat(userMsg);
                    }

                    setMessages(prev => [...prev, { role: 'assistant', content: finalAnswer }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "I encountered an error while processing your request. Please try again." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isVerifying) return null;

            return (
                <div className={`flex flex-col h-full w-full ${theme === 'light' ? 'light-mode' : ''}`}>
                    <header className="glass-header h-16 flex items-center justify-between px-6 shrink-0 z-20">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center font-black text-white text-xs shadow-lg shadow-violet-600/30">N4</div>
                            <span className="font-bold tracking-tight text-lg">Nix 4</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-white/10 transition-colors text-xl">
                                {theme === 'dark' ? '🌞' : '🌙'}
                            </button>
                            <span className="px-3 py-1 bg-violet-600/10 border border-violet-600/20 text-violet-500 rounded-full text-[10px] font-bold uppercase tracking-widest">
                                codenix
                            </span>
                        </div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto chat-container p-4 md:p-8">
                        <div className="max-w-3xl mx-auto space-y-8 pb-24">
                            {messages.length === 0 && (
                                <div className="h-[60vh] flex flex-col items-center justify-center text-center px-4">
                                    <div className="w-24 h-24 bg-violet-600/10 rounded-[2.5rem] flex items-center justify-center mb-8 border border-violet-500/20 shadow-2xl animate-bounce duration-[3000ms]">
                                        <span className="text-5xl">✨</span>
                                    </div>
                                    <h2 className="text-4xl font-bold mb-4 tracking-tight">Intelligence by Nix 4</h2>
                                    <p className="opacity-50 max-w-sm text-lg italic">Searching internal knowledge... Ask me anything about Codenix systems.</p>
                                </div>
                            )}

                            {messages.map((m, i) => (
                                <div key={i} className={`flex gap-4 md:gap-6 ${m.role === 'user' ? 'flex-row-reverse' : 'animate-in fade-in slide-in-from-bottom-2 duration-300'}`}>
                                    <div className={`w-9 h-9 rounded-xl shrink-0 flex items-center justify-center text-xs font-bold shadow-sm ${m.role === 'user' ? 'bg-white/10 border border-white/10' : 'bg-violet-600 text-white'}`}>
                                        {m.role === 'user' ? 'YOU' : 'N4'}
                                    </div>
                                    <div className={`message-bubble ${isArabic(m.content) ? 'rtl text-right' : ''}`}>
                                        <div className="text-[1.05rem] leading-relaxed prose prose-invert max-w-none">
                                            <div dangerouslySetInnerHTML={{ __html: marked.parse(m.content) }} />
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {isLoading && (
                                <div className="flex gap-4 md:gap-6">
                                    <div className="w-9 h-9 rounded-xl bg-violet-600/20 shrink-0 flex items-center justify-center">
                                        <div className="w-4 h-4 border-2 border-violet-600 border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                    <div className="space-y-3 flex-1 pt-2">
                                        <div className="h-3 bg-white/5 rounded-full w-[90%] animate-pulse"></div>
                                        <div className="h-3 bg-white/5 rounded-full w-[60%] animate-pulse"></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="shrink-0 p-4 md:p-8 bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent">
                        <div className="max-w-3xl mx-auto relative">
                            <div className="input-area flex items-end p-2 pr-3 shadow-2xl backdrop-blur-xl">
                                <textarea 
                                    rows="1"
                                    value={input}
                                    onChange={(e) => {
                                        setInput(e.target.value);
                                        e.target.style.height = 'auto';
                                        e.target.style.height = e.target.scrollHeight + 'px';
                                    }}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSend();
                                        }
                                    }}
                                    placeholder="Ask anything..."
                                    className="flex-1 bg-transparent border-none outline-none py-4 px-5 resize-none max-h-60 text-[1.05rem]"
                                    style={{ height: 'auto' }}
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim() || isLoading}
                                    className="mb-1.5 w-11 h-11 bg-violet-600 text-white rounded-2xl flex items-center justify-center hover:bg-violet-500 disabled:opacity-10 disabled:grayscale transition-all active:scale-90 shadow-xl shadow-violet-600/20"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
