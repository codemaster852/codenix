<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix 4 - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #000000;
            --accent: #6366f1;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 15, 15, 0.7);
            --bubble-user: #18181b;
        }

        .light {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --accent: #4f46e5;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(255, 255, 255, 0.8);
            --bubble-user: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .input-glass {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .sidebar-item-active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            box-shadow: inset 3px 0 0 0 var(--accent);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .message-bubble {
            max-width: 85%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
        
        .file-badge {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const API_URL = "https://api.longcat.chat/openai/v1/chat/completions";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('chat');
            const [theme, setTheme] = useState('dark');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);
            
            const [myClasses, setMyClasses] = useState([]);
            const [selectedClass, setSelectedClass] = useState(null);

            const scrollRef = useRef(null);
            const textareaRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) { window.location.href = "auth.html"; return; }
                    setUser(session.user);
                    fetchConversations(session.user.id);
                    fetchClasses(session.user.id);
                };
                init();
            }, []);

            useEffect(() => { document.body.className = theme; }, [theme]);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const fetchConversations = async (uid) => {
                const { data } = await supabaseClient.from('conversations').select('*').eq('user_id', uid).order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const loadConversation = async (id) => {
                setActiveConvId(id);
                const { data } = await supabaseClient.from('messages').select('*').eq('conversation_id', id).order('created_at', { ascending: true });
                if (data) setMessages(data);
            };

            const fetchClasses = async (uid) => {
                const { data: teacherClasses } = await supabaseClient.from('classes').select('*').eq('teacher_id', uid);
                const { data: joinedClasses } = await supabaseClient.from('class_members').select('classes(*)').eq('user_id', uid);
                const combined = [
                    ...(teacherClasses || []).map(c => ({ ...c, role: 'teacher' })),
                    ...(joinedClasses || []).map(item => ({ ...item.classes, role: 'student' }))
                ];
                setMyClasses(combined);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedFile({
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + ' KB',
                        type: file.type
                    });
                }
            };

            const createClass = async () => {
                const name = prompt("Enter Class Name:");
                if (!name) return;
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                const { data } = await supabaseClient.from('classes').insert([{ teacher_id: user.id, name, join_code: code }]).select().single();
                if (data) setMyClasses([{ ...data, role: 'teacher' }, ...myClasses]);
            };

            const joinClass = async () => {
                const code = prompt("Enter Join Code:");
                if (!code) return;
                const { data: cls } = await supabaseClient.from('classes').select('id').eq('join_code', code.toUpperCase()).single();
                if (!cls) return alert("Invalid code");
                await supabaseClient.from('class_members').insert([{ class_id: cls.id, user_id: user.id }]);
                fetchClasses(user.id);
            };

            const generateClassAI = async (type, topic) => {
                if (!topic) return;
                setIsTyping(true);
                const promptMsg = type === 'mindmap' 
                    ? `Create a structured mindmap for '${topic}'. Write it as a step-by-step hierarchical list (1. Main, 1.1 Subtopic).`
                    : `Generate professional ${type} content for the topic: ${topic}.`;

                const fileInfo = selectedFile ? ` [Attached context from file: ${selectedFile.name}]` : "";

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [{ role: "system", content: "Expert Educator mode." }, { role: "user", content: promptMsg + fileInfo }]
                        })
                    });
                    const data = await res.json();
                    const aiContent = data.choices[0].message.content;
                    
                    await supabaseClient.from('class_content').insert([{ 
                        class_id: selectedClass.id, 
                        type, 
                        title: topic, 
                        content: aiContent,
                        file_attachment: selectedFile ? JSON.stringify(selectedFile) : null
                    }]);
                    
                    const { data: updated } = await supabaseClient.from('class_content').select('*').eq('class_id', selectedClass.id).order('created_at', { ascending: false });
                    setSelectedClass({ ...selectedClass, content: updated });
                    setSelectedFile(null);
                } finally { setIsTyping(false); }
            };

            const processQuery = async () => {
                if (!input.trim() && !selectedFile || isTyping) return;
                const q = input;
                const f = selectedFile;
                setInput("");
                setSelectedFile(null);
                if(textareaRef.current) textareaRef.current.style.height = 'auto';
                setIsTyping(true);

                let currentConvId = activeConvId;
                if (!currentConvId) {
                    const { data } = await supabaseClient.from('conversations').insert([{ user_id: user.id, title: q.substring(0, 20) || "File Upload" }]).select().single();
                    currentConvId = data.id;
                    setActiveConvId(currentConvId);
                }

                const userMsg = { 
                    conversation_id: currentConvId, 
                    role: 'user', 
                    content: q + (f ? `\n[File Attached: ${f.name}]` : ""),
                    file_data: f
                };
                setMessages(prev => [...prev, userMsg]);

                try {
                    const systemContext = "You are Nix 4. If the user mentions a file attachment, assume you have processed its text content.";
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [
                                { role: "system", content: systemContext },
                                ...messages.map(m => ({ role: m.role, content: m.content })), 
                                { role: "user", content: userMsg.content }
                            ]
                        })
                    });
                    const data = await res.json();
                    const aiTxt = data.choices[0].message.content;
                    const aiMsg = { conversation_id: currentConvId, role: 'assistant', content: aiTxt };
                    setMessages(prev => [...prev, aiMsg]);
                    await supabaseClient.from('messages').insert([userMsg, aiMsg]);
                } finally { setIsTyping(false); }
            };

            return (
                <div className={`flex h-screen w-full bg-[var(--bg-main)] text-[var(--text-primary)] transition-colors duration-300`}>
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                    
                    {/* Sidebar */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-[var(--bg-sidebar)] border-r border-[var(--border)] transition-transform lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex flex-col h-full">
                            <div className="p-6">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="w-10 h-10 bg-[var(--accent)] rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/20">N4</div>
                                    <h1 className="font-bold">Nix 4 Pro</h1>
                                </div>
                                <div className="space-y-1">
                                    <button onClick={() => setView('chat')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'chat' ? 'sidebar-item-active' : 'hover:bg-white/5 opacity-60'}`}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                        <span className="text-sm font-semibold">AI Assistant</span>
                                    </button>
                                    <button onClick={() => setView('class')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${view === 'class' ? 'sidebar-item-active' : 'hover:bg-white/5 opacity-60'}`}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 14l9-5-9-5-9 5 9 5zM12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
                                        <span className="text-sm font-semibold">Nix Class</span>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto px-4 chat-scroll">
                                {view === 'chat' ? (
                                    <>
                                        <p className="px-3 text-[10px] font-black uppercase tracking-widest text-[var(--text-secondary)] mb-2">Recent Sessions</p>
                                        {conversations.map(c => (
                                            <button key={c.id} onClick={() => loadConversation(c.id)} className={`w-full text-left p-3 rounded-xl text-sm truncate ${activeConvId === c.id ? 'bg-white/5' : 'opacity-40 hover:opacity-100'}`}>{c.title}</button>
                                        ))}
                                    </>
                                ) : (
                                    <>
                                        <div className="flex justify-between items-center px-3 mb-2">
                                            <p className="text-[10px] font-black uppercase tracking-widest text-[var(--text-secondary)]">Your Classes</p>
                                            <button onClick={createClass} className="text-indigo-400 text-xs font-bold hover:underline">+ New</button>
                                        </div>
                                        {myClasses.map(c => (
                                            <button key={c.id} onClick={() => setSelectedClass(c)} className={`w-full text-left p-3 rounded-xl text-sm truncate ${selectedClass?.id === c.id ? 'bg-white/5' : 'opacity-40 hover:opacity-100'}`}>
                                                {c.name} {c.role === 'teacher' ? '👑' : '🎓'}
                                            </button>
                                        ))}
                                        <button onClick={joinClass} className="w-full mt-4 p-3 border border-dashed border-[var(--border)] rounded-xl text-xs text-center opacity-60">Join with Code</button>
                                    </>
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-16 flex items-center justify-between px-6 glass-panel shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="lg:hidden p-2">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" strokeWidth="2"/></svg>
                                </button>
                                <h2 className="text-sm font-bold">{view === 'chat' ? 'Strategic Intelligence' : 'Nix Classroom'}</h2>
                            </div>
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2.5 rounded-xl border border-[var(--border)] hover:bg-white/5 transition-all">
                                {theme === 'dark' ? '☀️' : '🌙'}
                            </button>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 md:px-10 py-10 space-y-8">
                            <div className="max-w-4xl mx-auto pb-64">
                                {view === 'chat' ? (
                                    <>
                                        {messages.length === 0 && (
                                            <div className="h-[50vh] flex flex-col items-center justify-center text-center opacity-20">
                                                <div className="w-20 h-20 bg-indigo-600 rounded-3xl mb-6 shadow-2xl"></div>
                                                <h3 className="text-xl font-bold">Initiate Analysis</h3>
                                                <p className="text-xs mt-2">Upload documentation or start a query</p>
                                            </div>
                                        )}
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex gap-4 mb-8 ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                                <div className={`w-9 h-9 shrink-0 rounded-xl flex items-center justify-center font-black text-[10px] ${m.role === 'user' ? 'bg-[var(--border)]' : 'bg-[var(--accent)] text-white shadow-lg shadow-indigo-500/20'}`}>{m.role === 'user' ? 'ME' : 'N4'}</div>
                                                <div className="max-w-[85%]">
                                                    <div className={`p-5 rounded-3xl text-[15px] leading-relaxed ${m.role === 'user' ? 'bg-[var(--bubble-user)] border border-[var(--border)] rounded-tr-none' : 'bg-transparent border-none'}`}>
                                                        {m.content}
                                                    </div>
                                                    {m.file_data && (
                                                        <div className="mt-2 flex justify-end">
                                                            <div className="file-badge">
                                                                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
                                                                {m.file_data.name}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </>
                                ) : (
                                    <div className="space-y-8">
                                        {!selectedClass ? (
                                            <div className="text-center py-20 opacity-30">Select or join a class to begin learning</div>
                                        ) : (
                                            <>
                                                <div className="p-8 bg-indigo-600/5 border border-indigo-600/20 rounded-[2rem] relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-600/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                                                    <h3 className="text-2xl font-extrabold">{selectedClass.name}</h3>
                                                    <p className="text-sm opacity-60 mt-1">Classroom ID: <span className="font-mono font-bold text-indigo-400">{selectedClass.join_code}</span></p>
                                                    {selectedClass.role === 'teacher' && (
                                                        <div className="flex flex-wrap gap-2 mt-6">
                                                            <button onClick={() => generateClassAI('lesson', prompt("Enter Lesson Topic:"))} className="p-2.5 px-5 bg-[var(--accent)] text-white text-xs font-bold rounded-xl active:scale-95 transition-all">Generate Lesson</button>
                                                            <button onClick={() => generateClassAI('test', prompt("Enter Quiz Topic:"))} className="p-2.5 px-5 bg-[var(--accent)] text-white text-xs font-bold rounded-xl active:scale-95 transition-all">Generate Quiz</button>
                                                            <button onClick={() => generateClassAI('mindmap', prompt("Enter Mindmap Topic:"))} className="p-2.5 px-5 bg-[var(--accent)] text-white text-xs font-bold rounded-xl active:scale-95 transition-all">Build Mindmap</button>
                                                            <button onClick={() => fileInputRef.current.click()} className="p-2.5 px-5 border border-indigo-500/40 text-indigo-400 text-xs font-bold rounded-xl hover:bg-indigo-500/10 transition-all">
                                                                {selectedFile ? `File: ${selectedFile.name}` : 'Upload Reference'}
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="grid gap-6">
                                                    {selectedClass.content?.map((item, idx) => (
                                                        <div key={idx} className="p-6 bg-white/5 rounded-3xl border border-[var(--border)] hover:border-indigo-500/30 transition-all group">
                                                            <div className="flex justify-between items-center mb-6">
                                                                <span className="text-[9px] font-black uppercase tracking-widest bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded-full border border-indigo-500/20">{item.type}</span>
                                                                <span className="text-xs opacity-40">{new Date(item.created_at).toLocaleDateString()}</span>
                                                            </div>
                                                            <h4 className="text-lg font-bold mb-3">{item.title}</h4>
                                                            <div className="text-[14px] opacity-80 whitespace-pre-wrap leading-relaxed">{item.content}</div>
                                                            {item.file_attachment && (
                                                                <div className="mt-6 pt-6 border-t border-[var(--border)] flex items-center gap-2">
                                                                    <div className="file-badge">
                                                                        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
                                                                        Reference: {JSON.parse(item.file_attachment).name}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                )}
                                {isTyping && <div className="flex gap-2 p-6 opacity-30"><div className="w-2 h-2 bg-[var(--accent)] rounded-full animate-bounce"></div><div className="w-2 h-2 bg-[var(--accent)] rounded-full animate-bounce [animation-delay:0.2s]"></div><div className="w-2 h-2 bg-[var(--accent)] rounded-full animate-bounce [animation-delay:0.4s]"></div></div>}
                            </div>
                        </div>

                        {/* Input Area */}
                        {view === 'chat' && (
                            <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent">
                                <div className="max-w-4xl mx-auto">
                                    {selectedFile && (
                                        <div className="mb-2 flex justify-start">
                                            <div className="file-badge py-2 shadow-xl animate-in slide-in-from-bottom-2">
                                                <span>📎 {selectedFile.name}</span>
                                                <button onClick={() => setSelectedFile(null)} className="hover:text-red-400 font-black">×</button>
                                            </div>
                                        </div>
                                    )}
                                    <div className="relative input-glass rounded-[2rem] p-2 flex items-end shadow-2xl transition-all focus-within:ring-2 ring-indigo-500/20">
                                        <button 
                                            onClick={() => fileInputRef.current.click()}
                                            className="w-12 h-12 flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--accent)] transition-all mb-1 ml-1"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                        </button>
                                        <textarea 
                                            ref={textareaRef}
                                            rows="1"
                                            value={input}
                                            onChange={(e) => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px'; }}
                                            placeholder="Consult Nix 4..."
                                            className="flex-1 bg-transparent p-4 outline-none resize-none text-[15px] leading-relaxed"
                                            onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), processQuery())}
                                        />
                                        <button onClick={processQuery} className="w-12 h-12 flex items-center justify-center bg-[var(--text-primary)] text-[var(--bg-main)] rounded-2xl mb-1 ml-2 transition-all active:scale-90 hover:scale-105 shadow-lg">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" strokeWidth="3"/></svg>
                                        </button>
                                    </div>
                                    <p className="text-[9px] text-center mt-4 text-[var(--text-secondary)] font-black uppercase tracking-[0.3em] opacity-30">Secure Intelligence Terminal</p>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
