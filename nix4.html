<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix 4 | by codenix</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#8b5cf6',
                            purpleDark: '#6d28d9',
                            bgLight: '#ffffff',
                            bgDark: '#0a0a0a',
                            panelLight: '#f3f4f6',
                            panelDark: '#171717',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Markdown Styles */
        .prose pre {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .prose code {
            font-family: monospace;
            background-color: rgba(139, 92, 246, 0.15);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            color: #8b5cf6;
        }
        .prose p { margin-bottom: 0.75rem; }
        .prose p:last-child { margin-bottom: 0; }
        
        /* Auto-resizing textarea */
        textarea {
            resize: none;
            overflow-y: hidden;
        }

        /* Blinking cursor for typing effect */
        .typing-indicator::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: #8b5cf6;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-brand-bgLight dark:bg-brand-bgDark text-gray-800 dark:text-gray-200 h-screen flex overflow-hidden transition-colors duration-300">

    <!-- Auth Check Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-brand-bgLight dark:bg-brand-bgDark z-50 flex items-center justify-center">
        <div class="flex flex-col items-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-brand-purple mb-4"></i>
            <p class="text-lg font-medium">Verifying Session...</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-brand-panelLight dark:bg-brand-panelDark flex-shrink-0 border-r border-gray-200 dark:border-gray-800 flex flex-col transition-all duration-300 relative z-20">
        <div class="p-4 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2 text-brand-purple">
                <i data-lucide="sparkles"></i>
                Nix 4
            </h1>
            <button id="close-sidebar" class="md:hidden p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="px-4 pb-2">
            <button onclick="startNewChat()" class="w-full flex items-center gap-2 bg-brand-purple hover:bg-brand-purpleDark text-white px-4 py-2 rounded-lg transition-colors font-medium">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <h2 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Recent Chats</h2>
            <div id="history-list" class="space-y-1">
                <!-- History items will populate here -->
            </div>
        </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-brand-purple flex items-center justify-center text-white font-bold">
                    U
                </div>
                <span id="user-email" class="text-sm font-medium truncate max-w-[120px]">User</span>
            </div>
            <button id="theme-toggle" class="p-2 text-gray-500 hover:text-brand-purple dark:text-gray-400 dark:hover:text-brand-purple transition-colors rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative">
        <!-- Mobile Header -->
        <header class="md:hidden flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 bg-brand-bgLight dark:bg-brand-bgDark absolute top-0 w-full z-10">
            <button id="open-sidebar" class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 rounded">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <span class="font-bold text-brand-purple">Nix 4</span>
            <div class="w-6"></div> <!-- Spacer -->
        </header>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 pt-20 md:pt-8 space-y-6 scroll-smooth">
            
            <!-- Welcome Screen -->
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto opacity-100 transition-opacity duration-300">
                <div class="w-16 h-16 bg-brand-purple rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-brand-purple/20">
                    <i data-lucide="cpu" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">How can I help you today?</h2>
                <p class="text-gray-500 dark:text-gray-400 mb-8">I'm Nix 4 by codenix. I search our specialized knowledge base first, then use advanced external models.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <button class="suggestion-btn p-4 text-left border border-gray-200 dark:border-gray-800 rounded-xl hover:border-brand-purple dark:hover:border-brand-purple transition-colors bg-brand-panelLight dark:bg-brand-panelDark/50">
                        <span class="font-medium block mb-1">Explain quantum computing</span>
                        <span class="text-sm text-gray-500 dark:text-gray-400">in simple terms</span>
                    </button>
                    <button class="suggestion-btn p-4 text-left border border-gray-200 dark:border-gray-800 rounded-xl hover:border-brand-purple dark:hover:border-brand-purple transition-colors bg-brand-panelLight dark:bg-brand-panelDark/50">
                        <span class="font-medium block mb-1">Write a Python script</span>
                        <span class="text-sm text-gray-500 dark:text-gray-400">to automate daily tasks</span>
                    </button>
                </div>
            </div>

            <!-- Messages will be appended here -->
            <div id="messages-list" class="max-w-3xl mx-auto space-y-6 pb-24"></div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gradient-to-t from-brand-bgLight via-brand-bgLight to-transparent dark:from-brand-bgDark dark:via-brand-bgDark absolute bottom-0 w-full md:w-[calc(100%-16rem)] right-0">
            <div class="max-w-3xl mx-auto relative group">
                <textarea 
                    id="chat-input" 
                    rows="1" 
                    placeholder="Message Nix 4..." 
                    class="w-full bg-brand-panelLight dark:bg-brand-panelDark border border-gray-300 dark:border-gray-700 rounded-2xl pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-brand-purple/50 focus:border-brand-purple transition-all shadow-sm max-h-48 text-base"
                    oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 192) + 'px'"></textarea>
                <button id="send-btn" class="absolute right-3 bottom-3 p-1.5 bg-brand-purple text-white rounded-lg hover:bg-brand-purpleDark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
            <p class="text-center text-xs text-gray-500 mt-2">Nix 4 can make mistakes. Verify important information.</p>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // -------------------------------------------------------------------
        // 1. Configuration & Secrets
        // -------------------------------------------------------------------
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        
        const SHEET_ID = '1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU';
        const LONGCAT_API_KEY = 'ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J';

        // -------------------------------------------------------------------
        // 2. Authentication (Supabase)
        // -------------------------------------------------------------------
        // FIX: Renamed 'supabase' to 'supabaseClient' to avoid conflicting with the global 'window.supabase' object injected by the CDN script.
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function verifyAuth() {
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error || !session) {
                    // Redirect to auth.html if not logged in
                    window.location.href = `auth.html?redirect=nix4.html`;
                } else {
                    // Logged in
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('user-email').textContent = session.user.email.split('@')[0];
                }
            } catch (err) {
                console.error("Auth check failed:", err);
                // Fallback for development/preview environments without valid tokens setup
                document.getElementById('auth-overlay').style.display = 'none';
                console.warn("Bypassing strict auth for UI demonstration.");
            }
        }

        // -------------------------------------------------------------------
        // 3. UI Logic (Theme, Sidebar, Textarea)
        // -------------------------------------------------------------------
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesList = document.getElementById('messages-list');
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');

        // Theme Toggle
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            themeIcon.setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
            localStorage.setItem('nix4-theme', isDark ? 'dark' : 'light');
        });

        // Load Theme
        if (localStorage.getItem('nix4-theme') === 'light') {
            htmlElement.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
            lucide.createIcons();
        }

        // Sidebar Mobile Toggle
        const sidebar = document.getElementById('sidebar');
        document.getElementById('open-sidebar').addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('absolute', 'h-full');
        });
        document.getElementById('close-sidebar').addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        // -------------------------------------------------------------------
        // 4. Data Retrieval Logic (Google Sheets -> Longcat API)
        // -------------------------------------------------------------------

        // Parse CSV text into 2D array
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        async function fetchFromSheet(query) {
            try {
                // Using gviz endpoint which returns CSV easily for public/shared sheets
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
                const response = await fetch(url);
                if (!response.ok) return null;
                
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                // Assuming Data format: Col 0 = Question, Col 1 = Answer, Col 2 = Tokens
                const normalizedQuery = query.toLowerCase().trim();

                for (let i = 1; i < data.length; i++) { // Skip header row
                    if (data[i] && data[i].length >= 2) {
                        const q = (data[i][0] || "").toLowerCase().trim();
                        const a = data[i][1];
                        const tokens = data[i][2] || "0";

                        // Basic matching (exact or contains)
                        if (q === normalizedQuery || q.includes(normalizedQuery) || normalizedQuery.includes(q)) {
                            console.log(`%c[Nix 4 DB] Tokens consumed: ${tokens}`, 'color: #8b5cf6; font-weight: bold;');
                            return a;
                        }
                    }
                }
                return null; // Not found in sheet
            } catch (error) {
                console.error("Error fetching from Google Sheets:", error);
                return null;
            }
        }

        async function fetchFromLongcatAPI(query) {
            try {
                // Assuming standard OpenAI-compatible endpoint structure for "longcat api"
                const endpoint = "https://api.longcat.app/v1/chat/completions";
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${LONGCAT_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "longcat-v1",
                        messages: [{ role: "user", content: query }]
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    return data.choices[0].message.content;
                } else {
                    throw new Error("API Response not OK");
                }
            } catch (error) {
                console.warn("Longcat API call failed. Generating simulated response.");
                // Simulated response since actual longcat endpoint might not be available
                return `I couldn't find an answer for "${query}" in our local database, and the external API is currently unreachable. How else can I assist you today?`;
            }
        }

        // -------------------------------------------------------------------
        // 5. Chat Interface Logic
        // -------------------------------------------------------------------

        function addMessageToUI(role, content, isStreaming = false) {
            welcomeScreen.style.display = 'none';
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-4 p-2 ${role === 'user' ? 'justify-end' : ''}`;

            const innerContent = role === 'user' 
                ? `
                <div class="bg-brand-panelLight dark:bg-brand-panelDark max-w-[80%] rounded-2xl px-5 py-3 shadow-sm border border-gray-100 dark:border-gray-800">
                    <p class="text-[15px] whitespace-pre-wrap">${content}</p>
                </div>
                `
                : `
                <div class="w-8 h-8 rounded-full bg-brand-purple flex-shrink-0 flex items-center justify-center text-white mt-1 shadow-md">
                    <i data-lucide="cpu" class="w-5 h-5"></i>
                </div>
                <div class="flex-1 max-w-[calc(100%-3rem)] prose prose-purple dark:prose-invert">
                    <div class="message-content text-[15px] leading-relaxed ${isStreaming ? 'typing-indicator' : ''}">
                        ${isStreaming ? '' : marked.parse(content)}
                    </div>
                </div>
                `;
            
            messageDiv.innerHTML = innerContent;
            messagesList.appendChild(messageDiv);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function typeOutMessage(element, text, speed = 15) {
            return new Promise((resolve) => {
                let i = 0;
                element.innerHTML = ''; // clear initially
                const contentDiv = element.querySelector('.message-content');
                
                function type() {
                    if (i < text.length) {
                        // Very basic chunk typing for plain text simulation before markdown parse
                        contentDiv.innerHTML = marked.parse(text.substring(0, i + 1));
                        i += 3; // chars per tick
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        setTimeout(type, speed);
                    } else {
                        contentDiv.classList.remove('typing-indicator');
                        contentDiv.innerHTML = marked.parse(text); // Final clean render
                        resolve();
                    }
                }
                type();
            });
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. Add User Message
            addMessageToUI('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto'; // reset height
            sendBtn.disabled = true;

            // 2. Setup AI Response Element (Streaming state)
            const aiMessageEl = addMessageToUI('ai', '', true);

            // 3. Process Query
            let finalAnswer = "";
            
            // Search Google Sheets First
            const sheetResult = await fetchFromSheet(text);
            
            if (sheetResult) {
                finalAnswer = sheetResult;
            } else {
                // Fallback to Longcat API
                console.log("[Nix 4] Query not found in Google Sheets. Querying Longcat API...");
                finalAnswer = await fetchFromLongcatAPI(text);
            }

            // 4. Type out response
            await typeOutMessage(aiMessageEl, finalAnswer);
            sendBtn.disabled = false;
            chatInput.focus();
        }

        // -------------------------------------------------------------------
        // 6. Event Listeners
        // -------------------------------------------------------------------
        sendBtn.addEventListener('click', handleSend);
        
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // Suggestion buttons
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = btn.querySelector('.font-medium').textContent + " " + btn.querySelector('.text-sm').textContent;
                chatInput.value = text;
                handleSend();
            });
        });

        function startNewChat() {
            messagesList.innerHTML = '';
            welcomeScreen.style.display = 'flex';
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            verifyAuth();
        });

    </script>
</body>
</html>
