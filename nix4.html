<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix 4 | Codenix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --purple-primary: #8B5CF6;
            --purple-dark: #6D28D9;
            --bg-light: #FFFFFF;
            --bg-dark: #0A0A0A;
        }

        body { transition: background-color 0.3s, color 0.3s; }
        
        .dark-mode {
            background-color: var(--bg-dark);
            color: #E5E7EB;
        }

        .purple-gradient {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #8B5CF633;
            border-radius: 10px;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-sidebar {
            background: rgba(249, 250, 251, 0.8);
            backdrop-filter: blur(10px);
        }
        .dark-mode .glass-sidebar {
            background: rgba(18, 18, 18, 0.8);
        }
        
        .ai-bubble {
            border: 1px solid rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] bg-white dark:bg-black flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin"></div>
            <p class="mt-4 text-purple-600 font-medium animate-pulse">Initializing Nix 4...</p>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="app-content" class="hidden flex h-full">
        
        <!-- Sidebar -->
        <aside class="w-72 flex-shrink-0 glass-sidebar border-r border-neutral-200 dark:border-neutral-800 hidden md:flex flex-col">
            <div class="p-5 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-9 h-9 purple-gradient rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="text-xl font-bold dark:text-white tracking-tight">Nix <span class="text-purple-600 italic">4</span></span>
                </div>
                <button id="theme-btn" class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors dark:text-white">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <div class="p-4">
                <button onclick="window.location.reload()" class="w-full flex items-center justify-center space-x-2 p-3 rounded-xl border border-neutral-200 dark:border-neutral-800 hover:bg-white dark:hover:bg-neutral-900 transition-all text-sm font-medium dark:text-white">
                    <i class="fas fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-4 py-2 space-y-2" id="chat-history">
                <div class="text-[10px] font-bold text-neutral-400 uppercase tracking-widest px-2 pb-2">Recent Threads</div>
            </div>

            <div class="p-4 border-t border-neutral-200 dark:border-neutral-800">
                <div class="flex items-center p-3 rounded-2xl bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 shadow-sm">
                    <div id="user-initials" class="w-10 h-10 purple-gradient rounded-full flex items-center justify-center text-white font-bold text-sm mr-3">U</div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name-display" class="text-sm font-semibold truncate dark:text-white">User</p>
                        <p class="text-[10px] text-purple-500 font-bold uppercase tracking-tighter">Codenix Member</p>
                    </div>
                    <button id="logout-btn" class="text-neutral-400 hover:text-red-500 transition-colors ml-2">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col bg-white dark:bg-black relative">
            
            <div id="chat-window" class="flex-1 overflow-y-auto chat-container p-6">
                <!-- Welcome View -->
                <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center space-y-6 fade-in">
                    <div class="w-20 h-20 purple-gradient rounded-3xl flex items-center justify-center text-white text-4xl shadow-2xl shadow-purple-500/20 rotate-3">
                        <span class="italic font-black">N</span>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold dark:text-white tracking-tight">How can I assist you, <span id="welcome-name" class="text-purple-600">User</span>?</h1>
                        <p class="text-neutral-500 mt-2 max-w-md mx-auto">Nix 4 by Codenix: Next-gen intelligence powered by LongCat.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl w-full">
                        <button onclick="fillPrompt('What is your name?')" class="p-4 text-left border border-neutral-200 dark:border-neutral-800 rounded-2xl hover:border-purple-400 transition-all group">
                            <i class="fas fa-id-card text-purple-500 mb-2"></i>
                            <p class="text-sm font-semibold dark:text-white">Identity Check</p>
                            <p class="text-xs text-neutral-500">Query your spreadsheet identity</p>
                        </button>
                        <button onclick="fillPrompt('What is Codenix?')" class="p-4 text-left border border-neutral-200 dark:border-neutral-800 rounded-2xl hover:border-purple-400 transition-all">
                            <i class="fas fa-building text-purple-500 mb-2"></i>
                            <p class="text-sm font-semibold dark:text-white">Company Info</p>
                            <p class="text-xs text-neutral-500">Search Knowledge Base</p>
                        </button>
                    </div>
                </div>

                <div id="messages" class="max-w-4xl mx-auto space-y-8 py-10 hidden">
                    <!-- Chat bubbles injected here -->
                </div>
            </div>

            <!-- Input Section -->
            <div class="p-4 md:p-8 bg-gradient-to-t from-white dark:from-black via-white dark:via-black to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <div class="relative bg-neutral-50 dark:bg-neutral-900 rounded-3xl border border-neutral-200 dark:border-neutral-800 shadow-xl overflow-hidden focus-within:border-purple-500 transition-colors">
                        <textarea id="chat-input" rows="1" placeholder="Type a message or search knowledge base..." 
                            class="w-full p-4 pr-16 bg-transparent text-neutral-900 dark:text-white outline-none resize-none max-h-60"></textarea>
                        
                        <div class="absolute right-3 bottom-3 flex items-center space-x-2">
                            <button id="send-btn" class="w-10 h-10 purple-gradient text-white rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg shadow-purple-500/20">
                                <i class="fas fa-arrow-up"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-center text-[10px] text-neutral-400 mt-4 tracking-wide font-medium">
                        POWERED BY LONGCAT AI &bull; CODENIX SYSTEMS
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const SPREADSHEET_ID = "1i9JYpZzxUHeUg9F6i1AP-mx4OiCiaF2YA3KmWVqwDsU";
        const LONGCAT_API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";

        let sbClient;
        try {
            sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) { console.error("Supabase failed", e); }

        let currentUser = null;
        let isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages');
        const welcomeView = document.getElementById('welcome-view');
        const chatWindow = document.getElementById('chat-window');

        async function checkAuth() {
            if (!sbClient) return;
            const { data: { session } } = await sbClient.auth.getSession();
            if (!session) {
                window.location.href = `auth.html?redirect=nix4.html`;
            } else {
                currentUser = session.user;
                setupUI();
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        function setupUI() {
            const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
            document.getElementById('user-name-display').innerText = name;
            document.getElementById('welcome-name').innerText = name;
            document.getElementById('user-initials').innerText = name.charAt(0).toUpperCase();
            if (isDarkMode) document.body.classList.add('dark-mode');
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            welcomeView.classList.add('hidden');
            messagesContainer.classList.remove('hidden');

            appendMessage(text, 'user');
            const aiMsgId = appendMessage('...', 'ai', true);

            try {
                // 1. Search Sheets (Mandatory First Check)
                const sheetAnswer = await searchSheets(text);
                
                if (sheetAnswer !== null) {
                    updateAIMessage(aiMsgId, sheetAnswer);
                } else {
                    // 2. Fallback to LongCat AI only if sheets fail
                    const longCatResponse = await callLongCat(text);
                    updateAIMessage(aiMsgId, longCatResponse);
                }
            } catch (e) {
                console.error("Critical Flow Error:", e);
                updateAIMessage(aiMsgId, "Nix 4 is having trouble connecting to the neural core. Please try again.");
            }
        }

        async function searchSheets(query) {
            try {
                // Ensure the spreadsheet is public/anyone with link can view
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`);
                if (!response.ok) throw new Error("Sheet fetch failed");
                
                const resText = await response.text();
                // Extract valid JSON from GViz wrapper
                const jsonStr = resText.substring(47).slice(0, -2);
                const json = JSON.parse(jsonStr);
                
                const rows = json.table.rows;
                if (!rows || rows.length < 1) return null;

                // Query cleaning: lower case, remove punctuation, trim
                const cleanQuery = query.toLowerCase().trim().replace(/[?.,!]$/, "");

                // Start from index 1 to skip headers (Question | Answer)
                for (let i = 1; i < rows.length; i++) {
                    const cellData = rows[i].c;
                    if (!cellData || !cellData[0]) continue;

                    // Get value from Column A (index 0)
                    const rawQ = cellData[0].v ? cellData[0].v.toString() : "";
                    const cleanQ = rawQ.toLowerCase().trim().replace(/[?.,!]$/, "");

                    if (cleanQ === cleanQuery) {
                        // Return value from Column B (index 1)
                        return cellData[1] ? cellData[1].v : "No data found for this entry.";
                    }
                }
                return null; // Not found in sheet
            } catch (err) {
                console.error("Sheet parsing error:", err);
                return null;
            }
        }

        async function callLongCat(query) {
            try {
                const response = await fetch('https://api.longcat.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${LONGCAT_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "nix-4-turbo", // or "gpt-4o"
                        messages: [
                            { role: "system", content: "You are Nix 4, the advanced AI core of Codenix. Be professional, efficient, and precise." },
                            { role: "user", content: query }
                        ]
                    })
                });

                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                console.error("LongCat Connection Error:", e);
                // Custom handling for the specific error you saw
                if (e.message.includes("ERR_NAME_NOT_RESOLVED") || e.name === "TypeError") {
                    return "Neural Link (LongCat) is currently unreachable. However, I am still operational. Please check your knowledge base (Google Sheets) or network connection.";
                }
                return "I couldn't find a match in the knowledge base, and the external AI core is currently unresponsive.";
            }
        }

        function appendMessage(text, sender, isLoading = false) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = `flex w-full mb-8 fade-in ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            msgDiv.innerHTML = `
                <div class="flex max-w-[85%] md:max-w-2xl space-x-4 ${sender === 'user' ? 'flex-row-reverse space-x-reverse' : ''}">
                    <div class="w-8 h-8 flex-shrink-0 rounded-lg flex items-center justify-center font-bold text-[10px] ${sender === 'user' ? 'bg-neutral-200 dark:bg-neutral-800' : 'purple-gradient text-white'}">
                        ${sender === 'user' ? 'ME' : 'N4'}
                    </div>
                    <div class="space-y-1">
                        <div class="px-4 py-3 rounded-2xl ${sender === 'user' ? 'bg-neutral-100 dark:bg-neutral-900 dark:text-white' : 'ai-bubble dark:text-neutral-100 shadow-sm border border-neutral-100 dark:border-neutral-800'}">
                            ${isLoading ? '<div class="flex space-x-1 py-1"><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.2s"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.4s"></div></div>' : text}
                        </div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(msgDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function updateAIMessage(id, text) {
            const msg = document.getElementById(id);
            if (msg) {
                const bubble = msg.querySelector('.ai-bubble') || msg.querySelector('.rounded-2xl');
                bubble.innerHTML = text;
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }
        }

        function fillPrompt(text) {
            chatInput.value = text;
            chatInput.focus();
        }

        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-btn').querySelector('i');
            icon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
        });

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (sbClient) await sbClient.auth.signOut();
            window.location.reload();
        });

        window.onload = checkAuth;
    </script>
</body>
</html>
