<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Codenix Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        purple: {
                            600: '#7e22ce',
                            700: '#6b21a8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="h-full bg-white dark:bg-[#0d1117] text-slate-900 dark:text-[#c9d1d9] flex flex-col items-center justify-center p-6 transition-colors duration-300">

    <main class="w-full max-w-lg text-center space-y-8">
        
        <!-- Status Code -->
        <div class="space-y-2">
            <h1 class="text-7xl font-extrabold text-purple-600 dark:text-purple-500 tracking-tight">404</h1>
            <p class="text-2xl font-semibold text-slate-800 dark:text-white">Page not found</p>
        </div>

        <!-- Description -->
        <div class="space-y-4">
            <p class="text-slate-600 dark:text-slate-400">
                The page you are looking for doesn't exist or has been moved. 
                If you think this is a mistake, please contact our support team.
            </p>
        </div>

        <!-- Call to Action -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/dashboard/" class="inline-flex items-center justify-center px-5 py-2.5 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg transition-colors shadow-sm">
                Go to Dashboard
            </a>
            <a href="#" class="inline-flex items-center justify-center px-5 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-[#21262d] dark:hover:bg-[#30363d] text-slate-800 dark:text-slate-200 font-medium rounded-lg transition-colors border border-slate-200 dark:border-slate-700">
                Report Issue
            </a>
        </div>

        <!-- Footer -->
        <footer class="pt-12 text-sm text-slate-500 dark:text-slate-500 border-t border-slate-200 dark:border-slate-800">
            <p>&copy; 2026 Codenix Studio. All rights reserved.</p>
        </footer>
    </main>

</body>
</html>
