<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Code | CodeNix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        purple: {
                            50: '#f5f3ff',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            950: '#1e1b4b',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --accent-purple: #8b5cf6;
            --bg-light: #ffffff;
            --bg-dark: #050505;
        }

        /* STRICT CURSOR HIDING */
        * {
            cursor: none !important;
        }

        body { 
            background-color: var(--bg-light); 
            color: #1a1a1a; 
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .dark body { 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
        }

        /* Custom Purple Triangle Cursor */
        #custom-cursor {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #8b5cf6;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(1px 0px 0px #000) 
                    drop-shadow(-1px 0px 0px #000) 
                    drop-shadow(0px 1px 0px #000) 
                    drop-shadow(0px -1px 0px #000);
            transform: translate(-50%, -50%) rotate(-30deg);
            transition: transform 0.08s ease-out;
            display: none;
            will-change: transform, left, top;
        }

        .cursor-active {
            transform: translate(-50%, -50%) rotate(-30deg) scale(1.4) !important;
            border-bottom-color: #a78bfa !important;
        }

        .mesh-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            filter: blur(60px);
            pointer-events: none;
        }

        .dark .mesh-bg {
            background: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(109, 40, 217, 0.1) 0px, transparent 50%);
            opacity: 0.6;
        }

        .light-mesh {
            background: 
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .dark .glass-card {
            background: rgba(15, 15, 20, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .text-glow-purple {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .cyber-grid {
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black, transparent);
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="min-h-screen antialiased relative font-sans">
    
    <!-- Custom Purple Cursor -->
    <div id="custom-cursor"></div>

    <!-- Background Layers -->
    <div class="fixed inset-0 cyber-grid pointer-events-none opacity-40"></div>
    <div class="mesh-bg light-mesh dark:hidden"></div>
    <div class="mesh-bg hidden dark:block"></div>

    <!-- Main Content -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-5 md:p-6">
        
        <!-- Big Animated 404 -->
        <div class="relative group select-none mb-4 sm:mb-0">
            <h2 class="text-[8rem] sm:text-[15rem] md:text-[20rem] font-black leading-none tracking-tighter opacity-10 dark:opacity-[0.07] font-mono animate-pulse-slow">
                404
            </h2>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-20 h-20 md:w-32 md:h-32 bg-purple-600 rounded-2xl md:rounded-3xl rotate-12 group-hover:rotate-0 transition-all duration-700 flex items-center justify-center shadow-2xl shadow-purple-600/40 animate-float">
                    <svg class="w-10 h-10 md:w-16 md:h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Content Card -->
        <div class="max-w-xl w-full text-center mt-[-20px] sm:mt-[-40px] md:mt-[-80px]">
            <h1 class="text-3xl md:text-6xl font-extrabold mb-4 md:mb-6 tracking-tight text-slate-900 dark:text-white leading-tight">
                Null <span class="text-purple-600 text-glow-purple italic">Pointer</span> Exception
            </h1>
            
            <p class="text-base md:text-xl text-slate-600 dark:text-slate-400 mb-8 md:mb-10 leading-relaxed font-medium px-2">
                The logic flow reached a dead end. This route doesn't exist in our current production environment.
            </p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-5 w-full max-w-sm mx-auto sm:max-w-none">
                <a href="/" class="group relative w-full sm:w-auto">
                    <div class="absolute -inset-0.5 bg-purple-600 rounded-xl md:rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-1000"></div>
                    <button class="relative w-full sm:w-auto px-8 md:px-10 py-4 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl md:rounded-2xl transition-all flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        Main Repository
                    </button>
                </a>

                <button onclick="window.history.back()" class="glass-card w-full sm:w-auto px-8 md:px-10 py-4 dark:text-white text-slate-800 font-bold rounded-xl md:rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2 border border-purple-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Previous State
                </button>
            </div>
            
            <!-- Terminal Message -->
            <div class="mt-12 md:mt-16 inline-flex items-center gap-3 px-4 py-2 rounded-full bg-slate-100/50 dark:bg-purple-950/20 border border-slate-200 dark:border-purple-500/10">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span>
                </span>
                <p class="text-[10px] md:text-[11px] uppercase tracking-widest text-slate-500 dark:text-purple-400 font-mono">
                    System: 404_SEGMENT_NOT_FOUND
                </p>
            </div>
        </div>
    </main>

    <!-- Theme Switcher -->
    <div class="fixed bottom-6 right-6 flex flex-row sm:flex-col gap-3 z-50">
        <button onclick="document.documentElement.classList.remove('dark')" class="group p-3 rounded-xl glass-card text-slate-800 dark:text-white hover:border-purple-500/50 transition-all shadow-lg" aria-label="Light Mode">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        </button>
        <button onclick="document.documentElement.classList.add('dark')" class="group p-3 rounded-xl glass-card text-slate-800 dark:text-white hover:border-purple-500/50 transition-all shadow-lg" aria-label="Dark Mode">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
    </div>

    <script>
        // Enhanced Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        
        // Use requestAnimationFrame for smoother performance
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Show cursor on first move
            if (cursor.style.display !== 'block') {
                cursor.style.display = 'block';
            }
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        });

        document.addEventListener('mouseover', (e) => {
            const target = e.target;
            // Check for buttons, links, or their children
            if (target.closest('button') || target.closest('a')) {
                cursor.classList.add('cursor-active');
            } else {
                cursor.classList.remove('cursor-active');
            }
        });

        // Hide cursor when leaving window
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
        });

        // Ensure cursor is hidden even after browser events like refocusing
        window.addEventListener('focus', () => {
            cursor.style.display = 'none';
        });
    </script>

</body>
</html>
