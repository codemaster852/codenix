<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletNix</title>
    <style>
        /* Reset and full-screen setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling on the parent container */
            background-color: #0f172a; /* Dark modern background */
            font-family: sans-serif;
        }

        /* Iframe container to ensure it occupies the full viewport */
        .full-screen-iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Embedded application -->
    <iframe 
        src="https://walletnix-859846748440.europe-west2.run.app" 
        class="full-screen-iframe" 
        title="WalletNix Application"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

</body>
</html>
