<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralith - Coenix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e2e8f0; }
        .glass-panel { background: rgba(23, 25, 30, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .message-user { background: #2563eb; color: white; border-radius: 18px 18px 2px 18px; }
        .message-ai { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 18px 2px; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="h-16 flex items-center justify-between px-6 glass-panel fixed top-0 w-full z-50">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">A</div>
            <h1 class="font-semibold text-lg">Auralith</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto mt-16 p-4 md:p-8 space-y-6" id="chatWindow"></main>

    <footer class="p-4 glass-panel">
        <div class="max-w-4xl mx-auto relative">
            <textarea id="userInput" placeholder="Ask Auralith..." class="w-full bg-[#1e293b] text-white border border-gray-700 rounded-2xl py-4 pl-5 pr-14 focus:outline-none focus:border-blue-500 resize-none"></textarea>
            <button id="sendBtn" class="absolute right-3 bottom-3 p-2 bg-blue-600 rounded-xl text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            </button>
        </div>
    </footer>

    <script>
        // NOTICE: We now call our OWN backend endpoint, not LongCat directly.
        const BACKEND_URL = "/api/chat"; 
        const MODEL = "LongCat-Flash-Chat";

        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let messages = [{ role: "system", content: "You are Auralith by Coenix." }];

        function addMessage(role, content, isThinking = false) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4`;
            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[85%] p-4 ${role === 'user' ? 'message-user' : 'message-ai'}`;
            innerDiv.innerHTML = isThinking ? `<span class="loading-dots">Auralith is thinking</span>` : marked.parse(content);
            div.appendChild(innerDiv);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return innerDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            addMessage('user', text);
            messages.push({ role: "user", content: text });
            
            const botPlaceholder = addMessage('assistant', '', true);
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODEL, messages: messages })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                botPlaceholder.innerHTML = marked.parse(aiResponse);
                messages.push({ role: "assistant", content: aiResponse });
            } catch (e) {
                botPlaceholder.innerHTML = "Error connecting to backend.";
            }
        }

        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>
</html>
