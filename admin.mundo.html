<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50">

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-slate-900 text-white p-10 overflow-y-auto">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold text-blue-400">Nixora Admin Engine</h2>
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="bg-red-600 px-4 py-2 rounded">Close</button>
            </div>
            
            <div class="bg-slate-800 p-8 rounded-xl space-y-6">
                <input type="text" id="c-title" placeholder="Course Title" class="w-full p-4 bg-slate-700 rounded border border-slate-600">
                <textarea id="c-desc" placeholder="Course Description" class="w-full p-4 bg-slate-700 rounded border border-slate-600 h-32"></textarea>
                <input type="text" id="c-cover" placeholder="Cover Image URL" class="w-full p-4 bg-slate-700 rounded border border-slate-600">
                
                <button onclick="saveCourse()" class="w-full bg-blue-600 py-4 font-bold rounded hover:bg-blue-500 transition">SAVE & SYNC TO SUPABASE</button>
            </div>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="p-6 bg-white shadow-md flex justify-between">
        <h1 class="text-2xl font-bold text-blue-600">Mundo.Academy</h1>
    </nav>

    <script>
        const sbClient = supabase.createClient(
            'https://rnlwrngfgvznndlekmrz.supabase.co', 
            'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt'
        );

        async function saveCourse() {
            const courseData = {
                title: document.getElementById('c-title').value,
                description: document.getElementById('c-desc').value,
                cover_url: document.getElementById('c-cover').value
            };

            // Using upsert handles both creation and editing if ID is provided
            const { data, error } = await sbClient
                .from('courses_list')
                .upsert([courseData]);

            if (error) {
                alert("Nixora Engine Error: " + error.message);
            } else {
                alert("Course Saved Successfully!");
                location.reload();
            }
        }

        // Shortcut to open Admin
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
