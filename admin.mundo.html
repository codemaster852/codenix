<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Nixora Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { scroll-behavior: smooth; }
        .hidden-panel { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Admin Dashboard -->
    <div id="admin-panel" class="hidden-panel fixed inset-0 z-50 bg-slate-900 text-white flex">
        <aside class="w-64 bg-slate-800 p-6 flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-bold mb-8 text-blue-400">Nixora Admin</h2>
                <nav class="space-y-4">
                    <button onclick="showSection('course-builder')" class="w-full text-left p-3 bg-blue-600 rounded-lg shadow-lg">Course Builder</button>
                </nav>
            </div>
            <button onclick="closeAdmin()" class="text-slate-400 hover:text-red-400">Exit Admin</button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto" id="admin-content">
            <h2 class="text-3xl font-bold mb-6">Course Builder</h2>
            <div id="wizard-container" class="bg-white text-slate-900 p-8 rounded-2xl shadow-xl max-w-2xl">
                <h3 class="text-lg font-semibold mb-4">Step 1: Course Details</h3>
                <input type="text" id="course-title" placeholder="Course Title" class="w-full p-3 mb-4 border rounded-lg">
                <textarea id="course-desc" placeholder="Course Description" class="w-full p-3 mb-4 border rounded-lg h-32"></textarea>
                <button onclick="saveCourseToSupabase()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Save & Publish Course</button>
            </div>
        </main>
    </div>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm p-4 sticky top-0 z-40 flex justify-between items-center px-10">
        <h1 class="text-xl font-extrabold text-blue-600 tracking-tight">Mundo.Academy</h1>
        <div id="user-info" class="text-sm font-medium text-slate-500"></div>
    </nav>

    <main id="app-container" class="max-w-7xl mx-auto p-10">
        <header class="mb-12"><h2 class="text-4xl font-bold text-slate-900">Welcome Back!</h2></header>
        <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const sbClient = supabase.createClient('https://rnlwrngfgvznndlekmrz.supabase.co', 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt');

        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden-panel'); }

        async function saveCourseToSupabase() {
            const title = document.getElementById('course-title').value;
            const description = document.getElementById('course-desc').value;

            if (!title) return alert("Please enter a title");

            const { data, error } = await sbClient
                .from('courses_list')
                .insert([{ title, description }]);

            if (error) {
                console.error("Save Error:", error);
                alert("Error saving: " + error.message);
            } else {
                alert("Course saved successfully to Supabase!");
                closeAdmin();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                document.getElementById('admin-panel').classList.remove('hidden-panel');
            }
        });

        async function init() {
            const { data: { user } } = await sbClient.auth.getUser();
            if (user) document.getElementById('user-info').innerText = user.email;
        }
        init();
    </script>
</body>
</html>
