<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix Maps | Interactive World Map</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .map-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            width: 280px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="map-overlay">
    <h1 class="text-xl font-bold text-gray-800 mb-2">Nix Maps</h1>
    <p class="text-sm text-gray-600 mb-4">Customize your viewing experience.</p>
    
    <div class="space-y-3">
        <label class="flex items-center space-x-2">
            <input type="checkbox" id="labelToggle" checked class="w-4 h-4 text-blue-600">
            <span class="text-sm font-medium">Show Political Labels</span>
        </label>
        <button id="detectBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm hover:bg-blue-700 transition">
            Auto-Detect Preference
        </button>
    </div>
    <p class="mt-4 text-[10px] text-gray-400">Powered by MapLibre & OpenStreetMap</p>
</div>

<script>
    // Initialize the map
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json', // Using public demo style
        center: [35.2, 31.8], // Centered around the region
        zoom: 7
    });

    // Helper: Detect Locale/Preference
    function applyUserPreference() {
        const lang = navigator.language || navigator.userLanguage;
        const isArabic = lang.startsWith('ar');
        
        // This is a programmatic demonstration. 
        // In a production app, you would filter map layers based on these variables.
        console.log("Current Locale:", lang);
        if (isArabic) {
            console.log("Arabic detected: Enabling region-specific view.");
            // Example: setFilter for specific label layers here
        }
    }

    // Toggle Label Visibility
    document.getElementById('labelToggle').addEventListener('change', (e) => {
        const visibility = e.target.checked ? 'visible' : 'none';
        // Note: MapLibre layer IDs depend on the tile source style. 
        // We find all layers that have 'text' and toggle them.
        map.getStyle().layers.forEach(layer => {
            if (layer.type === 'symbol') {
                map.setLayoutProperty(layer.id, 'visibility', visibility);
            }
        });
    });

    document.getElementById('detectBtn').addEventListener('click', applyUserPreference);

    // Initial load
    map.on('load', () => {
        applyUserPreference();
    });
</script>
</body>
</html>
