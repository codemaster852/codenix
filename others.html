    <style>
        :root {
            --primary-purple: #a78bfa;
            --primary-dark: #030014;
            --accent-glow: rgba(167, 139, 250, 0.15);
        }

        /* Fully hide the system cursor on desktop for a premium custom experience */
        @media (min-width: 1025px) {
            *, body, html, button, a, div, img {
                cursor: none !important;
            }
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-dark);
            color: #f3f4f6;
            overflow-x: hidden;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.authorized {
            opacity: 1;
        }

        /* Custom Premium Fluid Cursor */
        #custom-cursor {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            mix-blend-mode: difference;
        }

        #custom-cursor-ring {
            width: 36px;
            height: 36px;
            border: 1.5px solid var(--primary-purple);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s, width 0.3s, height 0.3s;
        }

        /* Subtle Luxury Grid Background with Radial Lighting */
        .grid-bg {
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(167, 139, 250, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.015) 1px, transparent 0);
            background-size: 100% 100%, 100% 100%, 32px 32px;
        }

        /* Glassmorphic Cards with Luxury Border Glow */
        .tool-card {
            background: rgba(10, 6, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tool-card:hover {
            border-color: rgba(167, 139, 250, 0.4);
            background: rgba(167, 139, 250, 0.03);
            transform: translateY(-6px) scale(1.01);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.6),
                0 0 40px var(--accent-glow),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        /* Status Badge Styling */
        .status-badge {
            font-size: 9px;
            letter-spacing: 0.12em;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .coming-soon {
            filter: grayscale(0.8) opacity(0.5);
            cursor: not-allowed !important;
        }
        
        .coming-soon:hover {
            transform: none !important;
            border-color: rgba(255, 255, 255, 0.05) !important;
            box-shadow: none !important;
        }

        /* Dropdown custom anim */
        #profile-dropdown {
            display: none;
            animation: slideDownFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        #profile-dropdown.show {
            display: block;
        }

        @keyframes slideDownFade {
            from { opacity: 0; transform: translateY(-8px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Shimmer skeleton for loading state */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
        }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 1024px) {
            #custom-cursor, #custom-cursor-ring { display: none !important; }
            * { cursor: auto !important; }
        }
    </style>

            cursorRing.style.left = e.clientX + 'px';

        // Dropdown Toggle
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });

        // Sign Out
        document.getElementById('sign-out-btn').addEventListener('click', async () => {
            await vaultSupabase.auth.signOut();
            window.location.href = 'auth.html';
        });

        // Strict Auth Guard & Profile Sync
        async function checkAuthAndSync() {
            try {
                const { data: { user }, error: authError } = await vaultSupabase.auth.getUser();

                if (!user || authError) {
                    window.location.href = 'auth.html';
                    return;
                }

                document.body.classList.add('authorized');
                document.getElementById('user-email-display').textContent = user.email;

                const { data: profile } = await vaultSupabase
                    .from('profiles')
                    .select('avatar_url, username, full_name')
                    .eq('id', user.id)
                    .single();

                const displayName = profile?.username || profile?.full_name || user.email.split('@')[0];
                document.getElementById('nav-name').textContent = displayName.toUpperCase();

                let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=8b5cf6&color=fff&bold=true`;
                if (profile?.avatar_url) {
                    if (profile.avatar_url.startsWith('http')) {
                        avatarUrl = profile.avatar_url;
                    } else {
                        const { data: storageData } = vaultSupabase.storage.from('avatars').getPublicUrl(profile.avatar_url);
                        avatarUrl = `${storageData.publicUrl}?t=${new Date().getTime()}`;
                    }
                }
                document.getElementById('nav-avatar').src = avatarUrl;

                // Load the Google Sheet data now
                await fetchSheetData();

            } catch (err) {
                window.location.href = 'auth.html';
            }
        }

            }
        };

        // Fetch dynamic items from Google Sheet
        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                // Google Sheets formats JSON responses with a protection prefix
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                
                const rows = data.table.rows;
                const items = [];

                // Parse columns: Type, Name, Link
                rows.forEach((row, index) => {
                    // Skip header row if it exists
                    if (index === 0 && row.c[0]?.v?.toLowerCase() === 'type') return;

                    const type = row.c[0]?.v || '';
                    const name = row.c[1]?.v || '';
                    const link = row.c[2]?.v || '';

                    if (name.trim()) {
                        items.push({
                            type: type.trim(),
                            name: name.trim(),
                            link: link.trim()
                        });
                    }
                });

                rawVaultItems = items;
                renderVault(items);

            } catch (err) {
                console.error("Google Sheets synchronization error. Using local layout fallback.", err);
                // Premium Local Fallback if network fails
                rawVaultItems = [
                    { type: "Active", name: "Podnix", link: "podnix.html" },
                    { type: "Active", name: "Services", link: "services.html" },
                    { type: "Active", name: "Games", link: "game.html" },
                    { type: "Active", name: "App Store", link: "app.html" },
                    { type: "Active", name: "DeepThinix", link: "deepthinix.html" },
                    { type: "Beta", name: "Nixora", link: "" },
                    { type: "Active", name: "Models", link: "models.html" },
                    { type: "Active", name: "Study & Work", link: "Studork.html" },
                    { type: "Active", name: "AI Academy", link: "codenix-academy.html" }
                ];
                renderVault(rawVaultItems);
            }
        }

        // Render Vault cards dynamically
        function renderVault(items) {
            const grid = document.getElementById('vault-grid');
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-white/40 font-mono tracking-widest uppercase text-xs">No systems found in this category.</p>
                    </div>
                `;
                return;
            }

            items.forEach(item => {
                const normalizedName = item.name.toLowerCase();
                const template = itemTemplates[normalizedName] || {
                    desc: "Interactive system module integrated via live protocols.",
                    bg: "from-purple-900/10 to-transparent",
                    icon: `<div class="p-4 bg-purple-600/30 rounded-2xl text-purple-300 border border-purple-500/30"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg></div>`
                };

                const isComingSoon = !item.link || item.type.toLowerCase().includes('coming soon');
                const cardClass = `tool-card p-8 rounded-[2rem] flex flex-col justify-between group h-[260px] relative overflow-hidden bg-gradient-to-br ${template.bg} ${isComingSoon ? 'coming-soon' : 'active-card'}`;

                // Handle status color styles
                let statusBadgeStyle = "bg-purple-500/10 text-purple-300 border border-purple-500/20";
                if (item.type.toLowerCase() === 'active' || item.type.toLowerCase().includes('month')) {
                    statusBadgeStyle = "bg-emerald-500/10 text-emerald-300 border border-emerald-500/20";
                } else if (isComingSoon) {
                    statusBadgeStyle = "bg-zinc-800 text-zinc-400 border border-zinc-700";
                }

                const cardHtml = `
                    <div class="${cardClass}" ${!isComingSoon ? `onclick="window.location.href='${item.link}'"` : ''}>
                        <!-- Glow Overlay -->
                        <div class="absolute -right-12 -top-12 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>

                        <div class="flex justify-between items-start relative z-10 mb-4">
                            ${template.icon}
                            <div class="flex flex-col items-end gap-1.5">
                                <span class="status-badge ${statusBadgeStyle}">${item.type}</span>
                                ${isComingSoon ? `<span class="status-badge bg-rose-500/10 text-rose-300 border border-rose-500/20">LOCKED</span>` : ''}
                            </div>
                        </div>

                        <div class="relative z-10 mt-auto">
                            <h3 class="text-2xl font-black text-white/90 group-hover:text-white group-hover:translate-x-1 transition-all duration-300 mb-2 flex items-center gap-2">
                                ${item.name}
                                ${!isComingSoon ? `
                                <svg class="h-4 w-4 opacity-0 group-hover:opacity-100 transition-all text-purple-400 -translate-x-2 group-hover:translate-x-0 duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                                </svg>` : ''}
                            </h3>
                            <p class="text-xs text-white/50 leading-relaxed font-medium line-clamp-2">${template.desc}</p>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });

            // Re-bind cursor events for new elements
            bindCursorInteractions();
        }

        // Vault Filtering system
        function filterVault(filterType) {
            // Update Tab active styling
            const tabs = ['all', 'active', 'upcoming'];
            tabs.forEach(tab => {
                const btn = document.getElementById(`filter-${tab}`);
                if (tab === filterType) {
                    btn.className = "px-5 py-2 rounded-full text-xs font-bold tracking-wider uppercase border border-purple-500/30 bg-purple-500/10 text-purple-300 transition-all duration-300";
                } else {
                    btn.className = "px-5 py-2 rounded-full text-xs font-bold tracking-wider uppercase border border-white/5 bg-white/5 hover:border-white/10 text-white/60 hover:text-white transition-all duration-300";
                }
            });

            if (filterType === 'all') {
                renderVault(rawVaultItems);
            } else if (filterType === 'active') {
                const filtered = rawVaultItems.filter(item => {
                    const status = item.type.toLowerCase();
                    return status.includes('active') || status.includes('month') || (!status.includes('soon') && item.link);
                });
                renderVault(filtered);
            } else if (filterType === 'upcoming') {
                const filtered = rawVaultItems.filter(item => {
                    const status = item.type.toLowerCase();
                    return status.includes('soon') || !item.link;
                });
                renderVault(filtered);
            }
        }

        // Beautiful Interactive Hover Scaling for Custom Cursor
        function bindCursorInteractions() {
            document.querySelectorAll('.tool-card.active-card, #profile-trigger, #filters-container button, a, button').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1.8)';
                    cursor.style.backgroundColor = '#a78bfa';
                    cursorRing.style.width = '52px';
                    cursorRing.style.height = '52px';
                    cursorRing.style.borderColor = '#ffffff';
                });
                el.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursor.style.backgroundColor = '#ffffff';
                    cursorRing.style.width = '36px';
                    cursorRing.style.height = '36px';
                    cursorRing.style.borderColor = '#a78bfa';
                });
            });

            // Specific styling when hovering disabled cards
            document.querySelectorAll('.tool-card.coming-soon').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.style.backgroundColor = '#ef4444';
                    cursorRing.style.borderColor = '#ef4444';
                });
                el.addEventListener('mouseleave', () => {
                    cursor.style.backgroundColor = '#ffffff';
                    cursorRing.style.borderColor = '#a78bfa';
                });
            });
        }

        window.onload = checkAuthAndSync;
    </script>
</body>
</html>
