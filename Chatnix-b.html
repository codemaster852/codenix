<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatNIx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
    header { background: #0d6efd; color: white; padding: 1em; text-align: center; }
    main { padding: 1em; }
    .chat-box { border: 1px solid #ccc; padding: 1em; background: white; height: 300px; overflow-y: auto; }
    .controls { margin-top: 1em; }
    button { margin: 0.2em; padding: 0.5em 1em; }
  </style>
</head>
<body>
  <header>
    <h1>ChatNIx</h1>
    <p>Offline Bluetooth Sharing & Voice Calls</p>
  </header>
  <main>
    <div class="chat-box" id="chatBox"></div>
    <div class="controls">
      <input type="file" id="fileInput" multiple>
      <button onclick="shareFiles()">Share Files</button>
      <button onclick="startVoiceCall()">Start Voice Call</button>
    </div>
  </main>

  <script>
    // Register service worker for offline + PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Bluetooth file sharing (Web Bluetooth API)
    async function shareFiles() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true
        });
        document.getElementById('chatBox').innerHTML += "<p>Connected to: " + device.name + "</p>";
        // Actual file transfer requires custom GATT service implementation
      } catch (error) {
        alert("Bluetooth error: " + error);
      }
    }

    // Voice call mode (WebRTC)
    async function startVoiceCall() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audio = document.createElement('audio');
        audio.srcObject = stream;
        audio.play();
        document.getElementById('chatBox').innerHTML += "<p>Voice call started...</p>";
        // For real calls, integrate WebRTC peer connection
      } catch (error) {
        alert("Voice call error: " + error);
      }
    }
  </script>
</body>
  </html>
