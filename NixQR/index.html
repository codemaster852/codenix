<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixQR | Powered by Codenix</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛶</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass rounded-3xl shadow-2xl overflow-hidden p-8 border border-white/20">
        <div class="flex flex-col items-center mb-8">
            <img src="/logo.png" alt="Codenix Logo" class="w-20 h-20 rounded-full mb-4 shadow-lg border-4 border-blue-500">
            <h1 class="text-3xl font-bold text-slate-800">NixQR</h1>
            <p class="text-slate-500">by Codenix</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="Enter your link here..." 
                   class="w-full p-4 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg">
            
            <button onclick="generateQR()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition-all active:scale-95">
                Generate QR Code
            </button>
        </div>

        <div id="statusArea" class="mt-8 flex flex-col items-center justify-center min-h-[300px]">
            <div id="loader" class="loader hidden"></div>
            <div id="resultContainer" class="hidden flex flex-col items-center animate-in fade-in zoom-in duration-500">
                <img id="qrImage" src="" alt="Generated QR" class="w-64 h-64 border-4 border-white shadow-xl rounded-lg mb-6">
                <button onclick="downloadQR()" class="text-blue-600 font-semibold hover:underline">Download QR Code</button>
            </div>
            <p id="placeholderText" class="text-slate-400">Your QR code will appear here</p>
        </div>
    </div>

    <script>
        function generateQR() {
            const input = document.getElementById('urlInput').value.trim();
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            const qrImage = document.getElementById('qrImage');
            const placeholder = document.getElementById('placeholderText');
            const statusArea = document.getElementById('statusArea');

            if (!input) {
                alert('Please enter a valid link');
                return;
            }

            // UI Reset
            placeholder.classList.add('hidden');
            resultContainer.classList.add('hidden');
            loader.classList.remove('hidden');

            // Simulate generation latency
            setTimeout(() => {
                // Updated to use the reliable goQR.me API
                const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(input)}`;
                qrImage.src = apiUrl;
                
                loader.classList.add('hidden');
                resultContainer.classList.remove('hidden');
            }, 800);
        }

        // Helper to download the image
        async function downloadQR() {
            const image = document.getElementById('qrImage');
            const imageSrc = image.src;
            
            try {
                const response = await fetch(imageSrc);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'NixQR-Code.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error('Download failed', err);
                alert('Could not download the image directly. Please right-click the QR code and select "Save Image As".');
            }
        }
    </script>
</body>
</html>
