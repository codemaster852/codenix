<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nixus Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Eliminate any potential scrollbars or margins on the container */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Ensure the iframe fills its space perfectly */
        .embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="relative w-screen h-screen flex flex-col items-stretch justify-stretch">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500 ease-out">
        <div class="flex flex-col items-center space-y-4">
            <!-- Animated Custom Spinner -->
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 rounded-full border-4 border-slate-700/50"></div>
                <div class="absolute inset-0 rounded-full border-4 border-blue-500 border-t-transparent animate-spin"></div>
            </div>
            <div class="text-center">
                <h3 class="text-slate-200 text-lg font-semibold tracking-wide">Connecting to Nixus Dashboard</h3>
                <p class="text-slate-400 text-sm mt-1">Securing your connection...</p>
            </div>
        </div>
    </div>

    <!-- Fullscreen Embed Container -->
    <main class="embed-container flex-grow w-full h-full relative">
        <iframe 
            id="dashboard-frame"
            src="https://nixus-dashboard-859846748440.europe-west2.run.app/" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </main>

    <script>
        // Once the iframe loads, fade out and remove the loader overlay
        const iframe = document.getElementById('dashboard-frame');
        const loader = document.getElementById('loading-overlay');

        iframe.addEventListener('load', () => {
            loader.classList.add('opacity-0');
            // Remove completely after the fade animation completes to allow interaction below it
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        });

        // Fail-safe: If the iframe takes too long or blocks the load event, fade out loader after 8 seconds
        setTimeout(() => {
            if (loader.style.display !== 'none') {
                loader.classList.add('opacity-0');
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        }, 8000);
    </script>
</body>
</html>
