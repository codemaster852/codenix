<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen">

    <div id="loading" class="flex items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-violet-500"></div>
    </div>

    <main id="content" class="hidden container mx-auto p-6 md:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Welcome back, <span id="user-name" class="text-violet-400">User</span>!</h1>
                <p class="text-slate-400 mt-2">Manage your AI projects and settings here.</p>
            </div>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-full text-sm font-semibold transition">
                Sign Out
            </button>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-xl font-bold mb-4">Project Status</h2>
                <p class="text-slate-400">Your AI studio is active and ready for your next deployment.</p>
            </div>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-xl font-bold mb-4">Quick Actions</h2>
                <button class="w-full bg-violet-600 hover:bg-violet-500 text-white py-2 rounded-lg transition mb-2">Create New Agent</button>
                <button class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-lg transition">View Logs</button>
            </div>
        </section>
    </main>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        
        // Ensure supabase instance is initialized globally once safely
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = '/start/';
                return;
            }

            // Set User Data
            document.getElementById('user-name').innerText = user.user_metadata.full_name || user.email.split('@')[0];
            
            // Show content
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        async function logout() {
            await window.supabaseClient.auth.signOut();
            window.location.href = '/start/';
        }

        init();
    </script>
</body>
</html>
