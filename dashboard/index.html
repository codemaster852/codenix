<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-purple: #8b5cf6; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hover-glow:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); border-color: var(--primary-purple); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-8 py-4 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-white">CODENIX</div>
        <div class="flex items-center gap-6">
            <button id="themeToggle" class="text-slate-400 hover:text-white transition">Toggle Theme</button>
            <div id="avatar" class="w-10 h-10 rounded-full bg-purple-600 cursor-pointer border-2 border-slate-700 hover:border-purple-500 transition"></div>
            <div id="profileMenu" class="hidden absolute top-20 right-8 glass rounded-xl p-2 w-48 shadow-2xl">
                <button id="signOutBtn" class="w-full text-left px-4 py-2 text-red-400 hover:bg-red-500/10 rounded-lg">Sign Out</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-8">
        <h1 class="text-4xl font-extrabold mb-12">Dashboard</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Feature Cards -->
            <div class="glass p-6 rounded-2xl hover-glow transition duration-300">
                <h3 class="text-xl font-semibold mb-4 text-purple-400">💬 Chat AI</h3>
                <div class="space-y-3">
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">GPT Assistant</button>
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">LongCat Docs</button>
                </div>
            </div>
            
            <div class="glass p-6 rounded-2xl hover-glow transition duration-300">
                <h3 class="text-xl font-semibold mb-4 text-purple-400">🎨 Image AI</h3>
                <div class="space-y-3">
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">Image Generator</button>
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">Background Remover</button>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl hover-glow transition duration-300">
                <h3 class="text-xl font-semibold mb-4 text-purple-400">💻 Code AI</h3>
                <div class="space-y-3">
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">Code Generator</button>
                    <button class="w-full text-left p-3 rounded-lg bg-slate-800/50 hover:bg-purple-600 transition">Debugger Pro</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        const supabase = window.supabase.createClient(
            'https://rnlwrngfgvznndlekmrz.supabase.co', 
            'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt'
        );

        // Authentication Guard
        async function initAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = '/Start/';
        }
        initAuth();

        // UI Interactions
        document.getElementById('avatar').onclick = () => {
            document.getElementById('profileMenu').classList.toggle('hidden');
        };

        document.getElementById('signOutBtn').onclick = async () => {
            await supabase.auth.signOut();
            window.location.href = '/Start/';
        };
    </script>
</body>
</html>
