<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen">

    <!-- Loading State -->
    <div id="loading" class="flex items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-violet-500"></div>
    </div>

    <!-- Main Content -->
    <main id="content" class="hidden container mx-auto p-6 md:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Welcome back, <span id="user-name" class="text-violet-400">User</span>!</h1>
                <p class="text-slate-400 mt-2">Manage your AI studio and project sections.</p>
            </div>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-full text-sm font-semibold transition">
                Sign Out
            </button>
        </header>

        <!-- Dynamic Sections Grid -->
        <section id="sections-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Sections will be injected here -->
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        // Replace with your actual published CSV link from Google Sheets
        const SPREADSHEET_CSV_URL = 'YOUR_PUBLISHED_CSV_URL_HERE'; 

        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchSpreadsheetSections() {
            try {
                const response = await fetch(SPREADSHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));
                const headers = rows.shift();
                return rows.filter(row => row.length === headers.length).map(row => {
                    let obj = {};
                    headers.forEach((header, i) => obj[header.trim()] = row[i]?.trim());
                    return obj;
                });
            } catch (error) {
                console.error('Error loading sheet data:', error);
                return [];
            }
        }

        async function init() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = '/start/';
                return;
            }

            document.getElementById('user-name').innerText = user.user_metadata.full_name || user.email.split('@')[0];
            
            // Fetch dynamic data
            const sections = await fetchSpreadsheetSections();
            const grid = document.getElementById('sections-grid');
            
            sections.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 p-6 rounded-2xl border border-slate-800 hover:border-violet-500 transition";
                card.innerHTML = `
                    <h2 class="text-xl font-bold mb-4">${s.Title || 'Project Section'}</h2>
                    <p class="text-slate-400">${s.Description || 'Manage this part of your studio.'}</p>
                `;
                grid.appendChild(card);
            });

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        async function logout() {
            await window.supabaseClient.auth.signOut();
            window.location.href = '/start/';
        }

        init();
    </script>
</body>
</html>
