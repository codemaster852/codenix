<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurany Premium | التلاوة والتحميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg-base: #000000;
            --bg-elevated: #121212;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --nav-height: 85px;
            --mini-height: 70px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        .quran-font { font-family: 'Amiri', serif; }

        .app-shell {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
            position: relative;
        }

        .main-content {
            overflow-y: auto;
            padding-bottom: calc(var(--nav-height) + var(--mini-height) + 20px);
            scrollbar-width: none;
        }

        .main-content::-webkit-scrollbar { display: none; }

        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: absolute;
            bottom: 0;
            width: 100%;
            height: var(--nav-height);
            display: grid;
            grid-template-cols: repeat(3, 1fr);
            z-index: 60;
        }

        #screen-player {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(180deg, #1e1b4b 0%, #000000 100%);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        #screen-player.active { transform: translateY(0); }

        .mini-player {
            position: fixed;
            bottom: calc(var(--nav-height) + 10px);
            left: 12px;
            right: 12px;
            height: var(--mini-height);
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 16px;
            z-index: 50;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }

        @keyframes rotating {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .disc-anim { animation: rotating 15s linear infinite; animation-play-state: paused; }
        .playing .disc-anim { animation-play-state: running; }

        .dl-loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: -4px;
            box-shadow: 0 0 10px var(--primary);
        }

        .subtitle-area {
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            height: 140px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .subtitle-line {
            padding: 8px 0;
            opacity: 0.3;
            transition: all 0.3s ease;
        }
        .subtitle-line.active {
            opacity: 1;
            transform: scale(1.05);
            color: #fff;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #6366f1;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-black text-white">

    <div id="toast" class="toast"></div>

    <div class="app-shell">
        <header class="p-5 flex justify-between items-center z-40 bg-black/50 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="ph-fill ph-mosque text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-none">قرآني</h1>
                    <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">Premium</span>
                </div>
            </div>
            <div id="dateBadge" class="bg-white/5 border border-white/5 px-3 py-1.5 rounded-full text-[10px] text-gray-400 font-bold italic">جاري التحميل...</div>
        </header>

        <main id="mainScroll" class="main-content px-4 space-y-8">
            
            <!-- Home Section -->
            <section id="view-home" class="view space-y-8">
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h2 class="text-xl font-bold">الإذاعات الشائعة</h2>
                        <i class="ph ph-sparkle text-indigo-400"></i>
                    </div>
                    <div id="popularList" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                        <div class="animate-pulse flex gap-4">
                            <div class="w-36 h-48 bg-white/5 rounded-3xl"></div>
                            <div class="w-36 h-48 bg-white/5 rounded-3xl"></div>
                            <div class="w-36 h-48 bg-white/5 rounded-3xl"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-xl font-bold px-1">البحث والاستكشاف</h2>
                    <div class="relative">
                        <input id="radioSearch" type="text" placeholder="ابحث عن إذاعة أو قارئ..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pr-12 pl-4 text-sm outline-none focus:ring-2 ring-indigo-500/50 transition-all">
                        <i class="ph ph-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    </div>
                    <div id="radioList" class="grid grid-cols-1 gap-3"></div>
                </div>
            </section>

            <!-- Reciters Section -->
            <section id="view-reciters" class="view hidden space-y-6">
                <div class="bg-indigo-600/10 p-6 rounded-[2rem] border border-indigo-500/10">
                    <h2 class="text-xl font-bold">مكتبة القراء</h2>
                    <p class="text-xs text-gray-400 mt-1">اختر الشيخ واستمع للتلاوات بجودة عالية</p>
                </div>
                <div class="relative">
                    <select id="reciterSelector" class="w-full bg-white/10 border border-white/5 rounded-2xl p-4 text-lg font-bold appearance-none outline-none focus:bg-white/15">
                        <option value="">اختر القارئ...</option>
                    </select>
                    <i class="ph ph-caret-down absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-indigo-400"></i>
                </div>
                <div id="surahContainer" class="hidden space-y-3">
                    <div class="flex justify-between items-center px-2">
                        <h3 class="text-sm font-bold text-gray-400">السور المتاحة</h3>
                        <span id="surahMeta" class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-md font-bold"></span>
                    </div>
                    <div id="surahList" class="space-y-2"></div>
                </div>
            </section>

            <!-- Library Section -->
            <section id="view-library" class="view hidden space-y-6">
                <div class="flex gap-2 p-1 bg-white/5 rounded-2xl">
                    <button onclick="setLibraryMode('favs')" id="lib-tab-favs" class="flex-1 py-3 rounded-xl bg-indigo-600 font-bold text-xs shadow-lg transition-all">المفضلة</button>
                    <button onclick="setLibraryMode('downloads')" id="lib-tab-downloads" class="flex-1 py-3 rounded-xl font-bold text-xs transition-all">المحملة</button>
                </div>
                <div id="libraryList" class="space-y-3 min-h-[300px]"></div>
                <div id="emptyLib" class="hidden py-20 text-center opacity-30 flex flex-col items-center gap-4">
                    <i class="ph ph-archive text-6xl"></i>
                    <p class="font-bold">القائمة فارغة</p>
                </div>
            </section>
        </main>

        <div id="miniPlayer" class="mini-player hidden" onclick="togglePlayerView(true)">
            <div class="w-12 h-12 rounded-xl bg-indigo-600/20 flex items-center justify-center overflow-hidden">
                <i id="miniIcon" class="ph-fill ph-music-notes text-indigo-400 text-2xl"></i>
            </div>
            <div class="flex-1 px-3 overflow-hidden">
                <h4 id="miniTitle" class="text-sm font-bold truncate">...</h4>
                <p id="miniSub" class="text-[10px] text-gray-400 truncate font-bold">...</p>
            </div>
            <button onclick="event.stopPropagation(); togglePlayState()" class="w-10 h-10 flex items-center justify-center text-3xl">
                <i id="miniPlayIcon" class="ph-fill ph-play"></i>
            </button>
            <div class="absolute bottom-0 left-0 h-1 bg-indigo-500 rounded-full transition-all" id="miniProgress" style="width: 0%"></div>
        </div>

        <section id="screen-player" class="">
            <header class="flex justify-between items-center">
                <button onclick="togglePlayerView(false)" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="ph ph-caret-down text-xl"></i></button>
                <div class="text-center">
                    <span class="text-[8px] uppercase font-bold text-indigo-400 tracking-widest block mb-1">الآن في رحاب</span>
                    <span id="playerTag" class="text-[10px] font-bold border border-white/10 px-3 py-0.5 rounded-full bg-white/5">...</span>
                </div>
                <button onclick="toggleFavoriteCurrent()" id="favBtn" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-xl">
                    <i id="favIcon" class="ph ph-heart"></i>
                </button>
            </header>

            <div class="flex-1 flex flex-col items-center justify-center py-10 space-y-8 overflow-hidden">
                <div class="relative w-64 h-64">
                    <div class="absolute inset-0 bg-indigo-600/20 blur-3xl rounded-full"></div>
                    <div class="relative w-full h-full rounded-full border-4 border-white/5 shadow-2xl overflow-hidden flex items-center justify-center bg-zinc-900 disc-anim">
                        <i id="playerIconBig" class="ph-fill ph-mosque text-[100px] text-indigo-500/20"></i>
                    </div>
                </div>

                <div class="text-center w-full px-4">
                    <h2 id="fullTitle" class="text-2xl font-bold truncate mb-1">...</h2>
                    <p id="fullSub" class="text-indigo-400 font-bold text-sm">...</p>
                </div>

                <div class="w-full subtitle-area no-scrollbar" id="subtitleBox">
                    <div id="subtitleContent" class="text-center quran-font text-2xl text-gray-400">
                        <p class="subtitle-line active italic text-sm">استمع بقلبك...</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6 pb-6">
                <div class="px-2 space-y-1">
                    <input id="seekBar" type="range" min="0" max="100" value="0">
                    <div class="flex justify-between text-[10px] font-bold text-gray-500">
                        <span id="currTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4">
                    <button onclick="downloadCurrent()" id="dlBtnFull" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl text-gray-400">
                        <i id="dlIconFull" class="ph ph-download-simple"></i>
                    </button>
                    
                    <div class="flex items-center gap-6">
                        <button class="text-3xl text-white/20"><i class="ph-fill ph-skip-back"></i></button>
                        <button onclick="togglePlayState()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-all">
                            <i id="fullPlayIcon" class="ph-fill ph-play text-3xl"></i>
                        </button>
                        <button class="text-3xl text-white/20"><i class="ph-fill ph-skip-forward"></i></button>
                    </div>

                    <button onclick="shareTrack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl text-indigo-400">
                        <i class="ph ph-share-network"></i>
                    </button>
                </div>
            </div>
        </section>

        <nav class="glass-nav">
            <button onclick="switchView('home')" id="nav-home" class="flex flex-col items-center justify-center gap-1 text-indigo-600">
                <i class="ph-fill ph-house-simple text-2xl"></i>
                <span class="text-[9px] font-bold">الرئيسية</span>
            </button>
            <button onclick="switchView('reciters')" id="nav-reciters" class="flex flex-col items-center justify-center gap-1 text-gray-500">
                <i class="ph-fill ph-microphone-stage text-2xl"></i>
                <span class="text-[9px] font-bold">القراء</span>
            </button>
            <button onclick="switchView('library')" id="nav-library" class="flex flex-col items-center justify-center gap-1 text-gray-500">
                <i class="ph-fill ph-bookmarks text-2xl"></i>
                <span class="text-[9px] font-bold">المكتبة</span>
            </button>
        </nav>
    </div>

    <audio id="audioCore" preload="auto"></audio>

    <script>
        const CONFIG = {
            apiRadios: 'https://www.mp3quran.net/api/v3/radios',
            apiReciters: 'https://www.mp3quran.net/api/v3/reciters?language=ar',
            apiSuwar: 'https://www.mp3quran.net/api/v3/suwar?language=ar',
            apiQuranText: 'https://api.alquran.cloud/v1/surah',
            dbName: 'QuranyV3_Store',
            dbStore: 'offline_audio'
        };

        const state = {
            radios: [],
            reciters: [],
            suwar: [],
            favorites: JSON.parse(localStorage.getItem('q_favs_v3') || '[]'),
            downloads: [],
            current: null,
            activeView: 'home',
            libraryMode: 'favs',
            subtitles: [],
            db: null
        };

        const dom = {
            audio: document.getElementById('audioCore'),
            scroll: document.getElementById('mainScroll'),
            mini: document.getElementById('miniPlayer'),
            full: document.getElementById('screen-player'),
            seekBar: document.getElementById('seekBar'),
            reciterSel: document.getElementById('reciterSelector'),
            surahList: document.getElementById('surahList'),
            libList: document.getElementById('libraryList'),
            popularList: document.getElementById('popularList'),
            radioList: document.getElementById('radioList')
        };

        async function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(CONFIG.dbName, 3);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(CONFIG.dbStore)) {
                        db.createObjectStore(CONFIG.dbStore, { keyPath: 'url' });
                    }
                };
                req.onsuccess = (e) => {
                    state.db = e.target.result;
                    syncDownloads();
                    resolve();
                };
                req.onerror = () => reject();
            });
        }

        async function syncDownloads() {
            if (!state.db) return;
            const tx = state.db.transaction(CONFIG.dbStore, 'readonly');
            const store = tx.objectStore(CONFIG.dbStore);
            const req = store.getAll();
            req.onsuccess = () => {
                state.downloads = req.result;
                if (state.activeView === 'library' && state.libraryMode === 'downloads') renderLibrary();
            };
        }

        async function loadApp() {
            try {
                // Initialize Date
                const now = new Date();
                document.getElementById('dateBadge').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

                // Fetch Radios
                const rRes = await fetch(CONFIG.apiRadios);
                const rData = await rRes.json();
                state.radios = rData.radios || [];
                renderHome();

                // Fetch Reciters
                const recRes = await fetch(CONFIG.apiReciters);
                const recData = await recRes.json();
                state.reciters = recData.reciters || [];
                populateReciters();

                // Check Deep Link
                const params = new URLSearchParams(window.location.search);
                if (params.has('radio')) {
                    const found = state.radios.find(r => r.id == params.get('radio'));
                    if (found) playItem({ name: found.name, url: found.url, type: 'radio', sub: 'إذاعة مباشرة' });
                }
            } catch (e) {
                showToast("خطأ في الاتصال بالخادم");
            }
        }

        function renderHome() {
            // Popular
            const populars = state.radios.slice(0, 8);
            dom.popularList.innerHTML = populars.map(r => `
                <div onclick='playItem(${JSON.stringify({name: r.name, url: r.url, type: 'radio', sub: 'إذاعة مباشرة', id: r.id})})' class="w-36 flex-shrink-0 snap-start bg-indigo-600/10 border border-white/5 rounded-3xl p-4 flex flex-col gap-4 active:scale-95 transition-all">
                    <div class="w-full aspect-square rounded-2xl bg-indigo-600/20 flex items-center justify-center">
                        <i class="ph-fill ph-broadcast text-4xl text-indigo-400"></i>
                    </div>
                    <h3 class="text-xs font-bold truncate">${r.name}</h3>
                </div>
            `).join('');

            // All Radios
            dom.radioList.innerHTML = state.radios.map(r => `
                <div onclick='playItem(${JSON.stringify({name: r.name, url: r.url, type: 'radio', sub: 'إذاعة مباشرة', id: r.id})})' class="bg-white/5 p-4 rounded-2xl flex items-center gap-4 active:bg-white/10">
                    <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400">
                        <i class="ph-fill ph-microphone"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="text-sm font-bold truncate">${r.name}</h4>
                    </div>
                    <i class="ph ph-play-circle text-2xl text-white/20"></i>
                </div>
            `).join('');
        }

        function populateReciters() {
            dom.reciterSel.innerHTML = '<option value="">اختر القارئ...</option>' + 
                state.reciters.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            
            dom.reciterSel.onchange = async (e) => {
                const id = e.target.value;
                if (!id) return;
                const reciter = state.reciters.find(r => r.id == id);
                const moshaf = reciter.moshaf[0];
                const suwarList = moshaf.surah_list.split(',');
                
                // Fetch Surah Names
                const sRes = await fetch(CONFIG.apiSuwar);
                const sData = await sRes.json();
                state.suwar = sData.suwar;

                document.getElementById('surahContainer').classList.remove('hidden');
                document.getElementById('surahMeta').innerText = `${suwarList.length} سورة`;
                
                dom.surahList.innerHTML = suwarList.map(sId => {
                    const surah = state.suwar.find(s => s.id == sId);
                    const name = surah ? surah.name : `سورة ${sId}`;
                    const url = `${moshaf.server}${sId.padStart(3, '0')}.mp3`;
                    const item = { name, url, type: 'quran', sub: reciter.name, sId: sId };
                    return `
                        <div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between active:bg-white/10">
                            <div onclick='playItem(${JSON.stringify(item)})' class="flex-1 flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-indigo-600/10 flex items-center justify-center text-xs font-bold text-indigo-400">${sId}</div>
                                <h4 class="text-sm font-bold">${name}</h4>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick='downloadSurah(${JSON.stringify(item)})' id="dl-${sId}" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-500">
                                    <i class="ph ph-download-simple"></i>
                                </button>
                                <i class="ph ph-play-circle text-2xl text-white/10"></i>
                            </div>
                        </div>
                    `;
                }).join('');
            };
        }

        async function playItem(item) {
            state.current = item;
            
            // Check if downloaded
            const downloaded = state.downloads.find(d => d.url === item.url);
            dom.audio.src = downloaded ? URL.createObjectURL(downloaded.blob) : item.url;
            
            dom.audio.play();
            updatePlayerUI();
            togglePlayerView(true);
            
            if (item.type === 'quran') fetchSubtitles(item.sId);
            else document.getElementById('subtitleContent').innerHTML = '<p class="subtitle-line active italic text-sm">البث المباشر للإذاعة...</p>';
        }

        async function fetchSubtitles(sId) {
            try {
                const res = await fetch(`${CONFIG.apiQuranText}/${sId}/ar.alafasy`);
                const data = await res.json();
                state.subtitles = data.data.ayahs;
                renderSubtitles();
            } catch (e) {
                state.subtitles = [];
            }
        }

        function renderSubtitles() {
            const container = document.getElementById('subtitleContent');
            container.innerHTML = state.subtitles.map((a, i) => `
                <p id="ayah-${i}" class="subtitle-line quran-font">${a.text}</p>
            `).join('');
        }

        function updatePlayerUI() {
            const item = state.current;
            document.getElementById('fullTitle').innerText = item.name;
            document.getElementById('fullSub').innerText = item.sub;
            document.getElementById('playerTag').innerText = item.type === 'radio' ? 'إذاعة مباشرة' : 'تلاوة عطرة';
            
            document.getElementById('miniTitle').innerText = item.name;
            document.getElementById('miniSub').innerText = item.sub;
            dom.mini.classList.remove('hidden');

            const isFav = state.favorites.some(f => f.url === item.url);
            document.getElementById('favIcon').className = isFav ? 'ph-fill ph-heart text-red-500' : 'ph ph-heart';
            
            // Update Mini Player Icon
            document.getElementById('miniIcon').className = item.type === 'radio' ? 'ph-fill ph-broadcast' : 'ph-fill ph-music-notes';
            
            // Player Disc state
            document.body.classList.add('playing');
            document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
            document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
        }

        function togglePlayState() {
            if (dom.audio.paused) {
                dom.audio.play();
                document.body.classList.add('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
            } else {
                dom.audio.pause();
                document.body.classList.remove('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-play';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-play';
            }
        }

        dom.audio.ontimeupdate = () => {
            const p = (dom.audio.currentTime / dom.audio.duration) * 100 || 0;
            dom.seekBar.value = p;
            document.getElementById('miniProgress').style.width = p + '%';
            document.getElementById('currTime').innerText = formatTime(dom.audio.currentTime);
            document.getElementById('totalTime').innerText = formatTime(dom.audio.duration);

            // Subtitle Sync Logic
            if (state.subtitles.length > 0 && dom.audio.duration) {
                const index = Math.floor((dom.audio.currentTime / dom.audio.duration) * state.subtitles.length);
                const prev = document.querySelector('.subtitle-line.active');
                if (prev) prev.classList.remove('active');
                
                const current = document.getElementById(`ayah-${index}`);
                if (current) {
                    current.classList.add('active');
                    current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        };

        dom.seekBar.oninput = () => {
            const time = (dom.seekBar.value / 100) * dom.audio.duration;
            dom.audio.currentTime = time;
        };

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function switchView(id) {
            state.activeView = id;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${id}`).classList.remove('hidden');
            
            document.querySelectorAll('.glass-nav button').forEach(b => b.classList.replace('text-indigo-600', 'text-gray-500'));
            document.getElementById(`nav-${id}`).classList.replace('text-gray-500', 'text-indigo-600');
            
            if (id === 'library') renderLibrary();
        }

        function togglePlayerView(show) {
            if (show) dom.full.classList.add('active');
            else dom.full.classList.remove('active');
        }

        function setLibraryMode(mode) {
            state.libraryMode = mode;
            document.getElementById('lib-tab-favs').classList.toggle('bg-indigo-600', mode === 'favs');
            document.getElementById('lib-tab-downloads').classList.toggle('bg-indigo-600', mode === 'downloads');
            renderLibrary();
        }

        function renderLibrary() {
            const list = state.libraryMode === 'favs' ? state.favorites : state.downloads;
            if (list.length === 0) {
                dom.libList.innerHTML = '';
                document.getElementById('emptyLib').classList.remove('hidden');
            } else {
                document.getElementById('emptyLib').classList.add('hidden');
                dom.libList.innerHTML = list.map(item => `
                    <div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between active:bg-white/10">
                        <div onclick='playItem(${JSON.stringify(item)})' class="flex-1 flex items-center gap-4 overflow-hidden">
                            <div class="w-10 h-10 rounded-xl bg-indigo-600/10 flex items-center justify-center text-indigo-500">
                                <i class="ph-fill ph-${item.type === 'radio' ? 'broadcast' : 'music-notes'}"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="text-sm font-bold truncate">${item.name}</h4>
                                <p class="text-[10px] text-indigo-400 font-bold">${item.sub}</p>
                            </div>
                        </div>
                        <button onclick="removeFromLib('${item.url}')" class="p-2 text-white/20"><i class="ph ph-trash"></i></button>
                    </div>
                `).join('');
            }
        }

        function toggleFavoriteCurrent() {
            if (!state.current) return;
            const idx = state.favorites.findIndex(f => f.url === state.current.url);
            if (idx > -1) state.favorites.splice(idx, 1);
            else state.favorites.push(state.current);
            
            localStorage.setItem('q_favs_v3', JSON.stringify(state.favorites));
            updatePlayerUI();
            showToast(idx > -1 ? "تمت الإزالة من المفضلة" : "تمت الإضافة للمفضلة");
        }

        async function downloadSurah(item) {
            const btn = document.getElementById(`dl-${item.sId}`);
            if (btn.classList.contains('active')) return;
            
            btn.innerHTML = '<i class="ph ph-circle-notch dl-loading"></i>';
            btn.classList.add('active');
            
            try {
                const res = await fetch(item.url);
                const blob = await res.blob();
                const tx = state.db.transaction(CONFIG.dbStore, 'readwrite');
                await tx.objectStore(CONFIG.dbStore).put({ ...item, blob });
                await syncDownloads();
                showToast(`تم تحميل ${item.name}`);
                btn.innerHTML = '<i class="ph-fill ph-check-circle text-green-500"></i>';
            } catch (e) {
                btn.innerHTML = '<i class="ph ph-download-simple"></i>';
                btn.classList.remove('active');
                showToast("فشل التحميل");
            }
        }

        function downloadCurrent() {
            if (state.current && state.current.type === 'quran') downloadSurah(state.current);
            else showToast("التحميل متاح للسور فقط");
        }

        async function removeFromLib(url) {
            if (state.libraryMode === 'favs') {
                state.favorites = state.favorites.filter(f => f.url !== url);
                localStorage.setItem('q_favs_v3', JSON.stringify(state.favorites));
            } else {
                const tx = state.db.transaction(CONFIG.dbStore, 'readwrite');
                await tx.objectStore(CONFIG.dbStore).delete(url);
                await syncDownloads();
            }
            renderLibrary();
            showToast("تمت الإزالة");
        }

        function shareTrack() {
            if (!state.current) return;
            let url = window.location.origin + window.location.pathname;
            if (state.current.id) url += `?radio=${state.current.id}`;
            
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = `استمع إلى ${state.current.name} على قرآني: ${url}`;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("تم نسخ رابط المشاركة");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = async () => {
            await initDB();
            loadApp();
            
            // Search Logic
            document.getElementById('radioSearch').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = state.radios.filter(r => r.name.toLowerCase().includes(term));
                dom.radioList.innerHTML = filtered.map(r => `
                    <div onclick='playItem(${JSON.stringify({name: r.name, url: r.url, type: 'radio', sub: 'إذاعة مباشرة', id: r.id})})' class="bg-white/5 p-4 rounded-2xl flex items-center gap-4 active:bg-white/10">
                        <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400">
                            <i class="ph-fill ph-microphone"></i>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="text-sm font-bold truncate">${r.name}</h4>
                        </div>
                        <i class="ph ph-play-circle text-2xl text-white/20"></i>
                    </div>
                `).join('');
            };
        };
    </script>
</body>
</html>
