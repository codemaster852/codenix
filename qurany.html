<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qurany Premium | التلاوة والمفضلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-base: #0a0a0c;
            --bg-elevated: #16161e;
            --nav-height: 85px;
            --mini-height: 70px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-base);
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
        }

        .quran-font { font-family: 'Amiri', serif; }

        .app-shell {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
            position: relative;
        }

        .main-content {
            overflow-y: auto;
            padding-bottom: calc(var(--nav-height) + var(--mini-height) + 40px);
            mask-image: linear-gradient(to top, transparent, black 50px);
        }

        .modern-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; /* تحويل من grid إلى flex لتوزيع أفضل */
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: row; /* جعل الرمز والنص بجانب بعضهما */
            align-items: center;
            justify-content: center;
            gap: 8px; /* مسافة بين الرمز والنص */
            color: #71717a;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            padding: 8px 16px;
            border-radius: 50px;
        }

        .nav-item.active {
            color: white;
            background: rgba(99, 102, 241, 0.15); /* خلفية خفيفة للتبويب النشط */
        }

        .nav-item i {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .nav-item.active i {
            color: var(--primary-light);
            transform: scale(1.1);
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 700;
            /* إخفاء النص في الشاشات الصغيرة جداً إذا لزم الأمر، لكن هنا سنبقيه بجانب الأيقونة */
        }

        .mini-player {
            position: fixed;
            bottom: calc(var(--nav-height) + 12px);
            left: 12px;
            right: 12px;
            height: var(--mini-height);
            background: linear-gradient(to right, #1e1e26, #16161e);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 90;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #screen-player {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #1a1a24 0%, #050505 100%);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #screen-player.active { transform: translateY(0); }

        .disc-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 40px auto;
        }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111;
            border: 8px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        .playing .disc { animation-play-state: running; }

        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: white;
            margin-top: -5px;
        }

        .subtitle-viewport {
            flex: 1;
            overflow-y: auto;
            text-align: center;
            mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
            padding: 40px 0;
        }

        .ayah-line {
            padding: 12px 0;
            font-size: 22px;
            color: rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }

        .ayah-line.active {
            color: white;
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translate(-50%, -100px);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 13px;
            z-index: 300;
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translate(-50%, 0); }

        .dl-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }
    </style>
</head>
<body>

    <div id="toast" class="toast">تمت العملية بنجاح</div>

    <div class="app-shell">
        <header class="p-6 flex justify-between items-center bg-black/40 backdrop-blur-lg border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i class="ph-fill ph-mosque text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">قرآني</h1>
                    <p class="text-[9px] text-indigo-400 font-bold tracking-widest uppercase">Premium Edition</p>
                </div>
            </div>
            <div id="dateBadge" class="text-[10px] text-zinc-500 font-bold bg-white/5 px-3 py-1 rounded-full italic">جاري التحديث...</div>
        </header>

        <main id="mainScroll" class="main-content px-4 py-6">
            
            <!-- Home: Radio Stations -->
            <section id="view-home" class="view space-y-8">
                <div>
                    <div class="flex justify-between items-center mb-5">
                        <h2 class="text-xl font-bold">الإذاعات المختارة</h2>
                        <span class="text-indigo-400 text-xs font-bold">عرض الكل</span>
                    </div>
                    <div id="popularList" class="flex gap-4 overflow-x-auto pb-4 -mx-4 px-4 snap-x">
                        <!-- Popular Radios Cards -->
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <input id="searchRadio" type="text" placeholder="ابحث عن إذاعة..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pr-12 pl-4 text-sm outline-none focus:ring-2 ring-indigo-500/50">
                        <i class="ph ph-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                    </div>
                    <div id="radioList" class="grid gap-3">
                        <!-- Radio List Items -->
                    </div>
                </div>
            </section>

            <!-- Reciters: Browsing Sheikhs -->
            <section id="view-reciters" class="view hidden space-y-6">
                <div class="bg-gradient-to-br from-indigo-900/20 to-transparent p-6 rounded-3xl border border-white/5">
                    <h2 class="text-2xl font-bold">مكتبة القراء</h2>
                    <p class="text-xs text-zinc-400 mt-1">تصفح التلاوات بأصوات كبار المشايخ</p>
                </div>

                <select id="reciterSelector" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 font-bold appearance-none outline-none focus:bg-white/10">
                    <option value="">اختر القارئ المفضل...</option>
                </select>

                <div id="surahSection" class="hidden animate-in fade-in duration-500">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <h3 class="text-sm font-bold text-zinc-400">السور المتاحة</h3>
                        <span id="surahCount" class="bg-indigo-600/20 text-indigo-400 text-[10px] px-2 py-0.5 rounded-full font-bold">0 سورة</span>
                    </div>
                    <div id="surahList" class="space-y-2">
                        <!-- Surah List Items -->
                    </div>
                </div>
            </section>

            <!-- Library: Favs & Downloads -->
            <section id="view-library" class="view hidden space-y-6">
                <div class="flex p-1 bg-white/5 rounded-2xl gap-1">
                    <button onclick="setLibraryTab('favs')" id="tab-favs" class="flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold transition-all">المفضلة</button>
                    <button onclick="setLibraryTab('downloads')" id="tab-downloads" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all">المحملة</button>
                </div>

                <div id="libraryList" class="space-y-3">
                    <!-- Library Items -->
                </div>

                <div id="emptyLibrary" class="hidden flex flex-col items-center justify-center py-20 text-zinc-600">
                    <i class="ph ph-bookmark-simple text-6xl mb-4"></i>
                    <p class="font-bold">القائمة فارغة حالياً</p>
                </div>
            </section>
        </main>

        <div id="miniPlayer" class="mini-player hidden" onclick="openFullPlayer()">
            <div class="w-11 h-11 bg-indigo-600 rounded-xl flex items-center justify-center text-xl overflow-hidden shadow-lg">
                <i id="miniIcon" class="ph-fill ph-music-notes text-white"></i>
            </div>
            <div class="flex-1 px-3 min-w-0">
                <h4 id="miniTitle" class="text-sm font-bold truncate">لم يتم الاختيار</h4>
                <p id="miniSub" class="text-[10px] text-zinc-400 font-bold truncate">...</p>
            </div>
            <button onclick="event.stopPropagation(); togglePlayState()" class="w-10 h-10 flex items-center justify-center text-3xl">
                <i id="miniPlayIcon" class="ph-fill ph-play"></i>
            </button>
            <div id="miniProgress" class="absolute bottom-0 left-0 h-0.5 bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
        </div>

        <section id="screen-player">
            <header class="flex justify-between items-center">
                <button onclick="closeFullPlayer()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="ph ph-caret-down text-xl"></i></button>
                <div class="text-center">
                    <span class="text-[8px] text-indigo-400 uppercase font-black tracking-widest block">يُعرض الآن</span>
                    <span id="playerType" class="text-[10px] font-bold opacity-50">...</span>
                </div>
                <button onclick="toggleFavoriteCurrent()" id="favBtn" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-2xl transition-transform active:scale-125">
                    <i id="favIcon" class="ph ph-heart"></i>
                </button>
            </header>

            <div class="disc-wrapper">
                <div class="absolute inset-0 bg-indigo-600/20 blur-[80px] rounded-full"></div>
                <div class="disc">
                    <div class="w-20 h-20 bg-zinc-800 rounded-full flex items-center justify-center shadow-inner">
                        <i id="bigIcon" class="ph-fill ph-mosque text-indigo-500/30 text-5xl"></i>
                    </div>
                </div>
            </div>

            <div class="text-center mb-6">
                <h2 id="fullTitle" class="text-2xl font-bold mb-1">...</h2>
                <p id="fullSub" class="text-indigo-400 font-bold">...</p>
            </div>

            <div class="subtitle-viewport no-scrollbar" id="subtitleContainer">
                <!-- Subtitles will appear here -->
                <p class="ayah-line active italic text-sm">استمع بقلبك وروحك...</p>
            </div>

            <div class="mt-auto space-y-6 pb-4">
                <div class="space-y-1">
                    <input id="seekBar" type="range" min="0" max="100" value="0">
                    <div class="flex justify-between text-[10px] font-bold text-zinc-500">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <button onclick="downloadCurrent()" id="dlFullBtn" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl text-zinc-400">
                        <i id="dlFullIcon" class="ph ph-download-simple"></i>
                    </button>
                    <div class="flex items-center gap-8">
                        <button class="text-zinc-700 text-3xl"><i class="ph-fill ph-skip-back"></i></button>
                        <button onclick="togglePlayState()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-all">
                            <i id="fullPlayIcon" class="ph-fill ph-play text-4xl"></i>
                        </button>
                        <button class="text-zinc-700 text-3xl"><i class="ph-fill ph-skip-forward"></i></button>
                    </div>
                    <button onclick="shareLink()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl text-indigo-400">
                        <i class="ph ph-share-network"></i>
                    </button>
                </div>
            </div>
        </section>

        <nav class="modern-nav">
            <button onclick="switchTab('home')" id="nav-home" class="nav-item active">
                <i class="ph-fill ph-house-simple"></i>
                <span>الرئيسية</span>
            </button>
            <button onclick="switchTab('reciters')" id="nav-reciters" class="nav-item">
                <i class="ph-fill ph-microphone-stage"></i>
                <span>القراء</span>
            </button>
            <button onclick="switchTab('library')" id="nav-library" class="nav-item">
                <i class="ph-fill ph-bookmarks"></i>
                <span>المكتبة</span>
            </button>
        </nav>
    </div>

    <audio id="audioElement" preload="auto"></audio>

    <script>
        const API = {
            radios: 'https://www.mp3quran.net/api/v3/radios',
            reciters: 'https://www.mp3quran.net/api/v3/reciters?language=ar',
            suwar: 'https://www.mp3quran.net/api/v3/suwar?language=ar',
            ayahs: 'https://api.alquran.cloud/v1/surah'
        };

        const APP = {
            db: null,
            state: {
                activeTab: 'home',
                radios: [],
                reciters: [],
                suwar: [],
                favorites: JSON.parse(localStorage.getItem('q_premium_favs') || '[]'),
                downloads: [],
                current: null,
                subtitles: [],
                libraryMode: 'favs'
            }
        };

        const DOM = {
            audio: document.getElementById('audioElement'),
            mini: document.getElementById('miniPlayer'),
            full: document.getElementById('screen-player'),
            seekBar: document.getElementById('seekBar'),
            reciterSel: document.getElementById('reciterSelector'),
            surahList: document.getElementById('surahList'),
            libList: document.getElementById('libraryList')
        };

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('QuranyDB_v3', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('offline_tracks')) {
                        db.createObjectStore('offline_tracks', { keyPath: 'url' });
                    }
                };
                request.onsuccess = (e) => {
                    APP.db = e.target.result;
                    syncDownloads();
                    resolve();
                };
                request.onerror = () => reject();
            });
        }

        async function syncDownloads() {
            const tx = APP.db.transaction('offline_tracks', 'readonly');
            const store = tx.objectStore('offline_tracks');
            const req = store.getAll();
            req.onsuccess = () => {
                APP.state.downloads = req.result;
                if (APP.state.activeTab === 'library' && APP.state.libraryMode === 'downloads') renderLibrary();
            };
        }

        async function startApp() {
            try {
                // Set Date
                const now = new Date();
                document.getElementById('dateBadge').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });

                // Load Radios
                const rRes = await fetch(API.radios);
                const rData = await rRes.json();
                APP.state.radios = rData.radios || [];
                renderRadios();

                // Load Reciters
                const recRes = await fetch(API.reciters);
                const recData = await recRes.json();
                APP.state.reciters = recData.reciters || [];
                populateReciters();

                // Handle Deep Linking
                const params = new URLSearchParams(window.location.search);
                if (params.has('radio')) {
                    const radio = APP.state.radios.find(r => r.id == params.get('radio'));
                    if (radio) playTrack({ name: radio.name, url: radio.url, sub: 'إذاعة مباشرة', type: 'radio', id: radio.id });
                }
            } catch (err) {
                console.error(err);
                showToast("حدث خطأ في جلب البيانات");
            }
        }

        function renderRadios() {
            const popular = APP.state.radios.slice(0, 10);
            document.getElementById('popularList').innerHTML = popular.map(r => `
                <div onclick='playTrack(${JSON.stringify({name: r.name, url: r.url, type:'radio', sub:'إذاعة مباشرة', id:r.id})})' class="w-32 flex-shrink-0 snap-center bg-white/5 rounded-2xl p-3 border border-white/5 flex flex-col gap-3 active:scale-95 transition-all">
                    <div class="w-full aspect-square bg-indigo-600/10 rounded-xl flex items-center justify-center text-indigo-400">
                        <i class="ph-fill ph-broadcast text-3xl"></i>
                    </div>
                    <span class="text-[10px] font-bold truncate text-center">${r.name}</span>
                </div>
            `).join('');

            document.getElementById('radioList').innerHTML = APP.state.radios.map(r => `
                <div onclick='playTrack(${JSON.stringify({name: r.name, url: r.url, type:'radio', sub:'إذاعة مباشرة', id:r.id})})' class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl active:bg-white/10 transition-all group">
                    <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400 group-active:scale-90 transition-transform">
                        <i class="ph-fill ph-microphone"></i>
                    </div>
                    <h4 class="text-sm font-bold flex-1 truncate">${r.name}</h4>
                    <i class="ph ph-play-circle text-2xl opacity-20"></i>
                </div>
            `).join('');
        }

        async function populateReciters() {
            DOM.reciterSel.innerHTML = '<option value="">اختر القارئ المفضل...</option>' + 
                APP.state.reciters.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

            DOM.reciterSel.onchange = async (e) => {
                const id = e.target.value;
                if (!id) return;
                
                const reciter = APP.state.reciters.find(r => r.id == id);
                const moshaf = reciter.moshaf[0];
                const list = moshaf.surah_list.split(',');

                if (APP.state.suwar.length === 0) {
                    const sRes = await fetch(API.suwar);
                    const sData = await sRes.json();
                    APP.state.suwar = sData.suwar;
                }

                document.getElementById('surahSection').classList.remove('hidden');
                document.getElementById('surahCount').innerText = `${list.length} سورة`;

                DOM.surahList.innerHTML = list.map(sId => {
                    const surah = APP.state.suwar.find(s => s.id == sId);
                    const name = surah ? surah.name : `سورة ${sId}`;
                    const url = `${moshaf.server}${sId.padStart(3, '0')}.mp3`;
                    const item = { name, url, sub: reciter.name, type: 'quran', sId: sId };
                    
                    return `
                        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl hover:bg-white/10">
                            <div onclick='playTrack(${JSON.stringify(item)})' class="flex-1 flex items-center gap-4">
                                <div class="w-8 h-8 rounded-lg bg-indigo-600/20 flex items-center justify-center text-[10px] font-bold text-indigo-400">${sId}</div>
                                <h4 class="text-sm font-bold">${name}</h4>
                            </div>
                            <button onclick='downloadTrack(${JSON.stringify(item)})' id="dl-btn-${sId}" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-zinc-500">
                                <i class="ph ph-download-simple"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            };
        }

        function playTrack(item) {
            APP.state.current = item;
            
            // Check Offline first
            const offline = APP.state.downloads.find(d => d.url === item.url);
            DOM.audio.src = offline ? URL.createObjectURL(offline.blob) : item.url;
            
            DOM.audio.play();
            document.body.classList.add('playing');
            updateUI();
            
            if (item.type === 'quran') fetchAyahs(item.sId);
            else document.getElementById('subtitleContainer').innerHTML = '<p class="ayah-line active italic text-sm">البث المباشر للإذاعة...</p>';
        }

        async function fetchAyahs(sId) {
            try {
                const res = await fetch(`${API.ayahs}/${sId}/ar.alafasy`);
                const data = await res.json();
                APP.state.subtitles = data.data.ayahs;
                renderSubtitles();
            } catch (e) {
                APP.state.subtitles = [];
            }
        }

        function renderSubtitles() {
            const container = document.getElementById('subtitleContainer');
            container.innerHTML = APP.state.subtitles.map((a, i) => `
                <p id="ayah-${i}" class="ayah-line quran-font">${a.text}</p>
            `).join('');
        }

        function updateUI() {
            const item = APP.state.current;
            DOM.mini.classList.remove('hidden');
            document.getElementById('miniTitle').innerText = item.name;
            document.getElementById('miniSub').innerText = item.sub;
            document.getElementById('fullTitle').innerText = item.name;
            document.getElementById('fullSub').innerText = item.sub;
            document.getElementById('playerType').innerText = item.type === 'radio' ? 'إذاعة مباشرة' : 'تلاوة مباركة';
            
            const isFav = APP.state.favorites.some(f => f.url === item.url);
            document.getElementById('favIcon').className = isFav ? 'ph-fill ph-heart text-red-500' : 'ph ph-heart';
            
            document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
            document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
        }

        function togglePlayState() {
            if (DOM.audio.paused) {
                DOM.audio.play();
                document.body.classList.add('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
            } else {
                DOM.audio.pause();
                document.body.classList.remove('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-play';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-play';
            }
        }

        DOM.audio.ontimeupdate = () => {
            const progress = (DOM.audio.currentTime / DOM.audio.duration) * 100 || 0;
            DOM.seekBar.value = progress;
            document.getElementById('miniProgress').style.width = progress + '%';
            document.getElementById('currentTime').innerText = formatTime(DOM.audio.currentTime);
            document.getElementById('totalTime').innerText = formatTime(DOM.audio.duration);

            if (APP.state.subtitles.length > 0 && DOM.audio.duration) {
                const idx = Math.floor((DOM.audio.currentTime / DOM.audio.duration) * APP.state.subtitles.length);
                const prev = document.querySelector('.ayah-line.active');
                if (prev) prev.classList.remove('active');
                const curr = document.getElementById(`ayah-${idx}`);
                if (curr) {
                    curr.classList.add('active');
                    curr.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        };

        DOM.seekBar.oninput = () => {
            DOM.audio.currentTime = (DOM.seekBar.value / 100) * DOM.audio.duration;
        };

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function switchTab(tab) {
            APP.state.activeTab = tab;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');

            if (tab === 'library') renderLibrary();
        }

        function openFullPlayer() { DOM.full.classList.add('active'); }
        function closeFullPlayer() { DOM.full.classList.remove('active'); }

        function setLibraryTab(mode) {
            APP.state.libraryMode = mode;
            document.getElementById('tab-favs').className = mode === 'favs' ? 'flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold' : 'flex-1 py-3 rounded-xl text-xs font-bold';
            document.getElementById('tab-downloads').className = mode === 'downloads' ? 'flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold' : 'flex-1 py-3 rounded-xl text-xs font-bold';
            renderLibrary();
        }

        function renderLibrary() {
            const list = APP.state.libraryMode === 'favs' ? APP.state.favorites : APP.state.downloads;
            const empty = document.getElementById('emptyLibrary');
            
            if (list.length === 0) {
                DOM.libList.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                DOM.libList.innerHTML = list.map(item => `
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl active:bg-white/10">
                        <div onclick='playTrack(${JSON.stringify(item)})' class="flex-1 flex items-center gap-4 min-w-0">
                            <div class="w-10 h-10 rounded-xl bg-indigo-600/10 flex items-center justify-center text-indigo-400">
                                <i class="ph-fill ph-${item.type === 'radio' ? 'broadcast' : 'music-notes'}"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="text-sm font-bold truncate">${item.name}</h4>
                                <p class="text-[10px] text-indigo-400 font-bold">${item.sub}</p>
                            </div>
                        </div>
                        <button onclick="removeFromLibrary('${item.url}')" class="text-white/20 p-2"><i class="ph ph-trash"></i></button>
                    </div>
                `).join('');
            }
        }

        function toggleFavoriteCurrent() {
            if (!APP.state.current) return;
            const idx = APP.state.favorites.findIndex(f => f.url === APP.state.current.url);
            if (idx > -1) {
                APP.state.favorites.splice(idx, 1);
                showToast("تمت الإزالة من المفضلة");
            } else {
                APP.state.favorites.push(APP.state.current);
                showToast("تمت الإضافة للمفضلة");
            }
            localStorage.setItem('q_premium_favs', JSON.stringify(APP.state.favorites));
            updateUI();
            if (APP.state.activeTab === 'library' && APP.state.libraryMode === 'favs') renderLibrary();
        }

        async function downloadTrack(item) {
            const btn = document.getElementById(`dl-btn-${item.sId}`);
            if (btn) btn.innerHTML = '<i class="ph ph-circle-notch dl-spinner"></i>';
            
            try {
                const res = await fetch(item.url);
                const blob = await res.blob();
                const tx = APP.db.transaction('offline_tracks', 'readwrite');
                await tx.objectStore('offline_tracks').put({ ...item, blob });
                await syncDownloads();
                
                showToast(`تم حفظ ${item.name} أوفلاين`);
                if (btn) btn.innerHTML = '<i class="ph-fill ph-check-circle text-green-500"></i>';
            } catch (e) {
                showToast("فشل التحميل");
                if (btn) btn.innerHTML = '<i class="ph ph-download-simple"></i>';
            }
        }

        function downloadCurrent() {
            if (APP.state.current && APP.state.current.type === 'quran') downloadTrack(APP.state.current);
            else showToast("التحميل متاح للسور فقط");
        }

        async function removeFromLibrary(url) {
            if (APP.state.libraryMode === 'favs') {
                APP.state.favorites = APP.state.favorites.filter(f => f.url !== url);
                localStorage.setItem('q_premium_favs', JSON.stringify(APP.state.favorites));
            } else {
                const tx = APP.db.transaction('offline_tracks', 'readwrite');
                await tx.objectStore('offline_tracks').delete(url);
                await syncDownloads();
            }
            renderLibrary();
            showToast("تم الحذف");
        }

        function shareLink() {
            if (!APP.state.current) return;
            let url = window.location.origin + window.location.pathname;
            if (APP.state.current.id) url += `?radio=${APP.state.current.id}`;
            
            const tempInput = document.createElement('input');
            document.body.appendChild(tempInput);
            tempInput.value = `استمع إلى ${APP.state.current.name} على قرآني Premium: ${url}`;
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast("تم نسخ رابط المشاركة");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.onload = async () => {
            await initDB();
            startApp();
            
            // Local search
            document.getElementById('searchRadio').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = APP.state.radios.filter(r => r.name.toLowerCase().includes(term));
                document.getElementById('radioList').innerHTML = filtered.map(r => `
                    <div onclick='playTrack(${JSON.stringify({name: r.name, url: r.url, type:'radio', sub:'إذاعة مباشرة', id:r.id})})' class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl active:bg-white/10 transition-all group">
                        <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400">
                            <i class="ph-fill ph-microphone"></i>
                        </div>
                        <h4 class="text-sm font-bold flex-1 truncate">${r.name}</h4>
                        <i class="ph ph-play-circle text-2xl opacity-20"></i>
                    </div>
                `).join('');
            };
        };
    </script>
</body>
</html>
