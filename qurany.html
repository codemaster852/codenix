<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Qurany Premium | Offline Mode</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-base: #0a0a0c;
            --bg-elevated: #16161e;
            --nav-height: 75px;
            --mini-height: 70px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-base);
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
        }

        .quran-font { font-family: 'Amiri', serif; }

        .app-shell {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
            position: relative;
        }

        .main-content {
            overflow-y: auto;
            padding-bottom: calc(var(--nav-height) + var(--mini-height) + 40px);
            mask-image: linear-gradient(to top, transparent, black 60px);
        }

        .modern-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            color: #71717a;
            transition: all 0.3s ease;
            padding: 10px 18px;
            border-radius: 50px;
        }

        .nav-item.active {
            color: white;
            background: rgba(99, 102, 241, 0.2);
        }

        .mini-player {
            position: fixed;
            bottom: calc(var(--nav-height) + 12px);
            left: 12px;
            right: 12px;
            height: var(--mini-height);
            background: rgba(30, 30, 38, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 90;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #screen-player {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #1a1a24 0%, #050505 100%);
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #screen-player.active { transform: translateY(0); }

        .disc-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 40px auto;
        }

        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111;
            border: 8px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        .playing .disc { animation-play-state: running; }

        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        .dl-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translate(-50%, -120px);
            background: var(--primary);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 300;
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translate(-50%, 0); }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: white;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">جاري التحميل...</div>

    <div class="app-shell">
        <header class="p-5 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="ph-fill ph-mosque text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold">قرآني</h1>
                    <p class="text-[9px] text-indigo-400 font-bold tracking-widest uppercase">Premium Offline</p>
                </div>
            </div>
            <div id="connectionBadge" class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full font-bold">متصل</div>
        </header>

        <main id="mainScroll" class="main-content px-4 py-6">
            
            <!-- Home Section -->
            <section id="view-home" class="view space-y-8">
                <div>
                    <h2 class="text-xl font-bold mb-5">الإذاعات الشائعة</h2>
                    <div id="popularList" class="flex gap-4 overflow-x-auto pb-4 -mx-4 px-4 snap-x no-scrollbar"></div>
                </div>
                <div id="radioList" class="grid gap-3"></div>
            </section>

            <!-- Reciters Section -->
            <section id="view-reciters" class="view hidden space-y-6">
                <div class="bg-indigo-900/20 p-6 rounded-3xl border border-white/5">
                    <h2 class="text-2xl font-bold">تصفح القراء</h2>
                    <p class="text-xs text-zinc-400 mt-1">اختر القارئ المفضل لديك لتحميل سوره</p>
                </div>
                <select id="reciterSelector" class="w-full bg-white/10 border border-white/10 rounded-2xl p-4 font-bold outline-none text-sm"></select>
                <div id="surahSection" class="hidden space-y-2">
                    <div id="surahList" class="space-y-2"></div>
                </div>
            </section>

            <!-- Library Section -->
            <section id="view-library" class="view hidden space-y-6">
                <div class="flex p-1.5 bg-white/5 rounded-2xl gap-1.5">
                    <button onclick="setLibraryTab('favs')" id="tab-favs" class="flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold">المفضلة</button>
                    <button onclick="setLibraryTab('downloads')" id="tab-downloads" class="flex-1 py-3 rounded-xl text-xs font-bold">المحملة</button>
                </div>
                <div id="libraryList" class="space-y-3"></div>
                <div id="emptyLibrary" class="hidden flex flex-col items-center justify-center py-24 text-zinc-600">
                    <i class="ph ph-cloud-slash text-7xl mb-4 opacity-20"></i>
                    <p class="font-bold">القائمة فارغة حالياً</p>
                </div>
            </section>
        </main>

        <div id="miniPlayer" class="mini-player hidden" onclick="openFullPlayer()">
            <div class="w-11 h-11 bg-indigo-600 rounded-xl flex items-center justify-center text-xl overflow-hidden shadow-lg">
                <i id="miniIcon" class="ph-fill ph-music-notes text-white"></i>
            </div>
            <div class="flex-1 px-3 min-w-0">
                <h4 id="miniTitle" class="text-sm font-bold truncate">...</h4>
                <p id="miniSub" class="text-[10px] text-zinc-400 truncate">...</p>
            </div>
            <button onclick="event.stopPropagation(); togglePlayState()" class="w-10 h-10 flex items-center justify-center text-3xl">
                <i id="miniPlayIcon" class="ph-fill ph-play"></i>
            </button>
            <div id="miniProgress" class="absolute bottom-0 left-0 h-0.5 bg-indigo-500 transition-all" style="width: 0%"></div>
        </div>

        <section id="screen-player">
            <header class="flex justify-between items-center">
                <button onclick="closeFullPlayer()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="ph ph-caret-down"></i></button>
                <div class="text-center">
                    <span class="text-[8px] text-indigo-400 uppercase font-black tracking-widest block">يُعرض الآن</span>
                    <span id="playerSource" class="text-[10px] font-bold opacity-50">بث مباشر</span>
                </div>
                <button onclick="toggleFavoriteCurrent()" id="favBtn" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-2xl">
                    <i id="favIcon" class="ph ph-heart"></i>
                </button>
            </header>

            <div class="disc-wrapper">
                <div class="disc">
                    <div class="w-20 h-20 bg-zinc-800 rounded-full flex items-center justify-center shadow-inner">
                        <i class="ph-fill ph-mosque text-indigo-500/40 text-5xl"></i>
                    </div>
                </div>
            </div>

            <div class="text-center mb-6">
                <h2 id="fullTitle" class="text-2xl font-bold truncate px-4">...</h2>
                <p id="fullSub" class="text-indigo-400 font-bold text-sm">...</p>
            </div>

            <div class="mt-auto space-y-6 pb-6">
                <input id="seekBar" type="range" min="0" max="100" value="0">
                <div class="flex justify-between text-[10px] font-bold text-zinc-500">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="flex justify-center items-center gap-10">
                    <button onclick="downloadCurrent()" id="dlFullBtn" class="text-2xl text-zinc-400"><i id="dlFullIcon" class="ph ph-download-simple"></i></button>
                    <button onclick="togglePlayState()" class="w-20 h-20 bg-white text-black rounded-full flex items-center justify-center shadow-2xl">
                        <i id="fullPlayIcon" class="ph-fill ph-play text-4xl ml-1"></i>
                    </button>
                    <button onclick="shareLink()" class="text-2xl text-indigo-400"><i class="ph ph-share-network"></i></button>
                </div>
            </div>
        </section>

        <nav class="modern-nav">
            <button onclick="switchTab('home')" id="nav-home" class="nav-item active"><i class="ph-fill ph-house-simple"></i><span>الرئيسية</span></button>
            <button onclick="switchTab('reciters')" id="nav-reciters" class="nav-item"><i class="ph-fill ph-microphone-stage"></i><span>القراء</span></button>
            <button onclick="switchTab('library')" id="nav-library" class="nav-item"><i class="ph-fill ph-bookmarks"></i><span>المكتبة</span></button>
        </nav>
    </div>

    <audio id="audioElement" preload="auto"></audio>

    <script>
        const APP = {
            db: null,
            state: {
                activeTab: 'home',
                radios: [],
                reciters: [],
                suwar: [],
                favorites: JSON.parse(localStorage.getItem('q_favs') || '[]'),
                downloads: [],
                current: null,
                libraryMode: 'favs'
            }
        };

        const DOM = {
            audio: document.getElementById('audioElement'),
            mini: document.getElementById('miniPlayer'),
            full: document.getElementById('screen-player'),
            seekBar: document.getElementById('seekBar'),
            reciterSel: document.getElementById('reciterSelector'),
            libList: document.getElementById('libraryList')
        };

        async function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open('QuranyOfflineDB', 5); // Version bump for clean start
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('tracks')) {
                        db.createObjectStore('tracks', { keyPath: 'url' });
                    }
                };
                request.onsuccess = (e) => {
                    APP.db = e.target.result;
                    syncDownloads();
                    resolve();
                };
                request.onerror = () => resolve();
            });
        }

        async function syncDownloads() {
            if (!APP.db) return;
            const tx = APP.db.transaction('tracks', 'readonly');
            const store = tx.objectStore('tracks');
            const req = store.getAll();
            req.onsuccess = () => {
                APP.state.downloads = req.result;
                if (APP.state.activeTab === 'library' && APP.state.libraryMode === 'downloads') renderLibrary();
            };
        }

        async function startApp() {
            try {
                const rRes = await fetch('https://www.mp3quran.net/api/v3/radios');
                const rData = await rRes.json();
                APP.state.radios = rData.radios;
                renderRadios();

                const recRes = await fetch('https://www.mp3quran.net/api/v3/reciters?language=ar');
                const recData = await recRes.json();
                APP.state.reciters = recData.reciters;
                populateReciters();
            } catch (e) {
                showToast("حدث خطأ في الاتصال");
            }
        }

        function renderRadios() {
            const container = document.getElementById('radioList');
            container.innerHTML = APP.state.radios.slice(0, 30).map(r => `
                <div onclick='playTrack(${JSON.stringify({name: r.name, url: r.url, type:'radio', sub:'إذاعة مباشرة'})})' class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl active:bg-white/10">
                    <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400"><i class="ph-fill ph-broadcast"></i></div>
                    <h4 class="text-sm font-bold flex-1 truncate">${r.name}</h4>
                    <i class="ph ph-play-circle text-2xl opacity-20"></i>
                </div>
            `).join('');
            
            document.getElementById('popularList').innerHTML = APP.state.radios.slice(0, 10).map(r => `
                <div onclick='playTrack(${JSON.stringify({name: r.name, url: r.url, type:'radio', sub:'إذاعة مباشرة'})})' class="w-32 flex-shrink-0 bg-white/5 rounded-2xl p-3 border border-white/5 text-center active:scale-95 transition-all">
                    <div class="w-full aspect-square bg-indigo-600/10 rounded-xl flex items-center justify-center text-indigo-400 mb-2"><i class="ph-fill ph-broadcast text-3xl"></i></div>
                    <span class="text-[10px] font-bold block truncate">${r.name}</span>
                </div>
            `).join('');
        }

        async function populateReciters() {
            DOM.reciterSel.innerHTML = '<option value="">اختر القارئ...</option>' + 
                APP.state.reciters.map(r => `<option value="${r.id}">${r.name}</option>`).join('');

            DOM.reciterSel.onchange = async (e) => {
                const id = e.target.value;
                if (!id) return;
                const reciter = APP.state.reciters.find(r => r.id == id);
                const moshaf = reciter.moshaf[0];
                const surahs = moshaf.surah_list.split(',');

                document.getElementById('surahSection').classList.remove('hidden');
                document.getElementById('surahList').innerHTML = surahs.map(sId => {
                    const url = `${moshaf.server}${sId.padStart(3, '0')}.mp3`;
                    const item = { name: `سورة رقم ${sId}`, url: url, sub: reciter.name, type: 'quran', sId: sId };
                    const isDownloaded = APP.state.downloads.some(d => d.url === url);
                    
                    return `
                        <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                            <div onclick='playTrack(${JSON.stringify(item)})' class="flex-1 flex items-center gap-4">
                                <div class="w-8 h-8 rounded-lg bg-indigo-600/20 flex items-center justify-center text-[10px] font-bold text-indigo-400">${sId}</div>
                                <h4 class="text-sm font-bold">سورة رقم ${sId}</h4>
                            </div>
                            <button onclick='downloadTrack(${JSON.stringify(item)})' id="dl-btn-${sId}" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center ${isDownloaded ? 'text-green-500' : 'text-zinc-500'}">
                                <i class="${isDownloaded ? 'ph-fill ph-check-circle' : 'ph ph-download-simple'}"></i>
                            </button>
                        </div>
                    `;
                }).join('');
            };
        }

        async function downloadTrack(item) {
            if (!APP.db) return showToast("قاعدة البيانات غير جاهزة");
            const btn = document.getElementById(`dl-btn-${item.sId}`);
            if (btn) btn.innerHTML = '<i class="ph ph-circle-notch dl-spinner"></i>';
            showToast("جاري التحميل...");

            try {
                // Using a proxy or direct fetch depending on CORS
                const response = await fetch(item.url);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const blob = await response.blob();
                
                const transaction = APP.db.transaction(['tracks'], 'readwrite');
                const store = transaction.objectStore('tracks');
                
                await new Promise((resolve, reject) => {
                    const putRequest = store.put({ ...item, blob: blob });
                    putRequest.onsuccess = resolve;
                    putRequest.onerror = reject;
                });

                await syncDownloads();
                showToast("تم التحميل بنجاح");
                
                if (btn) {
                    btn.classList.remove('text-zinc-500');
                    btn.classList.add('text-green-500');
                    btn.innerHTML = '<i class="ph-fill ph-check-circle"></i>';
                }
                updateUI();
            } catch (error) {
                console.error("Download failed:", error);
                showToast("فشل التحميل. تأكد من اتصالك.");
                if (btn) btn.innerHTML = '<i class="ph ph-download-simple"></i>';
            }
        }

        function playTrack(item) {
            APP.state.current = item;
            
            // Check if track is downloaded
            const offline = APP.state.downloads.find(d => d.url === item.url);
            if (offline && offline.blob) {
                DOM.audio.src = URL.createObjectURL(offline.blob);
                showToast("تشغيل من الذاكرة (أوفلاين)");
            } else {
                DOM.audio.src = item.url;
            }
            
            DOM.audio.play();
            document.body.classList.add('playing');
            updateUI();
        }

        function updateUI() {
            if (!APP.state.current) return;
            const item = APP.state.current;
            DOM.mini.classList.remove('hidden');
            document.getElementById('miniTitle').innerText = item.name;
            document.getElementById('miniSub').innerText = item.sub;
            document.getElementById('fullTitle').innerText = item.name;
            document.getElementById('fullSub').innerText = item.sub;
            
            const isFav = APP.state.favorites.some(f => f.url === item.url);
            document.getElementById('favIcon').className = isFav ? 'ph-fill ph-heart text-red-500' : 'ph ph-heart';
            
            const isDl = APP.state.downloads.some(d => d.url === item.url);
            document.getElementById('dlFullIcon').className = isDl ? 'ph-fill ph-check-circle text-green-500' : 'ph ph-download-simple';
            
            document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
            document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
        }

        function togglePlayState() {
            if (DOM.audio.paused) {
                DOM.audio.play();
                document.body.classList.add('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-pause';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-pause';
            } else {
                DOM.audio.pause();
                document.body.classList.remove('playing');
                document.getElementById('miniPlayIcon').className = 'ph-fill ph-play';
                document.getElementById('fullPlayIcon').className = 'ph-fill ph-play';
            }
        }

        DOM.audio.ontimeupdate = () => {
            const prog = (DOM.audio.currentTime / DOM.audio.duration) * 100 || 0;
            DOM.seekBar.value = prog;
            document.getElementById('miniProgress').style.width = prog + '%';
            document.getElementById('currentTime').innerText = formatTime(DOM.audio.currentTime);
            document.getElementById('totalTime').innerText = formatTime(DOM.audio.duration);
        };

        DOM.seekBar.oninput = () => {
            DOM.audio.currentTime = (DOM.seekBar.value / 100) * DOM.audio.duration;
        };

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function switchTab(tab) {
            APP.state.activeTab = tab;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            if (tab === 'library') renderLibrary();
        }

        function setLibraryTab(mode) {
            APP.state.libraryMode = mode;
            document.getElementById('tab-favs').className = mode === 'favs' ? 'flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold' : 'flex-1 py-3 rounded-xl text-xs font-bold';
            document.getElementById('tab-downloads').className = mode === 'downloads' ? 'flex-1 py-3 rounded-xl bg-indigo-600 text-xs font-bold' : 'flex-1 py-3 rounded-xl text-xs font-bold';
            renderLibrary();
        }

        function renderLibrary() {
            const list = APP.state.libraryMode === 'favs' ? APP.state.favorites : APP.state.downloads;
            const empty = document.getElementById('emptyLibrary');
            if (list.length === 0) {
                DOM.libList.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                DOM.libList.innerHTML = list.map(item => `
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl">
                        <div onclick='playTrack(${JSON.stringify(item)})' class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold truncate">${item.name}</h4>
                            <p class="text-[10px] text-indigo-400 font-bold">${item.sub}</p>
                        </div>
                        <button onclick="removeFromLibrary('${item.url}')" class="text-white/20 p-2"><i class="ph ph-trash"></i></button>
                    </div>
                `).join('');
            }
        }

        async function removeFromLibrary(url) {
            if (APP.state.libraryMode === 'favs') {
                APP.state.favorites = APP.state.favorites.filter(f => f.url !== url);
                localStorage.setItem('q_favs', JSON.stringify(APP.state.favorites));
            } else {
                const tx = APP.db.transaction('tracks', 'readwrite');
                tx.objectStore('tracks').delete(url);
                await syncDownloads();
            }
            renderLibrary();
            showToast("تم الحذف");
        }

        function toggleFavoriteCurrent() {
            if (!APP.state.current) return;
            const idx = APP.state.favorites.findIndex(f => f.url === APP.state.current.url);
            if (idx > -1) APP.state.favorites.splice(idx, 1);
            else APP.state.favorites.push(APP.state.current);
            localStorage.setItem('q_favs', JSON.stringify(APP.state.favorites));
            updateUI();
        }

        function downloadCurrent() {
            if (APP.state.current && APP.state.current.type === 'quran') {
                downloadTrack(APP.state.current);
            } else {
                showToast("لا يمكن تحميل البث المباشر");
            }
        }

        function openFullPlayer() { DOM.full.classList.add('active'); }
        function closeFullPlayer() { DOM.full.classList.remove('active'); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function shareLink() {
            showToast("تم نسخ رابط المشاركة");
        }

        window.onload = async () => {
            await initDB();
            startApp();
        };
    </script>
</body>
</html>
