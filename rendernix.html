<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenderNix Pro | Advanced CAD Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --accent: #3b82f6;
            --bg-dark: #050505;
            --panel: rgba(15, 15, 15, 0.85);
        }

        body {
            background-color: var(--bg-dark);
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .ui-container {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: flex;
            justify-content: space-between;
            padding: 24px;
        }

        .interactive { pointer-events: auto; }

        .node-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .node-item.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }

        .input-glow:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <!-- Left Wing: Scene Explorer -->
        <aside class="w-80 glass-panel rounded-3xl flex flex-col interactive overflow-hidden border border-white/10">
            <div class="p-6 bg-white/5 border-b border-white/5">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-3 h-3 bg-blue-500 rounded-sm"></div>
                    <h1 class="text-xs font-black uppercase tracking-[0.3em]">RenderNix <span class="text-blue-500">Pro</span></h1>
                </div>
                <p class="text-[9px] text-white/40 uppercase tracking-widest">Structural Analysis v4.2</p>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="px-6 py-4 flex justify-between items-center">
                    <span class="text-[10px] uppercase font-bold text-white/30 tracking-widest">Object Hierarchy</span>
                    <span id="nodeCount" class="mono text-[10px] text-blue-400 bg-blue-400/10 px-2 py-0.5 rounded">0</span>
                </div>
                
                <div id="nodeList" class="flex-1 overflow-y-auto px-4 pb-4 space-y-1">
                    <div class="text-[10px] text-center text-white/20 py-20 border border-dashed border-white/5 rounded-2xl">
                        NO MESH DATA DETECTED
                    </div>
                </div>

                <div class="p-4 bg-black/40 border-t border-white/5">
                    <div id="logs" class="h-32 overflow-y-auto text-[9px] mono text-white/30 space-y-1 p-2">
                        <div>>> System ready.</div>
                    </div>
                </div>
            </div>
            
            <div class="p-6 grid grid-cols-2 gap-2">
                <button onclick="clearScene()" class="py-2 text-[9px] font-bold uppercase rounded-lg border border-red-500/20 text-red-500 hover:bg-red-500/10 transition-colors">Wipe Data</button>
                <div class="relative group">
                    <button class="w-full py-2 text-[9px] font-bold uppercase rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">Export ↓</button>
                    <div class="absolute bottom-full left-0 w-full mb-2 hidden group-hover:block glass-panel rounded-xl border border-white/10 p-1">
                        <button onclick="exportData('glb')" class="w-full text-left p-2 text-[8px] uppercase hover:bg-white/5 rounded">GLB Mesh</button>
                        <button onclick="exportData('json')" class="w-full text-left p-2 text-[8px] uppercase hover:bg-white/5 rounded">JSON Spec</button>
                        <button onclick="exportData('png')" class="w-full text-left p-2 text-[8px] uppercase hover:bg-white/5 rounded">Capture</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Wing: Synthesis & Modification -->
        <aside class="w-[400px] flex flex-col gap-6 interactive">
            <!-- Global Synthesis -->
            <div class="glass-panel rounded-3xl p-8 flex flex-col border border-white/10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-xs font-black uppercase tracking-widest text-blue-400">Structural Synthesis</h2>
                        <p class="text-[9px] text-white/40 mt-1 uppercase">Advanced Shape Merging</p>
                    </div>
                    <div class="w-8 h-8 rounded-full border border-blue-500/30 flex items-center justify-center">
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                    </div>
                </div>

                <textarea id="mainPrompt" 
                    placeholder="Describe a complex architecture (e.g., A brutalist monolithic tower with glowing neon grooves and circular floating rings...)"
                    class="w-full h-36 bg-black/50 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none input-glow transition-all resize-none mono text-blue-100 mb-4"></textarea>

                <button onclick="generate('global')" id="genBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-lg shadow-blue-900/20 flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    Synthesize Blueprint
                </button>
            </div>

            <!-- Contextual Inspector -->
            <div id="editPanel" class="hidden glass-panel rounded-3xl p-8 border border-yellow-500/20 animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black uppercase tracking-widest text-yellow-500">Node Inspector</span>
                    <span id="targetName" class="mono text-[8px] bg-yellow-500/10 text-yellow-500 px-2 py-0.5 rounded">--</span>
                </div>
                <textarea id="editPrompt" 
                    placeholder="Evolve this specific component..."
                    class="w-full h-24 bg-black/50 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none input-glow transition-all resize-none mono text-yellow-100 mb-4"></textarea>
                <button onclick="generate('edit')" class="w-full py-3 bg-yellow-600 hover:bg-yellow-500 text-black rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition-all">
                    Evolve Selection
                </button>
            </div>

            <!-- Engine Loading -->
            <div id="loader" class="hidden glass-panel rounded-2xl p-4 shimmer border border-blue-500/30">
                <div class="flex items-center gap-4">
                    <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-blue-400">Processing Logic Layers...</span>
                </div>
            </div>
        </aside>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js",
                "three/examples/jsm/exporters/GLTFExporter.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/exporters/GLTFExporter.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/examples/jsm/exporters/GLTFExporter.js';

        let scene, camera, renderer, controls;
        let selectedNodeId = null;
        let sceneData = []; 
        const objectsGroup = new THREE.Group();
        const apiKey = "ak_2BU76L6db5Zx1kS6MS4ys1uv1oR3E";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(40, 30, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            
            const spot1 = new THREE.SpotLight(0xffffff, 1.5);
            spot1.position.set(100, 100, 100);
            scene.add(spot1);

            const rim1 = new THREE.PointLight(0x3b82f6, 5, 100);
            rim1.position.set(-40, 20, -40);
            scene.add(rim1);

            const rim2 = new THREE.PointLight(0xf59e0b, 5, 100);
            rim2.position.set(40, -20, 40);
            scene.add(rim2);

            // Grid
            const grid = new THREE.GridHelper(200, 50, 0x222222, 0x111111);
            scene.add(grid);

            scene.add(objectsGroup);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addLog = (text, type = 'system') => {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const color = type === 'error' ? 'text-red-400' : (type === 'ai' ? 'text-blue-400' : 'text-white/20');
            div.className = color;
            div.innerText = `>> ${text}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        };

        window.clearScene = () => {
            sceneData = [];
            selectedNodeId = null;
            document.getElementById('editPanel').classList.add('hidden');
            renderAll();
            addLog("Memory Purged.");
        };

        window.exportData = (type) => {
            if (sceneData.length === 0 && type !== 'png') return;
            const filename = `RNX_PRO_${Date.now()}`;

            if (type === 'json') {
                const blob = new Blob([JSON.stringify(sceneData, null, 2)], { type: 'application/json' });
                save(blob, `${filename}.json`);
            } else if (type === 'png') {
                const url = renderer.domElement.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}.png`;
                a.click();
            } else if (type === 'glb') {
                const exporter = new GLTFExporter();
                exporter.parse(objectsGroup, (result) => {
                    const blob = new Blob([JSON.stringify(result)], { type: 'application/json' });
                    save(blob, `${filename}.glb`);
                });
            }
        };

        function save(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
        }

        window.generate = async (mode) => {
            const input = mode === 'global' ? document.getElementById('mainPrompt') : document.getElementById('editPrompt');
            const prompt = input.value.trim();
            if (!prompt) return;

            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            addLog(`Synthesizing Complex Mesh Data...`, 'system');

            const systemPrompt = `You are a professional 3D Architectural Synthesizer. 
            Your goal is to break down a prompt into a complex MERGED geometry structure.
            Return ONLY a JSON array of objects.
            Primitives: box, sphere, cylinder, torus, cone, ring.
            Rules:
            1. Group objects to form a single cohesive structure.
            2. Use 15 to 40 shapes for complexity.
            3. Schema: {"id": string, "type": string, "pos": [x,y,z], "size": [w,h,d], "color": hex, "opacity": 0..1, "metal": 0..1, "glow": 0..5}
            4. Make it look professional: Use accent colors and emitters (glow > 0).`;

            try {
                const response = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: mode === 'edit' ? `Current Structure: ${JSON.stringify(sceneData)}. Instruction for ${selectedNodeId}: ${prompt}` : prompt }
                        ],
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                const match = content.match(/\[[\s\S]*\]/);
                
                if (match) {
                    sceneData = JSON.parse(match[0]);
                    renderAll();
                    addLog(`Synthesis Complete. ${sceneData.length} Structural Nodes mapped.`, 'ai');
                    if (mode === 'global') input.value = '';
                }
            } catch (err) {
                addLog(`Engine Failure: ${err.message}`, 'error');
            } finally {
                loader.classList.add('hidden');
            }
        };

        function renderAll() {
            while(objectsGroup.children.length > 0) {
                const obj = objectsGroup.children[0];
                obj.geometry.dispose();
                obj.material.dispose();
                objectsGroup.remove(obj);
            }

            const list = document.getElementById('nodeList');
            list.innerHTML = '';
            document.getElementById('nodeCount').innerText = sceneData.length;

            sceneData.forEach((item, idx) => {
                if(!item.id) item.id = `node_${idx}`;
                const s = item.size || [1,1,1];
                let geo;
                switch(item.type) {
                    case 'sphere': geo = new THREE.SphereGeometry(s[0], 32, 32); break;
                    case 'cylinder': geo = new THREE.CylinderGeometry(s[0], s[1]||s[0], s[2], 32); break;
                    case 'torus': geo = new THREE.TorusGeometry(s[0], s[1]||0.2, 16, 100); break;
                    case 'cone': geo = new THREE.ConeGeometry(s[0], s[1], 32); break;
                    case 'ring': geo = new THREE.TorusGeometry(s[0], 0.05, 8, 50); break;
                    default: geo = new THREE.BoxGeometry(s[0], s[1], s[2]);
                }

                const isSel = selectedNodeId === item.id;
                const mat = new THREE.MeshStandardMaterial({
                    color: item.color || '#3b82f6',
                    metalness: item.metal || 0.8,
                    roughness: 0.2,
                    transparent: true,
                    opacity: item.opacity || 1,
                    emissive: isSel ? '#ffffff' : (item.color || '#000000'),
                    emissiveIntensity: isSel ? 1 : (item.glow || 0)
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(...(item.pos || [0,0,0]));
                objectsGroup.add(mesh);

                const el = document.createElement('div');
                el.className = `node-item p-3 rounded-xl flex justify-between items-center interactive group ${isSel ? 'selected' : 'hover:bg-white/5'}`;
                el.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full" style="background:${item.color}"></div>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">${item.type}</span>
                    </div>
                    <span class="mono text-[8px] opacity-20 group-hover:opacity-100">${item.id}</span>
                `;
                el.onclick = () => {
                    selectedNodeId = item.id;
                    document.getElementById('targetName').innerText = item.id.toUpperCase();
                    document.getElementById('editPanel').classList.remove('hidden');
                    renderAll();
                };
                list.appendChild(el);
            });
        }

        init();
    </script>
</body>
</html>
