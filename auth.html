<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-purple: #9333ea;
            --brand-purple-light: #a855f7;
            --brand-black: #09090b;
            --brand-white: #fafafa;
        }

        /* --- SYSTEM-STYLE PURPLE CURSOR --- */
        * { cursor: none !important; }

        #cursor-container {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10000;
            will-change: transform;
        }

        /* Custom SVG Arrow to match system pointer exactly */
        .custom-pointer {
            width: 24px;
            height: 24px;
            fill: var(--brand-purple);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            transition: transform 0.1s ease, fill 0.3s ease;
        }

        /* Cursor States */
        .cursor-active .custom-pointer { 
            transform: scale(0.9);
            fill: var(--brand-purple-light);
        }
        
        .cursor-hovering .custom-pointer { 
            fill: #fff;
            filter: drop-shadow(0 0 8px var(--brand-purple));
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--brand-black); 
            color: var(--brand-white); 
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle Grid Overlay */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(147, 51, 234, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(147, 51, 234, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Ambient Background Glows */
        .glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 2;
            filter: blur(80px);
            pointer-events: none;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .glass-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
            width: 100%;
            max-width: 420px;
            transition: border-color 0.5s ease;
        }

        .glass-card:hover { border-color: rgba(147, 51, 234, 0.3); }

        .input-group { position: relative; margin-bottom: 1rem; }

        .input-field {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            padding-left: 2.75rem;
            font-size: 0.875rem;
        }

        .input-field:focus {
            border-color: var(--brand-purple);
            background: rgba(147, 51, 234, 0.03);
            outline: none;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .input-field:focus + .input-icon { color: var(--brand-purple-light); }

        .btn-primary {
            background: linear-gradient(135deg, #9333ea 0%, #7e22ce 100%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            color: white;
            letter-spacing: 0.025em;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(147, 51, 234, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            color: #d4d4d8;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(147, 51, 234, 0.4);
            color: white;
        }

        .signup-only { 
            display: none; 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo-container {
            position: relative;
            width: 56px;
            height: 56px;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            background: var(--brand-purple);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(147, 51, 234, 0.4);
            position: relative;
            z-index: 2;
        }

        .brand-logo-glow {
            position: absolute;
            inset: -4px;
            background: var(--brand-purple);
            filter: blur(12px);
            opacity: 0.4;
            z-index: 1;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #3f3f46;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow" style="top: -10%; right: -10%;"></div>
    <div class="glow" style="bottom: -10%; left: -10%;"></div>

    <!-- System-style Purple Cursor -->
    <div id="cursor-container">
        <svg class="custom-pointer" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 2l12 11.2-5.8.1 3.3 5.7-2.1 1.2-3.3-5.7-4.1 3.5V2z"/>
        </svg>
    </div>

    <div class="main-wrapper">
        <div class="w-full max-w-[420px]">
            <div class="glass-card rounded-[2rem] p-8 md:p-10">
                <!-- Branding -->
                <div class="flex flex-col items-center mb-8">
                    <div class="brand-logo-container">
                        <div class="brand-logo">
                            <i class="fa-solid fa-code text-white text-2xl"></i>
                        </div>
                        <div class="brand-logo-glow"></div>
                    </div>
                    <h1 id="auth-title" class="text-2xl font-bold tracking-tight text-white text-center">Codenix AI Studio</h1>
                    <p id="auth-subtitle" class="text-zinc-500 text-sm mt-1.5 font-medium">Elevating intelligence, together.</p>
                </div>

                <!-- Social Auth -->
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" id="google-btn" class="btn-secondary py-3 px-4 rounded-xl flex items-center justify-center text-[13px] font-semibold interactive">
                        <svg class="mr-2" width="18" height="18" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Google
                    </button>

                    <button type="button" id="github-btn" class="btn-secondary py-3 px-4 rounded-xl flex items-center justify-center text-[13px] font-semibold interactive">
                        <i class="fa-brands fa-github text-lg mr-2"></i>
                        GitHub
                    </button>
                </div>

                <div class="divider">or continue with email</div>

                <!-- Form -->
                <form id="auth-form" class="space-y-3.5">
                    <div class="signup-only">
                        <div class="input-group">
                            <input type="text" id="fullname" class="input-field w-full py-3.5 rounded-xl interactive" placeholder="Full Name">
                            <i class="fa-solid fa-user input-icon"></i>
                        </div>
                        <div class="input-group">
                            <input type="text" id="username" class="input-field w-full py-3.5 rounded-xl interactive" placeholder="Username">
                            <i class="fa-solid fa-at input-icon"></i>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <input type="email" id="email" required class="input-field w-full py-3.5 rounded-xl interactive" placeholder="Email Address">
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" required class="input-field w-full py-3.5 rounded-xl interactive" placeholder="Password">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <div id="message-box" class="hidden p-3.5 rounded-xl text-[11px] font-bold uppercase tracking-wider text-center"></div>

                    <button type="submit" id="submit-btn" class="btn-primary w-full py-4 rounded-xl font-bold text-sm mt-2 interactive">
                        Continue to Studio
                    </button>
                </form>

                <!-- Toggle -->
                <div class="mt-8 text-center">
                    <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest">
                        <span id="toggle-text">New to the studio?</span>
                        <button id="toggle-auth" class="text-purple-400 ml-1.5 hover:text-purple-300 transition-colors interactive">Create Account</button>
                    </p>
                </div>
            </div>
            
            <p class="text-center mt-8 text-zinc-600 text-[9px] font-bold uppercase tracking-[0.25em]">
                Codenix AI Studio &bull; Precision Engineered &bull; 2024
            </p>
        </div>
    </div>

    <script>
        // --- HIGH-PERFORMANCE SYSTEM-STYLE CURSOR ---
        const cursorContainer = document.getElementById('cursor-container');
        let mouseX = 0, mouseY = 0, currentX = 0, currentY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            // Tight interpolation for a responsive "real cursor" feel
            currentX += (mouseX - currentX) * 0.4;
            currentY += (mouseY - currentY) * 0.4;
            cursorContainer.style.transform = `translate(${currentX}px, ${currentY}px)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.addEventListener('mousedown', () => document.body.classList.add('cursor-active'));
        document.addEventListener('mouseup', () => document.body.classList.remove('cursor-active'));

        const interactives = document.querySelectorAll('.interactive, button, input, a');
        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hovering'));
        });

        // --- AUTH LOGIC ---
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');
        const githubBtn = document.getElementById('github-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const signupFields = document.querySelectorAll('.signup-only');
        const msgBox = document.getElementById('message-box');
        let isLogin = true;

        // FIXED: Mobile redirection logic to prevent double domains
        const getSafeRedirectUrl = () => {
            const params = new URLSearchParams(window.location.search);
            const redirectParam = params.get('redirect');
            if (!redirectParam) return window.location.origin + '/portal.html';
            
            // If it's already a full URL, return it, otherwise prepend origin
            return redirectParam.startsWith('http') ? redirectParam : window.location.origin + (redirectParam.startsWith('/') ? '' : '/') + redirectParam;
        };

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Codenix AI Studio' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLogin ? 'Elevating intelligence, together.' : 'Begin your journey with Codenix';
            submitBtn.innerText = isLogin ? 'Continue to Studio' : 'Finalize Registration';
            document.getElementById('toggle-text').innerText = isLogin ? "New to the studio?" : "Already a member?";
            toggleBtn.innerText = isLogin ? 'Create Account' : 'Sign In';
            signupFields.forEach(f => f.style.display = isLogin ? 'none' : 'block');
            msgBox.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullname').value;
            const username = document.getElementById('username').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                let result;
                if (isLogin) {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabaseClient.auth.signUp({ 
                        email, password,
                        options: { 
                            data: { full_name: fullName, username: username },
                            emailRedirectTo: getSafeRedirectUrl()
                        }
                    });
                }

                if (result.error) throw result.error;
                
                if (!isLogin && result.data.user && result.data.session === null) {
                    showMessage("Verification email sent to your inbox.", "success");
                } else {
                    window.location.href = getSafeRedirectUrl();
                }
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? 'Continue to Studio' : 'Finalize Registration';
            }
        });

        async function socialLogin(provider) {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: getSafeRedirectUrl() }
                });
                if (error) throw error;
            } catch (err) {
                showMessage(err.message, "error");
            }
        }

        googleBtn.addEventListener('click', () => socialLogin('google'));
        githubBtn.addEventListener('click', () => socialLogin('github'));

        function showMessage(text, type) {
            msgBox.innerText = text;
            msgBox.className = `p-3.5 rounded-xl text-[11px] font-bold uppercase tracking-wider text-center mt-4 ${
                type === "success" ? "bg-purple-500/10 text-purple-400" : "bg-red-500/10 text-red-400"
            }`;
            msgBox.classList.remove('hidden');
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = getSafeRedirectUrl();
        }
        checkSession();
    </script>
</body>
</html>
