<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-purple: #9333ea;
            --brand-purple-light: #a855f7;
            --brand-black: #09090b;
            --brand-white: #fafafa;
        }

        /* Hide default cursor globally */
        * {
            cursor: none !important;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--brand-black); 
            color: var(--brand-white); 
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Custom Professional Triangle Cursor */
        #custom-cursor {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid var(--brand-purple);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) rotate(-35deg);
            transition: border-bottom-color 0.2s ease, transform 0.1s ease-out;
            filter: drop-shadow(1px 0 0 black) drop-shadow(-1px 0 0 black) drop-shadow(0 1px 0 black) drop-shadow(0 -1px 0 black);
        }

        .cursor-hover {
            transform: translate(-50%, -50%) rotate(-35deg) scale(1.3) !important;
            border-bottom-color: var(--brand-purple-light) !important;
        }

        .glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(80px);
            pointer-events: none;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(168, 85, 247, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 440px;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(168, 85, 247, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            padding-left: 2.75rem;
        }

        .input-field:focus {
            border-color: var(--brand-purple);
            background: rgba(147, 51, 234, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(168, 85, 247, 0.5);
            transition: color 0.3s ease;
        }

        .btn-primary {
            background: var(--brand-purple);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--brand-purple-light);
            box-shadow: 0 0 25px rgba(147, 51, 234, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(168, 85, 247, 0.1);
            transition: all 0.3s ease;
            color: white;
        }

        .signup-only, .forgot-only, .update-only { 
            display: none; 
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--brand-purple);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(147, 51, 234, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #52525b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(168, 85, 247, 0.1);
        }

        .divider:not(:empty)::before { margin-right: .75rem; }
        .divider:not(:empty)::after { margin-left: .75rem; }
        
        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div class="glow" style="top: -10%; right: -10%;"></div>
    <div class="glow" style="bottom: -10%; left: -10%;"></div>

    <div class="main-wrapper">
        <div class="w-full max-w-[440px]">
            <div class="glass-card rounded-[2.5rem] p-8 md:p-12">
                <div class="flex flex-col items-center mb-8">
                    <div class="brand-logo mb-6">
                        <i class="fa-solid fa-code text-white text-2xl"></i>
                    </div>
                    <h1 id="auth-title" class="text-2xl font-black tracking-tighter text-white text-center">Codenix AI Studio</h1>
                    <p id="auth-subtitle" class="text-zinc-500 text-sm mt-2 font-medium">Sign in to your AI workspace</p>
                </div>

                <div id="social-auth-section" class="space-y-3">
                    <button type="button" id="google-btn" class="btn-secondary w-full py-2.5 px-4 rounded-2xl flex items-center justify-center text-sm font-bold group interactive">
                        <div class="social-icon-wrapper group-hover:scale-110 transition-transform duration-300 mr-3">
                             <svg width="20" height="20" viewBox="0 0 48 48">
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            </svg>
                        </div>
                        Continue with Google
                    </button>
                    <button type="button" id="github-btn" class="btn-secondary w-full py-2.5 px-4 rounded-2xl flex items-center justify-center text-sm font-bold group interactive">
                        <i class="fa-brands fa-github text-lg mr-3"></i> Continue with GitHub
                    </button>
                </div>

                <div id="email-divider" class="divider">or use email</div>

                <form id="auth-form" class="space-y-4">
                    <!-- Signup Only Fields -->
                    <div class="signup-only">
                        <div class="input-group">
                            <input type="text" id="fullname" class="input-field w-full py-4 rounded-2xl text-sm interactive" placeholder="Full Name">
                            <i class="fa-solid fa-user input-icon"></i>
                        </div>
                        <div class="input-group">
                            <input type="text" id="username" class="input-field w-full py-4 rounded-2xl text-sm interactive" placeholder="Username">
                            <i class="fa-solid fa-at input-icon"></i>
                        </div>
                    </div>
                    
                    <!-- Email Group (Hidden in Update Mode) -->
                    <div class="input-group email-group">
                        <input type="email" id="email" class="input-field w-full py-4 rounded-2xl text-sm interactive" placeholder="Developer Email">
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>

                    <!-- Password Group -->
                    <div id="password-group" class="input-group">
                        <input type="password" id="password" class="input-field w-full py-4 rounded-2xl text-sm interactive" placeholder="Password">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <div class="flex justify-end mt-2 forgot-trigger-wrapper">
                            <button type="button" id="forgot-password-trigger" class="text-[10px] font-bold text-zinc-500 hover:text-purple-400 transition-colors uppercase tracking-widest interactive">Forgot Password?</button>
                        </div>
                    </div>

                    <!-- Update Only Field (Confirm New Password) -->
                    <div class="update-only">
                        <div class="input-group">
                            <input type="password" id="confirm-password" class="input-field w-full py-4 rounded-2xl text-sm interactive" placeholder="Confirm New Password">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                        </div>
                    </div>

                    <div id="message-box" class="hidden p-4 rounded-2xl text-xs font-bold uppercase tracking-wider text-center"></div>

                    <button type="submit" id="submit-btn" class="btn-primary w-full py-4 rounded-2xl font-black text-sm mt-4 interactive">
                        Initialize Session
                    </button>
                </form>

                <div id="toggle-wrapper" class="mt-8 pt-8 border-t border-zinc-800/50 text-center">
                    <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest">
                        <span id="toggle-text">New to the studio?</span>
                        <button id="toggle-auth" class="text-purple-500 ml-2 hover:underline interactive">Create Account</button>
                    </p>
                </div>
            </div>
            <p class="text-center mt-8 text-zinc-600 text-[10px] font-bold uppercase tracking-[0.2em] pb-8">
                &copy; 2024 Codenix AI Studio &bull; Developer Portal
            </p>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const updateInteractiveListeners = () => {
            document.querySelectorAll('.interactive, button, input, a, [role="button"]').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
            });
        };
        updateInteractiveListeners();

        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');
        const githubBtn = document.getElementById('github-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const forgotBtn = document.getElementById('forgot-password-trigger');
        const signupFields = document.querySelectorAll('.signup-only');
        const updateFields = document.querySelectorAll('.update-only');
        const passwordGroup = document.getElementById('password-group');
        const socialAuthSection = document.getElementById('social-auth-section');
        const emailDivider = document.getElementById('email-divider');
        const msgBox = document.getElementById('message-box');
        const emailGroup = document.querySelector('.email-group');
        const toggleWrapper = document.getElementById('toggle-wrapper');
        const forgotWrapper = document.querySelector('.forgot-trigger-wrapper');
        
        // Input elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const fullNameInput = document.getElementById('fullname');
        const usernameInput = document.getElementById('username');

        let mode = 'login';

        const checkRecoveryMode = () => {
            const hash = window.location.hash;
            if (hash && (hash.includes('type=recovery') || hash.includes('access_token='))) {
                mode = 'update';
                updateUI();
            }
        };

        const getRedirectUrl = () => {
            const params = new URLSearchParams(window.location.search);
            const redirectParam = params.get('redirect');
            if (redirectParam) return redirectParam;
            let origin = window.location.origin;
            if (origin.endsWith('/')) origin = origin.slice(0, -1);
            return `${origin}/portal.html`;
        };

        const updateUI = () => {
            msgBox.classList.add('hidden');
            
            // Default states for all elements
            signupFields.forEach(f => f.style.display = 'none');
            updateFields.forEach(f => f.style.display = 'none');
            passwordGroup.style.display = 'block';
            socialAuthSection.style.display = 'block';
            emailDivider.style.display = 'flex';
            emailGroup.style.display = 'block';
            toggleWrapper.style.display = 'block';
            forgotWrapper.style.display = 'flex';

            // Reset required attributes to prevent "not focusable" errors
            emailInput.required = false;
            passwordInput.required = false;
            confirmPasswordInput.required = false;
            fullNameInput.required = false;
            usernameInput.required = false;

            if (mode === 'login') {
                document.getElementById('auth-title').innerText = 'Codenix AI Studio';
                document.getElementById('auth-subtitle').innerText = 'Sign in to your AI workspace';
                submitBtn.innerText = 'Initialize Session';
                document.getElementById('toggle-text').innerText = "New to the studio?";
                toggleBtn.innerText = 'Create Account';
                emailInput.required = true;
                passwordInput.required = true;
                passwordInput.placeholder = 'Password';
            } else if (mode === 'signup') {
                document.getElementById('auth-title').innerText = 'Create Account';
                document.getElementById('auth-subtitle').innerText = 'Begin your journey with Codenix';
                submitBtn.innerText = 'Register Profile';
                document.getElementById('toggle-text').innerText = "Already a member?";
                toggleBtn.innerText = 'Sign In';
                signupFields.forEach(f => f.style.display = 'block');
                emailInput.required = true;
                passwordInput.required = true;
                fullNameInput.required = true;
                usernameInput.required = true;
                passwordInput.placeholder = 'Password';
            } else if (mode === 'forgot') {
                document.getElementById('auth-title').innerText = 'Reset Access';
                document.getElementById('auth-subtitle').innerText = 'Enter email to recover account';
                submitBtn.innerText = 'Send Recovery Link';
                document.getElementById('toggle-text').innerText = "Remembered it?";
                toggleBtn.innerText = 'Sign In';
                passwordGroup.style.display = 'none';
                socialAuthSection.style.display = 'none';
                emailDivider.style.display = 'none';
                emailInput.required = true;
            } else if (mode === 'update') {
                document.getElementById('auth-title').innerText = 'Update Password';
                document.getElementById('auth-subtitle').innerText = 'Set a new secure password for your account';
                submitBtn.innerText = 'Update Credentials';
                emailGroup.style.display = 'none';
                socialAuthSection.style.display = 'none';
                emailDivider.style.display = 'none';
                toggleWrapper.style.display = 'none';
                forgotWrapper.style.display = 'none';
                updateFields.forEach(f => f.style.display = 'block');
                passwordInput.placeholder = 'New Password';
                passwordInput.required = true;
                confirmPasswordInput.required = true;
            }
            updateInteractiveListeners();
        };

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            mode = (mode === 'signup') ? 'login' : 'signup';
            updateUI();
        });

        forgotBtn.addEventListener('click', (e) => {
            e.preventDefault();
            mode = 'forgot';
            updateUI();
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (mode === 'update' && password !== confirmPassword) {
                showMessage("Passwords do not match", "error");
                return;
            }

            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

            try {
                let result;
                if (mode === 'login') {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else if (mode === 'signup') {
                    result = await supabaseClient.auth.signUp({ 
                        email, password,
                        options: { 
                            data: { full_name: fullNameInput.value, username: usernameInput.value },
                            emailRedirectTo: window.location.href
                        }
                    });
                    if (!result.error) showMessage("Verification email sent!", "success");
                } else if (mode === 'forgot') {
                    result = await supabaseClient.auth.resetPasswordForEmail(email, { 
                        redirectTo: window.location.href
                    });
                    if (!result.error) showMessage("Recovery link sent!", "success");
                } else if (mode === 'update') {
                    result = await supabaseClient.auth.updateUser({ password });
                    if (!result.error) {
                        showMessage("Password updated! Redirecting...", "success");
                        setTimeout(() => window.location.href = getRedirectUrl(), 2000);
                        return;
                    }
                }
                
                if (result?.error) throw result.error;

                if (mode === 'login' || (mode === 'signup' && result.data.session)) {
                    window.location.href = getRedirectUrl();
                }
            } catch (err) {
                showMessage(err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        });

        async function socialLogin(provider) {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: getRedirectUrl() }
                });
                if (error) throw error;
            } catch (err) {
                showMessage(err.message, "error");
            }
        }

        googleBtn.addEventListener('click', () => socialLogin('google'));
        githubBtn.addEventListener('click', () => socialLogin('github'));

        function showMessage(text, type) {
            msgBox.innerText = text;
            msgBox.className = `p-4 rounded-2xl text-xs font-bold uppercase tracking-wider text-center mt-4 ${type === 'success' ? 'bg-purple-500/10 text-purple-400' : 'bg-red-500/10 text-red-400'}`;
            msgBox.classList.remove('hidden');
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && mode !== 'update') {
                window.location.href = getRedirectUrl();
            }
        }

        // Initialize
        checkRecoveryMode();
        checkSession();
        updateUI();
    </script>
</body>
</html>
