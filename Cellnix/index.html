<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellnix - Auto-Calculating Spreadsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <style>
        .cell { border: 1px solid #e2e8f0; min-width: 120px; height: 32px; padding: 4px 8px; outline: none; transition: border 0.1s; font-family: monospace; }
        .cell:focus { border: 2px solid #4f46e5; z-index: 10; }
        .grid-container { display: grid; grid-template-columns: 40px repeat(26, 120px); }
        .header-cell { background: #f8fafc; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; color: #64748b; }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden bg-white text-slate-900 font-sans">

    <nav class="h-14 border-b flex items-center justify-between px-4 bg-white z-20 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <i data-lucide="layout-grid"></i> Cellnix
            </h1>
            <div class="hidden md:flex gap-1 border-l pl-4 ml-2">
                <button class="px-3 py-1 hover:bg-slate-100 rounded text-sm font-medium">File</button>
                <button class="px-3 py-1 hover:bg-slate-100 rounded text-sm font-medium">Edit</button>
                <button class="px-3 py-1 hover:bg-slate-100 rounded text-sm font-medium">Data</button>
            </div>
        </div>
        <div class="text-xs text-slate-400 font-medium">Auto-Calculation Enabled</div>
    </nav>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="h-10 border-b flex items-center gap-2 px-2 bg-slate-50 shrink-0">
            <div class="font-bold text-slate-400 w-8 text-center text-xs">fx</div>
            <input id="formulaInput" type="text" readonly class="flex-1 border-0 bg-transparent h-7 text-sm outline-none text-slate-500" placeholder="Select a cell to see formula">
        </div>

        <div id="gridWrapper" class="flex-1 overflow-auto bg-slate-100 p-2">
            <div id="grid" class="grid-container w-max"></div>
        </div>
    </main>

    <script>
        let state = {};
        const rows = 50;
        const cols = 26;

        function getCellVal(id) {
            const raw = state[id] || "";
            if (raw.startsWith('=')) return evaluateFormula(raw.substring(1));
            return raw;
        }

        // Simple formula evaluator
        function evaluateFormula(formula) {
            try {
                // 1. SUM(A1:A5)
                if (formula.startsWith('SUM(')) {
                    const match = formula.match(/SUM\(([A-Z][0-9]+):([A-Z][0-9]+)\)/);
                    if (match) {
                        const start = match[1];
                        const end = match[2];
                        // Simplistic range summation
                        return "Sum Range Not Implemented Yet"; 
                    }
                }
                
                // 2. Simple Math like A1+B1
                let expression = formula;
                const refs = expression.match(/[A-Z][0-9]+/g);
                if (refs) {
                    refs.forEach(ref => {
                        const val = parseFloat(state[ref] || 0);
                        expression = expression.replace(ref, val);
                    });
                }
                // Calculate
                return eval(expression);
            } catch (e) {
                return "#ERR";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // Corner & Col Headers
            grid.appendChild(document.createElement('div'));
            for (let i = 0; i < cols; i++) grid.appendChild(createHeader(String.fromCharCode(65 + i)));

            // Cells
            for (let r = 1; r <= rows; r++) {
                grid.appendChild(createHeader(r));
                for (let c = 0; c < cols; c++) {
                    const id = String.fromCharCode(65 + c) + r;
                    const cell = document.createElement('input');
                    cell.className = 'cell bg-white';
                    cell.id = id;
                    cell.value = state[id] || '';
                    
                    cell.onfocus = () => { document.getElementById('formulaInput').value = state[id] || ''; };
                    cell.onblur = (e) => { 
                        state[id] = e.target.value; 
                        recalculate();
                    };
                    grid.appendChild(cell);
                }
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function createHeader(content) {
            const div = document.createElement('div');
            div.className = 'header-cell';
            div.innerText = content;
            return div;
        }

        function recalculate() {
            Object.keys(state).forEach(id => {
                const val = state[id];
                if (val && val.startsWith('=')) {
                    const el = document.getElementById(id);
                    if (el) el.value = evaluateFormula(val.substring(1));
                }
            });
        }

        window.onload = () => {
            renderGrid();
        };
    </script>
</body>
</html>
