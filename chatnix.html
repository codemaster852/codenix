<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1e33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ChatNIx · Bluetooth P2P</title>
  <link rel="manifest" href="data:application/manifest+json,
  {
    %22name%22: %22ChatNIx%22,
    %22short_name%22: %22ChatNIx%22,
    %22start_url%22: %22.%22,
    %22display%22: %22standalone%22,
    %22background_color%22: %22#0b1e33%22,
    %22theme_color%22: %22#0b1e33%22,
    %22icons%22: [
      {
        %22src%22: %22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300c8ff'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E⬡%3C/text%3E%3C/svg%3E%22,
        %22sizes%22: %22192x192%22,
        %22type%22: %22image/svg+xml%22
      }
    ]
  }">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0a1929 0%, #0d2b45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 800px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 42px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,200,255,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .header {
      padding: 16px 20px;
      background: rgba(10, 25, 41, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,200,255,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .logo {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #00c8ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bluetooth-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,200,255,0.15);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0e9ff;
      cursor: pointer;
      transition: 0.2s;
    }
    .bluetooth-indicator:hover { background: rgba(0,200,255,0.25); }
    .bluetooth-dot {
      width: 10px;
      height: 10px;
      background: #00ffaa;
      border-radius: 50%;
      box-shadow: 0 0 12px #00ffaa;
    }
    .bluetooth-dot.offline {
      background: #ff5e7e;
      box-shadow: 0 0 8px #ff3b5c;
    }
    .connected-peer {
      font-size: 0.8rem;
      background: rgba(123,44,191,0.6);
      padding: 4px 12px;
      border-radius: 20px;
      margin-left: 6px;
    }
    .device-list-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 42px;
    }
    .device-panel {
      background: #0f2137;
      width: 85%;
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(0,200,255,0.4);
      color: white;
    }
    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }
    .device-item:hover { border-color: #00c8ff; background: rgba(0,200,255,0.15); }
    .device-name { font-weight: 600; }
    .scan-btn {
      background: #00c8ff;
      border: none;
      border-radius: 30px;
      padding: 10px 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(0,0,0,0.2);
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      word-break: break-word;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      color: #f0f6ff;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
      align-self: flex-start;
    }
    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #0066cc, #4b0082);
      border: 1px solid rgba(0,200,255,0.5);
    }
    .message img, .message video {
      max-width: 100%;
      border-radius: 16px;
      margin: 6px 0;
    }
    .message audio { width: 100%; margin: 4px 0; }
    .voice-call-bar {
      background: rgba(123, 44, 191, 0.7);
      margin: 8px 14px;
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: bold;
      backdrop-filter: blur(15px);
      border: 1px solid #bb86fc;
    }
    .call-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
    }
    .end-call { background: #e53e3e; color: white; }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.15);
      flex-wrap: wrap;
      justify-content: center;
    }
    .icon-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #d0e4ff;
      font-size: 1.3rem;
      padding: 10px 14px;
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .input-row {
      display: flex;
      padding: 10px 14px;
      gap: 8px;
      background: rgba(0,0,0,0.6);
    }
    #messageInput {
      flex:1;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 12px 18px;
      color: white;
      outline: none;
    }
    .send-btn {
      background: #00c8ff;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.3rem;
    }
    .hidden-file-input { display: none; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="header">
    <div class="logo">⛓️‍💥 ChatNIx</div>
    <div class="bluetooth-indicator" id="btStatus">
      <span class="bluetooth-dot" id="btDot"></span>
      <span id="btText">Tap to select</span>
      <span class="connected-peer" id="connectedName" style="display:none;"></span>
    </div>
  </div>

  <!-- Device selection panel (hidden by default) -->
  <div class="device-list-overlay" id="deviceOverlay">
    <div class="device-panel">
      <h3 style="margin-bottom:12px;">📡 Nearby Bluetooth devices</h3>
      <div id="deviceListContainer">
        <div class="device-item" style="opacity:0.7;">🔍 Scanning...</div>
      </div>
      <button class="scan-btn" id="refreshScanBtn">🔄 Scan again</button>
      <button style="background:transparent; border:1px solid gray; color:white; margin-top:8px; width:100%; border-radius:20px; padding:8px;" id="closeOverlayBtn">Cancel</button>
    </div>
  </div>

  <div id="voiceCallPanel" style="display: none;" class="voice-call-bar">
    <span>🎙️ Voice call with <span id="callPeerName"></span></span>
    <div>
      <button class="call-btn" id="muteToggleBtn">🔇</button>
      <button class="call-btn end-call" id="endCallBtn">📴</button>
    </div>
  </div>

  <div class="chat-area" id="chatMessages">
    <div class="message">👇 Tap Bluetooth icon to choose a contact.</div>
  </div>

  <div class="toolbar">
    <button class="icon-btn" id="shareImageBtn">🖼️ Image</button>
    <button class="icon-btn" id="shareVoiceBtn">🎤 Voice</button>
    <button class="icon-btn" id="shareAppBtn">📦 App</button>
    <button class="icon-btn" id="startVoiceCallBtn">📞 Call</button>
  </div>

  <div class="input-row">
    <input type="text" id="messageInput" placeholder="Type message..." autocomplete="off" />
    <button class="send-btn" id="sendTextBtn">➤</button>
  </div>
  <input type="file" id="imageFileInput" class="hidden-file-input" accept="image/*" />
  <input type="file" id="voiceFileInput" class="hidden-file-input" accept="audio/*" />
  <input type="file" id="appFileInput" class="hidden-file-input" accept=".apk,.aab,.zip,application/vnd.android.package-archive" />
</div>

<script>
  (function() {
    // ----- PWA install prompt -----
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
    });

    // ----- State -----
    const btDot = document.getElementById('btDot');
    const btText = document.getElementById('btText');
    const connectedNameSpan = document.getElementById('connectedName');
    const deviceOverlay = document.getElementById('deviceOverlay');
    const deviceListContainer = document.getElementById('deviceListContainer');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const voicePanel = document.getElementById('voiceCallPanel');
    const callPeerNameSpan = document.getElementById('callPeerName');

    let selectedPeer = null; // { name, id }
    let bluetoothActive = false;
    let callActive = false;
    let muted = false;

    // Mock device database
    const mockDevices = [
      { name: "Galaxy S24 · Alex", id: "bt_galaxy_s24" },
      { name: "Pixel 9 · Jordan", id: "bt_pixel_9" },
      { name: "iPhone 16 (BLE)", id: "bt_iphone_ble" },
      { name: "OnePlus 13 · Sam", id: "bt_oneplus" },
      { name: "Tablet · Taylor", id: "bt_tablet" }
    ];

    function updateBluetoothUI() {
      if (selectedPeer) {
        btDot.className = 'bluetooth-dot';
        btText.textContent = 'Connected';
        connectedNameSpan.textContent = selectedPeer.name;
        connectedNameSpan.style.display = 'inline';
      } else {
        btDot.className = 'bluetooth-dot offline';
        btText.textContent = 'Tap to select';
        connectedNameSpan.style.display = 'none';
      }
    }

    function addMessage(content, type = 'text', isSent = true, fileInfo = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isSent ? 'sent' : ''}`;
      if (type === 'image' && content) {
        const img = document.createElement('img');
        img.src = content;
        msgDiv.appendChild(img);
      } else if (type === 'voice' && content) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = content;
        msgDiv.appendChild(audio);
        msgDiv.innerHTML += '<div>🎵 Voice message</div>';
      } else if (type === 'app' && fileInfo) {
        msgDiv.innerHTML = `<div>📱 ${fileInfo.name || 'App'} shared</div>`;
      } else {
        msgDiv.textContent = content;
      }
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (isSent && selectedPeer && bluetoothActive) {
        setTimeout(() => {
          const echo = document.createElement('div');
          echo.className = 'message';
          echo.textContent = `🔁 ${selectedPeer.name}: ${type==='text'?content:'received'}`;
          chatMessages.appendChild(echo);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 800);
      }
    }

    // ----- Device list rendering -----
    function renderDeviceList(devices) {
      deviceListContainer.innerHTML = '';
      if (!devices.length) {
        deviceListContainer.innerHTML = '<div class="device-item">No devices found</div>';
        return;
      }
      devices.forEach(device => {
        const div = document.createElement('div');
        div.className = 'device-item';
        div.innerHTML = `<span>📱 ${device.name}</span><span style="color:#00c8ff;">Connect</span>`;
        div.addEventListener('click', () => {
          selectPeer(device);
        });
        deviceListContainer.appendChild(div);
      });
    }

    function selectPeer(device) {
      selectedPeer = device;
      bluetoothActive = true;
      updateBluetoothUI();
      deviceOverlay.style.display = 'none';
      addMessage(`🔵 Connected to ${device.name}`, 'text', false);
    }

    function openDeviceSelector() {
      renderDeviceList(mockDevices);
      deviceOverlay.style.display = 'flex';
    }

    // Event: Bluetooth indicator opens overlay
    document.getElementById('btStatus').addEventListener('click', openDeviceSelector);
    document.getElementById('closeOverlayBtn').addEventListener('click', () => {
      deviceOverlay.style.display = 'none';
    });
    document.getElementById('refreshScanBtn').addEventListener('click', () => {
      renderDeviceList(mockDevices);
    });

    // Close overlay on background click
    deviceOverlay.addEventListener('click', (e) => {
      if (e.target === deviceOverlay) deviceOverlay.style.display = 'none';
    });

    // ----- Text messaging -----
    function sendText() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!selectedPeer) {
        alert('Please select a Bluetooth contact first.');
        openDeviceSelector();
        return;
      }
      addMessage(text, 'text', true);
      messageInput.value = '';
    }
    document.getElementById('sendTextBtn').addEventListener('click', sendText);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendText();
    });

    // ----- File sharing -----
    const imageInput = document.getElementById('imageFileInput');
    const voiceInput = document.getElementById('voiceFileInput');
    const appInput = document.getElementById('appFileInput');
    document.getElementById('shareImageBtn').addEventListener('click', ()=>{
      if(!selectedPeer) { alert('Connect first'); openDeviceSelector(); return; }
      imageInput.click();
    });
    document.getElementById('shareVoiceBtn').addEventListener('click', ()=>{
      if(!selectedPeer) { alert('Connect first'); openDeviceSelector(); return; }
      voiceInput.click();
    });
    document.getElementById('shareAppBtn').addEventListener('click', ()=>{
      if(!selectedPeer) { alert('Connect first'); openDeviceSelector(); return; }
      appInput.click();
    });

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(URL.createObjectURL(file), 'image', true); imageInput.value = ''; }
    });
    voiceInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(URL.createObjectURL(file), 'voice', true); voiceInput.value = ''; }
    });
    appInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(null, 'app', true, { name: file.name }); appInput.value = ''; }
    });

    // ----- Voice call -----
    document.getElementById('startVoiceCallBtn').addEventListener('click', () => {
      if (!selectedPeer) {
        alert('Select a Bluetooth contact to call.');
        openDeviceSelector();
        return;
      }
      callActive = true;
      voicePanel.style.display = 'flex';
      callPeerNameSpan.textContent = selectedPeer.name;
      addMessage(`📞 Voice call with ${selectedPeer.name} started`, 'text', true);
    });
    document.getElementById('endCallBtn').addEventListener('click', () => {
      callActive = false;
      voicePanel.style.display = 'none';
      addMessage('📴 Call ended', 'text', true);
    });
    document.getElementById('muteToggleBtn').addEventListener('click', () => {
      muted = !muted;
      document.getElementById('muteToggleBtn').textContent = muted ? '🔊' : '🔇';
      addMessage(muted ? '🔇 Muted' : '🎙️ Unmuted', 'text', true);
    });

    // Service worker for offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
        "self.addEventListener('install',e=>{self.skipWaiting()});" +
        "self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});" +
        "self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline')))});"
      )).catch(()=>{});
    }

    // Initial state
    updateBluetoothUI();
  })();
</script>
</body>
  </html>
