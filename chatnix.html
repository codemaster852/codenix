<script>
    // ... (Keep existing Supabase config)

    async function checkAuth() {
        const { data: { session }, error } = await client.auth.getSession();
        if (error || !session) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = session.user;
        
        // Use the newly synced chatnix_profiles table
        const { data: profile, error: profileErr } = await client
            .from('chatnix_profiles')
            .select('username')
            .eq('id', currentUser.id)
            .single();

        if (profileErr) {
            console.error("Profile sync check:", profileErr);
            // Fallback UI if profile hasn't synced yet
            document.getElementById('myAvatar').innerText = currentUser.email[0].toUpperCase();
        } else {
            document.getElementById('myAvatar').innerText = (profile.username || "U")[0].toUpperCase();
        }
        
        initIndexedDB();
        setupRealtime();
        requestNotifications();
        loadActiveChats();
    }

    // ... (Rest of your existing portal.html logic)
</script>
