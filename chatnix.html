<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1e33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ChatNIx · Bluetooth P2P</title>
  <link rel="manifest" href="data:application/manifest+json,
  {
    %22name%22: %22ChatNIx%22,
    %22short_name%22: %22ChatNIx%22,
    %22start_url%22: %22.%22,
    %22display%22: %22standalone%22,
    %22background_color%22: %22#0b1e33%22,
    %22theme_color%22: %22#0b1e33%22,
    %22icons%22: [
      {
        %22src%22: %22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300c8ff'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E⬡%3C/text%3E%3C/svg%3E%22,
        %22sizes%22: %22192x192%22,
        %22type%22: %22image/svg+xml%22
      }
    ]
  }">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0a1929 0%, #0d2b45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 800px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 42px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,200,255,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      background: rgba(10, 25, 41, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,200,255,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .logo {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #00c8ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bluetooth-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,200,255,0.15);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0e9ff;
    }
    .bluetooth-dot {
      width: 10px;
      height: 10px;
      background: #00ffaa;
      border-radius: 50%;
      box-shadow: 0 0 12px #00ffaa;
      animation: pulse 1.8s infinite;
    }
    .bluetooth-dot.offline {
      background: #ff5e7e;
      box-shadow: 0 0 8px #ff3b5c;
      animation: none;
    }
    @keyframes pulse { 0% { opacity: 0.7; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.7; transform: scale(0.9); } }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(0,0,0,0.2);
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      word-break: break-word;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      color: #f0f6ff;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
      align-self: flex-start;
    }
    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #0066cc, #4b0082);
      border: 1px solid rgba(0,200,255,0.5);
    }
    .message img, .message video {
      max-width: 100%;
      border-radius: 16px;
      margin: 6px 0;
      display: block;
    }
    .message audio {
      width: 100%;
      margin: 4px 0;
    }
    .file-share {
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .voice-call-bar {
      background: rgba(123, 44, 191, 0.7);
      margin: 8px 14px;
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: bold;
      backdrop-filter: blur(15px);
      border: 1px solid #bb86fc;
    }
    .call-controls {
      display: flex;
      gap: 12px;
    }
    .call-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .end-call { background: #e53e3e; color: white; }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.15);
      flex-wrap: wrap;
      justify-content: center;
    }
    .icon-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #d0e4ff;
      font-size: 1.4rem;
      padding: 10px 14px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      font-weight: 500;
    }
    .icon-btn:active { background: rgba(0,200,255,0.3); transform: scale(0.94); }
    .input-row {
      display: flex;
      padding: 10px 14px;
      gap: 8px;
      background: rgba(0,0,0,0.6);
    }
    #messageInput {
      flex:1;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 12px 18px;
      color: white;
      outline: none;
      font-size: 1rem;
    }
    .send-btn {
      background: #00c8ff;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.3rem;
      color: #0a1929;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden-file-input { display: none; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="logo">⛓️‍💥 ChatNIx</div>
    <div class="bluetooth-indicator" id="btStatus">
      <span class="bluetooth-dot" id="btDot"></span>
      <span id="btText">Searching...</span>
    </div>
  </div>

  <div id="voiceCallPanel" style="display: none;" class="voice-call-bar">
    <span>🎙️ Voice call active</span>
    <div class="call-controls">
      <button class="call-btn" id="muteToggleBtn">🔇</button>
      <button class="call-btn end-call" id="endCallBtn">📴</button>
    </div>
  </div>

  <div class="chat-area" id="chatMessages">
    <div class="message">👋 Welcome to ChatNIx. Bluetooth P2P ready. Share anything.</div>
  </div>

  <div class="toolbar">
    <button class="icon-btn" id="shareImageBtn">🖼️ Image</button>
    <button class="icon-btn" id="shareVoiceBtn">🎤 Voice</button>
    <button class="icon-btn" id="shareAppBtn">📦 App</button>
    <button class="icon-btn" id="startVoiceCallBtn">📞 Call</button>
  </div>

  <div class="input-row">
    <input type="text" id="messageInput" placeholder="Type message..." autocomplete="off" />
    <button class="send-btn" id="sendTextBtn">➤</button>
  </div>
  <input type="file" id="imageFileInput" class="hidden-file-input" accept="image/*" />
  <input type="file" id="voiceFileInput" class="hidden-file-input" accept="audio/*" />
  <input type="file" id="appFileInput" class="hidden-file-input" accept=".apk,.aab,.zip,application/vnd.android.package-archive" />
</div>

<script>
  (function() {
    // ---------- PWA install prompt ----------
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      console.log('PWA install ready');
    });

    // ---------- Bluetooth simulation (offline P2P concept) ----------
    const btDot = document.getElementById('btDot');
    const btText = document.getElementById('btText');
    let bluetoothActive = false;
    
    function updateBluetoothStatus(active) {
      bluetoothActive = active;
      if (active) {
        btDot.className = 'bluetooth-dot';
        btText.textContent = 'Nearby peer';
      } else {
        btDot.className = 'bluetooth-dot offline';
        btText.textContent = 'Offline';
      }
    }
    // Simulate Bluetooth connection after 1.5s
    setTimeout(() => updateBluetoothStatus(true), 1500);
    
    // Toggle simulation on dot click
    document.getElementById('btStatus').addEventListener('click', () => {
      updateBluetoothStatus(!bluetoothActive);
    });

    // ---------- Chat display ----------
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    
    function addMessage(content, type = 'text', isSent = true, fileInfo = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isSent ? 'sent' : ''}`;
      
      if (type === 'image' && content) {
        const img = document.createElement('img');
        img.src = content;
        img.alt = 'shared image';
        msgDiv.appendChild(img);
      } else if (type === 'voice' && content) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = content;
        msgDiv.appendChild(audio);
        msgDiv.innerHTML += '<div>🎵 Voice message</div>';
      } else if (type === 'app' && fileInfo) {
        msgDiv.innerHTML = `<div class="file-share">📱 ${fileInfo.name || 'App file'} <span style="font-size:0.7rem;">(shared)</span></div>`;
      } else {
        msgDiv.textContent = content;
      }
      
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      // Simulate receiving echo after 800ms (Bluetooth P2P demo)
      if (isSent && bluetoothActive) {
        setTimeout(() => {
          const echoDiv = document.createElement('div');
          echoDiv.className = 'message';
          if (type === 'text') echoDiv.textContent = `🔁 Echo: ${content}`;
          else if (type === 'image') echoDiv.innerHTML = '<div>🖼️ Image received</div>';
          else if (type === 'voice') echoDiv.innerHTML = '<div>🎤 Voice note received</div>';
          else if (type === 'app') echoDiv.innerHTML = '<div>📦 App shared via Bluetooth</div>';
          chatMessages.appendChild(echoDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 900);
      }
    }

    // Send text
    function sendText() {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, 'text', true);
      messageInput.value = '';
    }
    document.getElementById('sendTextBtn').addEventListener('click', sendText);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendText();
    });

    // ---------- File sharing handlers ----------
    const imageInput = document.getElementById('imageFileInput');
    const voiceInput = document.getElementById('voiceFileInput');
    const appInput = document.getElementById('appFileInput');
    
    document.getElementById('shareImageBtn').addEventListener('click', () => imageInput.click());
    document.getElementById('shareVoiceBtn').addEventListener('click', () => voiceInput.click());
    document.getElementById('shareAppBtn').addEventListener('click', () => appInput.click());
    
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        addMessage(url, 'image', true);
        imageInput.value = '';
      }
    });
    
    voiceInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        addMessage(url, 'voice', true);
        voiceInput.value = '';
      }
    });
    
    appInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        addMessage(null, 'app', true, { name: file.name });
        appInput.value = '';
      }
    });

    // ---------- Voice call mode ----------
    const voicePanel = document.getElementById('voiceCallPanel');
    const startCallBtn = document.getElementById('startVoiceCallBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    const muteBtn = document.getElementById('muteToggleBtn');
    let callActive = false;
    let muted = false;
    
    function startVoiceCall() {
      if (!bluetoothActive) {
        alert('Bluetooth peer not connected. Activate Bluetooth first.');
        return;
      }
      callActive = true;
      voicePanel.style.display = 'flex';
      addMessage('📞 Voice call started (Bluetooth mode)', 'text', true);
    }
    
    function endVoiceCall() {
      callActive = false;
      voicePanel.style.display = 'none';
      addMessage('📴 Call ended', 'text', true);
    }
    
    startCallBtn.addEventListener('click', startVoiceCall);
    endCallBtn.addEventListener('click', endVoiceCall);
    
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? '🔊' : '🔇';
      addMessage(muted ? '🔇 Microphone muted' : '🎙️ Microphone active', 'text', true);
    });

    // Register service worker for offline support (basic)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
          "self.addEventListener('install',e=>{self.skipWaiting()});" +
          "self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});" +
          "self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline')))});"
        )).catch(() => console.log('SW registered via blob'));
      });
    }

    // Initial Bluetooth simulation message
    setTimeout(() => {
      if (bluetoothActive) addMessage('🔵 Bluetooth peer connected. You can share files & call.', 'text', false);
    }, 2000);
  })();
</script>
</body>
  </html>
