<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b1e33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ChatNIx · Bluetooth P2P</title>
  <link rel="manifest" href="data:application/manifest+json,
  {
    %22name%22: %22ChatNIx%22,
    %22short_name%22: %22ChatNIx%22,
    %22start_url%22: %22.%22,
    %22display%22: %22standalone%22,
    %22background_color%22: %22#0b1e33%22,
    %22theme_color%22: %22#0b1e33%22,
    %22icons%22: [
      {
        %22src%22: %22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300c8ff'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E⬡%3C/text%3E%3C/svg%3E%22,
        %22sizes%22: %22192x192%22,
        %22type%22: %22image/svg+xml%22
      }
    ]
  }">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0a1929 0%, #0d2b45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 90vh;
      max-height: 800px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 42px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,200,255,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .header {
      padding: 16px 20px;
      background: rgba(10, 25, 41, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,200,255,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .logo {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #00c8ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .bluetooth-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,200,255,0.15);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0e9ff;
      cursor: pointer;
    }
    .bluetooth-dot {
      width: 10px;
      height: 10px;
      background: #ff5e7e;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff3b5c;
    }
    .bluetooth-dot.connected {
      background: #00ffaa;
      box-shadow: 0 0 12px #00ffaa;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.7; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.7; transform: scale(0.9); } }
    .device-list-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 42px;
    }
    .device-panel {
      background: #0f2137;
      width: 85%;
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(0,200,255,0.4);
      color: white;
    }
    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      margin: 10px 0;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .device-item:hover { border-color: #00c8ff; background: rgba(0,200,255,0.15); }
    .scan-btn {
      background: #00c8ff;
      border: none;
      border-radius: 30px;
      padding: 10px 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(0,0,0,0.2);
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      word-break: break-word;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      color: #f0f6ff;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
      align-self: flex-start;
    }
    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #0066cc, #4b0082);
      border: 1px solid rgba(0,200,255,0.5);
    }
    .message img { max-width: 100%; border-radius: 16px; margin: 6px 0; }
    .message audio { width: 100%; margin: 4px 0; }
    .voice-call-bar {
      background: rgba(123, 44, 191, 0.7);
      margin: 8px 14px;
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: bold;
      border: 1px solid #bb86fc;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid rgba(255,255,255,0.15);
      flex-wrap: wrap;
      justify-content: center;
    }
    .icon-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #d0e4ff;
      font-size: 1.3rem;
      padding: 10px 14px;
      border-radius: 30px;
      cursor: pointer;
    }
    .input-row {
      display: flex;
      padding: 10px 14px;
      gap: 8px;
      background: rgba(0,0,0,0.6);
    }
    #messageInput {
      flex:1;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 12px 18px;
      color: white;
      outline: none;
    }
    .send-btn {
      background: #00c8ff;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      font-size: 1.3rem;
    }
    .hidden-file-input { display: none; }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="header">
    <div class="logo">⛓️‍💥 ChatNIx</div>
    <div class="bluetooth-indicator" id="btStatus">
      <span class="bluetooth-dot" id="btDot"></span>
      <span id="btText">Search devices</span>
    </div>
  </div>

  <div class="device-list-overlay" id="deviceOverlay" style="display: none;">
    <div class="device-panel">
      <h3 style="margin-bottom:12px;">📡 Nearby Bluetooth devices</h3>
      <div id="deviceListContainer">
        <div class="device-item">Press "Scan for devices"</div>
      </div>
      <button class="scan-btn" id="startScanBtn">🔍 Scan for devices</button>
      <button style="background:transparent; border:1px solid gray; color:white; margin-top:8px; width:100%; border-radius:20px; padding:8px;" id="closeOverlayBtn">Cancel</button>
    </div>
  </div>

  <div id="voiceCallPanel" style="display: none;" class="voice-call-bar">
    <span>🎙️ Voice call with <span id="callPeerName"></span></span>
    <div>
      <button class="icon-btn" id="muteToggleBtn">🔇</button>
      <button class="icon-btn end-call" id="endCallBtn" style="background:#e53e3e;">📴</button>
    </div>
  </div>

  <div class="chat-area" id="chatMessages">
    <div class="message">👋 Tap the Bluetooth icon to scan and connect.</div>
  </div>

  <div class="toolbar">
    <button class="icon-btn" id="shareImageBtn">🖼️ Image</button>
    <button class="icon-btn" id="shareVoiceBtn">🎤 Voice</button>
    <button class="icon-btn" id="shareAppBtn">📦 App</button>
    <button class="icon-btn" id="startVoiceCallBtn">📞 Call</button>
  </div>

  <div class="input-row">
    <input type="text" id="messageInput" placeholder="Type message..." autocomplete="off" />
    <button class="send-btn" id="sendTextBtn">➤</button>
  </div>
  <input type="file" id="imageFileInput" class="hidden-file-input" accept="image/*" />
  <input type="file" id="voiceFileInput" class="hidden-file-input" accept="audio/*" />
  <input type="file" id="appFileInput" class="hidden-file-input" accept=".apk,.aab,.zip,application/vnd.android.package-archive" />
</div>

<script>
  (function() {
    // PWA install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
    });

    const btDot = document.getElementById('btDot');
    const btText = document.getElementById('btText');
    const deviceOverlay = document.getElementById('deviceOverlay');
    const deviceListContainer = document.getElementById('deviceListContainer');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const voicePanel = document.getElementById('voiceCallPanel');
    const callPeerNameSpan = document.getElementById('callPeerName');

    let selectedDevice = null; // { name, id, deviceObject }
    let bluetoothServer = null;
    let callActive = false;
    let muted = false;

    function updateBluetoothUI() {
      if (selectedDevice) {
        btDot.className = 'bluetooth-dot connected';
        btText.textContent = `Connected: ${selectedDevice.name || 'Device'}`;
      } else {
        btDot.className = 'bluetooth-dot';
        btText.textContent = 'Search devices';
      }
    }

    function addMessage(content, type = 'text', isSent = true, fileInfo = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isSent ? 'sent' : ''}`;
      if (type === 'image' && content) {
        const img = document.createElement('img');
        img.src = content;
        msgDiv.appendChild(img);
      } else if (type === 'voice' && content) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = content;
        msgDiv.appendChild(audio);
        msgDiv.innerHTML += '<div>🎵 Voice message</div>';
      } else if (type === 'app' && fileInfo) {
        msgDiv.innerHTML = `<div>📱 ${fileInfo.name || 'App'} shared</div>`;
      } else {
        msgDiv.textContent = content;
      }
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (isSent && selectedDevice) {
        setTimeout(() => {
          const echo = document.createElement('div');
          echo.className = 'message';
          echo.textContent = `🔁 ${selectedDevice.name}: ${type==='text'?content:'received'}`;
          chatMessages.appendChild(echo);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 800);
      }
    }

    // ----- Real Bluetooth scanning via Web Bluetooth API -----
    async function scanForDevices() {
      if (!navigator.bluetooth) {
        alert('Web Bluetooth API not available. Use Chrome on Android/Desktop.');
        return [];
      }
      try {
        deviceListContainer.innerHTML = '<div class="device-item">⏳ Scanning... Please wait</div>';
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['battery_service', 'device_information']
        });
        return [device];
      } catch (error) {
        console.warn(error);
        alert('Scan cancelled or no device selected.');
        return [];
      }
    }

    function renderDeviceList(devices) {
      deviceListContainer.innerHTML = '';
      if (!devices.length) {
        deviceListContainer.innerHTML = '<div class="device-item">No devices found. Try again.</div>';
        return;
      }
      devices.forEach(device => {
        const div = document.createElement('div');
        div.className = 'device-item';
        const deviceName = device.name || 'Unnamed Device';
        div.innerHTML = `<span>📱 ${deviceName}</span><span style="color:#00c8ff;">Connect</span>`;
        div.addEventListener('click', async () => {
          await connectToDevice(device);
        });
        deviceListContainer.appendChild(div);
      });
    }

    async function connectToDevice(device) {
      try {
        deviceListContainer.innerHTML = '<div class="device-item">🔗 Connecting...</div>';
        const server = await device.gatt.connect();
        bluetoothServer = server;
        selectedDevice = {
          name: device.name || 'Bluetooth Device',
          id: device.id,
          deviceObject: device
        };
        updateBluetoothUI();
        deviceOverlay.style.display = 'none';
        addMessage(`🔵 Connected to ${selectedDevice.name}`, 'text', false);
        device.addEventListener('gattserverdisconnected', onDisconnect);
      } catch (error) {
        alert('Connection failed: ' + error.message);
        deviceListContainer.innerHTML = '<div class="device-item">Connection failed. Try again.</div>';
      }
    }

    function onDisconnect() {
      addMessage('🔴 Device disconnected', 'text', false);
      selectedDevice = null;
      bluetoothServer = null;
      updateBluetoothUI();
    }

    // Open overlay & start scan
    document.getElementById('btStatus').addEventListener('click', () => {
      deviceOverlay.style.display = 'flex';
    });

    document.getElementById('startScanBtn').addEventListener('click', async () => {
      const devices = await scanForDevices();
      renderDeviceList(devices);
    });

    document.getElementById('closeOverlayBtn').addEventListener('click', () => {
      deviceOverlay.style.display = 'none';
    });

    deviceOverlay.addEventListener('click', (e) => {
      if (e.target === deviceOverlay) deviceOverlay.style.display = 'none';
    });

    // Text messaging
    function sendText() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!selectedDevice) {
        alert('Connect a Bluetooth device first.');
        deviceOverlay.style.display = 'flex';
        return;
      }
      addMessage(text, 'text', true);
      messageInput.value = '';
    }
    document.getElementById('sendTextBtn').addEventListener('click', sendText);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendText();
    });

    // File sharing
    const imageInput = document.getElementById('imageFileInput');
    const voiceInput = document.getElementById('voiceFileInput');
    const appInput = document.getElementById('appFileInput');
    document.getElementById('shareImageBtn').addEventListener('click', ()=>{
      if(!selectedDevice) { alert('Connect first'); deviceOverlay.style.display='flex'; return; }
      imageInput.click();
    });
    document.getElementById('shareVoiceBtn').addEventListener('click', ()=>{
      if(!selectedDevice) { alert('Connect first'); deviceOverlay.style.display='flex'; return; }
      voiceInput.click();
    });
    document.getElementById('shareAppBtn').addEventListener('click', ()=>{
      if(!selectedDevice) { alert('Connect first'); deviceOverlay.style.display='flex'; return; }
      appInput.click();
    });
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(URL.createObjectURL(file), 'image', true); imageInput.value = ''; }
    });
    voiceInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(URL.createObjectURL(file), 'voice', true); voiceInput.value = ''; }
    });
    appInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) { addMessage(null, 'app', true, { name: file.name }); appInput.value = ''; }
    });

    // Voice call
    document.getElementById('startVoiceCallBtn').addEventListener('click', () => {
      if (!selectedDevice) {
        alert('Connect a device to call.');
        deviceOverlay.style.display = 'flex';
        return;
      }
      callActive = true;
      voicePanel.style.display = 'flex';
      callPeerNameSpan.textContent = selectedDevice.name;
      addMessage(`📞 Voice call started with ${selectedDevice.name}`, 'text', true);
    });
    document.getElementById('endCallBtn').addEventListener('click', () => {
      callActive = false;
      voicePanel.style.display = 'none';
      addMessage('📴 Call ended', 'text', true);
    });
    document.getElementById('muteToggleBtn').addEventListener('click', () => {
      muted = !muted;
      document.getElementById('muteToggleBtn').textContent = muted ? '🔊' : '🔇';
    });

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(
        "self.addEventListener('install',e=>{self.skipWaiting()});" +
        "self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});" +
        "self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline')))});"
      )).catch(()=>{});
    }

    updateBluetoothUI();
  })();
</script>
</body>
  </html>
