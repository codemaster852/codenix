<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service by Codenix Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom scrollbar for chat area */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        
        /* Typing indicator animation */
        .dot-flashing {
            position: relative;
            width: 8px;
            height: 8px;
            border-radius: 5px;
            background-color: #64748b;
            color: #64748b;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .dot-flashing::before {
            left: -15px;
            width: 8px;
            height: 8px;
            border-radius: 5px;
            background-color: #64748b;
            color: #64748b;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 15px;
            width: 8px;
            height: 8px;
            border-radius: 5px;
            background-color: #64748b;
            color: #64748b;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: #64748b; }
            50%, 100% { background-color: #e2e8f0; }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 font-sans">

    <!-- Chat Widget Container -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[700px] border border-gray-200 relative">
        
        <!-- Header -->
        <header class="bg-slate-900 text-white p-4 flex items-center justify-between z-10 shadow-md">
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center font-bold text-lg">
                        <i data-lucide="bot" class="w-6 h-6 text-white" id="avatar-icon"></i>
                    </div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-slate-900 rounded-full"></div>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Codenix Studio</h1>
                    <p class="text-xs text-slate-300" id="agent-status">AI Assistant: Jose</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <a href="/dashboard/" class="text-xs bg-slate-700 hover:bg-slate-600 transition-colors px-3 py-1.5 rounded-lg flex items-center space-x-1 border border-slate-500" title="Back to Dashboard">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                </a>
                <button id="human-btn" onclick="transferToHuman()" class="text-xs bg-slate-800 hover:bg-slate-700 transition-colors px-3 py-1.5 rounded-lg flex items-center space-x-1 border border-slate-600" title="Talk to a human">
                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- Connection / Handoff Banner (Hidden by default) -->
        <div id="handoff-banner" class="hidden bg-amber-100 text-amber-800 text-xs font-semibold px-4 py-2 flex items-center justify-center shadow-sm">
            <i data-lucide="refresh-cw" class="w-3 h-3 mr-2 animate-spin"></i>
            Transferring to Customer Service Agent...
        </div>

        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 chat-scroll">
            <!-- Initial Greeting -->
        </div>

        <!-- Typing Indicator Container (Hidden by default) -->
        <div id="typing-indicator" class="hidden px-4 pb-2 bg-slate-50">
            <div class="flex items-end space-x-2">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-4 h-4 text-slate-500"></i>
                </div>
                <div class="bg-white border border-gray-100 px-4 py-3 rounded-2xl rounded-bl-none shadow-sm flex items-center h-[42px] min-w-[60px]">
                    <div class="dot-flashing ml-3"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="p-4 bg-white border-t border-gray-100 z-10">
            <form id="chat-form" class="flex items-center space-x-2">
                <input 
                    type="text" 
                    id="message-input" 
                    class="flex-1 bg-slate-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl px-4 py-3 outline-none transition-all"
                    placeholder="Type your message..."
                    autocomplete="off"
                    required
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-colors focus:ring-2 focus:ring-blue-400 focus:outline-none flex flex-shrink-0 items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
            <div class="text-center mt-2">
                <span class="text-[10px] text-gray-400">Powered by Codenix Studio AI</span>
            </div>
        </footer>
    </div>

    <!-- Ticket Modal Overlay -->
    <div id="ticket-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in relative my-8">
            <div class="bg-indigo-600 px-6 py-4 flex items-center justify-between">
                <h2 class="text-white font-bold text-lg flex items-center">
                    <i data-lucide="ticket" class="w-5 h-5 mr-2"></i> Submit a Support Ticket
                </h2>
                <button id="close-ticket-btn" class="text-indigo-200 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <form id="ticket-form" class="p-6 space-y-4">
                <p class="text-sm text-gray-600 mb-4">Our live agents are currently busy. Please create a ticket and we will get back to you via email as soon as possible.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" name="email" required class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm">
                    </div>
                    <!-- Type -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Inquiry Type</label>
                        <select name="type" class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm">
                            <option value="technical">Technical Support</option>
                            <option value="billing">Billing Issue</option>
                            <option value="general">General Inquiry</option>
                            <option value="feedback">Feedback</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Subject -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Subject <span class="text-red-500">*</span></label>
                        <input type="text" name="subject" required class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm">
                    </div>
                    <!-- Priority -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Priority Level</label>
                        <select name="priority" class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
                    <textarea name="description" required rows="4" class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm resize-none"></textarea>
                </div>

                <!-- Rating -->
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">How would you rate your AI experience so far?</label>
                    <select name="rating" class="w-full bg-slate-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg px-3 py-2 outline-none transition-all text-sm">
                        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                        <option value="4">⭐⭐⭐⭐ Good</option>
                        <option value="3" selected>⭐⭐⭐ Neutral</option>
                        <option value="2">⭐⭐ Fair</option>
                        <option value="1">⭐ Poor</option>
                    </select>
                </div>

                <!-- Actions -->
                <div class="flex justify-end space-x-3 pt-2">
                    <button type="button" id="cancel-ticket-btn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
                    <button type="submit" id="submit-ticket-btn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors flex items-center">
                        <i data-lucide="send" class="w-4 h-4 mr-2"></i> Submit Ticket
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Application State
        const DIFY_API_KEY = 'app-Xo5rUJWjIsjhhbVtn7peLcHb';
        const API_URL = 'https://api.dify.ai/v1/chat-messages';
        
        // Supabase Configuration
        const SUPABASE_URL = 'https://zncztttvefahofdeacxf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GhwVsgutWW4EpK9Fc_3DQQ_pW_R48LM';
        // Renamed 'supabase' to 'supabaseClient' to prevent naming collision with the globally injected Supabase library
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let conversationId = '';
        // Generate a random user ID for the session
        const userId = 'user_' + Math.random().toString(36).substring(2, 10);
        
        let isHumanMode = false;
        let isWaitingForResponse = false;

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const agentStatus = document.getElementById('agent-status');
        const avatarIcon = document.getElementById('avatar-icon');
        const handoffBanner = document.getElementById('handoff-banner');
        const humanBtn = document.getElementById('human-btn');
        const sendBtn = document.getElementById('send-btn');

        // Ticket Modal Elements
        const ticketModal = document.getElementById('ticket-modal');
        const ticketForm = document.getElementById('ticket-form');
        const closeTicketBtn = document.getElementById('close-ticket-btn');
        const cancelTicketBtn = document.getElementById('cancel-ticket-btn');
        const submitTicketBtn = document.getElementById('submit-ticket-btn');

        // Keywords that automatically trigger human handoff
        const handoffKeywords = ["human", "agent", "real person", "customer service", "representative", "operator"];

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                appendMessage("Hello! I'm Jose, the AI Assistant for Codenix Studio. How can I help you today?", 'agent');
            }, 500);
        });

        // Form Submit Handler
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message || isWaitingForResponse) return;

            // Clear input
            messageInput.value = '';
            
            // Show User Message
            appendMessage(message, 'user');

            // Check for auto-handoff keywords
            const lowerMessage = message.toLowerCase();
            const needsHuman = handoffKeywords.some(keyword => lowerMessage.includes(keyword));

            if (needsHuman) {
                transferToHuman();
                return;
            }

            if (isHumanMode) {
                transferToHuman(); // Prompt them with the ticket again if they try to type
                return;
            }

            // AI Mode: Send to Dify API
            await handleAIResponse(message);
        });

        async function handleAIResponse(message) {
            setLoading(true);

            const payload = {
                inputs: {},
                query: message,
                response_mode: 'streaming',
                user: userId,
                conversation_id: conversationId || ""
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DIFY_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || errData.code || `API Error: ${response.status}`);
                }

                // Create empty message bubble for the stream
                const msgId = appendMessage("", 'agent');
                let fullAnswer = "";
                let firstChunkReceived = false;

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n');
                    buffer = parts.pop(); 

                    for (const part of parts) {
                        if (part.startsWith('data: ')) {
                            if (!firstChunkReceived) {
                                firstChunkReceived = true;
                                setLoading(true, true); // Hide typing indicator, but keep inputs disabled
                            }
                            const jsonStr = part.slice(6);
                            if (jsonStr.trim() === '[DONE]') continue;

                            try {
                                const data = JSON.parse(jsonStr);
                                if (data.conversation_id) {
                                    conversationId = data.conversation_id;
                                }
                                if (data.event === 'message' || data.event === 'agent_message') {
                                    fullAnswer += data.answer;
                                    updateMessage(msgId, fullAnswer);
                                } else if (data.event === 'message_replace') {
                                    fullAnswer = data.answer;
                                    updateMessage(msgId, fullAnswer);
                                } else if (data.event === 'error') {
                                    throw new Error(data.message || data.code);
                                }
                            } catch (e) {
                                if (e.name !== 'SyntaxError') {
                                    console.warn('Parse error:', e);
                                }
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Dify API Error:', error);
                appendMessage("Connection error: " + error.message + ". Please try again.", 'system');
            } finally {
                setLoading(false);
            }
        }

        // Transfer to Human Logic (Ticket Modal)
        function transferToHuman() {
            ticketModal.classList.remove('hidden');
        }

        function closeTicketModal() {
            ticketModal.classList.add('hidden');
            ticketForm.reset();
        }
        
        // Modal Event Listeners
        closeTicketBtn.addEventListener('click', closeTicketModal);
        cancelTicketBtn.addEventListener('click', closeTicketModal);

        ticketForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Change button state
            const originalBtnText = submitTicketBtn.innerHTML;
            submitTicketBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> Submitting...';
            submitTicketBtn.disabled = true;

            const formData = new FormData(ticketForm);
            
            try {
                // Using the renamed supabaseClient
                const { data, error } = await supabaseClient
                    .from('tickets')
                    .insert([
                        {
                            email: formData.get('email'),
                            subject: formData.get('subject'),
                            ticket_type: formData.get('type'),
                            priority: formData.get('priority'),
                            description: formData.get('description'),
                            rating: parseInt(formData.get('rating')),
                        }
                    ]);

                if (error) throw error;

                closeTicketModal();
                isHumanMode = true;
                humanBtn.style.display = 'none'; // Hide human button
                
                // Show Banner briefly
                handoffBanner.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> Ticket submitted successfully!`;
                handoffBanner.classList.replace('bg-amber-100', 'bg-green-100');
                handoffBanner.classList.replace('text-amber-800', 'text-green-800');
                handoffBanner.classList.remove('hidden');
                
                setTimeout(() => {
                    handoffBanner.classList.add('hidden');
                }, 4000);

                appendMessage("Your support ticket has been created successfully. Our team will review your inquiry and reply to your email shortly.", 'system');
                
                // Disable chat
                messageInput.disabled = true;
                messageInput.placeholder = "Ticket created. Please wait for an email reply.";
                sendBtn.disabled = true;

            } catch (err) {
                console.error('Error submitting ticket:', err);
                alert("Failed to submit ticket: " + err.message);
            } finally {
                submitTicketBtn.innerHTML = originalBtnText;
                submitTicketBtn.disabled = false;
                lucide.createIcons();
            }
        });

        // UI Helpers
        function setLoading(isLoading, hideTypingIndicator = false) {
            isWaitingForResponse = isLoading;
            messageInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            
            if (isLoading && !hideTypingIndicator) {
                typingIndicator.classList.remove('hidden');
                scrollToBottom();
            } else {
                typingIndicator.classList.add('hidden');
                if (!isLoading) messageInput.focus();
            }
        }

        function appendMessage(text, sender) {
            const messageId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} w-full animate-fade-in`;
            wrapper.id = messageId;

            let innerHTML = '';

            if (sender === 'user') {
                innerHTML = `
                    <div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-none shadow-sm max-w-[80%] break-words text-sm">
                        ${text}
                    </div>
                `;
            } else if (sender === 'system') {
                innerHTML = `
                    <div class="w-full flex justify-center my-2">
                        <span id="${messageId}-text" class="bg-gray-200 text-gray-600 text-xs px-3 py-1 rounded-full font-medium">
                            ${text}
                        </span>
                    </div>
                `;
            } else {
                // Agent or Human
                const isAI = sender === 'agent';
                const avatarBg = isAI ? 'bg-slate-200 text-slate-600' : 'bg-indigo-100 text-indigo-600';
                const iconName = isAI ? 'bot' : 'headset';
                const nameStr = isAI ? 'Jose (AI)' : 'Sarah (Support)';

                innerHTML = `
                    <div class="flex items-end space-x-2 max-w-[85%]">
                        <div class="w-8 h-8 rounded-full ${avatarBg} flex items-center justify-center flex-shrink-0 mb-1">
                            <i data-lucide="${iconName}" class="w-4 h-4"></i>
                        </div>
                        <div class="flex flex-col space-y-1">
                            <span class="text-[10px] text-gray-400 ml-1 font-medium">${nameStr}</span>
                            <div id="${messageId}-text" class="bg-white text-slate-800 border border-gray-100 px-4 py-3 rounded-2xl rounded-bl-none shadow-sm break-words text-sm leading-relaxed">
                                ${text}
                            </div>
                        </div>
                    </div>
                `;
            }

            wrapper.innerHTML = innerHTML;
            chatContainer.appendChild(wrapper);
            lucide.createIcons(); // re-initialize any injected icons
            scrollToBottom();
            
            return messageId;
        }

        function updateMessage(id, text) {
            const textEl = document.getElementById(id + '-text');
            if (textEl) {
                textEl.innerHTML = text.replace(/\n/g, '<br>');
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // CSS for fade-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.3s ease-out forwards;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
