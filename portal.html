<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8b5cf6;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f8fafc; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass border-b border-white/5 backdrop-blur-xl">
        <div class="flex justify-between items-center p-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WJ3faivzsp4Q7kNvwFwCGJg&_nc_oc=Adryh1560rK2Dga1sRCAZY21BjDad7XBkgC6Rvx39Ohl_xzdvyQzcAsob5jaA_AlWV4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=he47LuXvRvvEjehHP4DjEg&_nc_ss=7c2a8&oh=00_Af9qgK1hh-EsWc0tdu5texxo-fgUlMJwhluFEwanhEeglg&oe=6A2A1281" class="w-10 h-10 rounded-xl shadow-lg border border-white/10">
                <div class="text-xl font-black tracking-tighter">CODENIX<span class="text-purple-500">AI</span></div>
            </div>
            <button onclick="signOut()" class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-purple-400 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <section class="glass p-12 rounded-[3rem] border border-white/10 mb-16">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 text-white">Welcome, <span class="text-purple-500" id="user-display-name">Operative</span></h1>
            <p class="text-slate-400 text-lg max-w-2xl font-light">Accessing your customized Codenix AI Workspace terminal.</p>
        </section>

        <div id="portal-sections" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="text-center col-span-full py-20 text-purple-400 font-black tracking-widest uppercase animate-pulse">Initializing Data Stream...</div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const GOOGLE_SHEET_ID = "150MBM7hasO1yQi9iBpsM6wU9LojacaKRGmRzXIQZgPs";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
            } else {
                document.getElementById('user-display-name').textContent = session.user.email.split('@')[0];
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        }

        async function fetchSpreadsheetSections() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json`);
                const text = await response.text();
                const json = JSON.parse(text.slice(text.indexOf('({') + 1, text.lastIndexOf('})') + 1));
                return json.table.rows;
            } catch (e) { return []; }
        }

        window.onload = async () => {
            await checkUser();
            const rows = await fetchSpreadsheetSections();
            const container = document.getElementById('portal-sections');
            container.innerHTML = '';
            rows.forEach(row => {
                const val = row.c[1]?.v;
                if(val) {
                    container.innerHTML += `<div class="glass p-8 rounded-3xl border border-white/5 hover:border-purple-500/30 transition-all cursor-pointer">
                        <h3 class="text-xl font-black text-white">${val}</h3>
                    </div>`;
                }
            });
        };
    </script>
</body>
</html>
