<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dropdown { transition: opacity 0.2s, visibility 0.2s; }
        .dropdown-hidden { opacity: 0; visibility: hidden; }
        .dropdown-visible { opacity: 1; visibility: visible; }
        .grid-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <nav class="sticky top-0 z-50 border-b border-slate-200 dark:border-white/10 bg-white/80 dark:bg-[#050505]/80 backdrop-blur-lg">
        <div class="flex justify-between items-center p-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WJ3faivzsp4Q7kNvwFwCGJg&_nc_oc=Adryh1560rK2Dga1sRCAZY21BjDad7XBkgC6Rvx39Ohl_xzdvyQzcAsob5jaA_AlWV4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=he47LuXvRvvEjehHP4DjEg&_nc_ss=7c2a8&oh=00_Af9qgK1hh-EsWc0tdu5texxo-fgUlMJwhluFEwanhEeglg&oe=6A2A1281" class="w-10 h-10 rounded-lg shadow-sm">
                <span class="text-xl font-bold tracking-tight">CODENIX<span class="text-purple-600">AI</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center hover:scale-105 transition">
                    <span id="theme-icon">🌙</span>
                </button>
                <div class="relative">
                    <button onclick="toggleDropdown()" id="user-btn" class="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-800 rounded-full hover:bg-slate-100 dark:hover:bg-slate-900 transition font-semibold text-sm">
                        <div class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-white text-[10px]" id="user-initial">U</div>
                        <span id="user-email">Loading...</span>
                    </button>
                    <div id="profile-dropdown" class="dropdown dropdown-hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl overflow-hidden z-50">
                        <a href="profile.html" class="block px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Profile</a>
                        <a href="profile.html#settings" class="block px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Settings</a>
                        <button onclick="signOut()" class="block w-full text-left px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12 border-l-4 border-purple-600 pl-6">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Live Operations</h1>
            <p class="text-slate-500 dark:text-slate-400">Real-time system deployment & workspace modular ecosystem.</p>
        </header>

        <section id="portal-sections" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-400 animate-pulse">Synchronizing with central hub...</div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const GOOGLE_SHEET_ID = "150MBM7hasO1yQi9iBpsM6wU9LojacaKRGmRzXIQZgPs";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
        }

        function toggleDropdown() {
            document.getElementById('profile-dropdown').classList.toggle('dropdown-hidden');
            document.getElementById('profile-dropdown').classList.toggle('dropdown-visible');
        }

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = 'auth.html';
            else {
                const email = session.user.email;
                document.getElementById('user-email').textContent = email.split('@')[0];
                document.getElementById('user-initial').textContent = email[0].toUpperCase();
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        }

        async function fetchSpreadsheetSections() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json`);
                const text = await response.text();
                const json = JSON.parse(text.slice(text.indexOf('({') + 1, text.lastIndexOf('})') + 1));
                return json.table.rows;
            } catch (e) { return []; }
        }

        window.onload = async () => {
            document.documentElement.classList.add('dark');
            await checkUser();
            const rows = await fetchSpreadsheetSections();
            const container = document.getElementById('portal-sections');
            container.innerHTML = '';
            
            rows.forEach(row => {
                const title = row.c[1]?.v;
                const description = row.c[2]?.v || "Standard Operational Module";
                if(title) {
                    container.innerHTML += `
                        <div class="grid-card p-6 rounded-2xl hover:border-purple-600 transition-all cursor-pointer group">
                            <div class="w-10 h-10 bg-purple-600/10 rounded-lg flex items-center justify-center mb-4 group-hover:bg-purple-600 transition">
                                <span class="text-purple-600 group-hover:text-white">🚀</span>
                            </div>
                            <h3 class="font-bold text-lg mb-1">${title}</h3>
                            <p class="text-sm text-slate-500">${description}</p>
                        </div>`;
                }
            });
        };
    </script>
</body>
</html>
