<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Codenix AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .dropdown { transition: all 0.2s; }
        .hidden-menu { opacity: 0; visibility: hidden; transform: translateY(-10px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <nav class="sticky top-0 z-50 border-b border-slate-200 dark:border-white/10 bg-white/80 dark:bg-[#050505]/80 backdrop-blur-xl">
        <div class="flex justify-between items-center p-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <img src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=WJ3faivzsp4Q7kNvwFwCGJg&_nc_oc=Adryh1560rK2Dga1sRCAZY21BjDad7XBkgC6Rvx39Ohl_xzdvyQzcAsob5jaA_AlWV4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=R7QLdS4BkPxOiehch8jdvg&_nc_ss=7c2a8&oh=00_Af_C-FTW1jFtXcZ2bxlhnhO8jHTf0SL9JJvxg8n6KG6flA&oe=6A2A1281" class="w-10 h-10 rounded-lg shadow-sm">
                <span class="text-xl font-bold tracking-tight">CODENIX<span class="text-purple-600">AI</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 transition hover:scale-105">🌙</button>
                <div class="relative">
                    <button id="user-btn" onclick="toggleDropdown()" class="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-800 rounded-full hover:bg-slate-100 dark:hover:bg-slate-900 transition text-sm">
                        <div id="user-initial" class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-white text-[10px]">U</div>
                        <span id="user-email">...</span>
                    </button>
                    <div id="profile-menu" class="dropdown hidden-menu absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl z-50">
                        <a href="profile.html" class="block px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800">Profile</a>
                        <a href="profile.html#settings" class="block px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800">Settings</a>
                        <button onclick="signOut()" class="block w-full text-left px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12 border-l-4 border-purple-600 pl-6">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Live Operations</h1>
            <p class="text-slate-500 dark:text-slate-400" id="agent-count">Synchronizing with central hub...</p>
        </header>

        <section id="portal-sections" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-400 animate-pulse">Initializing Ecosystem Grid...</div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const GOOGLE_SHEET_ID = "150MBM7hasO1yQi9iBpsM6wU9LojacaKRGmRzXIQZgPs";
        
        // Changed variable name to avoid global naming collisions
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleDropdown() {
            const menu = document.getElementById('profile-menu');
            menu.classList.toggle('hidden-menu');
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
        };

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        }

        async function fetchSections() {
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json`);
            const text = await response.text();
            const json = JSON.parse(text.slice(text.indexOf('({') + 1, text.lastIndexOf('})') + 1));
            return json.table.rows;
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = 'auth.html';
            
            document.getElementById('user-email').textContent = session.user.email.split('@')[0];
            document.getElementById('user-initial').textContent = session.user.email[0].toUpperCase();

            const rows = await fetchSections();
            const container = document.getElementById('portal-sections');
            container.innerHTML = '';
            
            rows.forEach(row => {
                const title = row.c[1]?.v;
                if(title) {
                    container.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl hover:border-purple-600 transition-all cursor-pointer group">
                            <div class="w-10 h-10 bg-purple-600/10 rounded-lg flex items-center justify-center mb-4 group-hover:bg-purple-600 transition">🚀</div>
                            <h3 class="font-bold text-lg mb-1">${title}</h3>
                            <p class="text-sm text-slate-500">Active Operational Module</p>
                        </div>`;
                }
            });
        };
    </script>
</body>
</html>
