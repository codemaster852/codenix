<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nixora | Social Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nix-blue: #0084ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f7f9fb; }
        .glass-nav { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #e1e8ed; }
        .card { background: white; border: 1px solid #e1e8ed; border-radius: 1rem; }
        .btn-primary { background: var(--nix-blue); color: white; font-weight: 700; padding: 0.5rem 1.5rem; border-radius: 999px; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .mention { color: var(--nix-blue); font-weight: 600; cursor: pointer; }
        .hidden-section { display: none !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--nix-blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900">

    <!-- 1. AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-sm w-full text-center space-y-8">
            <div class="text-6xl font-black text-blue-500 tracking-tighter">NIXORA</div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome to the future of social.</h1>
            <button onclick="performLogin()" id="login-btn" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-black text-xl shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                <i class="fa-solid fa-bolt"></i> ENTER UNIVERSE
            </button>
            <p id="auth-status" class="text-gray-400 text-sm">Securing entry...</p>
        </div>
    </div>

    <!-- 2. ONBOARDING SCREEN -->
    <div id="onboarding-screen" class="fixed inset-0 bg-white z-[250] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-sm w-full space-y-6 text-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="text-3xl font-black">Identity Setup</h1>
            <p class="text-gray-500">How should the world see you?</p>
            <div class="space-y-4">
                <input type="text" id="ob-username" placeholder="Username (e.g. neon_driver)" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input type="text" id="ob-displayname" placeholder="Display Name" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="finalizeProfile()" class="w-full btn-primary py-4 text-lg">Create Profile</button>
            </div>
        </div>
    </div>

    <!-- 3. MAIN APP -->
    <div id="app-screen" class="hidden-section">
        <!-- Header -->
        <nav class="fixed top-0 w-full glass-nav z-50 h-16 flex items-center px-4">
            <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
                <div class="text-blue-500 font-black text-2xl cursor-pointer" onclick="showView('home')">NIXORA</div>
                <div class="flex items-center gap-4">
                    <button onclick="showView('messages')" class="p-2 hover:bg-gray-100 rounded-full relative">
                        <i class="fa-regular fa-paper-plane text-xl"></i>
                    </button>
                    <button onclick="showView('notifications')" class="p-2 hover:bg-gray-100 rounded-full relative">
                        <i class="fa-regular fa-bell text-xl"></i>
                        <span id="notif-badge" class="absolute top-1 right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full hidden flex items-center justify-center">0</span>
                    </button>
                    <img id="my-avatar" onclick="openProfile(currentUser.id)" class="w-9 h-9 rounded-full border cursor-pointer object-cover">
                </div>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto flex pt-16 min-h-screen">
            <!-- Sidebar -->
            <aside class="hidden lg:flex flex-col w-64 fixed h-[calc(100vh-64px)] p-4 space-y-2">
                <button onclick="showView('home')" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition">
                    <i class="fa-solid fa-house text-blue-500"></i> Feed
                </button>
                <button onclick="showView('messages')" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition">
                    <i class="fa-solid fa-message text-green-500"></i> Messages
                </button>
                <button onclick="openProfile(currentUser.id)" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition">
                    <i class="fa-solid fa-circle-user text-purple-500"></i> My Profile
                </button>
                <div class="pt-4 border-t mt-4">
                    <p class="text-xs font-bold text-gray-400 uppercase px-3">Suggested</p>
                    <div id="suggested-users" class="mt-2 space-y-2"></div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 lg:ml-64 p-4 lg:p-6">
                <!-- View: Home Feed -->
                <div id="view-home">
                    <div class="card p-4 mb-6 shadow-sm">
                        <div class="flex gap-4">
                            <img id="input-avatar" class="w-12 h-12 rounded-full border bg-gray-100 object-cover">
                            <div class="flex-1">
                                <textarea id="post-input" placeholder="Tag @nix4_ai for AI answers..." class="w-full text-lg resize-none outline-none py-2 bg-transparent h-20"></textarea>
                                <div class="flex justify-between items-center border-t pt-3">
                                    <button class="text-blue-500"><i class="fa-solid fa-image"></i></button>
                                    <button onclick="publishPost()" class="btn-primary">Post</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="feed-container" class="space-y-4"></div>
                </div>

                <!-- View: Profile -->
                <div id="view-profile" class="hidden-section">
                    <div class="card overflow-hidden">
                        <div class="h-40 bg-gradient-to-r from-blue-400 to-indigo-600"></div>
                        <div class="px-6 pb-6 -mt-12 relative">
                            <div class="flex justify-between items-end">
                                <img id="prof-img" class="w-32 h-32 rounded-3xl border-4 border-white object-cover bg-white shadow-lg">
                                <div id="prof-actions" class="pb-2 flex gap-2"></div>
                            </div>
                            <h2 id="prof-name" class="text-3xl font-black mt-4"></h2>
                            <p id="prof-user" class="text-gray-500"></p>
                            <p id="prof-bio" class="mt-4 text-gray-700"></p>
                            <div class="flex gap-6 mt-6 border-t pt-6">
                                <div><span id="prof-following" class="font-black">0</span> <span class="text-gray-500">Following</span></div>
                                <div><span id="prof-followers" class="font-black">0</span> <span class="text-gray-500">Followers</span></div>
                            </div>
                        </div>
                    </div>
                    <div id="prof-posts" class="mt-6 space-y-4"></div>
                </div>

                <!-- View: Messages -->
                <div id="view-messages" class="hidden-section flex flex-col h-[calc(100vh-120px)]">
                    <div class="card flex-1 flex flex-col overflow-hidden">
                        <div class="p-4 border-b font-bold flex items-center justify-between">
                            <span>Messages</span>
                            <div id="chatting-with" class="text-blue-500 text-sm">Select a contact</div>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div id="chat-list" class="w-1/3 border-r overflow-y-auto p-2 space-y-1"></div>
                            <div class="flex-1 flex flex-col">
                                <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
                                <div class="p-4 border-t flex gap-2">
                                    <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 bg-gray-100 rounded-2xl px-4 py-2 outline-none">
                                    <button onclick="sendDirectMessage()" class="btn-primary w-10 h-10 flex items-center justify-center p-0"><i class="fa-solid fa-paper-plane"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const LONGCAT_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        const LONGCAT_API_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let userProfile = null;
        let activeChatId = null;

        const NIX_ID = "00000000-0000-0000-0000-000000000000";

        // --- AUTH & INIT ---
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                document.getElementById('auth-screen').classList.remove('hidden-section');
            } else {
                currentUser = session.user;
                const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).maybeSingle();
                
                if (!profile) {
                    document.getElementById('onboarding-screen').classList.remove('hidden-section');
                } else {
                    userProfile = profile;
                    document.getElementById('app-screen').classList.remove('hidden-section');
                    initApp();
                }
            }
        }

        async function performLogin() {
            const status = document.getElementById('auth-status');
            status.innerText = "Connecting to Nixora...";
            const { error } = await supabaseClient.auth.signInAnonymously();
            if (error) status.innerText = "Error: " + error.message;
            else checkSession();
        }

        async function finalizeProfile() {
            const username = document.getElementById('ob-username').value.trim().toLowerCase();
            const display = document.getElementById('ob-displayname').value.trim();
            if(!username || !display) return alert("Fill all fields");

            const { error } = await supabaseClient.from('profiles_social').upsert({
                id: currentUser.id,
                username: username,
                display_name: display,
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`
            });

            if(error) alert("Username taken or network error");
            else location.reload();
        }

        // --- APP LOGIC ---
        function initApp() {
            document.getElementById('my-avatar').src = userProfile.avatar_url;
            document.getElementById('input-avatar').src = userProfile.avatar_url;
            loadFeed();
            loadSuggested();
            subscribeToNotifications();
        }

        function showView(view) {
            ['view-home', 'view-profile', 'view-messages'].forEach(v => document.getElementById(v).classList.add('hidden-section'));
            document.getElementById(`view-${view}`).classList.remove('hidden-section');
            if(view === 'messages') loadChatList();
        }

        async function loadSuggested() {
            const { data } = await supabaseClient.from('profiles_social').select('*').limit(5);
            const container = document.getElementById('suggested-users');
            container.innerHTML = data.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="openProfile('${u.id}')" class="flex items-center gap-3 p-2 hover:bg-white rounded-xl cursor-pointer">
                    <img src="${u.avatar_url}" class="w-8 h-8 rounded-full border">
                    <div class="text-xs">
                        <p class="font-bold">${u.display_name}</p>
                        <p class="text-gray-400">@${u.username}</p>
                    </div>
                </div>
            `).join('');
        }

        async function publishPost() {
            const input = document.getElementById('post-input');
            const content = input.value.trim();
            if(!content) return;

            const { data, error } = await supabaseClient.from('posts_social').insert([{
                user_id: currentUser.id,
                content: content
            }]).select();

            if (!error && content.includes('@nix4_ai')) handleAI(data[0].id, content);
            input.value = '';
            loadFeed();
        }

        async function handleAI(postId, content) {
            const res = await fetch(LONGCAT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${LONGCAT_API_KEY}` },
                body: JSON.stringify({
                    model: "LongCat-Flash-Chat",
                    messages: [{ role: "system", content: "You are Nix 4 AI. Respond briefly." }, { role: "user", content }]
                })
            });
            const json = await res.json();
            const text = json.choices[0].message.content;
            await supabaseClient.from('comments_social').insert([{ post_id: postId, user_id: NIX_ID, content: text }]);
            loadFeed();
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('posts_social')
                .select('*, profiles_social(*), likes_social(user_id), comments_social(count)')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('feed-container');
            container.innerHTML = data.map(post => {
                const p = post.profiles_social || { display_name: "Unknown", username: "deleted", avatar_url: "" };
                const isLiked = post.likes_social?.some(l => l.user_id === currentUser.id);
                return `
                    <div class="card p-4 hover:shadow-md transition">
                        <div class="flex gap-3">
                            <img onclick="openProfile('${p.id}')" src="${p.avatar_url}" class="w-11 h-11 rounded-full border cursor-pointer object-cover">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-1">
                                    <span class="font-bold cursor-pointer" onclick="openProfile('${p.id}')">${p.display_name}</span>
                                    ${p.is_verified ? '<i class="fa-solid fa-circle-check text-blue-500 text-[10px]"></i>' : ''}
                                    <span class="text-gray-400 text-sm">@${p.username}</span>
                                </div>
                                <p class="mt-1 text-[15px] whitespace-pre-wrap">${post.content}</p>
                                <div class="flex gap-8 mt-4 text-gray-400 text-sm">
                                    <button onclick="toggleLike('${post.id}', ${isLiked})" class="${isLiked ? 'text-red-500 font-bold' : ''}">
                                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${post.likes_social?.length || 0}
                                    </button>
                                    <button><i class="fa-regular fa-comment"></i> ${post.comments_social?.[0]?.count || 0}</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleLike(pid, liked) {
            if(liked) await supabaseClient.from('likes_social').delete().match({ user_id: currentUser.id, post_id: pid });
            else await supabaseClient.from('likes_social').insert([{ user_id: currentUser.id, post_id: pid }]);
            loadFeed();
        }

        // --- PROFILE & SOCIAL ---
        async function openProfile(uid) {
            showView('profile');
            const { data: p } = await supabaseClient.from('profiles_social').select('*').eq('id', uid).single();
            const { data: following } = await supabaseClient.from('follows_social').select('count').eq('follower_id', uid);
            const { data: followers } = await supabaseClient.from('follows_social').select('count').eq('following_id', uid);
            const { data: isFollowed } = await supabaseClient.from('follows_social').select('*').match({ follower_id: currentUser.id, following_id: uid }).maybeSingle();

            document.getElementById('prof-img').src = p.avatar_url;
            document.getElementById('prof-name').innerText = p.display_name;
            document.getElementById('prof-user').innerText = `@${p.username}`;
            document.getElementById('prof-bio').innerText = p.bio || "No status yet.";
            document.getElementById('prof-following').innerText = following?.[0]?.count || 0;
            document.getElementById('prof-followers').innerText = followers?.[0]?.count || 0;

            const actionDiv = document.getElementById('prof-actions');
            if(uid === currentUser.id) {
                actionDiv.innerHTML = `<button class="btn-primary bg-gray-100 text-black border">Edit Profile</button>`;
            } else {
                actionDiv.innerHTML = `
                    <button onclick="toggleFollow('${uid}', ${!!isFollowed})" class="${isFollowed ? 'bg-gray-100 text-black' : 'btn-primary'} py-2 px-6 rounded-full font-bold">
                        ${isFollowed ? 'Following' : 'Follow'}
                    </button>
                    <button onclick="startChat('${uid}')" class="w-10 h-10 rounded-full border flex items-center justify-center hover:bg-gray-50"><i class="fa-regular fa-envelope"></i></button>
                `;
            }
        }

        async function toggleFollow(uid, followed) {
            if(followed) await supabaseClient.from('follows_social').delete().match({ follower_id: currentUser.id, following_id: uid });
            else {
                await supabaseClient.from('follows_social').insert([{ follower_id: currentUser.id, following_id: uid }]);
                await supabaseClient.from('notifications_social').insert([{ user_id: uid, actor_id: currentUser.id, type: 'follow' }]);
            }
            openProfile(uid);
        }

        // --- MESSAGING ---
        async function startChat(uid) {
            activeChatId = uid;
            showView('messages');
            loadChatWindow();
        }

        async function loadChatList() {
            // Get all profiles we've messaged with
            const { data: sent } = await supabaseClient.from('messages_social').select('receiver_id').eq('sender_id', currentUser.id);
            const { data: recv } = await supabaseClient.from('messages_social').select('sender_id').eq('receiver_id', currentUser.id);
            const ids = [...new Set([...sent.map(m=>m.receiver_id), ...recv.map(m=>m.sender_id)])];
            
            const { data: profiles } = await supabaseClient.from('profiles_social').select('*').in('id', ids);
            const list = document.getElementById('chat-list');
            list.innerHTML = profiles.map(p => `
                <div onclick="startChat('${p.id}')" class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl cursor-pointer ${activeChatId === p.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}">
                    <img src="${p.avatar_url}" class="w-10 h-10 rounded-full border object-cover">
                    <div class="overflow-hidden">
                        <p class="font-bold text-sm truncate">${p.display_name}</p>
                        <p class="text-xs text-gray-400 truncate">@${p.username}</p>
                    </div>
                </div>
            `).join('');
        }

        async function loadChatWindow() {
            if(!activeChatId) return;
            const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', activeChatId).single();
            document.getElementById('chatting-with').innerText = `@${profile.username}`;

            const { data: messages } = await supabaseClient.from('messages_social')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const win = document.getElementById('chat-window');
            win.innerHTML = messages.map(m => `
                <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[70%] ${m.sender_id === currentUser.id ? 'bg-blue-500 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white border rounded-r-2xl rounded-tl-2xl'} p-3 shadow-sm text-sm">
                        ${m.content}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendDirectMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChatId) return;

            await supabaseClient.from('messages_social').insert([{
                sender_id: currentUser.id,
                receiver_id: activeChatId,
                content: text
            }]);

            input.value = '';
            loadChatWindow();
            loadChatList();
        }

        function subscribeToNotifications() {
            supabaseClient.channel('realtime')
            .on('postgres_changes', { event: 'INSERT', table: 'messages_social', filter: `receiver_id=eq.${currentUser.id}` }, payload => {
                if(activeChatId === payload.new.sender_id) loadChatWindow();
                else {
                    const badge = document.getElementById('notif-badge');
                    badge.classList.remove('hidden');
                }
            }).subscribe();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
