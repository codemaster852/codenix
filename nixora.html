<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nixora | Social Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nx-blue: #0866ff; --nx-bg: #f0f2f5; --nx-card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--nx-bg); color: #050505; }
        .nx-logo { font-weight: 900; font-style: italic; background: linear-gradient(45deg, #0866ff, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; letter-spacing: -1px; }
        .nav-icon { height: 50px; width: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #65676b; position: relative; transition: 0.2s; border-radius: 8px; }
        .nav-icon:hover { background: #f2f2f2; }
        .nav-icon.active { color: var(--nx-blue); border-bottom: 3px solid var(--nx-blue); border-radius: 0; }
        .card { background: var(--nx-card); border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .hidden-section { display: none !important; }
        .post-media { border-radius: 8px; max-height: 500px; width: 100%; object-fit: cover; margin-top: 10px; }
        .calling-anim { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[3000] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="nx-logo text-6xl">nixora</div>
            <p class="text-xl text-gray-600 italic">"Connect with the World"</p>
            <div class="space-y-4">
                <input id="auth-username" type="text" placeholder="Enter display name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-blue-400">
                <button onclick="performLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">Enter Nixora</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header" class="fixed top-0 left-0 right-0 h-14 bg-white shadow-sm flex items-center justify-between px-4 z-50 hidden-section">
        <div class="flex items-center gap-2 w-1/4">
            <div class="nx-logo cursor-pointer" onclick="showView('home')">nx</div>
            <div class="relative hidden md:block">
                <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Search users..." class="bg-gray-100 rounded-full px-4 py-1.5 text-sm w-48 focus:w-64 transition-all outline-none border focus:border-blue-400">
                <div id="search-results" class="absolute top-10 left-0 w-64 bg-white shadow-xl rounded-lg hidden-section border p-2 z-[70]"></div>
            </div>
        </div>
        
        <div class="flex items-center justify-center flex-1 h-full">
            <div onclick="showView('home')" class="nav-icon active" id="nav-home"><i class="fa-solid fa-house text-xl"></i></div>
            <div onclick="showView('messages')" class="nav-icon" id="nav-messages"><i class="fa-solid fa-message text-xl"></i></div>
            <div onclick="showView('ai')" class="nav-icon" id="nav-ai"><i class="fa-solid fa-cat text-xl"></i></div>
            <div onclick="showProfileView()" class="nav-icon" id="nav-profile"><i class="fa-solid fa-user text-xl"></i></div>
        </div>

        <div class="flex items-center justify-end gap-3 w-1/4">
            <img id="my-avatar-nav" onclick="showProfileView()" class="w-10 h-10 rounded-full cursor-pointer object-cover border-2 border-transparent hover:border-blue-400">
        </div>
    </header>

    <!-- Main Content -->
    <div id="app-screen" class="pt-14 flex justify-center min-h-screen hidden-section">
        <!-- Sidebar -->
        <aside class="hidden xl:block fixed left-0 w-72 h-full p-4 space-y-4">
            <div onclick="showProfileView()" class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer">
                <img id="my-avatar-side" class="w-10 h-10 rounded-full object-cover">
                <span id="my-name-side" class="font-bold text-gray-800"></span>
            </div>
            <div class="space-y-2">
                <h3 class="px-3 text-gray-500 font-bold text-xs uppercase">Users from Nixora</h3>
                <div id="users-list" class="space-y-1">
                    <!-- Loaded from Supabase -->
                </div>
            </div>
        </aside>

        <main class="w-full max-w-[600px] px-2 py-4">
            <!-- Feed View -->
            <div id="view-home" class="space-y-4">
                <div class="card p-4 flex gap-3">
                    <img id="input-avatar" class="w-10 h-10 rounded-full object-cover">
                    <div onclick="openPostModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 rounded-full px-4 flex items-center text-gray-500 cursor-pointer">What's on your mind?</div>
                </div>
                <div id="feed-container" class="space-y-4"></div>
            </div>

            <!-- Profile View -->
            <div id="view-profile" class="hidden-section space-y-4">
                <div class="card overflow-hidden">
                    <div class="h-32 bg-blue-600"></div>
                    <div class="px-4 pb-4 -mt-12 flex flex-col items-center">
                        <img id="profile-view-avatar" class="w-24 h-24 rounded-full border-4 border-white object-cover bg-white">
                        <h2 id="profile-view-name" class="text-2xl font-bold mt-2"></h2>
                        <div id="profile-view-id" class="text-xs text-gray-400 font-mono"></div>
                    </div>
                </div>
                <div id="profile-feed" class="space-y-4"></div>
            </div>

            <!-- Messages View -->
            <div id="view-messages" class="hidden-section h-[80vh] card flex overflow-hidden">
                <div class="w-1/3 border-r overflow-y-auto" id="chat-threads"></div>
                <div class="flex-1 flex flex-col bg-gray-50">
                    <div id="chat-header" class="p-4 bg-white border-b flex justify-between items-center hidden-section">
                        <div class="flex items-center gap-3">
                            <img id="chat-target-avatar" class="w-10 h-10 rounded-full object-cover">
                            <span id="chat-target-name" class="font-bold"></span>
                        </div>
                        <button onclick="startVoiceCall()" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full"><i class="fa-solid fa-phone"></i></button>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
                    <div id="chat-input-area" class="p-3 bg-white border-t flex gap-2 hidden-section">
                        <input id="msg-input" type="text" placeholder="Message..." class="flex-1 bg-gray-100 rounded-full px-4 outline-none">
                        <button onclick="sendMessage()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <!-- AI View -->
            <div id="view-ai" class="hidden-section h-[80vh] card flex flex-col overflow-hidden">
                <div class="p-4 bg-blue-600 text-white font-bold flex items-center gap-2">
                    <i class="fa-solid fa-cat"></i> LongCat Omni-2603
                </div>
                <div id="ai-chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
                <div class="p-4 border-t flex gap-2">
                    <input id="ai-input" type="text" placeholder="Ask Omni AI..." class="flex-1 border rounded-full px-4 outline-none">
                    <button onclick="sendAiMessage()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-bolt"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Voice Call -->
    <div id="voice-call" class="fixed inset-0 bg-slate-900 z-[4000] flex flex-col items-center justify-center hidden-section text-white">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-blue-500/20 rounded-full animate-ping"></div>
            <img id="call-avatar" class="w-32 h-32 rounded-full border-4 border-blue-500 relative z-10 object-cover">
        </div>
        <h2 id="call-name" class="text-2xl font-bold mb-2"></h2>
        <p class="text-blue-400 animate-pulse mb-8">Connecting Peer-to-Peer...</p>
        <button onclick="endCall()" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl hover:bg-red-600 transition"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center hidden-section">
        <div class="card w-full max-w-md p-4 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="font-bold">Create Post</h2>
                <button onclick="closePostModal()" class="text-2xl">&times;</button>
            </div>
            <textarea id="post-input" class="w-full min-h-[120px] outline-none resize-none" placeholder="What's happening?"></textarea>
            <input id="post-image-url" type="text" placeholder="Image URL (optional)" class="w-full p-2 border rounded text-sm">
            <button onclick="publishPost()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">Post</button>
        </div>
    </div>

    <script>
        const apiKey = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J"; 
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userProfile = null;
        let allUsers = [];
        let activeChatId = null;

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).single();
                if (data) {
                    userProfile = data;
                    initApp();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden-section');
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden-section');
            }
        }

        async function performLogin() {
            const name = document.getElementById('auth-username').value.trim();
            if (!name) return alert("Please enter a name");

            const { data: authData } = await supabaseClient.auth.signInAnonymously();
            currentUser = authData.user;

            const profile = {
                id: currentUser.id,
                display_name: name,
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name + Math.random()}`
            };

            await supabaseClient.from('profiles_social').upsert(profile);
            userProfile = profile;
            initApp();
        }

        async function initApp() {
            document.getElementById('auth-screen').classList.add('hidden-section');
            document.getElementById('app-screen').classList.remove('hidden-section');
            document.getElementById('main-header').classList.remove('hidden-section');

            document.getElementById('my-avatar-nav').src = userProfile.avatar_url;
            document.getElementById('my-avatar-side').src = userProfile.avatar_url;
            document.getElementById('my-name-side').innerText = userProfile.display_name;
            document.getElementById('input-avatar').src = userProfile.avatar_url;

            loadUsers();
            loadFeed();
            subscribeToPosts();
            subscribeToMessages();
        }

        async function loadUsers() {
            const { data } = await supabaseClient.from('profiles_social').select('*');
            allUsers = data || [];
            
            const list = document.getElementById('users-list');
            list.innerHTML = allUsers.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="showProfileView('${u.id}')" class="flex items-center justify-between p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                    <div class="flex items-center gap-3">
                        <img src="${u.avatar_url}" class="w-9 h-9 rounded-full object-cover">
                        <span class="text-sm font-bold text-gray-700">${u.display_name}</span>
                    </div>
                    <button onclick="event.stopPropagation(); openChat('${u.id}')" class="text-blue-500"><i class="fa-solid fa-message"></i></button>
                </div>
            `).join('');

            const threads = document.getElementById('chat-threads');
            threads.innerHTML = allUsers.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="openChat('${u.id}')" class="flex items-center gap-3 p-3 hover:bg-gray-100 cursor-pointer border-b">
                    <img src="${u.avatar_url}" class="w-12 h-12 rounded-full object-cover">
                    <div>
                        <p class="font-bold">${u.display_name}</p>
                        <p class="text-xs text-gray-500">Active now</p>
                    </div>
                </div>
            `).join('');
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient
                .from('posts_social')
                .select('*, profiles_social(*)')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('feed-container');
            container.innerHTML = posts.map(p => `
                <div class="card p-4 space-y-3">
                    <div class="flex items-center gap-2">
                        <img src="${p.profiles_social?.avatar_url}" class="w-10 h-10 rounded-full object-cover cursor-pointer" onclick="showProfileView('${p.user_id}')">
                        <div>
                            <p class="font-bold cursor-pointer" onclick="showProfileView('${p.user_id}')">${p.profiles_social?.display_name}</p>
                            <p class="text-[10px] text-gray-400">${new Date(p.created_at).toLocaleString()}</p>
                        </div>
                    </div>
                    <p class="text-gray-800">${p.content}</p>
                    ${p.media_url ? `<img src="${p.media_url}" class="post-media">` : ''}
                    <div class="flex border-t pt-2 gap-4">
                        <button onclick="likePost('${p.id}')" class="flex-1 py-1 hover:bg-gray-100 rounded font-bold text-gray-500"><i class="fa-regular fa-heart"></i> ${p.likes || 0} Likes</button>
                        <button class="flex-1 py-1 hover:bg-gray-100 rounded font-bold text-gray-500"><i class="fa-regular fa-comment"></i> Comment</button>
                    </div>
                </div>
            `).join('');
        }

        async function publishPost() {
            const content = document.getElementById('post-input').value.trim();
            const media = document.getElementById('post-image-url').value.trim();
            if (!content && !media) return;

            await supabaseClient.from('posts_social').insert([{
                user_id: currentUser.id,
                content: content,
                media_url: media,
                likes: 0
            }]);

            closePostModal();
            loadFeed();
        }

        async function openChat(uid) {
            showView('messages');
            activeChatId = uid;
            const target = allUsers.find(u => u.id === uid);
            
            document.getElementById('chat-header').classList.remove('hidden-section');
            document.getElementById('chat-input-area').classList.remove('hidden-section');
            document.getElementById('chat-target-avatar').src = target.avatar_url;
            document.getElementById('chat-target-name').innerText = target.display_name;
            
            loadMessages();
        }

        async function loadMessages() {
            if (!activeChatId) return;
            const { data } = await supabaseClient.from('messages_social')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const win = document.getElementById('chat-messages');
            win.innerHTML = (data || []).map(m => `
                <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[80%] p-2 px-4 rounded-2xl ${m.sender_id === currentUser.id ? 'bg-blue-600 text-white' : 'bg-white border shadow-sm'}">
                        ${m.content}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if (!val || !activeChatId) return;

            await supabaseClient.from('messages_social').insert([{
                sender_id: currentUser.id,
                receiver_id: activeChatId,
                content: val
            }]);
            input.value = '';
            loadMessages();
        }

        function handleSearch(val) {
            const resultsBox = document.getElementById('search-results');
            if (!val) { resultsBox.classList.add('hidden-section'); return; }
            
            const filtered = allUsers.filter(u => u.display_name.toLowerCase().includes(val.toLowerCase()));
            resultsBox.classList.remove('hidden-section');
            resultsBox.innerHTML = filtered.map(u => `
                <div onclick="showProfileView('${u.id}')" class="flex items-center gap-3 p-2 hover:bg-gray-100 cursor-pointer rounded">
                    <img src="${u.avatar_url}" class="w-8 h-8 rounded-full object-cover">
                    <span class="font-bold text-sm">${u.display_name}</span>
                </div>
            `).join('') || '<p class="text-xs p-2 text-gray-500">No users found</p>';
        }

        async function showProfileView(uid = currentUser.id) {
            showView('profile');
            document.getElementById('search-results').classList.add('hidden-section');
            const user = allUsers.find(u => u.id === uid) || (uid === currentUser.id ? userProfile : null);
            if (!user) return;

            document.getElementById('profile-view-avatar').src = user.avatar_url;
            document.getElementById('profile-view-name').innerText = user.display_name;
            document.getElementById('profile-view-id').innerText = `@${user.id.slice(0, 8)}`;

            const { data: posts } = await supabaseClient.from('posts_social').select('*, profiles_social(*)').eq('user_id', uid).order('created_at', { ascending: false });
            
            const container = document.getElementById('profile-feed');
            container.innerHTML = posts.map(p => `
                <div class="card p-4 space-y-2">
                    <p class="text-sm">${p.content}</p>
                    ${p.media_url ? `<img src="${p.media_url}" class="post-media">` : ''}
                </div>
            `).join('') || '<p class="text-center text-gray-400 py-10">No posts yet</p>';
        }

        async function sendAiMessage() {
            const input = document.getElementById('ai-input');
            const val = input.value.trim();
            if (!val) return;
            
            appendAiChat("user", val);
            input.value = '';
            
            try {
                const response = await fetch("https://api.longcat.chat/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Omni-2603",
                        messages: [{ role: "user", content: [{ type: "text", text: val }] }],
                        stream: false
                    })
                });
                const data = await response.json();
                appendAiChat("ai", data.choices[0].message.content);
            } catch (err) {
                appendAiChat("ai", "Omni Core connection error.");
            }
        }

        function appendAiChat(role, text) {
            const win = document.getElementById('ai-chat-window');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[85%] p-3 rounded-2xl ${role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border'} text-sm shadow-sm">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function showView(v) {
            ['home', 'messages', 'profile', 'ai'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden-section'));
            document.getElementById(`view-${v}`).classList.remove('hidden-section');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
        }

        function openPostModal() { document.getElementById('post-modal').classList.remove('hidden-section'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden-section'); }
        
        function startVoiceCall() {
            const target = allUsers.find(u => u.id === activeChatId);
            document.getElementById('voice-call').classList.remove('hidden-section');
            document.getElementById('call-avatar').src = target.avatar_url;
            document.getElementById('call-name').innerText = target.display_name;
        }
        function endCall() { document.getElementById('voice-call').classList.add('hidden-section'); }

        function subscribeToPosts() {
            supabaseClient.channel('posts').on('postgres_changes', { event: '*', table: 'posts_social' }, loadFeed).subscribe();
        }
        function subscribeToMessages() {
            supabaseClient.channel('messages').on('postgres_changes', { event: 'INSERT', table: 'messages_social' }, loadMessages).subscribe();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
