<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nixora | Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nx-blue: #0866ff; --nx-bg: #f0f2f5; --nx-card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--nx-bg); color: #050505; transition: direction 0.3s; }
        .nx-logo { font-weight: 900; font-style: italic; background: linear-gradient(45deg, #0866ff, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; letter-spacing: -1px; }
        .nav-icon { height: 50px; width: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #65676b; position: relative; transition: 0.2s; border-radius: 8px; }
        .nav-icon:hover { background: #f2f2f2; }
        .nav-icon.active { color: var(--nx-blue); border-bottom: 3px solid var(--nx-blue); border-radius: 0; }
        .card { background: var(--nx-card); border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .hidden-section { display: none !important; }
        .rtl { direction: rtl; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
        .calling-anim { animation: pulse 2s infinite; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[3000] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="nx-logo text-6xl">nixora</div>
            <p id="txt-slogan" class="text-xl text-gray-600 italic">"The Future of Professional Connection"</p>
            <button onclick="performLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition">Enter Nixora</button>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header" class="fixed top-0 left-0 right-0 h-14 bg-white shadow-sm flex items-center justify-between px-4 z-50 hidden-section">
        <div class="flex items-center gap-2 w-1/4">
            <div class="nx-logo cursor-pointer select-none" onclick="showView('home')">nx</div>
        </div>
        
        <div class="flex items-center justify-center flex-1 h-full">
            <div onclick="showView('home')" class="nav-icon active" id="nav-home"><i class="fa-solid fa-house"></i></div>
            <div onclick="showView('messages')" class="nav-icon" id="nav-messages"><i class="fa-solid fa-message"></i></div>
            <div onclick="showView('ai')" class="nav-icon" id="nav-ai"><i class="fa-solid fa-cat"></i></div>
        </div>

        <div class="flex items-center justify-end gap-3 w-1/4">
            <div class="relative">
                <div onclick="toggleNotifications()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-200">
                    <i class="fa-solid fa-bell"></i>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white"></span>
                </div>
                <div id="notif-dropdown" class="absolute top-12 right-0 bg-white shadow-2xl rounded-lg border hidden-section z-[60] p-2 w-80">
                    <h3 id="txt-notif-title" class="font-bold p-2 text-lg">Notifications</h3>
                    <div id="notif-list" class="max-h-64 overflow-y-auto"></div>
                </div>
            </div>
            <img id="my-avatar-nav" class="w-9 h-9 rounded-full cursor-pointer object-cover border">
        </div>
    </header>

    <!-- Main Content -->
    <div id="app-screen" class="pt-14 flex justify-center min-h-screen hidden-section">
        <!-- Sidebar -->
        <aside class="hidden xl:block fixed left-0 w-72 h-full p-4 space-y-1">
            <div class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer">
                <img id="my-avatar-side" class="w-9 h-9 rounded-full object-cover">
                <span id="my-name-side" class="font-semibold"></span>
            </div>
            <hr class="my-4">
            <h3 id="txt-labs" class="px-3 text-gray-500 font-bold text-sm uppercase">Nixora Labs</h3>
            <div class="flex items-center gap-3 p-3 bg-blue-50 text-blue-700 rounded-lg cursor-pointer" onclick="showView('ai')">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cat"></i></div>
                <span id="txt-longcat">Longcat AI</span>
            </div>
            <div id="users-discovery" class="mt-6 space-y-2">
                <h3 id="txt-discovery" class="px-3 text-gray-500 font-bold text-sm uppercase">Discover Users</h3>
                <div id="users-list" class="space-y-1"></div>
            </div>
        </aside>

        <main class="w-full max-w-[680px] px-2 py-4 pb-20">
            <!-- View: Home -->
            <div id="view-home" class="space-y-5">
                <div class="card p-4 space-y-3">
                    <div class="flex gap-3">
                        <img id="input-avatar" class="w-10 h-10 rounded-full object-cover">
                        <div onclick="openPostModal()" id="txt-think" class="flex-1 bg-[#f0f2f5] rounded-full px-4 flex items-center text-gray-500 cursor-pointer">What's on your mind?</div>
                    </div>
                </div>
                <div id="feed-container" class="space-y-4"></div>
            </div>

            <!-- View: Messages -->
            <div id="view-messages" class="hidden-section h-[85vh]">
                <div class="card h-full flex overflow-hidden">
                    <div class="w-1/3 border-r flex flex-col">
                        <div class="p-4 font-bold border-b" id="txt-chats">Chats</div>
                        <div id="chat-threads" class="flex-1 overflow-y-auto"></div>
                    </div>
                    <div class="flex-1 flex flex-col bg-gray-50">
                        <div id="chat-header" class="p-4 bg-white border-b flex justify-between items-center hidden-section">
                            <div class="flex items-center gap-2">
                                <img id="chat-target-avatar" class="w-8 h-8 rounded-full">
                                <span id="chat-target-name" class="font-bold"></span>
                            </div>
                            <button onclick="startUserCall()" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full"><i class="fa-solid fa-phone"></i></button>
                        </div>
                        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
                            <div class="h-full flex items-center justify-center text-gray-400 italic" id="txt-select-chat">Select a user to start messaging</div>
                        </div>
                        <div id="chat-input-area" class="p-3 bg-white border-t flex gap-2 hidden-section">
                            <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none">
                            <button onclick="sendMessage()" class="text-blue-600 px-2"><i class="fa-solid fa-paper-plane text-xl"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- View: AI -->
            <div id="view-ai" class="hidden-section h-[80vh]">
                <div class="card h-full flex flex-col overflow-hidden border-2 border-blue-200">
                    <div class="p-4 border-b bg-blue-600 text-white flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-cat text-2xl"></i>
                            <div><p class="font-bold">Longcat AI (Nix4)</p><p class="text-xs opacity-80" id="txt-ai-status">Online - AI Core</p></div>
                        </div>
                    </div>
                    <div id="ai-chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50"></div>
                    <div class="p-4 border-t flex gap-2 bg-white">
                        <input id="ai-input" type="text" placeholder="Talk to AI..." class="flex-1 border rounded-full px-4 py-2 outline-none">
                        <button onclick="sendAiMessage()" class="bg-blue-600 text-white w-10 h-10 rounded-full"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Voice Call Screen -->
    <div id="voice-call" class="fixed inset-0 bg-slate-900 z-[4000] flex flex-col items-center justify-center p-6 hidden-section text-white">
        <div class="text-center space-y-8">
            <div class="relative flex items-center justify-center">
                <div class="absolute w-48 h-48 bg-blue-500/20 rounded-full calling-anim"></div>
                <img id="call-avatar" class="w-32 h-32 rounded-full border-4 border-blue-500 z-10 object-cover">
            </div>
            <div>
                <h2 id="call-name" class="text-3xl font-bold">Calling...</h2>
                <p id="call-status" class="text-blue-400 font-mono mt-2">Connecting to secure peer...</p>
            </div>
            <div class="flex gap-8">
                <button onclick="endVoiceCall()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center text-3xl shadow-2xl hover:bg-red-600 transition">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center hidden-section">
        <div class="card w-full max-w-[500px] p-4 space-y-4 mx-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-xl font-bold" id="txt-create-post">Create Post</h2>
                <button onclick="closePostModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <textarea id="post-input" class="w-full text-lg resize-none outline-none min-h-[120px]" placeholder="What's happening?"></textarea>
            <button onclick="publishPost()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg" id="btn-post">Post</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl opacity-0 transition-opacity z-[5000] pointer-events-none"></div>

    <script>
        const apiKey = ""; 
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, userProfile = null, activeChatId = null;
        let allUsers = [], currentLang = 'en';

        const i18n = {
            en: {
                login: "Enter Nixora", slogan: "The Future of Professional Connection", think: "What's on your mind?", labs: "Nixora Labs", longcat: "Longcat AI", discovery: "Discover Users",
                chats: "Chats", selectChat: "Select a user to start messaging", aiStatus: "Online - AI Core", createPost: "Create Post", post: "Post", notif: "Notifications"
            },
            ar: {
                login: "دخول نيكسورا", slogan: "مستقبل التواصل المهني", think: "بم تفكر؟", labs: "مختبرات نيكسورا", longcat: "لونج كات AI", discovery: "اكتشف المستخدمين",
                chats: "المحادثات", selectChat: "اختر مستخدماً لبدء المراسلة", aiStatus: "متصل - النواة الذكية", createPost: "إنشاء منشور", post: "نشر", notif: "الإشعارات"
            }
        };

        function setLanguage() {
            const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
            currentLang = lang;
            if (lang === 'ar') document.body.classList.add('rtl');
            
            const t = i18n[lang];
            document.getElementById('btn-login').innerText = t.login;
            document.getElementById('txt-slogan').innerText = t.slogan;
            document.getElementById('txt-think').innerText = t.think;
            document.getElementById('txt-labs').innerText = t.labs;
            document.getElementById('txt-longcat').innerText = t.longcat;
            document.getElementById('txt-discovery').innerText = t.discovery;
            document.getElementById('txt-chats').innerText = t.chats;
            document.getElementById('txt-select-chat').innerText = t.selectChat;
            document.getElementById('txt-ai-status').innerText = t.aiStatus;
            document.getElementById('txt-create-post').innerText = t.createPost;
            document.getElementById('btn-post').innerText = t.post;
            document.getElementById('txt-notif-title').innerText = t.notif;
            document.getElementById('post-input').placeholder = t.think;
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) document.getElementById('auth-screen').classList.remove('hidden-section');
            else { currentUser = session.user; initApp(); }
        }

        async function performLogin() {
            await supabaseClient.auth.signInAnonymously();
            checkSession();
        }

        async function initApp() {
            setLanguage();
            document.getElementById('auth-screen').classList.add('hidden-section');
            document.getElementById('app-screen').classList.remove('hidden-section');
            document.getElementById('main-header').classList.remove('hidden-section');

            const seed = currentUser.id.slice(0, 5);
            userProfile = { 
                id: currentUser.id,
                display_name: "User_" + seed, 
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}` 
            };

            // Sync profile
            await supabaseClient.from('profiles_social').upsert({
                id: currentUser.id,
                display_name: userProfile.display_name,
                avatar_url: userProfile.avatar_url
            });

            ['my-avatar-nav', 'my-avatar-side', 'input-avatar'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.src = userProfile.avatar_url;
            });
            document.getElementById('my-name-side').innerText = userProfile.display_name;

            loadFeed();
            loadUsers();
            subscribeToMessages();
        }

        async function loadUsers() {
            const { data } = await supabaseClient.from('profiles_social').select('*').neq('id', currentUser.id);
            allUsers = data || [];
            const list = document.getElementById('users-list');
            list.innerHTML = allUsers.map(u => `
                <div onclick="startChat('${u.id}')" class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer transition">
                    <img src="${u.avatar_url}" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-medium">${u.display_name}</span>
                </div>
            `).join('');
        }

        async function loadFeed() {
            const { data: posts } = await supabaseClient.from('posts_social').select('*, profiles_social(*)').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = (posts || []).map(p => `
                <div class="card p-4 space-y-3">
                    <div class="flex items-center gap-2">
                        <img src="${p.profiles_social?.avatar_url}" class="w-10 h-10 rounded-full">
                        <div><p class="font-bold">${p.profiles_social?.display_name}</p><p class="text-xs text-gray-500">${new Date(p.created_at).toLocaleTimeString()}</p></div>
                    </div>
                    <p>${p.content}</p>
                    <hr>
                    <div class="flex gap-4 font-bold text-sm text-gray-500">
                        <button class="flex-1 py-1 hover:bg-gray-100 rounded">Like</button>
                        <button onclick="startChat('${p.user_id}')" class="flex-1 py-1 hover:bg-gray-100 rounded">Message</button>
                    </div>
                </div>
            `).join('');
        }

        // --- MESSAGING SYSTEM ---

        async function startChat(userId) {
            showView('messages');
            const user = allUsers.find(u => u.id === userId) || { display_name: "External User", avatar_url: "https://api.dicebear.com/7.x/avataaars/svg?seed=ext" };
            activeChatId = userId;
            
            document.getElementById('chat-header').classList.remove('hidden-section');
            document.getElementById('chat-input-area').classList.remove('hidden-section');
            document.getElementById('chat-target-name').innerText = user.display_name;
            document.getElementById('chat-target-avatar').src = user.avatar_url;
            
            loadMessages();
        }

        async function loadMessages() {
            const { data } = await supabaseClient.from('messages_social')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            const win = document.getElementById('chat-messages');
            win.innerHTML = (data || []).map(m => `
                <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[70%] p-2 px-4 rounded-2xl ${m.sender_id === currentUser.id ? 'bg-blue-600 text-white' : 'bg-white shadow-sm'}">
                        ${m.content}
                    </div>
                </div>
            `).join('') || `<div class="text-center text-gray-400 py-10">Start the conversation...</div>`;
            win.scrollTop = win.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val || !activeChatId) return;

            await supabaseClient.from('messages_social').insert([{
                sender_id: currentUser.id,
                receiver_id: activeChatId,
                content: val
            }]);
            input.value = '';
            loadMessages();
        }

        function subscribeToMessages() {
            supabaseClient.channel('messages_realtime')
                .on('postgres_changes', { event: 'INSERT', table: 'messages_social' }, (payload) => {
                    if(payload.new.receiver_id === currentUser.id || payload.new.sender_id === currentUser.id) {
                        if(activeChatId === payload.new.sender_id || activeChatId === payload.new.receiver_id) {
                            loadMessages();
                        } else if(payload.new.receiver_id === currentUser.id) {
                            showToast("New message from another user!");
                        }
                    }
                }).subscribe();
        }

        // --- VOICE CALLS ---

        function startUserCall() {
            if(!activeChatId) return;
            const user = allUsers.find(u => u.id === activeChatId);
            document.getElementById('voice-call').classList.remove('hidden-section');
            document.getElementById('call-avatar').src = user?.avatar_url;
            document.getElementById('call-name').innerText = user?.display_name;
            document.getElementById('call-status').innerText = "Ringing peer...";
            
            // Simulating real-time signal
            setTimeout(() => {
                document.getElementById('call-status').innerText = "Connected Securely";
                playSignal();
            }, 2500);
        }

        function playSignal() {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance("Connection established. Encrypted audio streaming active.");
            utter.lang = currentLang === 'ar' ? 'ar-SA' : 'en-US';
            synth.speak(utter);
        }

        function endVoiceCall() {
            document.getElementById('voice-call').classList.add('hidden-section');
        }

        // --- AI STUFF ---

        async function sendAiMessage() {
            const input = document.getElementById('ai-input');
            const val = input.value.trim();
            if(!val) return;
            appendAiChat("user", val);
            input.value = '';
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: val }] }],
                    systemInstruction: { parts: [{ text: "You are Nixora's Longcat AI. Be long, cat-like, and professional." }] }
                })
            });
            const data = await res.json();
            appendAiChat("ai", data.candidates[0].content.parts[0].text);
        }

        function appendAiChat(role, text) {
            const win = document.getElementById('ai-chat-window');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[80%] p-3 rounded-xl ${role === 'user' ? 'bg-blue-600 text-white' : 'bg-white border shadow-sm'}">${text}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // --- UI UTILS ---

        function showView(view) {
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            ['home', 'ai', 'messages'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden-section'));
            document.getElementById(`view-${view}`).classList.remove('hidden-section');
            document.getElementById(`nav-${view}`).classList.add('active');
        }

        function openPostModal() { document.getElementById('post-modal').classList.remove('hidden-section'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden-section'); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        async function publishPost() {
            const content = document.getElementById('post-input').value.trim();
            if(!content) return;
            await supabaseClient.from('posts_social').insert([{ user_id: currentUser.id, content: content }]);
            closePostModal(); loadFeed(); showToast("Shared!");
        }

        window.onload = checkSession;
    </script>
</body>
</html>
