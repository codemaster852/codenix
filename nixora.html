<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nixora | Professional Social Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nix-blue: #1d9bf0; --nix-dark: #0f1419; --nix-border: #eff3f4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #ffffff; color: var(--nix-dark); overflow: hidden; }
        .sidebar-link { display: flex; align-items: center; gap: 1.25rem; padding: 0.8rem 1rem; border-radius: 999px; transition: 0.2s; font-size: 1.25rem; cursor: pointer; width: fit-content; }
        .sidebar-link:hover { background: rgba(15, 20, 25, 0.1); }
        .sidebar-link.active { font-weight: 800; }
        .btn-primary { background: var(--nix-blue); color: white; padding: 0.8rem 2rem; border-radius: 999px; font-weight: 700; transition: 0.2s; }
        .btn-primary:hover { filter: brightness(0.9); }
        .feed-item { border-bottom: 1px solid var(--nix-border); padding: 12px 16px; cursor: pointer; transition: 0.2s; }
        .feed-item:hover { background: rgba(0,0,0,0.02); }
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .call-animation { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex justify-center">

    <!-- LOGIN SCREEN -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-xs w-full text-center space-y-8">
            <i class="fa-solid fa-atom text-6xl text-blue-500"></i>
            <h1 class="text-4xl font-black tracking-tight">Nixora Pro</h1>
            <button onclick="performLogin()" class="w-full bg-black text-white py-4 rounded-full font-bold text-lg hover:bg-gray-800 transition">Sign in Anonymously</button>
            <p class="text-xs text-gray-500">Professional Grade Social Networking</p>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="app-screen" class="hidden-section flex w-full max-w-7xl h-screen overflow-hidden">
        
        <!-- SIDEBAR (Desktop) -->
        <aside class="hidden md:flex flex-col w-20 lg:w-72 p-4 border-r h-screen sticky top-0">
            <div class="text-3xl text-blue-500 px-4 mb-4"><i class="fa-solid fa-atom"></i></div>
            <nav class="space-y-2 flex-1">
                <div onclick="showView('home')" class="sidebar-link active" data-view="home"><i class="fa-solid fa-house"></i> <span class="hidden lg:inline">Home</span></div>
                <div onclick="showView('shorts')" class="sidebar-link" data-view="shorts"><i class="fa-solid fa-bolt"></i> <span class="hidden lg:inline">Shorts</span></div>
                <div onclick="showView('messages')" class="sidebar-link" data-view="messages"><i class="fa-solid fa-envelope"></i> <span class="hidden lg:inline">Messages</span></div>
                <div onclick="openProfile(currentUser.id)" class="sidebar-link" data-view="profile"><i class="fa-solid fa-user"></i> <span class="hidden lg:inline">Profile</span></div>
            </nav>
            <div class="mt-auto p-2 flex items-center gap-3 hover:bg-gray-100 rounded-full cursor-pointer lg:pr-4" onclick="openProfile(currentUser.id)">
                <img id="my-avatar" class="w-10 h-10 rounded-full object-cover bg-gray-200">
                <div class="hidden lg:block overflow-hidden">
                    <p id="my-name" class="font-bold truncate text-sm"></p>
                    <p id="my-user" class="text-xs text-gray-500 truncate"></p>
                </div>
            </div>
        </aside>

        <!-- CENTER PANEL -->
        <main class="flex-1 flex flex-col border-r h-full overflow-hidden relative">
            
            <!-- Views Container -->
            <div id="view-home" class="flex-1 overflow-y-auto no-scrollbar pb-20 md:pb-0">
                <div class="sticky top-0 bg-white/80 backdrop-blur-md p-4 border-b font-black text-xl z-20 flex justify-between items-center">
                    <span>Home</span>
                    <i class="fa-solid fa-wand-magic-sparkles text-blue-500"></i>
                </div>
                <!-- Post Box -->
                <div class="p-4 border-b flex gap-4">
                    <img id="input-avatar" class="w-12 h-12 rounded-full object-cover">
                    <div class="flex-1">
                        <textarea id="post-input" placeholder="What's professional today?" class="w-full text-xl resize-none outline-none py-2 h-20"></textarea>
                        <div class="flex justify-between items-center border-t pt-3">
                            <div class="flex gap-4 text-blue-500">
                                <i class="fa-regular fa-image cursor-pointer p-2 hover:bg-blue-50 rounded-full"></i>
                                <i class="fa-solid fa-list-check cursor-pointer p-2 hover:bg-blue-50 rounded-full"></i>
                            </div>
                            <button onclick="publishPost()" id="post-btn" disabled class="bg-blue-500 text-white px-6 py-2 rounded-full font-bold disabled:opacity-50">Post</button>
                        </div>
                    </div>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="view-messages" class="hidden-section flex-1 flex flex-col overflow-hidden h-full">
                <div class="p-4 border-b font-black text-xl">Messages</div>
                <div class="flex flex-1 overflow-hidden">
                    <!-- Chat List -->
                    <div id="chat-list" class="w-full md:w-80 border-r overflow-y-auto bg-white z-10"></div>
                    <!-- Active Chat -->
                    <div id="chat-active" class="hidden absolute inset-0 md:relative md:flex flex-col flex-1 bg-white z-20">
                        <div class="p-3 border-b flex items-center justify-between bg-white/90 backdrop-blur">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-arrow-left md:hidden p-2" onclick="closeChat()"></i>
                                <img id="active-chat-img" class="w-10 h-10 rounded-full object-cover">
                                <div>
                                    <p id="active-chat-name" class="font-bold leading-tight"></p>
                                    <p class="text-[10px] text-green-500 font-bold uppercase tracking-wider">Online</p>
                                </div>
                            </div>
                            <div class="flex gap-4 text-blue-500 text-xl pr-2">
                                <i class="fa-solid fa-phone cursor-pointer hover:bg-gray-100 p-2 rounded-full" onclick="startCall('voice')"></i>
                                <i class="fa-solid fa-video cursor-pointer hover:bg-gray-100 p-2 rounded-full" onclick="startCall('video')"></i>
                                <i class="fa-solid fa-circle-info cursor-pointer hover:bg-gray-100 p-2 rounded-full"></i>
                            </div>
                        </div>
                        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#f7f9f9]"></div>
                        <div class="p-3 border-t bg-white flex items-center gap-2">
                            <input id="msg-input" type="text" placeholder="Start a new message" class="flex-1 bg-gray-100 rounded-full px-5 py-2.5 outline-none focus:ring-1 focus:ring-blue-400">
                            <button onclick="sendDirectMessage()" class="text-blue-500 w-10 h-10 flex items-center justify-center hover:bg-blue-50 rounded-full transition"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-profile" class="hidden-section flex-1 overflow-y-auto no-scrollbar pb-20">
                <div class="sticky top-0 bg-white/80 backdrop-blur-md p-3 border-b flex items-center gap-6 z-30">
                    <i class="fa-solid fa-arrow-left p-2 hover:bg-gray-100 rounded-full cursor-pointer" onclick="showView('home')"></i>
                    <div>
                        <h2 id="prof-header-name" class="font-black text-lg leading-none"></h2>
                        <p id="prof-post-count" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <div class="h-32 md:h-48 bg-gray-200 relative">
                    <img id="prof-img" class="absolute -bottom-16 left-4 w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-white bg-white object-cover shadow-sm">
                </div>
                <div class="flex justify-end p-4 h-20">
                    <div id="prof-actions"></div>
                </div>
                <div class="px-4 space-y-1">
                    <h2 id="prof-name" class="text-xl font-black"></h2>
                    <p id="prof-user" class="text-gray-500"></p>
                    <p id="prof-bio" class="py-2"></p>
                    <div class="flex gap-4 text-sm">
                        <p><span id="prof-following" class="font-black">0</span> <span class="text-gray-500">Following</span></p>
                        <p><span id="prof-followers" class="font-black">0</span> <span class="text-gray-500">Followers</span></p>
                    </div>
                </div>
                <div id="prof-posts" class="mt-6"></div>
            </div>

            <!-- Mobile Bottom Nav -->
            <nav class="md:hidden fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50">
                <i class="fa-solid fa-house text-xl" onclick="showView('home')"></i>
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
                <i class="fa-solid fa-envelope text-xl" onclick="showView('messages')"></i>
                <i class="fa-solid fa-user text-xl" onclick="openProfile(currentUser.id)"></i>
            </nav>
        </main>

        <!-- RIGHT PANEL -->
        <aside class="hidden lg:flex flex-col w-80 xl:w-96 p-4 sticky top-0 h-screen space-y-4">
            <div class="bg-gray-100 rounded-full px-4 py-2 flex items-center gap-3">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input type="text" placeholder="Search Nixora" class="bg-transparent outline-none w-full text-sm">
            </div>
            <div class="bg-[#f7f9f9] rounded-2xl p-4 border border-gray-100">
                <h3 class="font-black text-xl mb-4">Who to follow</h3>
                <div id="suggestions" class="space-y-4"></div>
            </div>
        </aside>
    </div>

    <!-- VOICE CALL MODAL -->
    <div id="call-modal" class="fixed inset-0 z-[2000] modal-overlay flex items-center justify-center hidden-section">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl p-8 text-center text-white space-y-8 shadow-2xl">
            <div class="relative inline-block">
                <img id="call-avatar" class="w-32 h-32 rounded-full border-4 border-blue-500 call-animation">
                <div class="absolute inset-0 rounded-full border-4 border-blue-400 animate-ping"></div>
            </div>
            <div>
                <h2 id="call-name" class="text-2xl font-black">Connecting...</h2>
                <p id="call-status" class="text-blue-400 font-bold mt-2">SECURE ENCRYPTED CALL</p>
            </div>
            <div class="flex justify-center gap-6">
                <button onclick="endCall()" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl hover:bg-red-600 transition shadow-lg"><i class="fa-solid fa-phone-slash"></i></button>
                <button class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center text-2xl hover:bg-white/20 transition"><i class="fa-solid fa-microphone-slash"></i></button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userProfile = null;
        let activeChatId = null;
        let msgSubscription = null;

        // --- AUTH ---
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                document.getElementById('auth-screen').classList.remove('hidden-section');
            } else {
                currentUser = session.user;
                const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).maybeSingle();
                if (!profile) {
                    await setupInitialProfile();
                } else {
                    userProfile = profile;
                    document.getElementById('app-screen').classList.remove('hidden-section');
                    initApp();
                }
            }
        }

        async function performLogin() {
            const { data, error } = await supabaseClient.auth.signInAnonymously();
            if(!error) checkSession();
        }

        async function setupInitialProfile() {
            const rand = Math.floor(Math.random() * 1000);
            const { data, error } = await supabaseClient.from('profiles_social').insert({
                id: currentUser.id,
                username: `user_${rand}`,
                display_name: `Professional ${rand}`,
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${rand}`,
                bio: "New to Nixora Pro. Let's connect!"
            }).select().single();
            userProfile = data;
            location.reload();
        }

        // --- APP LOGIC ---
        function initApp() {
            document.getElementById('my-avatar').src = userProfile.avatar_url;
            document.getElementById('input-avatar').src = userProfile.avatar_url;
            document.getElementById('my-name').innerText = userProfile.display_name;
            document.getElementById('my-user').innerText = `@${userProfile.username}`;

            const postInput = document.getElementById('post-input');
            const postBtn = document.getElementById('post-btn');
            postInput.oninput = () => postBtn.disabled = !postInput.value.trim();

            loadFeed();
            loadSuggestions();
        }

        function showView(view) {
            document.querySelectorAll('[data-view]').forEach(el => el.classList.remove('active', 'text-blue-500'));
            const activeLink = document.querySelector(`[data-view="${view}"]`);
            if(activeLink) activeLink.classList.add('active', 'text-blue-500');

            ['home', 'messages', 'profile'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if(el) el.classList.add('hidden-section');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden-section');

            if(view === 'home') loadFeed();
            if(view === 'messages') loadChatList();
        }

        // --- FEED & POSTS ---
        async function loadFeed() {
            const { data: posts } = await supabaseClient.from('posts_social')
                .select('*, profiles_social(*)')
                .order('created_at', { ascending: false });

            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            for (const post of (posts || [])) {
                // Fetch counts separately to avoid 400 join error
                const { count: likes } = await supabaseClient.from('likes_social').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                const { count: comments } = await supabaseClient.from('comments_social').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                const { data: myLike } = await supabaseClient.from('likes_social').select('*').match({post_id: post.id, user_id: currentUser.id}).maybeSingle();
                
                container.innerHTML += renderPost(post, likes || 0, comments || 0, !!myLike);
            }
        }

        function renderPost(post, likeCount, commentCount, isLiked) {
            const p = post.profiles_social;
            return `
                <div class="feed-item flex gap-3" onclick="openProfile('${p.id}')">
                    <img src="${p.avatar_url}" class="w-12 h-12 rounded-full object-cover bg-gray-100 flex-shrink-0">
                    <div class="flex-1 overflow-hidden">
                        <div class="flex items-center gap-1">
                            <span class="font-bold truncate">${p.display_name}</span>
                            <span class="text-gray-500 text-sm truncate">@${p.username}</span>
                        </div>
                        <p class="mt-1 text-[15px] leading-tight break-words">${post.content}</p>
                        <div class="flex justify-between mt-3 text-gray-500 text-sm max-w-sm">
                            <div class="flex items-center gap-2 hover:text-blue-500 transition"><i class="fa-regular fa-comment"></i> ${commentCount}</div>
                            <div onclick="event.stopPropagation(); toggleLike('${post.id}')" class="flex items-center gap-2 transition ${isLiked ? 'text-red-500' : 'hover:text-red-500'}">
                                <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${likeCount}
                            </div>
                            <div class="flex items-center gap-2 hover:text-blue-500 transition"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function publishPost() {
            const content = document.getElementById('post-input').value;
            const { data, error } = await supabaseClient.from('posts_social').insert([{ user_id: currentUser.id, content }]).select().single();
            
            if (content.toLowerCase().includes('cat')) {
                // Bot response logic
                setTimeout(async () => {
                    await supabaseClient.from('comments_social').insert([{
                        post_id: data.id,
                        user_id: '00000000-0000-0000-0000-000000000000',
                        content: "Meow! As a sophisticated feline observer of this professional network, I must say your mention of my species is highly appreciated. Cats are known for their focus and agility, traits that every Nixora professional should aspire to. Did you know that cats sleep for 70% of their lives? Talk about efficient energy management! Stay purr-fectly professional. 🐾"
                    }]);
                }, 2000);
            }

            document.getElementById('post-input').value = '';
            loadFeed();
        }

        async function toggleLike(postId) {
            const { data: existing } = await supabaseClient.from('likes_social').select('*').match({ user_id: currentUser.id, post_id: postId }).maybeSingle();
            if (existing) {
                await supabaseClient.from('likes_social').delete().match({ user_id: currentUser.id, post_id: postId });
            } else {
                await supabaseClient.from('likes_social').insert([{ user_id: currentUser.id, post_id: postId }]);
            }
            loadFeed();
        }

        // --- MESSAGING ---
        async function loadChatList() {
            const { data: messages } = await supabaseClient.from('messages_social')
                .select('sender_id, receiver_id')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
            
            const ids = [...new Set(messages?.flatMap(m => [m.sender_id, m.receiver_id]) || [])].filter(id => id !== currentUser.id);
            const { data: profiles } = await supabaseClient.from('profiles_social').select('*').in('id', ids);
            
            const list = document.getElementById('chat-list');
            list.innerHTML = (profiles || []).map(p => `
                <div onclick="openChat('${p.id}')" class="p-4 border-b hover:bg-gray-50 cursor-pointer flex gap-3 ${activeChatId === p.id ? 'bg-blue-50 border-r-4 border-r-blue-500' : ''}">
                    <img src="${p.avatar_url}" class="w-12 h-12 rounded-full object-cover">
                    <div class="flex-1 overflow-hidden">
                        <p class="font-bold truncate">${p.display_name}</p>
                        <p class="text-sm text-gray-500 truncate">@${p.username}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openChat(uid) {
            activeChatId = uid;
            const { data: p } = await supabaseClient.from('profiles_social').select('*').eq('id', uid).single();
            
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('active-chat-img').src = p.avatar_url;
            document.getElementById('active-chat-name').innerText = p.display_name;
            
            loadMessages();
            subscribeToMessages();
        }

        function closeChat() {
            document.getElementById('chat-active').classList.add('hidden');
            if(msgSubscription) msgSubscription.unsubscribe();
            activeChatId = null;
        }

        async function loadMessages() {
            if(!activeChatId) return;
            const { data: msgs } = await supabaseClient.from('messages_social')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const win = document.getElementById('chat-window');
            win.innerHTML = (msgs || []).map(m => `
                <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[75%] p-3 px-4 rounded-2xl ${m.sender_id === currentUser.id ? 'bg-blue-500 text-white rounded-tr-none' : 'bg-white border rounded-tl-none shadow-sm'}">
                        ${m.content}
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        function subscribeToMessages() {
            if(msgSubscription) msgSubscription.unsubscribe();
            msgSubscription = supabaseClient.channel('realtime-messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages_social' }, (payload) => {
                    const msg = payload.new;
                    if((msg.sender_id === activeChatId && msg.receiver_id === currentUser.id) || (msg.sender_id === currentUser.id && msg.receiver_id === activeChatId)) {
                        loadMessages();
                    }
                })
                .subscribe();
        }

        async function sendDirectMessage() {
            const content = document.getElementById('msg-input').value.trim();
            if(!content || !activeChatId) return;
            await supabaseClient.from('messages_social').insert([{ sender_id: currentUser.id, receiver_id: activeChatId, content }]);
            document.getElementById('msg-input').value = '';
            loadMessages();
        }

        // --- CALL SYSTEM ---
        function startCall(type) {
            const name = document.getElementById('active-chat-name').innerText;
            const img = document.getElementById('active-chat-img').src;
            document.getElementById('call-name').innerText = `Calling ${name}...`;
            document.getElementById('call-avatar').src = img;
            document.getElementById('call-modal').classList.remove('hidden-section');
        }

        function endCall() {
            document.getElementById('call-modal').classList.add('hidden-section');
        }

        // --- PROFILE & FRIENDS ---
        async function openProfile(uid) {
            showView('profile');
            const { data: p } = await supabaseClient.from('profiles_social').select('*').eq('id', uid).single();
            const { count: followers } = await supabaseClient.from('follows_social').select('*', { count: 'exact', head: true }).eq('following_id', uid);
            const { count: following } = await supabaseClient.from('follows_social').select('*', { count: 'exact', head: true }).eq('follower_id', uid);
            const { data: posts } = await supabaseClient.from('posts_social').select('*, profiles_social(*)').eq('user_id', uid).order('created_at', { ascending: false });

            document.getElementById('prof-img').src = p.avatar_url;
            document.getElementById('prof-name').innerText = p.display_name;
            document.getElementById('prof-user').innerText = `@${p.username}`;
            document.getElementById('prof-bio').innerText = p.bio || "";
            document.getElementById('prof-followers').innerText = followers || 0;
            document.getElementById('prof-following').innerText = following || 0;
            document.getElementById('prof-post-count').innerText = `${posts?.length || 0} Posts`;

            const actions = document.getElementById('prof-actions');
            if(uid !== currentUser.id) {
                const { data: isFollowing } = await supabaseClient.from('follows_social').select('*').match({ follower_id: currentUser.id, following_id: uid }).maybeSingle();
                actions.innerHTML = `
                    <button onclick="toggleFollow('${uid}', ${!!isFollowing})" class="bg-black text-white font-bold px-6 py-2 rounded-full hover:bg-gray-800 transition">${isFollowing ? 'Unfollow' : 'Follow'}</button>
                    <button onclick="openChat('${uid}')" class="w-10 h-10 border rounded-full flex items-center justify-center ml-2 hover:bg-gray-100"><i class="fa-regular fa-envelope"></i></button>
                `;
            } else {
                actions.innerHTML = `<button class="border border-gray-300 font-bold px-5 py-2 rounded-full hover:bg-gray-100">Edit profile</button>`;
            }

            document.getElementById('prof-posts').innerHTML = (posts || []).map(post => renderPost(post, 0, 0, false)).join('');
        }

        async function toggleFollow(uid, isFollowing) {
            if(isFollowing) await supabaseClient.from('follows_social').delete().match({ follower_id: currentUser.id, following_id: uid });
            else await supabaseClient.from('follows_social').insert([{ follower_id: currentUser.id, following_id: uid }]);
            openProfile(uid);
            loadSuggestions();
        }

        async function loadSuggestions() {
            const { data } = await supabaseClient.from('profiles_social').select('*').limit(5);
            const container = document.getElementById('suggestions');
            container.innerHTML = (data || []).filter(p => p.id !== currentUser.id).map(p => `
                <div class="flex items-center justify-between group">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile('${p.id}')">
                        <img src="${p.avatar_url}" class="w-10 h-10 rounded-full object-cover">
                        <div class="overflow-hidden">
                            <p class="font-bold text-sm truncate">${p.display_name}</p>
                            <p class="text-xs text-gray-500 truncate">@${p.username}</p>
                        </div>
                    </div>
                    <button onclick="openProfile('${p.id}')" class="bg-black text-white text-xs font-bold px-4 py-1.5 rounded-full">View</button>
                </div>
            `).join('');
        }

        window.onload = checkSession;
    </script>
</body>
</html>
