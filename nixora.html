<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Nixora | Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nx-blue: #0866ff; --nx-bg: #f0f2f5; --nx-card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--nx-bg); color: #050505; }
        
        .nx-logo { font-weight: 900; font-style: italic; background: linear-gradient(45deg, #0866ff, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; letter-spacing: -1px; }
        
        .nav-icon { height: 50px; width: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #65676b; position: relative; transition: 0.2s; border-radius: 8px; }
        .nav-icon:hover { background: #f2f2f2; }
        .nav-icon.active { color: var(--nx-blue); border-bottom: 3px solid var(--nx-blue); border-radius: 0; }
        
        .card { background: var(--nx-card); border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .short-card { aspect-ratio: 9/16; width: 100%; max-width: 320px; border-radius: 12px; background: #000; position: relative; overflow: hidden; }
        
        .hidden-section { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.2s ease-out forwards; }

        #notif-dropdown { width: 360px; max-height: 450px; overflow-y: auto; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- AUTH OVERLAY -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[3000] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="nx-logo text-6xl">nixora</div>
            <p class="text-xl text-gray-600 italic">"The Future of Professional Connection"</p>
            <button onclick="performLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition">Enter Nixora</button>
        </div>
    </div>

    <!-- GLOBAL NAVBAR -->
    <header id="main-header" class="fixed top-0 left-0 right-0 h-14 bg-white shadow-sm flex items-center justify-between px-4 z-50 hidden-section">
        <div class="flex items-center gap-2 w-1/4">
            <div class="nx-logo cursor-pointer select-none" onclick="showView('home')">nx</div>
            <div class="relative hidden lg:block">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="global-search" oninput="handleSearch(this.value)" placeholder="Search Nixora..." class="bg-[#f0f2f5] rounded-full pl-10 pr-4 py-2 outline-none w-64 border border-transparent focus:border-blue-400">
                <div id="search-results" class="absolute top-12 left-0 w-full bg-white shadow-xl rounded-lg border hidden-section max-h-64 overflow-y-auto z-[60]"></div>
            </div>
        </div>
        
        <div class="flex items-center justify-center flex-1 h-full">
            <div onclick="showView('home')" class="nav-icon active" id="nav-home" title="Home"><i class="fa-solid fa-house"></i></div>
            <div onclick="showView('shorts')" class="nav-icon" id="nav-shorts" title="Shorts"><i class="fa-solid fa-play"></i></div>
            <div onclick="showView('pages')" class="nav-icon" id="nav-pages" title="Pages"><i class="fa-solid fa-flag"></i></div>
            <div onclick="showView('messages')" class="nav-icon" id="nav-messages" title="Messages"><i class="fa-solid fa-message"></i></div>
        </div>

        <div class="flex items-center justify-end gap-3 w-1/4">
            <div class="relative">
                <div onclick="toggleNotifications()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-200">
                    <i class="fa-solid fa-bell"></i>
                    <span id="notif-badge" class="hidden absolute top-0 right-0 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">2</span>
                </div>
                <div id="notif-dropdown" class="absolute top-12 right-0 bg-white shadow-2xl rounded-lg border hidden-section z-[60] p-2">
                    <h3 class="font-bold p-2 text-lg">Notifications</h3>
                    <div id="notif-list" class="space-y-1">
                        <p class="text-center text-gray-500 py-4 text-sm">No new notifications</p>
                    </div>
                </div>
            </div>
            <img id="my-avatar-nav" class="w-9 h-9 rounded-full cursor-pointer object-cover border hover:opacity-80 transition">
        </div>
    </header>

    <!-- CONTENT WRAPPER -->
    <div id="app-screen" class="pt-14 flex justify-center min-h-screen hidden-section">
        
        <aside class="hidden xl:block fixed left-0 w-72 h-full p-4 space-y-1 overflow-y-auto">
            <div class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer">
                <img id="my-avatar-side" class="w-9 h-9 rounded-full object-cover">
                <span id="my-name-side" class="font-semibold"></span>
            </div>
            <div class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer" onclick="showView('messages')">
                <i class="fa-solid fa-user-group text-blue-500 w-8 text-center"></i>
                <span class="font-medium">Friends</span>
            </div>
            <div class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer" onclick="showView('pages')">
                <i class="fa-solid fa-flag text-orange-500 w-8 text-center"></i>
                <span class="font-medium">Pages</span>
            </div>
            <hr class="my-4">
            <h3 class="px-3 text-gray-500 font-bold text-sm">Nixora Labs</h3>
            <div class="flex items-center gap-3 p-3 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600"><i class="fa-solid fa-robot"></i></div>
                <span class="font-medium">Nixora AI</span>
            </div>
        </aside>

        <main class="w-full max-w-[680px] px-2 py-4 pb-20">
            <!-- VIEW: HOME -->
            <div id="view-home" class="space-y-5 animate-pop">
                <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                    <div class="relative min-w-[120px] h-48 rounded-xl bg-white shadow border overflow-hidden cursor-pointer group" onclick="triggerFileUpload('story-upload')">
                        <img id="my-avatar-story" class="h-32 w-full object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute bottom-0 left-0 right-0 h-16 bg-white flex flex-col items-center justify-center">
                            <div class="absolute -top-5 bg-blue-600 text-white w-9 h-9 rounded-full border-4 border-white flex items-center justify-center shadow-md"><i class="fa-solid fa-plus"></i></div>
                            <span class="text-xs font-bold mt-2">Create Story</span>
                        </div>
                        <input type="file" id="story-upload" class="hidden" accept="image/*" onchange="createStory(this)">
                    </div>
                    <div id="stories-container" class="flex gap-3"></div>
                </div>

                <div class="card p-4 space-y-3">
                    <div class="flex gap-3">
                        <img id="input-avatar" class="w-10 h-10 rounded-full object-cover">
                        <div onclick="openPostModal()" class="flex-1 bg-[#f0f2f5] rounded-full px-4 flex items-center text-gray-500 cursor-pointer hover:bg-[#e4e6eb] transition">What's on your mind, <span id="my-first-name" class="ml-1"></span>?</div>
                    </div>
                    <hr>
                    <div class="flex justify-between px-2">
                        <button onclick="openPostModal()" class="flex items-center gap-2 hover:bg-gray-100 py-2 px-4 rounded-lg transition text-gray-600 font-semibold"><i class="fa-solid fa-image text-green-500"></i> Photo</button>
                        <button onclick="openPostModal()" class="flex items-center gap-2 hover:bg-gray-100 py-2 px-4 rounded-lg transition text-gray-600 font-semibold"><i class="fa-solid fa-video text-red-500"></i> Video</button>
                        <button onclick="openPostModal()" class="flex items-center gap-2 hover:bg-gray-100 py-2 px-4 rounded-lg transition text-gray-600 font-semibold"><i class="fa-solid fa-face-smile text-yellow-500"></i> Activity</button>
                    </div>
                </div>

                <div id="feed-container" class="space-y-4"></div>
            </div>

            <!-- VIEW: SHORTS -->
            <div id="view-shorts" class="hidden-section animate-pop">
                <div class="flex flex-col items-center gap-6" id="shorts-container"></div>
            </div>

            <!-- VIEW: MESSAGES -->
            <div id="view-messages" class="hidden-section h-[80vh] animate-pop">
                <div class="card h-full flex overflow-hidden">
                    <div class="w-1/3 border-r bg-gray-50 flex flex-col">
                        <div class="p-4"><h2 class="text-2xl font-bold">Chats</h2></div>
                        <div id="chat-list" class="flex-1 overflow-y-auto no-scrollbar"></div>
                    </div>
                    <div id="chat-active" class="flex-1 flex flex-col bg-white">
                        <div id="chat-placeholder" class="flex-1 flex flex-col items-center justify-center text-gray-400">
                            <div class="nx-logo text-6xl mb-4">nx</div>
                            <p>Select a friend to message</p>
                        </div>
                        <div id="chat-main" class="hidden flex-1 flex flex-col h-full">
                            <div class="p-4 border-b flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <img id="active-chat-img" class="w-10 h-10 rounded-full object-cover">
                                    <p id="active-chat-name" class="font-bold"></p>
                                </div>
                            </div>
                            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
                            <div class="p-4 border-t flex items-center gap-3">
                                <form id="chat-form" onsubmit="event.preventDefault(); sendDirectMessage();" class="flex-1 flex gap-3">
                                    <input id="msg-input" type="text" placeholder="Aa" class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none">
                                    <button type="submit" class="text-blue-600 text-2xl"><i class="fa-solid fa-paper-plane"></i></button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: PAGES -->
            <div id="view-pages" class="hidden-section animate-pop">
                <div class="card p-10 text-center">
                    <i class="fa-solid fa-flag text-6xl text-orange-400 mb-4"></i>
                    <h2 class="text-2xl font-bold">Your Pages</h2>
                    <p class="text-gray-500">You haven't created any pages yet.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- MODALS & DRAWERS -->
    <div id="post-modal" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-md flex items-center justify-center hidden-section">
        <div class="card w-full max-w-[500px] shadow-2xl animate-pop p-4 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-xl font-bold">Create Post</h2>
                <button onclick="closePostModal()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <textarea id="post-input" placeholder="What's on your mind?" class="w-full text-xl resize-none outline-none min-h-[150px]" oninput="togglePostBtn()"></textarea>
            <div id="post-preview-area" class="hidden relative">
                <img id="post-img-preview" class="w-full rounded-lg max-h-64 object-cover border">
                <button onclick="removePostImage()" class="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full">&times;</button>
            </div>
            <div class="border rounded-lg p-3 flex justify-between items-center">
                <span class="font-bold text-sm">Add to your post</span>
                <i class="fa-solid fa-image text-green-500 text-xl cursor-pointer" onclick="triggerFileUpload('post-image-upload')"></i>
            </div>
            <button id="post-btn" onclick="publishPost()" disabled class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg disabled:opacity-50">Post</button>
        </div>
        <input type="file" id="post-image-upload" class="hidden" accept="image/*" onchange="previewPostImage(this)">
    </div>

    <div id="comment-drawer" class="fixed inset-0 z-[150] bg-black/40 flex items-end justify-center hidden-section">
        <div class="bg-white w-full max-w-[600px] rounded-t-2xl p-4 h-[70vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-bold">Comments</h3>
                <button onclick="closeComments()" class="text-2xl">&times;</button>
            </div>
            <div id="comments-list" class="flex-1 overflow-y-auto py-4 space-y-4"></div>
            <div class="pt-4 border-t flex gap-2">
                <input id="comment-input" type="text" placeholder="Write a comment..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none">
                <button onclick="submitComment()" class="text-blue-600 font-bold">Post</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl opacity-0 transition-opacity z-[5000] pointer-events-none"></div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, userProfile = null, activeChatId = null, activePostId = null, pendingImageData = null;
        let allProfiles = [];
        let chatInterval = null;

        // --- AUTH ---
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                document.getElementById('auth-screen').classList.remove('hidden-section');
            } else {
                currentUser = session.user;
                const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).maybeSingle();
                if (!profile) await setupInitialProfile();
                else { userProfile = profile; initApp(); }
            }
        }

        async function performLogin() {
            await supabaseClient.auth.signInAnonymously();
            checkSession();
        }

        async function setupInitialProfile() {
            const seed = Math.floor(Math.random() * 9999);
            const { data } = await supabaseClient.from('profiles_social').insert({
                id: currentUser.id,
                username: `nix_${seed}`,
                display_name: `Nixora User ${seed}`,
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`
            }).select().single();
            userProfile = data;
            initApp();
        }

        // --- INIT ---
        async function initApp() {
            document.getElementById('auth-screen').classList.add('hidden-section');
            document.getElementById('app-screen').classList.remove('hidden-section');
            document.getElementById('main-header').classList.remove('hidden-section');

            ['my-avatar-nav', 'my-avatar-side', 'input-avatar', 'my-avatar-story'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.src = userProfile.avatar_url;
            });
            document.getElementById('my-name-side').innerText = userProfile.display_name;
            document.getElementById('my-first-name').innerText = userProfile.display_name.split(' ')[0];

            loadFeed();
            loadShorts();
            loadMessages();
            loadStories();
            fetchAllProfiles();
        }

        async function fetchAllProfiles() {
            const { data } = await supabaseClient.from('profiles_social').select('*');
            allProfiles = data || [];
        }

        // --- SEARCH ---
        function handleSearch(val) {
            const resBox = document.getElementById('search-results');
            if(!val.trim()) { resBox.classList.add('hidden-section'); return; }
            const filtered = allProfiles.filter(p => p.display_name.toLowerCase().includes(val.toLowerCase()));
            resBox.innerHTML = filtered.map(p => `
                <div onclick="openProfileSearch('${p.id}')" class="flex items-center gap-3 p-3 hover:bg-gray-100 cursor-pointer">
                    <img src="${p.avatar_url}" class="w-8 h-8 rounded-full">
                    <span class="font-medium">${p.display_name}</span>
                </div>
            `).join('') || '<p class="p-3 text-gray-500 text-sm">No users found</p>';
            resBox.classList.remove('hidden-section');
        }

        function openProfileSearch(id) {
            document.getElementById('global-search').value = '';
            document.getElementById('search-results').classList.add('hidden-section');
            showToast(`Profile ${id} selected`);
        }

        // --- FEED & POSTS ---
        async function loadFeed() {
            const { data: posts, error } = await supabaseClient.from('posts_social').select('*, profiles_social(*)').order('created_at', { ascending: false });
            if (error) console.error("Error loading feed:", error);
            const container = document.getElementById('feed-container');
            container.innerHTML = (posts || []).map(p => renderPost(p)).join('');
        }

        function renderPost(post) {
            const profile = post.profiles_social || { avatar_url: '', display_name: 'Unknown User' };
            return `
                <div class="card p-4 space-y-3 animate-pop">
                    <div class="flex items-center gap-2">
                        <img src="${profile.avatar_url}" class="w-10 h-10 rounded-full border object-cover">
                        <div>
                            <p class="font-bold">${profile.display_name}</p>
                            <p class="text-xs text-gray-500">${new Date(post.created_at).toLocaleTimeString()}</p>
                        </div>
                    </div>
                    <p>${post.content}</p>
                    ${post.image_url ? `<img src="${post.image_url}" class="w-full rounded-lg max-h-96 object-cover border">` : ''}
                    <hr>
                    <div class="flex gap-4 font-bold text-sm text-gray-600">
                        <button onclick="showToast('Liked!')" class="flex-1 py-2 hover:bg-gray-100 rounded-lg"><i class="fa-regular fa-thumbs-up"></i> Like</button>
                        <button onclick="openComments('${post.id}')" class="flex-1 py-2 hover:bg-gray-100 rounded-lg"><i class="fa-regular fa-comment"></i> Comment</button>
                        <button onclick="showToast('Post Shared!')" class="flex-1 py-2 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-share"></i> Share</button>
                    </div>
                </div>
            `;
        }

        async function publishPost() {
            const content = document.getElementById('post-input').value.trim();
            if(!content && !pendingImageData) return;
            const btn = document.getElementById('post-btn');
            btn.disabled = true; btn.innerText = "...";
            const { error } = await supabaseClient.from('posts_social').insert([{ user_id: currentUser.id, content, image_url: pendingImageData }]);
            if (error) { console.error("Post failed:", error); showToast("Post failed."); } 
            else { closePostModal(); loadFeed(); showToast("Post shared!"); }
            btn.disabled = false; btn.innerText = "Post";
        }

        // --- COMMENTS ---
        async function openComments(postId) {
            activePostId = postId;
            document.getElementById('comment-drawer').classList.remove('hidden-section');
            const { data: comments } = await supabaseClient.from('comments_social').select('*, profiles_social(*)').eq('post_id', postId).order('created_at', {ascending: true});
            document.getElementById('comments-list').innerHTML = (comments || []).map(c => `
                <div class="flex gap-2">
                    <img src="${c.profiles_social.avatar_url}" class="w-8 h-8 rounded-full object-cover">
                    <div class="bg-gray-100 p-2 px-3 rounded-2xl flex-1 text-sm">
                        <p class="font-bold">${c.profiles_social.display_name}</p>
                        <p>${c.content}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-gray-400">No comments yet</p>';
        }

        async function submitComment() {
            const input = document.getElementById('comment-input');
            const val = input.value.trim();
            if(!val || !activePostId) return;
            const { error } = await supabaseClient.from('comments_social').insert([{ post_id: activePostId, user_id: currentUser.id, content: val }]);
            input.value = ''; openComments(activePostId);
        }

        // --- MESSAGING (FIXED PGRST204 ERROR) ---
        async function loadMessages() {
            const { data } = await supabaseClient.from('profiles_social').select('*').neq('id', currentUser.id).limit(20);
            document.getElementById('chat-list').innerHTML = (data || []).map(p => `
                <div onclick="openChat('${p.id}')" class="flex items-center gap-3 p-3 hover:bg-gray-100 cursor-pointer">
                    <img src="${p.avatar_url}" class="w-12 h-12 rounded-full border object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">${p.display_name}</p>
                        <p class="text-xs text-gray-500">Active now</p>
                    </div>
                </div>
            `).join('');
        }

        async function openChat(uid) {
            activeChatId = uid;
            const { data: p } = await supabaseClient.from('profiles_social').select('*').eq('id', uid).single();
            document.getElementById('chat-placeholder').classList.add('hidden');
            document.getElementById('chat-main').classList.remove('hidden');
            document.getElementById('active-chat-img').src = p.avatar_url;
            document.getElementById('active-chat-name').innerText = p.display_name;
            if (chatInterval) clearInterval(chatInterval);
            fetchMessages();
            chatInterval = setInterval(fetchMessages, 3000);
        }

        async function fetchMessages() {
            if(!activeChatId || !currentUser) return;
            try {
                // FIXED: Using basic select(*) to avoid PGRST204 schema cache errors with specific columns
                const { data, error } = await supabaseClient
                    .from('messages_social')
                    .select('*')
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                    .order('created_at', { ascending: true });

                if (error) {
                    // Log error but don't break UI
                    console.error("Fetch Error:", error);
                    return;
                }

                const win = document.getElementById('chat-window');
                const html = (data || []).map(m => `
                    <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[80%] p-3 rounded-2xl ${m.sender_id === currentUser.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white border'} shadow-sm">
                            <p class="text-sm">${m.content || m.message_text || ''}</p>
                            <span class="text-[10px] opacity-70 block mt-1">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                `).join('');
                
                if (win.innerHTML !== html) {
                    win.innerHTML = html;
                    win.scrollTop = win.scrollHeight;
                }
            } catch (err) { console.error("Chat logic error:", err); }
        }

        async function sendDirectMessage() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val || !activeChatId) return;
            
            // FIXED: Using plain insert without column selection to avoid 400 errors
            const { error } = await supabaseClient.from('messages_social').insert([
                { sender_id: currentUser.id, receiver_id: activeChatId, content: val }
            ]);
            
            if (error) {
                console.error("Send failed:", error);
                // Try fallback column name just in case the schema uses 'message_text'
                if(error.message.includes("content")) {
                     await supabaseClient.from('messages_social').insert([
                        { sender_id: currentUser.id, receiver_id: activeChatId, message_text: val }
                    ]);
                } else {
                    showToast("Message failed to send.");
                }
            }
            input.value = '';
            fetchMessages();
        }

        // --- UI UTILS ---
        function showView(view) {
            if (chatInterval) { clearInterval(chatInterval); chatInterval = null; }
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            ['home', 'shorts', 'messages', 'pages'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if(el) el.classList.add('hidden-section');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden-section');
            const btn = document.getElementById(`nav-${view}`);
            if(btn) btn.classList.add('active');
        }

        function toggleNotifications() {
            const dd = document.getElementById('notif-dropdown');
            dd.classList.toggle('hidden-section');
        }

        function openPostModal() { document.getElementById('post-modal').classList.remove('hidden-section'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden-section'); }
        function closeComments() { document.getElementById('comment-drawer').classList.add('hidden-section'); }
        function triggerFileUpload(id) { document.getElementById(id).click(); }

        function previewPostImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pendingImageData = e.target.result;
                    document.getElementById('post-img-preview').src = pendingImageData;
                    document.getElementById('post-preview-area').classList.remove('hidden');
                    togglePostBtn();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function removePostImage() {
            pendingImageData = null;
            document.getElementById('post-preview-area').classList.add('hidden');
            togglePostBtn();
        }
        function togglePostBtn() {
            const input = document.getElementById('post-input').value.trim();
            document.getElementById('post-btn').disabled = !input && !pendingImageData;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function loadShorts() {
            document.getElementById('shorts-container').innerHTML = [1,2,3,4].map(i => `
                <div class="short-card shadow-2xl">
                    <img src="https://picsum.photos/seed/${i*7}/400/700" class="w-full h-full object-cover opacity-80">
                    <div class="absolute bottom-4 left-4 text-white">
                        <p class="font-bold">@nix_creator_${i}</p>
                        <p class="text-sm">#NixoraShorts</p>
                    </div>
                </div>
            `).join('');
        }

        function loadStories() {
            document.getElementById('stories-container').innerHTML = [1,2,3,4,5].map(i => `
                <div class="relative min-w-[120px] h-48 rounded-xl bg-gray-200 shadow overflow-hidden cursor-pointer">
                    <img src="https://picsum.photos/seed/story${i}/200/300" class="h-full w-full object-cover hover:scale-110 transition duration-500">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${i+10}" class="absolute top-2 left-2 w-8 h-8 rounded-full border-2 border-blue-600 object-cover bg-white">
                </div>
            `).join('');
        }

        function createStory(input) { if(input.files && input.files[0]) showToast("Story uploaded!"); }

        window.onload = checkSession;
    </script>
</body>
</html>
