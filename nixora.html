<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nixora | Social Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --nix-blue: #0084ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f7f9fb; }
        .glass-nav { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #e1e8ed; }
        .card { background: white; border: 1px solid #e1e8ed; border-radius: 1rem; }
        .btn-primary { background: var(--nix-blue); color: white; font-weight: 700; padding: 0.5rem 1.5rem; border-radius: 999px; transition: 0.2s; border: none; cursor: pointer; }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="text-gray-900">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-sm w-full text-center space-y-8">
            <div class="text-6xl font-black text-blue-500 tracking-tighter">NIXORA</div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome to the future of social.</h1>
            <button onclick="performLogin()" id="login-btn" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-black text-xl shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                <i class="fa-solid fa-bolt"></i> ENTER UNIVERSE
            </button>
            <p id="auth-status" class="text-gray-400 text-sm">Securing entry...</p>
        </div>
    </div>

    <!-- ONBOARDING SCREEN -->
    <div id="onboarding-screen" class="fixed inset-0 bg-white z-[250] flex flex-col items-center justify-center p-6 hidden-section">
        <div class="max-w-sm w-full space-y-6 text-center">
            <h1 class="text-3xl font-black">Identity Setup</h1>
            <input type="text" id="ob-username" placeholder="Username" class="w-full p-4 border rounded-2xl outline-none">
            <input type="text" id="ob-displayname" placeholder="Display Name" class="w-full p-4 border rounded-2xl outline-none">
            <button onclick="finalizeProfile()" class="w-full btn-primary py-4 text-lg">Create Profile</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="hidden-section">
        <nav class="fixed top-0 w-full glass-nav z-50 h-16 flex items-center px-4">
            <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
                <div class="text-blue-500 font-black text-2xl cursor-pointer" onclick="showView('home')">NIXORA</div>
                <div class="flex items-center gap-4">
                    <button onclick="showView('messages')" class="p-2 hover:bg-gray-100 rounded-full"><i class="fa-regular fa-paper-plane text-xl"></i></button>
                    <img id="my-avatar" onclick="openProfile(currentUser.id)" class="w-9 h-9 rounded-full border cursor-pointer object-cover bg-gray-200">
                </div>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto flex pt-16 min-h-screen">
            <aside class="hidden lg:flex flex-col w-64 fixed h-[calc(100vh-64px)] p-4 space-y-2">
                <button onclick="showView('home')" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition"><i class="fa-solid fa-house text-blue-500"></i> Feed</button>
                <button onclick="showView('messages')" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition"><i class="fa-solid fa-message text-green-500"></i> Messages</button>
                <button onclick="openProfile(currentUser.id)" class="flex items-center gap-4 p-3 hover:bg-white rounded-2xl font-bold transition"><i class="fa-solid fa-circle-user text-purple-500"></i> My Profile</button>
            </aside>

            <main class="flex-1 lg:ml-64 p-4 lg:p-6">
                <!-- Home View -->
                <div id="view-home">
                    <div class="card p-4 mb-6 shadow-sm">
                        <div class="flex gap-4">
                            <img id="input-avatar" class="w-12 h-12 rounded-full border bg-gray-100 object-cover">
                            <div class="flex-1">
                                <textarea id="post-input" placeholder="What's happening?" class="w-full text-lg resize-none outline-none py-2 bg-transparent h-20"></textarea>
                                <div class="flex justify-end border-t pt-3">
                                    <button onclick="publishPost()" class="btn-primary">Post</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="feed-container" class="space-y-4"></div>
                </div>

                <!-- Profile View -->
                <div id="view-profile" class="hidden-section">
                    <div class="card overflow-hidden">
                        <div class="h-32 bg-blue-100"></div>
                        <div class="px-6 pb-6 -mt-10">
                            <div class="flex justify-between items-end">
                                <img id="prof-img" class="w-24 h-24 rounded-2xl border-4 border-white object-cover bg-gray-200">
                                <div id="prof-actions" class="pb-2"></div>
                            </div>
                            <h2 id="prof-name" class="text-2xl font-black mt-4"></h2>
                            <p id="prof-user" class="text-gray-500"></p>
                            <div class="flex gap-6 mt-4">
                                <div><span id="prof-following" class="font-bold">0</span> Following</div>
                                <div><span id="prof-followers" class="font-bold">0</span> Followers</div>
                            </div>
                        </div>
                    </div>
                    <div id="prof-posts" class="mt-6 space-y-4"></div>
                </div>

                <!-- Messages View -->
                <div id="view-messages" class="hidden-section h-[calc(100vh-120px)] flex flex-col">
                    <div class="card flex-1 flex overflow-hidden">
                        <div id="chat-list" class="w-1/3 border-r overflow-y-auto"></div>
                        <div class="flex-1 flex flex-col">
                            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>
                            <div class="p-4 border-t flex gap-2">
                                <input id="msg-input" type="text" placeholder="Message..." class="flex-1 border rounded-xl px-4 py-2">
                                <button onclick="sendDirectMessage()" class="btn-primary">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userProfile = null;
        let activeChatId = null;

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                document.getElementById('auth-screen').classList.remove('hidden-section');
            } else {
                currentUser = session.user;
                const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).maybeSingle();
                if (!profile) {
                    document.getElementById('onboarding-screen').classList.remove('hidden-section');
                } else {
                    userProfile = profile;
                    document.getElementById('app-screen').classList.remove('hidden-section');
                    initApp();
                }
            }
        }

        async function performLogin() {
            await supabaseClient.auth.signInAnonymously();
            checkSession();
        }

        async function finalizeProfile() {
            const username = document.getElementById('ob-username').value.trim().toLowerCase();
            const display = document.getElementById('ob-displayname').value.trim();
            if(!username || !display) return alert("Required");
            await supabaseClient.from('profiles_social').insert({
                id: currentUser.id, username, display_name: display,
                avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`
            });
            location.reload();
        }

        function initApp() {
            document.getElementById('my-avatar').src = userProfile.avatar_url;
            document.getElementById('input-avatar').src = userProfile.avatar_url;
            loadFeed();
        }

        function showView(view) {
            ['view-home', 'view-profile', 'view-messages'].forEach(v => document.getElementById(v).classList.add('hidden-section'));
            document.getElementById(`view-${view}`).classList.remove('hidden-section');
            if(view === 'messages') loadChatList();
        }

        async function loadFeed() {
            // Simplified query to avoid 400 error
            const { data, error } = await supabaseClient.from('posts_social')
                .select('*, profiles_social(*), likes_social(count)')
                .order('created_at', { ascending: false });

            if (error || !data) {
                console.error("Feed error:", error);
                return;
            }

            const container = document.getElementById('feed-container');
            container.innerHTML = data.map(post => {
                const p = post.profiles_social || { display_name: "User", username: "anon", avatar_url: "" };
                return `
                    <div class="card p-4">
                        <div class="flex gap-3">
                            <img onclick="openProfile('${p.id}')" src="${p.avatar_url}" class="w-10 h-10 rounded-full border cursor-pointer">
                            <div class="flex-1">
                                <div class="font-bold">${p.display_name} <span class="text-gray-400 font-normal">@${p.username}</span></div>
                                <p class="mt-1">${post.content}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function publishPost() {
            const content = document.getElementById('post-input').value;
            await supabaseClient.from('posts_social').insert([{ user_id: currentUser.id, content }]);
            document.getElementById('post-input').value = '';
            loadFeed();
        }

        async function openProfile(uid) {
            showView('profile');
            const { data: p } = await supabaseClient.from('profiles_social').select('*').eq('id', uid).single();
            const { count: followers } = await supabaseClient.from('follows_social').select('*', { count: 'exact', head: true }).eq('following_id', uid);
            const { count: following } = await supabaseClient.from('follows_social').select('*', { count: 'exact', head: true }).eq('follower_id', uid);

            document.getElementById('prof-img').src = p.avatar_url;
            document.getElementById('prof-name').innerText = p.display_name;
            document.getElementById('prof-user').innerText = `@${p.username}`;
            document.getElementById('prof-followers').innerText = followers || 0;
            document.getElementById('prof-following').innerText = following || 0;

            const actions = document.getElementById('prof-actions');
            if(uid !== currentUser.id) {
                const { data: isFollowing } = await supabaseClient.from('follows_social').select('*').match({ follower_id: currentUser.id, following_id: uid }).maybeSingle();
                actions.innerHTML = `
                    <button onclick="toggleFollow('${uid}', ${!!isFollowing})" class="btn-primary">${isFollowing ? 'Unfollow' : 'Follow'}</button>
                    <button onclick="startChat('${uid}')" class="ml-2 border p-2 rounded-full px-4">Message</button>
                `;
            } else {
                actions.innerHTML = `<button class="border p-2 rounded-full px-4">Edit</button>`;
            }
        }

        async function toggleFollow(uid, isFollowing) {
            if(isFollowing) await supabaseClient.from('follows_social').delete().match({ follower_id: currentUser.id, following_id: uid });
            else await supabaseClient.from('follows_social').insert([{ follower_id: currentUser.id, following_id: uid }]);
            openProfile(uid);
        }

        async function startChat(uid) {
            activeChatId = uid;
            showView('messages');
            loadChatWindow();
        }

        async function loadChatList() {
            const { data: messages } = await supabaseClient.from('messages_social')
                .select('sender_id, receiver_id')
                .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
            
            const ids = [...new Set(messages?.flatMap(m => [m.sender_id, m.receiver_id]) || [])].filter(id => id !== currentUser.id);
            const { data: profiles } = await supabaseClient.from('profiles_social').select('*').in('id', ids);
            
            document.getElementById('chat-list').innerHTML = (profiles || []).map(p => `
                <div onclick="startChat('${p.id}')" class="p-4 border-b hover:bg-gray-50 cursor-pointer ${activeChatId === p.id ? 'bg-blue-50' : ''}">
                    <p class="font-bold">${p.display_name}</p>
                </div>
            `).join('');
        }

        async function loadChatWindow() {
            const { data: msgs } = await supabaseClient.from('messages_social')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            document.getElementById('chat-window').innerHTML = (msgs || []).map(m => `
                <div class="flex ${m.sender_id === currentUser.id ? 'justify-end' : 'justify-start'}">
                    <div class="p-2 px-4 rounded-2xl ${m.sender_id === currentUser.id ? 'bg-blue-500 text-white' : 'bg-white border'}">
                        ${m.content}
                    </div>
                </div>
            `).join('');
        }

        async function sendDirectMessage() {
            const content = document.getElementById('msg-input').value;
            if(!content || !activeChatId) return;
            await supabaseClient.from('messages_social').insert([{ sender_id: currentUser.id, receiver_id: activeChatId, content }]);
            document.getElementById('msg-input').value = '';
            loadChatWindow();
        }

        window.onload = checkSession;
    </script>
</body>
</html>
