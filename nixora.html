<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nixora | Social Reimagined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --nixora-blue: #1DA1F2;
            --nixora-dark: #0f1419;
            --nixora-bg: #ffffff;
        }
        body { background-color: var(--nixora-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .nav-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #eff3f4; }
        .post-card { border-bottom: 1px solid #eff3f4; transition: background 0.2s; cursor: pointer; }
        .post-card:hover { background: rgba(0,0,0,0.02); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--nixora-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #nix-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        #nix-panel.visible { transform: translateY(0); }
    </style>
</head>
<body class="text-gray-900">

    <!-- Desktop Nav -->
    <nav class="fixed top-0 w-full nav-blur z-50 h-14 hidden md:block">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-full">
            <div class="text-blue-500 font-black text-2xl tracking-tighter">NIXORA</div>
            <div class="flex items-center gap-6">
                <button onclick="toggleNix()" class="text-blue-500 bg-blue-50 px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2">
                    <i class="fa-solid fa-robot"></i> Nix 4 Online
                </button>
                <img id="nav-avatar" onclick="openModal('settings-modal')" src="" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 object-cover">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto flex">
        <aside class="hidden md:flex flex-col w-64 fixed h-screen p-4 border-r border-gray-100 pt-16">
            <nav class="space-y-1">
                <button onclick="location.reload()" class="flex items-center gap-4 p-3 w-full hover:bg-gray-100 rounded-full text-xl font-bold transition">
                    <i class="fa-solid fa-house w-8"></i> Home
                </button>
                <button class="flex items-center gap-4 p-3 w-full hover:bg-gray-100 rounded-full text-xl transition">
                    <i class="fa-solid fa-hashtag w-8"></i> Explore
                </button>
                <button onclick="openModal('settings-modal')" class="flex items-center gap-4 p-3 w-full hover:bg-gray-100 rounded-full text-xl transition">
                    <i class="fa-solid fa-gear w-8"></i> Settings
                </button>
            </nav>
            <button onclick="document.getElementById('post-input').focus()" class="mt-6 bg-blue-500 text-white w-full py-3 rounded-full font-bold text-lg shadow-lg hover:bg-blue-600 transition">Post</button>
            
            <div class="mt-auto mb-20 p-3 flex items-center gap-3 hover:bg-gray-100 rounded-full cursor-pointer transition" onclick="openModal('settings-modal')">
                <img id="sidebar-avatar" src="" class="w-10 h-10 rounded-full border object-cover">
                <div class="flex-1 overflow-hidden">
                    <p id="sidebar-name" class="font-bold truncate"></p>
                    <p id="sidebar-user" class="text-gray-500 text-sm truncate"></p>
                </div>
            </div>
        </aside>

        <main class="flex-1 md:ml-64 lg:mr-[350px] min-h-screen border-r border-gray-100 pb-20 pt-0 md:pt-14">
            <div class="p-4 border-b border-gray-100">
                <div class="flex gap-4">
                    <img id="post-input-avatar" src="" class="w-12 h-12 rounded-full border object-cover">
                    <div class="flex-1">
                        <textarea id="post-input" placeholder="What's happening?" class="w-full text-xl resize-none outline-none min-h-[100px] py-2"></textarea>
                        <div id="media-preview" class="hidden mb-4 relative rounded-2xl overflow-hidden border">
                            <button onclick="clearMedia()" class="absolute top-2 right-2 bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fa fa-times"></i></button>
                            <img id="preview-img" class="w-full h-auto">
                        </div>
                        <div class="flex items-center justify-between border-t pt-3">
                            <div class="flex text-blue-500">
                                <label class="p-2 hover:bg-blue-50 rounded-full cursor-pointer transition">
                                    <i class="fa-solid fa-image"></i>
                                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*">
                                </label>
                                <button onclick="askNixForIdea()" class="p-2 hover:bg-blue-50 rounded-full transition"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                            </div>
                            <button id="publish-btn" onclick="publishPost()" class="bg-blue-500 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-600 transition disabled:opacity-50">Post</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="feed-container">
                <div class="flex justify-center p-12"><div class="loader !w-8 !h-8"></div></div>
            </div>
        </main>
    </div>

    <!-- Nix AI Panel -->
    <div id="nix-panel" class="fixed bottom-0 left-0 right-0 md:left-auto md:right-4 md:bottom-4 md:w-96 bg-white shadow-2xl rounded-t-3xl md:rounded-3xl border z-[60] flex flex-col h-[70vh] md:h-[500px] overflow-hidden">
        <div class="bg-blue-500 p-4 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-robot"></i>
                <span class="font-bold">Nix 4 Intelligence</span>
            </div>
            <button onclick="toggleNix()"><i class="fa fa-times"></i></button>
        </div>
        <div id="nix-chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 text-sm"></div>
        <div class="p-4 border-t bg-white">
            <div class="flex gap-2">
                <input type="text" id="nix-input" onkeypress="if(event.key==='Enter') talkToNix()" placeholder="Ask Nix something..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none">
                <button onclick="talkToNix()" class="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fa fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </div>

    <!-- Modals Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] items-center justify-center p-4">
        <div id="settings-modal" class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-black">Account Settings</h2>
                <button onclick="closeModal()"><i class="fa fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <p class="text-sm font-bold text-gray-600 mb-2">Update Profile Picture</p>
                    <div class="flex items-center gap-4">
                        <img id="settings-avatar-preview" src="" class="w-16 h-16 rounded-full border object-cover">
                        <label class="bg-blue-500 text-white px-4 py-2 rounded-full text-sm font-bold cursor-pointer hover:bg-blue-600 transition">
                            Change Photo
                            <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="updateProfilePicture(this)">
                        </label>
                    </div>
                </div>
                <hr>
                <button onclick="handleLogout()" class="w-full text-left p-4 bg-red-50 text-red-600 rounded-2xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign out
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        
        // Correct LongCat API endpoint and key
        const LONGCAT_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        const LONGCAT_API_KEY = "your-api-key"; // Replace with your actual key

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let selectedFile = null;

        const NIX_ID = "00000000-0000-0000-0000-000000000000";
        const NIX_PROFILE = {
            id: NIX_ID,
            username: "nix4_ai",
            display_name: "Nix 4 Intelligence",
            avatar_url: "https://api.dicebear.com/7.x/bottts/svg?seed=nix4",
            is_verified: true
        };

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = "auth.html"; return; }
            currentUser = session.user;
            await setupUI();
            await loadFeed();
            setupMedia();
            await initializeNixAccount();
            setInterval(checkNixPulse, 3600000); 
        }

        async function setupUI() {
            const { data: profile } = await supabaseClient.from('profiles_social').select('*').eq('id', currentUser.id).maybeSingle();
            const username = profile?.username || currentUser.email.split('@')[0];
            const avatar = profile?.avatar_url || `https://ui-avatars.com/api/?name=${username}`;

            document.querySelectorAll('[id*="avatar"]').forEach(img => img.src = avatar);
            if(document.getElementById('sidebar-name')) document.getElementById('sidebar-name').innerText = profile?.display_name || username;
            if(document.getElementById('sidebar-user')) document.getElementById('sidebar-user').innerText = `@${username}`;
        }

        async function callLongCat(prompt, systemMsg = "You are Nix 4 AI, a helpful and witty social media assistant.") {
            try {
                const response = await fetch(LONGCAT_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${LONGCAT_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "LongCat-Flash-Chat",
                        messages: [
                            { role: "system", content: systemMsg },
                            { role: "user", content: prompt }
                        ],
                        stream: false,
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });
                const result = await response.json();
                
                if (result.error) {
                    console.error("LongCat Error:", result.error);
                    return "Nix is taking a short break (API Error).";
                }

                return result.choices?.[0]?.message?.content || "Nix is thinking...";
            } catch (e) { 
                console.error("Network Error:", e);
                return "Nix is briefly offline due to a connection issue."; 
            }
        }

        async function updateProfilePicture(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const btnLabel = input.parentElement;
            btnLabel.innerText = "Saving...";

            try {
                const fileName = `avatars/${currentUser.id}_${Date.now()}.png`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('Nixora')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabaseClient.storage.from('Nixora').getPublicUrl(fileName);
                
                const { error: dbError } = await supabaseClient
                    .from('profiles_social')
                    .upsert({
                        id: currentUser.id,
                        avatar_url: publicUrl,
                        updated_at: new Date()
                    }, { onConflict: 'id' });

                if (dbError) throw dbError;

                await setupUI();
                alert("Profile picture updated!");
            } catch (err) {
                console.error(err);
                alert("Error: " + (err.message || "Failed to update."));
            } finally {
                btnLabel.innerText = "Change Photo";
            }
        }

        async function initializeNixAccount() {
            const { count } = await supabaseClient.from('posts_social').select('*', { count: 'exact', head: true }).eq('user_id', NIX_ID);
            if (count < 2) {
                const post1 = await callLongCat("Write a cool introduction for Nixora. 20 words max.");
                const post2 = await callLongCat("Tell a fun fact about AI. 20 words max.");
                await supabaseClient.from('posts_social').insert([
                    { user_id: NIX_ID, content: post1, media_type: 'text' },
                    { user_id: NIX_ID, content: post2, media_type: 'text' }
                ]);
                loadFeed();
            }
        }

        async function checkNixPulse() {
            const post = await callLongCat("Give a quick tech tip. 15 words max.");
            await supabaseClient.from('posts_social').insert({ user_id: NIX_ID, content: post, media_type: 'text' });
            loadFeed();
        }

        async function publishPost() {
            const input = document.getElementById('post-input');
            const btn = document.getElementById('publish-btn');
            if (!input.value && !selectedFile) return;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader"></div>`;

            try {
                let mediaUrl = null;
                if (selectedFile) {
                    const path = `posts/${currentUser.id}/${Date.now()}_${selectedFile.name}`;
                    const { data, error } = await supabaseClient.storage.from('Nixora').upload(path, selectedFile);
                    if (error) throw error;
                    mediaUrl = supabaseClient.storage.from('Nixora').getPublicUrl(data.path).data.publicUrl;
                }
                await supabaseClient.from('posts_social').insert({
                    user_id: currentUser.id,
                    content: input.value,
                    media_url: mediaUrl,
                    media_type: selectedFile ? (selectedFile.type.startsWith('image') ? 'image' : 'video') : 'text'
                });
                input.value = '';
                clearMedia();
                loadFeed();
            } catch (err) { 
                alert("Post failed. Make sure your Storage and RLS policies allow uploads."); 
            } finally { 
                btn.disabled = false; btn.innerText = "Post"; 
            }
        }

        async function talkToNix() {
            const input = document.getElementById('nix-input');
            const box = document.getElementById('nix-chat-box');
            if (!input.value) return;
            const text = input.value;
            input.value = '';
            box.innerHTML += `<div class="text-right mb-2"><span class="bg-blue-500 text-white p-2 rounded-xl inline-block">${text}</span></div>`;
            const reply = await callLongCat(text);
            box.innerHTML += `<div class="text-left mb-2"><span class="bg-white border p-2 rounded-xl inline-block shadow-sm">${reply}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function askNixForIdea() {
            const input = document.getElementById('post-input');
            input.placeholder = "Asking Nix...";
            const idea = await callLongCat("Suggest a short creative post idea.");
            input.value = idea;
            input.placeholder = "What's happening?";
        }

        async function loadFeed() {
            const { data, error } = await supabaseClient.from('posts_social').select(`*, profiles_social (username, display_name, avatar_url, is_verified)`).order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            if (error) return;
            container.innerHTML = data.map(post => {
                const isNix = post.user_id === NIX_ID;
                const p = isNix ? NIX_PROFILE : (post.profiles_social || { username: 'user', display_name: 'User' });
                return `
                    <div class="post-card p-4 flex gap-3">
                        <img src="${p.avatar_url || 'https://ui-avatars.com/api/?name=U'}" class="w-12 h-12 rounded-full border shrink-0 object-cover">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1">
                                <span class="font-bold truncate">${p.display_name}</span>
                                ${p.is_verified ? '<i class="fa-solid fa-circle-check text-blue-500 text-xs"></i>' : ''}
                                <span class="text-gray-500 text-sm">@${p.username}</span>
                            </div>
                            <p class="mt-1 text-[15px] whitespace-pre-wrap">${post.content}</p>
                            ${post.media_url ? (post.media_type === 'video' ? `<video controls src="${post.media_url}" class="mt-3 rounded-2xl w-full border"></video>` : `<img src="${post.media_url}" class="mt-3 rounded-2xl w-full h-auto border">`) : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupMedia() {
            document.getElementById('file-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                selectedFile = file;
                document.getElementById('media-preview').classList.remove('hidden');
                document.getElementById('preview-img').src = URL.createObjectURL(file);
            });
        }
        function clearMedia() { selectedFile = null; document.getElementById('media-preview').classList.add('hidden'); }
        function toggleNix() { document.getElementById('nix-panel').classList.toggle('visible'); }
        function openModal(id) { document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('modal-overlay').classList.replace('flex', 'hidden'); }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.href = "auth.html"; }

        window.onload = init;
    </script>
</body>
</html>
