<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #070708;
            --bg-sidebar: #010101;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-primary: #fdfdfd;
            --text-secondary: #8e949e;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(10, 10, 12, 0.8);
            --bubble-user: #1c1c1f;
            --sidebar-active: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .input-container-glass {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .sidebar-item-active {
            background: var(--sidebar-active);
            color: var(--text-primary);
            box-shadow: inset 3px 0 0 0 var(--accent);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.15); border-radius: 10px; }

        .message-bubble {
            max-width: 90%;
            animation: messageEntry 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes messageEntry {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .nix-logo {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .image-loading-shimmer {
            background: linear-gradient(90deg, #161618 25%, #232326 50%, #161618 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Mobile Sidebar Overlay */
        .mobile-sidebar-enter { transform: translateX(-100%); }
        .mobile-sidebar-active { transform: translateX(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const CHAT_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        
        // Fixed Image Generation Logic from tinymelon.html
        const GET_IMAGE_URL = (prompt) => {
            const seed = Math.floor(Math.random() * 1000000);
            const cleanPrompt = prompt.replace(/[^\w\s\u0600-\u06FF]/gi, '').substring(0, 400);
            return `https://pollinations.ai/p/${encodeURIComponent(cleanPrompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
        };

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [uiLang, setUiLang] = useState('en');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [showAlert, setShowAlert] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            const scrollRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = "auth.html";
                    } else {
                        setUser(session.user);
                        fetchConversations(session.user.id);
                        if (!localStorage.getItem('nix_alert_v3')) setShowAlert(true);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const fetchConversations = async (userId) => {
                const { data } = await supabaseClient
                    .from('conversations')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const loadConversation = async (id) => {
                setActiveConvId(id);
                setIsMobileMenuOpen(false);
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', id)
                    .order('created_at', { ascending: true });
                if (data) setMessages(data);
            };

            const processQuery = async () => {
                if (!input.trim() || !user || isTyping) return;

                const query = input.trim();
                setInput("");
                if (textareaRef.current) textareaRef.current.style.height = 'auto';

                let convId = activeConvId;
                if (!convId) {
                    const { data } = await supabaseClient
                        .from('conversations')
                        .insert([{ user_id: user.id, title: query.substring(0, 30) + "..." }])
                        .select().single();
                    convId = data.id;
                    setActiveConvId(convId);
                    setConversations([data, ...conversations]);
                }

                const userMsg = { conversation_id: convId, role: 'user', content: query };
                setMessages(prev => [...prev, userMsg]);
                setIsTyping(true);

                await supabaseClient.from('messages').insert([{
                    conversation_id: convId,
                    role: 'user',
                    content: query
                }]);

                // Advanced Image Intent Detection
                const imageKeywords = ["generate image", "create image", "draw", "make an image", "paint", "تصميم صورة", "ارسم", "photo of", "picture of"];
                const isImageRequest = imageKeywords.some(kw => query.toLowerCase().includes(kw));

                if (isImageRequest) {
                    const imageUrl = GET_IMAGE_URL(query);
                    const aiMsg = { 
                        conversation_id: convId, 
                        role: 'assistant', 
                        content: `Synthesizing your vision with **Tiny Mellon (Flux Engine)**...`,
                        tempImageUrl: imageUrl,
                        isImageLoading: true
                    };
                    
                    setMessages(prev => [...prev, aiMsg]);
                    setIsTyping(false);

                    // Preload Image to ensure it exists before displaying "Success"
                    const img = new Image();
                    img.src = imageUrl;
                    img.onload = async () => {
                        const finalContent = `I've generated this artwork using **Tiny Mellon (Flux Engine)**:\n\n![Generated Image](${imageUrl})`;
                        
                        setMessages(prev => prev.map(m => 
                            m.tempImageUrl === imageUrl ? { ...m, content: finalContent, isImageLoading: false } : m
                        ));

                        await supabaseClient.from('messages').insert([{
                            conversation_id: convId,
                            role: 'assistant',
                            content: finalContent
                        }]);
                    };
                    img.onerror = () => {
                        setMessages(prev => prev.map(m => 
                            m.tempImageUrl === imageUrl ? { ...m, content: "Sorry, I encountered an issue generating that image. Please try a different prompt.", isImageLoading: false } : m
                        ));
                    };
                } else {
                    try {
                        const res = await fetch(CHAT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                            body: JSON.stringify({
                                model: "LongCat-Flash-Chat",
                                messages: [
                                    { role: "system", content: "You are Nix, a highly intelligent AI workspace assistant. Your personality is sleek, minimal, and highly helpful." },
                                    ...messages.slice(-6).map(m => ({ role: m.role, content: m.content })),
                                    { role: "user", content: query }
                                ]
                            })
                        });
                        const data = await res.json();
                        const reply = data.choices[0].message.content;

                        const aiMsg = { conversation_id: convId, role: 'assistant', content: reply };
                        setMessages(prev => [...prev, aiMsg]);
                        await supabaseClient.from('messages').insert([aiMsg]);
                    } catch (e) {
                        console.error(e);
                    } finally {
                        setIsTyping(false);
                    }
                }
            };

            const SidebarContent = () => (
                <div className="flex flex-col h-full bg-[var(--bg-sidebar)]">
                    <div className="p-6 md:p-8">
                        <button 
                            onClick={() => { setActiveConvId(null); setMessages([]); setIsMobileMenuOpen(false); }} 
                            className="w-full py-4 rounded-2xl bg-[var(--accent)] text-white font-bold shadow-lg shadow-indigo-500/20 active:scale-95 transition-all"
                        >
                            New Space
                        </button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-4 md:px-6 py-2 chat-scroll space-y-1">
                        <p className="px-4 pb-4 text-[10px] font-black uppercase tracking-widest opacity-30">Recent Workspaces</p>
                        {conversations.map(c => (
                            <button 
                                key={c.id} 
                                onClick={() => loadConversation(c.id)} 
                                className={`w-full text-left p-4 rounded-2xl text-[12px] font-semibold truncate transition-all ${activeConvId === c.id ? 'sidebar-item-active' : 'text-[var(--text-secondary)] hover:bg-[var(--sidebar-active)]'}`}
                            >
                                {c.title || "Untitled Chat"}
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className={`flex h-[100dvh] w-full bg-[var(--bg-main)] ${uiLang === 'ar' ? 'rtl' : 'ltr'}`}>
                    {/* Alert shown only once */}
                    {showAlert && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/80 backdrop-blur-2xl">
                            <div className="relative w-full max-w-md bg-[var(--bg-main)] border border-[var(--border)] rounded-[3rem] p-10 text-center shadow-2xl">
                                <div className="nix-logo w-14 h-14 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                                    <span className="text-white font-black text-xl italic">N</span>
                                </div>
                                <h2 className="text-2xl font-black mb-3">Mobile Support & Flux</h2>
                                <p className="text-[var(--text-secondary)] text-sm mb-8 leading-relaxed">
                                    We've updated the interface for mobile devices and fixed the **Tiny Mellon** image generation core.
                                </p>
                                <button 
                                    onClick={() => { setShowAlert(false); localStorage.setItem('nix_alert_v3', 'true'); }}
                                    className="w-full py-4 rounded-2xl bg-[var(--accent)] text-white font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-500/30 transition-all active:scale-95"
                                >
                                    Experience Nix
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Mobile Sidebar Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[200] lg:hidden">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>
                            <div className="absolute left-0 top-0 bottom-0 w-4/5 max-w-sm bg-[var(--bg-sidebar)] border-r border-[var(--border)]">
                                <SidebarContent />
                            </div>
                        </div>
                    )}

                    {/* Desktop Sidebar */}
                    <aside className="hidden lg:flex w-[320px] border-r border-[var(--border)] flex-col bg-[var(--bg-sidebar)]">
                        <SidebarContent />
                    </aside>

                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="flex items-center justify-between h-20 px-6 md:px-12 glass-panel z-10 shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-2 text-[var(--text-secondary)]">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                                </button>
                                <div className="nix-logo w-9 h-9 rounded-xl flex items-center justify-center"><span className="text-white italic font-black text-xs">N</span></div>
                                <h2 className="text-[14px] font-extrabold tracking-tight">Nix Workspace</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="p-2 opacity-40 hover:opacity-100 transition-opacity">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </button>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll px-6 md:px-24 py-12">
                            <div className="max-w-3xl mx-auto space-y-14 pb-48">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-5 md:gap-8 ${msg.role === 'user' ? 'flex-row-reverse text-right' : ''}`}>
                                        <div className={`w-10 h-10 rounded-xl shrink-0 flex items-center justify-center text-[9px] font-black mt-1 ${msg.role === 'user' ? 'bg-[var(--border)]' : 'nix-logo text-white'}`}>
                                            {msg.role === 'user' ? 'ME' : 'NIX'}
                                        </div>
                                        <div className="message-bubble w-full min-w-0">
                                            <div className={`p-6 md:p-8 rounded-[2.5rem] text-[15px] leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-[var(--bubble-user)]' : 'bg-transparent border border-transparent'}`}>
                                                {msg.isImageLoading ? (
                                                    <div className="space-y-4">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>
                                                            <p className="font-black text-[11px] uppercase tracking-widest text-indigo-400">Tiny Mellon (Flux) is Synthesizing...</p>
                                                        </div>
                                                        <div className="w-full aspect-square rounded-[2.5rem] image-loading-shimmer"></div>
                                                    </div>
                                                ) : msg.content.includes('![Generated Image]') ? (
                                                    <div className="space-y-4">
                                                        <p className="whitespace-pre-wrap font-medium">{msg.content.split('![Generated Image]')[0]}</p>
                                                        <div className="relative group">
                                                            <img src={msg.content.match(/\((.*?)\)/)[1]} className="rounded-[2.5rem] w-full border border-[var(--border)] shadow-2xl transition-transform" alt="AI Generated" />
                                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/20 rounded-[2.5rem]">
                                                                <button onClick={() => window.open(msg.content.match(/\((.*?)\)/)[1], '_blank')} className="px-6 py-3 bg-white text-black font-bold rounded-xl shadow-xl">Download High-Res</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="whitespace-pre-wrap font-medium">{msg.content}</div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="flex gap-2 px-16 opacity-30 animate-pulse"><div className="w-2 h-2 bg-white rounded-full"></div><div className="w-2 h-2 bg-white rounded-full"></div><div className="w-2 h-2 bg-white rounded-full"></div></div>}
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 right-0 p-6 md:p-12 pointer-events-none">
                            <div className="max-w-3xl mx-auto pointer-events-auto">
                                <div className="input-container-glass rounded-[2.5rem] p-2 flex items-end">
                                    <textarea 
                                        ref={textareaRef}
                                        rows="1"
                                        value={input}
                                        onChange={(e) => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 180) + 'px'; }}
                                        onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processQuery(); } }}
                                        placeholder="Command Nix or Generate an image..."
                                        className="flex-1 bg-transparent py-6 px-8 outline-none resize-none text-[15px] font-medium"
                                    />
                                    <button onClick={processQuery} disabled={!input.trim() || isTyping} className="mb-3 mr-3 w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all disabled:opacity-5 disabled:scale-100">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 12h14m-7-7l7 7-7 7"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 z-[250] flex items-center justify-center bg-black/95 backdrop-blur-3xl p-6">
                            <div className="w-full max-w-sm bg-[var(--bg-main)] border border-[var(--border)] rounded-[3.5rem] p-12">
                                <div className="flex justify-between items-center mb-12">
                                    <h3 className="font-black text-2xl tracking-tighter">System Settings</h3>
                                    <button onClick={() => setShowSettings(false)} className="p-3 bg-[var(--border)] rounded-2xl">✕</button>
                                </div>
                                <div className="space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-30 px-2">Interface Language</label>
                                        <div className="grid grid-cols-2 gap-2 bg-[var(--border)] p-1.5 rounded-2xl">
                                            <button onClick={() => setUiLang('en')} className={`py-4 rounded-xl text-xs font-bold transition-all ${uiLang === 'en' ? 'bg-[var(--accent)] text-white shadow-lg' : 'opacity-40'}`}>English</button>
                                            <button onClick={() => setUiLang('ar')} className={`py-4 rounded-xl text-xs font-bold transition-all ${uiLang === 'ar' ? 'bg-[var(--accent)] text-white shadow-lg' : 'opacity-40'}`}>العربية</button>
                                        </div>
                                    </div>
                                    <div className="pt-8 border-t border-[var(--border)]">
                                        <button onClick={async () => { await supabaseClient.auth.signOut(); window.location.href="auth.html"; }} className="w-full py-5 text-red-500 border border-red-500/20 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
