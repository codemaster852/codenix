<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix Hybrid - AI Intelligence</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #070708;
            --bg-sidebar: #010101;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-primary: #fdfdfd;
            --text-secondary: #8e949e;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(10, 10, 12, 0.85);
            --bubble-user: #1c1c1f;
            --sidebar-active: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border-bottom: 1px solid var(--border);
        }

        .input-area {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            box-shadow: 0 10px 50px -10px rgba(0,0,0,0.7);
        }

        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .message-anim {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nix-logo {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .shimmer {
            background: linear-gradient(90deg, #111113 25%, #1e1e21 50%, #111113 75%);
            background-size: 200% 100%;
            animation: shimmerEffect 1.8s infinite;
        }

        @keyframes shimmerEffect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .btn-hover:active {
            transform: scale(0.96);
        }

        pre {
            background: #111113;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CONFIG = {
            SUPABASE_URL: "https://rnlwrngfgvznndlekmrz.supabase.co",
            SUPABASE_KEY: "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt",
            API_KEY: "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J",
            CHAT_URL: "https://api.longcat.chat/openai/v1/chat/completions"
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            const scrollRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => {
                const checkAuth = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = "auth.html";
                    } else {
                        setUser(session.user);
                        loadConversations(session.user.id);
                    }
                };
                checkAuth();
            }, []);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const loadConversations = async (uid) => {
                const { data } = await supabaseClient
                    .from('conversations')
                    .select('*')
                    .eq('user_id', uid)
                    .order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const loadMessages = async (id) => {
                setActiveId(id);
                setIsSidebarOpen(false);
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', id)
                    .order('created_at', { ascending: true });
                if (data) setMessages(data);
            };

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                
                const query = input.trim();
                setInput("");
                if (inputRef.current) inputRef.current.style.height = 'auto';

                let convId = activeId;
                if (!convId) {
                    const { data } = await supabaseClient
                        .from('conversations')
                        .insert([{ user_id: user.id, title: "New Task" }])
                        .select().single();
                    convId = data.id;
                    setActiveId(convId);
                    setConversations([data, ...conversations]);
                }

                const userMsg = { conversation_id: convId, role: 'user', content: query };
                setMessages(prev => [...prev, userMsg]);
                setIsTyping(true);

                await supabaseClient.from('messages').insert([userMsg]);

                // Hybrid Logic Routing
                const imageTrigger = ["draw", "create image", "paint", "visualize", "تصميم", "صورة", "generate image", "make a photo", "sketch"].some(k => query.toLowerCase().includes(k));

                if (imageTrigger) {
                    const seed = Math.floor(Math.random() * 1000000);
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(query)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
                    
                    const assistantMsg = { 
                        conversation_id: convId, 
                        role: 'assistant', 
                        content: `Synthesizing Visual Intelligence...`,
                        isImage: true,
                        imageUrl: imgUrl,
                        loading: true
                    };
                    setMessages(prev => [...prev, assistantMsg]);
                    setIsTyping(false);

                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = async () => {
                        const finalContent = `I have generated this visualization for you:\n\n![Nix Generation](${imgUrl})`;
                        setMessages(prev => prev.map(m => m.imageUrl === imgUrl ? { ...m, loading: false, content: finalContent } : m));
                        await supabaseClient.from('messages').insert([{ conversation_id: convId, role: 'assistant', content: finalContent }]);
                        updateTitle(convId, query);
                    };
                } else {
                    try {
                        // Advanced Memory Retrieval (Last 10 messages)
                        const context = messages.slice(-10).map(m => ({ role: m.role, content: m.content }));
                        
                        const res = await fetch(CONFIG.CHAT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.API_KEY}` },
                            body: JSON.stringify({
                                model: "LongCat-Flash-Chat",
                                messages: [
                                    { role: "system", content: "You are Nix Hybrid, an advanced AI blending visual synthesis and logical reasoning. You have access to the user's current session memory. Be precise, sophisticated, and helpful." },
                                    ...context,
                                    { role: "user", content: query }
                                ]
                            })
                        });
                        const data = await res.json();
                        const reply = data.choices[0].message.content;
                        
                        const assistantMsg = { conversation_id: convId, role: 'assistant', content: reply };
                        setMessages(prev => [...prev, assistantMsg]);
                        await supabaseClient.from('messages').insert([assistantMsg]);
                        updateTitle(convId, query);
                    } catch (err) {
                        console.error("Link error", err);
                    } finally {
                        setIsTyping(false);
                    }
                }
            };

            const updateTitle = async (id, prompt) => {
                if (messages.length > 2) return; // Only title the first exchange
                try {
                    const res = await fetch(CONFIG.CHAT_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.API_KEY}` },
                        body: JSON.stringify({
                            model: "LongCat-Flash-Chat",
                            messages: [{ role: "user", content: `Summarize this in 3 words: ${prompt}` }]
                        })
                    });
                    const data = await res.json();
                    const title = data.choices[0].message.content.replace(/[".]/g, '');
                    await supabaseClient.from('conversations').update({ title }).eq('id', id);
                    setConversations(prev => prev.map(c => c.id === id ? { ...c, title } : c));
                } catch (e) {}
            };

            return (
                <div className="flex h-[100dvh] w-full bg-[var(--bg-main)]">
                    {/* Mobile Sidebar Overlay */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm lg:hidden" onClick={() => setIsSidebarOpen(false)}>
                            <div className="w-[80%] h-full bg-[var(--bg-sidebar)] p-6" onClick={e => e.stopPropagation()}>
                                <SidebarContent conversations={conversations} activeId={activeId} loadMessages={loadMessages} />
                            </div>
                        </div>
                    )}

                    {/* Desktop Sidebar */}
                    <aside className="hidden lg:flex w-[300px] bg-[var(--bg-sidebar)] border-r border-[var(--border)] flex-col">
                        <SidebarContent conversations={conversations} activeId={activeId} loadMessages={loadMessages} startNew={() => { setActiveId(null); setMessages([]); }} />
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-16 flex items-center justify-between px-6 glass-panel shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-2 text-[var(--text-secondary)]">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                                </button>
                                <div className="nix-logo w-8 h-8 rounded-lg flex items-center justify-center">
                                    <span className="text-[10px] italic font-black text-white">N</span>
                                </div>
                                <h1 className="text-xs font-black uppercase tracking-[0.2em] opacity-80">
                                    {conversations.find(c => c.id === activeId)?.title || "Unified Intelligence"}
                                </h1>
                            </div>
                        </header>

                        {/* Messages Area */}
                        <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll px-4 md:px-0">
                            <div className="max-w-3xl mx-auto py-12 space-y-12 pb-44">
                                {messages.length === 0 && (
                                    <div className="text-center pt-24 space-y-6 opacity-30">
                                        <div className="w-16 h-16 border border-white/20 rounded-2xl mx-auto flex items-center justify-center">
                                            <span className="text-2xl italic font-black">N</span>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[11px] font-black uppercase tracking-widest">Logic & Synthesis Active</p>
                                            <p className="text-[10px] font-medium">Draw something or ask a complex question</p>
                                        </div>
                                    </div>
                                )}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-5 message-anim ${m.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-9 h-9 rounded-lg shrink-0 flex items-center justify-center text-[10px] font-black ${m.role === 'user' ? 'bg-[var(--border)]' : 'nix-logo text-white'}`}>
                                            {m.role === 'user' ? 'U' : 'N'}
                                        </div>
                                        <div className={`max-w-[85%] space-y-4 ${m.role === 'user' ? 'text-right' : ''}`}>
                                            <div className={`p-5 md:p-6 rounded-[1.8rem] text-[15px] leading-[1.6] ${m.role === 'user' ? 'bg-[var(--bubble-user)]' : 'bg-transparent'}`}>
                                                {m.loading ? (
                                                    <div className="space-y-4">
                                                        <p className="text-xs font-bold text-indigo-400 animate-pulse">INITIATING VISUAL CORE...</p>
                                                        <div className="aspect-square w-full shimmer rounded-3xl border border-white/5"></div>
                                                    </div>
                                                ) : (
                                                    <div className="whitespace-pre-wrap">
                                                        {renderContent(m.content)}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="flex gap-2 px-14 opacity-20"><div className="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:-0.15s]"></div><div className="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:-0.3s]"></div></div>}
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="absolute bottom-0 left-0 right-0 p-4 md:p-10 pointer-events-none">
                            <div className="max-w-2xl mx-auto pointer-events-auto">
                                <div className="input-area rounded-[2.2rem] p-2 flex items-end">
                                    <textarea 
                                        ref={inputRef}
                                        rows="1"
                                        value={input}
                                        onChange={(e) => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px'; }}
                                        onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }}}
                                        placeholder="Message or visualize..."
                                        className="flex-1 bg-transparent py-5 px-6 outline-none text-[15px] resize-none overflow-hidden"
                                    />
                                    <button 
                                        onClick={handleSend}
                                        disabled={!input.trim() || isTyping}
                                        className="w-12 h-12 bg-[var(--accent)] text-white rounded-2xl flex items-center justify-center mb-1 mr-1 btn-hover disabled:opacity-10 shadow-lg"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M14 5l7 7-7 7M5 12h14"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarContent = ({ conversations, activeId, loadMessages, startNew }) => (
            <div className="flex flex-col h-full">
                <div className="p-6">
                    <button onClick={startNew} className="w-full py-4 bg-[var(--accent)] text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/10 active:scale-95 transition-all">
                        New Session
                    </button>
                </div>
                <div className="flex-1 overflow-y-auto px-4 space-y-1 chat-scroll">
                    <p className="px-4 pb-3 text-[10px] font-black uppercase tracking-widest opacity-20">Archives</p>
                    {conversations.map(c => (
                        <button 
                            key={c.id} 
                            onClick={() => loadMessages(c.id)}
                            className={`w-full text-left p-4 rounded-xl text-[12.5px] font-semibold truncate transition-all ${activeId === c.id ? 'bg-[var(--sidebar-active)] text-white shadow-inner' : 'text-[var(--text-secondary)] hover:bg-white/5'}`}
                        >
                            {c.title}
                        </button>
                    ))}
                </div>
                <div className="p-6 border-t border-[var(--border)]">
                    <div className="flex items-center gap-3 opacity-50 text-[10px] font-bold">
                        <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                        HYBRID CORES ACTIVE
                    </div>
                </div>
            </div>
        );

        const renderContent = (content) => {
            if (content.includes('![Nix Generation]')) {
                const parts = content.split('![Nix Generation]');
                const urlMatch = parts[1].match(/\((.*?)\)/);
                const url = urlMatch ? urlMatch[1] : "";
                return (
                    <div className="space-y-4">
                        <p>{parts[0]}</p>
                        <div className="relative group">
                            <img src={url} className="rounded-3xl w-full border border-white/10 shadow-2xl transition-transform duration-500 hover:scale-[1.01]" />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-3xl backdrop-blur-sm">
                                <button onClick={() => window.open(url, '_blank')} className="px-6 py-3 bg-white text-black font-black text-[10px] uppercase tracking-widest rounded-xl hover:scale-105 transition-all">View Full</button>
                            </div>
                        </div>
                    </div>
                );
            }
            return content;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
