<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nix - Intelligent Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700&display=swap');
        
        :root {
            --bg-main: #070708;
            --bg-sidebar: #010101;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --text-primary: #fdfdfd;
            --text-secondary: #8e949e;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(10, 10, 12, 0.8);
            --bubble-user: #1c1c1f;
            --sidebar-active: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .input-container-glass {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .sidebar-item-active {
            background: var(--sidebar-active);
            color: var(--text-primary);
            box-shadow: inset 3px 0 0 0 var(--accent);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.15); border-radius: 10px; }

        .message-bubble {
            max-width: 85%;
            animation: messageEntry 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes messageEntry {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .nix-logo {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .image-loading-shimmer {
            background: linear-gradient(90deg, #161618 25%, #232326 50%, #161618 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const API_KEY = "ak_2OJ4ng6za7b74DP3hu32a6P04XH8J";
        const CHAT_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        
        // Image Generation URL Utility
        const GET_IMAGE_URL = (prompt) => {
            const seed = Math.floor(Math.random() * 1000000);
            return `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
        };

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [user, setUser] = useState(null);
            const [uiLang, setUiLang] = useState('en');
            const [messages, setMessages] = useState([]);
            const [conversations, setConversations] = useState([]);
            const [activeConvId, setActiveConvId] = useState(null);
            const [input, setInput] = useState("");
            const [isTyping, setIsTyping] = useState(false);
            const [showAlert, setShowAlert] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            
            const scrollRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = "auth.html";
                    } else {
                        setUser(session.user);
                        fetchConversations(session.user.id);
                        if (!localStorage.getItem('nix_alert_v2')) setShowAlert(true);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (scrollRef.current) {
                    scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [messages, isTyping]);

            const fetchConversations = async (userId) => {
                const { data } = await supabaseClient
                    .from('conversations')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (data) setConversations(data);
            };

            const loadConversation = async (id) => {
                setActiveConvId(id);
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('conversation_id', id)
                    .order('created_at', { ascending: true });
                if (data) setMessages(data);
            };

            const processQuery = async () => {
                if (!input.trim() || !user || isTyping) return;

                const query = input.trim();
                setInput("");
                if (textareaRef.current) textareaRef.current.style.height = 'auto';

                let convId = activeConvId;
                if (!convId) {
                    const { data } = await supabaseClient
                        .from('conversations')
                        .insert([{ user_id: user.id, title: query.substring(0, 20) + "..." }])
                        .select().single();
                    convId = data.id;
                    setActiveConvId(convId);
                    setConversations([data, ...conversations]);
                }

                const userMsg = { conversation_id: convId, role: 'user', content: query };
                setMessages(prev => [...prev, userMsg]);
                setIsTyping(true);

                // Save to Supabase (Avoiding columns that might not exist)
                await supabaseClient.from('messages').insert([{
                    conversation_id: convId,
                    role: 'user',
                    content: query
                }]);

                const imageKeywords = ["generate image", "create image", "draw", "make an image", "paint", "تصميم صورة", "ارسم"];
                const isImageRequest = imageKeywords.some(kw => query.toLowerCase().includes(kw));

                if (isImageRequest) {
                    // 1. Create a "Loading Image" message
                    const imageUrl = GET_IMAGE_URL(query);
                    const aiMsg = { 
                        conversation_id: convId, 
                        role: 'assistant', 
                        content: `Synthesizing your vision with **Tiny Mellon (Flux Engine)**...`,
                        tempImageUrl: imageUrl,
                        isImageLoading: true
                    };
                    
                    setMessages(prev => [...prev, aiMsg]);
                    setIsTyping(false);

                    // Preload image in background
                    const img = new Image();
                    img.src = imageUrl;
                    img.onload = async () => {
                        const finalContent = `I've generated this artwork using **Tiny Mellon (Flux Engine)** based on your request:\n\n![Generated Image](${imageUrl})`;
                        
                        // Update UI
                        setMessages(prev => prev.map(m => 
                            m.tempImageUrl === imageUrl ? { ...m, content: finalContent, isImageLoading: false } : m
                        ));

                        // Save to Database
                        await supabaseClient.from('messages').insert([{
                            conversation_id: convId,
                            role: 'assistant',
                            content: finalContent
                        }]);
                    };
                } else {
                    try {
                        const res = await fetch(CHAT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                            body: JSON.stringify({
                                model: "LongCat-Flash-Chat",
                                messages: [
                                    { role: "system", content: "You are Nix, a highly intelligent AI workspace assistant." },
                                    ...messages.slice(-5).map(m => ({ role: m.role, content: m.content })),
                                    { role: "user", content: query }
                                ]
                            })
                        });
                        const data = await res.json();
                        const reply = data.choices[0].message.content;

                        const aiMsg = { conversation_id: convId, role: 'assistant', content: reply };
                        setMessages(prev => [...prev, aiMsg]);
                        await supabaseClient.from('messages').insert([aiMsg]);
                    } catch (e) {
                        console.error(e);
                    } finally {
                        setIsTyping(false);
                    }
                }
            };

            return (
                <div className={`flex h-[100dvh] w-full bg-[var(--bg-main)] ${uiLang === 'ar' ? 'rtl' : 'ltr'}`}>
                    {showAlert && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/80 backdrop-blur-xl transition-opacity">
                            <div className="relative w-full max-w-md bg-[var(--bg-main)] border border-[var(--border)] rounded-[3rem] p-10 text-center shadow-2xl">
                                <div className="nix-logo w-14 h-14 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                                    <span className="text-white font-black text-xl italic">N</span>
                                </div>
                                <h2 className="text-2xl font-black mb-3">Flux Synthesis Active</h2>
                                <p className="text-[var(--text-secondary)] text-sm mb-8">Nix is now integrated with Tiny Mellon for high-fidelity image generation.</p>
                                <button 
                                    onClick={() => { setShowAlert(false); localStorage.setItem('nix_alert_v2', 'true'); }}
                                    className="w-full py-4 rounded-2xl bg-[var(--accent)] text-white font-black text-xs uppercase tracking-widest active:scale-95 transition-all"
                                >
                                    Start Creating
                                </button>
                            </div>
                        </div>
                    )}

                    <aside className="hidden lg:flex w-[320px] border-r border-[var(--border)] flex-col bg-[var(--bg-sidebar)]">
                        <div className="p-8">
                            <button onClick={() => { setActiveConvId(null); setMessages([]); }} className="w-full py-4 rounded-2xl bg-[var(--accent)] text-white font-bold shadow-lg shadow-indigo-500/20">New Chat</button>
                        </div>
                        <div className="flex-1 overflow-y-auto px-6 py-2 chat-scroll space-y-1">
                            {conversations.map(c => (
                                <button key={c.id} onClick={() => loadConversation(c.id)} className={`w-full text-left p-4 rounded-2xl text-[12px] font-semibold truncate transition-all ${activeConvId === c.id ? 'sidebar-item-active' : 'text-[var(--text-secondary)] hover:bg-[var(--sidebar-active)]'}`}>
                                    {c.title || "Untitled Conversation"}
                                </button>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="flex items-center justify-between h-20 px-8 glass-panel z-10 shrink-0">
                            <div className="flex items-center gap-4">
                                <div className="nix-logo w-10 h-10 rounded-xl flex items-center justify-center"><span className="text-white italic font-black">N</span></div>
                                <h2 className="text-[14px] font-extrabold">Nix Workspace</h2>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="p-2 opacity-40 hover:opacity-100">⚙</button>
                        </header>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll px-6 md:px-24 py-12">
                            <div className="max-w-3xl mx-auto space-y-12 pb-48">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-6 ${msg.role === 'user' ? 'flex-row-reverse text-right' : ''}`}>
                                        <div className={`w-10 h-10 rounded-xl shrink-0 flex items-center justify-center text-[9px] font-black mt-1 ${msg.role === 'user' ? 'bg-[var(--border)]' : 'nix-logo text-white'}`}>
                                            {msg.role === 'user' ? 'USER' : 'NIX'}
                                        </div>
                                        <div className="message-bubble w-full">
                                            <div className={`p-6 md:p-8 rounded-[2rem] text-[15px] leading-relaxed ${msg.role === 'user' ? 'bg-[var(--bubble-user)]' : 'bg-transparent'}`}>
                                                {msg.isImageLoading ? (
                                                    <div className="space-y-4">
                                                        <p className="flex items-center gap-3 font-bold text-indigo-400">
                                                            <svg className="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                            </svg>
                                                            Tiny Mellon is thinking...
                                                        </p>
                                                        <div className="w-full aspect-square rounded-3xl image-loading-shimmer"></div>
                                                    </div>
                                                ) : msg.content.includes('![Generated Image]') ? (
                                                    <div className="space-y-4">
                                                        <p className="whitespace-pre-wrap">{msg.content.split('![Generated Image]')[0]}</p>
                                                        <img src={msg.content.match(/\((.*?)\)/)[1]} className="rounded-3xl w-full border border-[var(--border)] shadow-2xl" alt="AI Generated" />
                                                    </div>
                                                ) : (
                                                    <div className="whitespace-pre-wrap">{msg.content}</div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="animate-pulse flex gap-2 px-16 opacity-30"><div className="w-1.5 h-1.5 bg-white rounded-full"></div><div className="w-1.5 h-1.5 bg-white rounded-full"></div><div className="w-1.5 h-1.5 bg-white rounded-full"></div></div>}
                            </div>
                        </div>

                        <div className="absolute bottom-0 left-0 right-0 p-6 md:p-12 pointer-events-none">
                            <div className="max-w-3xl mx-auto pointer-events-auto">
                                <div className="input-container-glass rounded-[2.5rem] p-2 flex items-end">
                                    <textarea 
                                        ref={textareaRef}
                                        rows="1"
                                        value={input}
                                        onChange={(e) => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 180) + 'px'; }}
                                        onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processQuery(); } }}
                                        placeholder="Type to chat or generate..."
                                        className="flex-1 bg-transparent py-5 px-6 outline-none resize-none text-[15px] font-medium"
                                    />
                                    <button onClick={processQuery} disabled={!input.trim() || isTyping} className="mb-2 mr-2 w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all disabled:opacity-10">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 12h14m-7-7l7 7-7 7"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {showSettings && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/90 backdrop-blur-xl p-6">
                            <div className="w-full max-w-sm bg-[var(--bg-main)] border border-[var(--border)] rounded-[3rem] p-10">
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="font-black text-xl">Settings</h3>
                                    <button onClick={() => setShowSettings(false)}>✕</button>
                                </div>
                                <div className="space-y-6">
                                    <button onClick={() => setUiLang(uiLang === 'en' ? 'ar' : 'en')} className="w-full py-4 bg-[var(--border)] rounded-2xl font-bold">
                                        Language: {uiLang.toUpperCase()}
                                    </button>
                                    <button onClick={async () => { await supabaseClient.auth.signOut(); window.location.href="auth.html"; }} className="w-full py-4 text-red-500 border border-red-500/20 rounded-2xl font-bold">Sign Out</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
