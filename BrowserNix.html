<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrowseNix | The Future of Search</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7e22ce',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Background Grids & Glows */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        .dark .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        /* Subtle Purple Glow */
        .glow-effect {
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
        }
        
        .dark .glow-effect {
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
        }

        /* Smooth Theme Transition */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Professional Google CSE Overrides - Standard CSS */
        .gsc-control-cse {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
            font-family: inherit !important;
        }
        .gsc-search-box {
            margin-bottom: 0 !important;
        }
        table.gsc-search-box td.gsc-input {
            padding-right: 0 !important;
        }
        .gsc-input-box {
            border: none !important;
            background: transparent !important;
        }
        input.gsc-input, .gsc-input-box {
            background-color: transparent !important;
            font-size: 1.125rem !important;
            padding: 0.75rem 1rem !important;
            outline: none !important;
            color: inherit !important;
        }
        .dark input.gsc-input {
            color: white !important;
        }
        .gsc-search-button-v2 {
            background-color: #9333ea !important;
            border-radius: 9999px !important;
            padding: 0.75rem 2rem !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            margin: 5px 6px 5px 0 !important;
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
        }
        .gsc-search-button-v2:hover {
            background-color: #7e22ce !important;
        }
        .gsc-search-button-v2 svg {
            fill: white !important;
            width: 1.25rem !important;
            height: 1.25rem !important;
        }
        /* Dark Mode Results Overlay Customization */
        .gsc-results-wrapper-overlay {
            border-radius: 1rem !important;
            border: none !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
        }
        .dark .gsc-results-wrapper-overlay {
            background-color: #0f172a !important;
        }
        .dark .gsc-modal-background-image {
            background-color: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(4px) !important;
        }
        .dark .gsc-webResult.gsc-result {
            background-color: transparent !important;
        }
        .dark .gsc-result .gs-title, .dark .gsc-result .gs-title * {
            color: #c084fc !important;
        }
        .dark .gsc-result .gs-snippet {
            color: #cbd5e1 !important;
        }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-white min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none flex justify-center">
        <!-- Soft Background Gradients -->
        <div class="absolute top-0 left-[-10%] w-[500px] h-[500px] bg-purple-300/30 dark:bg-purple-900/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-0 right-[-10%] w-[600px] h-[600px] bg-blue-300/20 dark:bg-blue-900/20 rounded-full blur-[120px]"></div>
        <!-- Grid Pattern -->
        <div class="absolute inset-0 bg-grid-pattern"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 z-50 w-full backdrop-blur-lg bg-white/70 dark:bg-slate-950/70 border-b border-slate-200/50 dark:border-slate-800/50 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer">
                <div class="bg-white dark:bg-slate-800 p-1.5 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
                    <i data-lucide="compass" class="w-5 h-5 text-brand-600 dark:text-brand-500"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">BrowseNix</span>
            </div>

            <!-- Center Links -->
            <div class="hidden md:flex items-center gap-8 font-medium text-sm text-slate-500 dark:text-slate-400">
                <a href="#" class="text-slate-900 dark:text-white transition-colors">Home</a>
                <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors">Features</a>
                <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors">About</a>
                <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors">Privacy</a>
            </div>

            <!-- Right Side: Theme Toggle -->
            <div class="flex items-center">
                <button id="theme-toggle" class="flex items-center justify-between w-14 h-8 bg-slate-200 dark:bg-slate-800 rounded-full p-1 border border-slate-300 dark:border-slate-700 transition-colors focus:outline-none shadow-inner">
                    <div class="w-6 h-6 rounded-full bg-white dark:bg-slate-950 shadow-sm flex items-center justify-center transform transition-transform duration-300 dark:translate-x-6">
                        <i data-lucide="sun" class="w-3.5 h-3.5 text-amber-500 dark:hidden"></i>
                        <i data-lucide="moon" class="w-3.5 h-3.5 text-blue-300 hidden dark:block"></i>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Hero Section -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 text-center pt-32 pb-32">
        
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-white/60 dark:bg-slate-900/60 backdrop-blur-md border border-slate-200 dark:border-slate-800 shadow-sm mb-8 hover:scale-105 transition-transform cursor-default">
            <i data-lucide="sparkles" class="w-4 h-4 text-brand-500"></i>
            <span class="text-xs font-bold tracking-widest text-slate-800 dark:text-slate-200 uppercase">
                Codenix Studio Presents
            </span>
        </div>

        <!-- Main Headline -->
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 max-w-4xl leading-tight">
            The <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-purple-400 dark:from-brand-400 dark:to-purple-300">Future</span> of Search <br class="hidden md:block" /> Starts Here.
        </h1>

        <!-- Subtitle -->
        <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 max-w-2xl mb-12 font-medium">
            Discover a powerful search experience. Fast, private, and secure results powered by Google — all in one clean platform.
        </p>

        <!-- Search Form (Google Custom Search Integration) -->
        <div class="relative w-full max-w-3xl mx-auto rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl transition-all duration-300 focus-within:border-brand-500 focus-within:ring-4 focus-within:ring-brand-500/20">
            <script async src="https://cse.google.com/cse.js?cx=b470dd351b55941e6"></script>
            <div class="gcse-search" data-linktarget="_self"></div>
        </div>

        <!-- Secondary Buttons (Visual only, matching original design) -->
        <div class="flex flex-col sm:flex-row items-center gap-4 mt-8">
            <button class="px-8 py-3.5 rounded-full font-semibold text-slate-700 dark:text-slate-200 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 hover:shadow-md transition-all">
                Explore Features
            </button>
        </div>

    </main>

    <!-- Footer Area (Optional/Minimal) -->
    <footer class="relative z-10 py-6 text-center text-sm text-slate-400 dark:text-slate-500">
        &copy; 2026 BrowseNix by Codenix Studio. Powered by Google Custom Search.
    </footer>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // Check for saved theme preference or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
    </script>
</body>
</html>
