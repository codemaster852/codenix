<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrowseNix | AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 50: '#faf5ff', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce' } } } } }
    </script>
    <style>
        /* Modern Grid Background */
        .bg-grid-pattern { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px); mask-image: radial-gradient(circle at center, black 40%, transparent 80%); }
        .dark .bg-grid-pattern { background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px); }
        
        /* Google Search Style overrides */
        .gsc-control-cse { background-color: transparent !important; border: none !important; font-family: inherit !important; }
        .gsc-input-box { background: transparent !important; border: none !important; }
        .gsc-search-button-v2 { background-color: #9333ea !important; border-radius: 9999px !important; }
        .dark .gsc-results-wrapper-overlay { background-color: #0f172a !important; }
        
        /* Smooth transitions */
        #ai-browser-overlay { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-white min-h-screen flex flex-col">
    <!-- Subtle Background Grid -->
    <div class="absolute inset-0 z-0 bg-grid-pattern"></div>
    
    <!-- Header -->
    <nav class="fixed top-0 z-50 w-full backdrop-blur-lg bg-white/70 dark:bg-slate-950/70 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-brand-600 p-1.5 rounded-lg"><i data-lucide="compass" class="w-5 h-5 text-white"></i></div>
                <span class="font-bold text-xl">BrowseNix</span>
            </div>
            <button id="theme-toggle" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <i data-lucide="sun" class="w-4 h-4 dark:hidden"></i>
                <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
            </button>
        </div>
    </nav>

    <!-- Main Search Interface -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 pt-32">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 text-center">The <span class="text-brand-600">Future</span> of Search</h1>
        
        <div class="relative w-full max-w-3xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-full shadow-xl p-2">
            <!-- Google Custom Search Integration -->
            <script async src="https://cse.google.com/cse.js?cx=b470dd351b55941e6"></script>
            <div class="gcse-search" data-linktarget="ai-browser-frame"></div>
        </div>
    </main>

    <!-- AI Workspace Overlay (Hidden by default) -->
    <div id="ai-browser-overlay" class="fixed inset-0 z-[100] bg-white dark:bg-slate-950 hidden flex-col translate-y-full">
        <!-- Overlay Header -->
        <div class="h-16 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
            <button id="close-browser-btn" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <span class="font-semibold text-sm">AI Workspace</span>
            <button class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-full text-sm font-semibold transition-colors">Summarize Page</button>
        </div>
        <!-- Target Iframe -->
        <iframe name="ai-browser-frame" id="ai-browser-frame" class="flex-grow w-full border-none"></iframe>
    </div>

    <script>
        lucide.createIcons();
        const overlay = document.getElementById('ai-browser-overlay');
        
        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        
        // Close Overlay
        document.getElementById('close-browser-btn').addEventListener('click', () => {
            overlay.classList.remove('translate-y-0');
            overlay.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 500);
        });

        // Trigger Overlay on Search Click
        document.addEventListener('click', (e) => {
            if (e.target.closest('a.gs-title')) {
                overlay.classList.remove('hidden');
                // Use requestAnimationFrame for smooth slide-up effect
                requestAnimationFrame(() => overlay.classList.replace('translate-y-full', 'translate-y-0'));
            }
        });
    </script>
</body>
</html>
