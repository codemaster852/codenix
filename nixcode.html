<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixCode Pro | Professional IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --brand-purple: #8b5cf6;
            --vs-bg: #0d0d0d;
            --vs-sidebar: #151515;
            --vs-active: #222222;
            --vs-border: #2a2a2a;
            --vs-text: #e0e0e0;
        }

        /* Custom Cursor */
        * { cursor: none !important; }
        #custom-cursor {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 18px solid var(--brand-purple);
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
            position: fixed; pointer-events: none; z-index: 9999;
            transform: rotate(-30deg);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            background: #000; 
            color: var(--vs-text); 
        }
        .code-font { font-family: 'Fira Code', monospace; }

        /* VS Code Style Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .sidebar-item { transition: all 0.2s; border-left: 2px solid transparent; }
        .sidebar-item.active { background: var(--vs-active); border-left-color: var(--brand-purple); color: #fff; }

        /* Editor Layout */
        .editor-line { 
            display: flex; 
            line-height: 1.6;
            min-width: fit-content;
        }
        .editor-line:hover { background: #1a1a1a; }
        .line-number { 
            width: 50px; 
            text-align: right; 
            padding-right: 20px; 
            color: #555; 
            user-select: none; 
            font-size: 11px; 
            flex-shrink: 0;
            background: #0d0d0d;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        .line-content { flex: 1; color: #d4d4d4; white-space: pre; font-size: 13px; padding-right: 40px; }

        #landing-overlay.hidden { opacity: 0; pointer-events: none; transform: translateY(-20px); }
        #app-content.blur { filter: blur(25px); pointer-events: none; opacity: 0.3; }

        @keyframes pulse-purple {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px 5px rgba(139, 92, 246, 0.1); transform: scale(1.02); }
        }
        .loading-pulse { animation: pulse-purple 2s infinite; }
        .tab-active { background: var(--vs-bg); border-top: 2px solid var(--brand-purple); color: white; font-weight: 600; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* Preview container constraints */
        #output-frame {
            background: white;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="dark overflow-hidden">
    <div id="custom-cursor"></div>

    <!-- Landing / Project Manager -->
    <div id="landing-overlay" class="fixed inset-0 z-[100] flex flex-col bg-[#050505] transition-all duration-700 overflow-y-auto">
        <div class="max-w-6xl mx-auto w-full px-8 py-20 flex flex-col min-h-full">
            <div class="flex items-center gap-5 mb-20">
                <div class="w-16 h-16 bg-gradient-to-br from-violet-600 to-indigo-700 rounded-3xl flex items-center justify-center shadow-2xl">
                    <i class="fas fa-rocket text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-5xl font-extrabold text-white tracking-tight">NixCode <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-indigo-400">Pro</span></h1>
                    <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.3em] font-bold">The Professional Web Foundry</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 flex-1">
                <div class="lg:col-span-7 space-y-10">
                    <div class="space-y-6">
                        <h2 class="text-4xl font-bold text-slate-100 leading-tight">What are we <br>architecting today?</h2>
                        <textarea id="initial-prompt" rows="4" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-3xl p-8 text-xl text-white placeholder-slate-600 outline-none focus:border-violet-500 transition-all shadow-2xl" 
                            placeholder="Describe your professional website..."></textarea>
                        <button onclick="startNewProject()" class="w-full bg-violet-600 hover:bg-violet-500 text-white py-6 rounded-2xl font-bold text-xl transition-all shadow-2xl flex items-center justify-center gap-4">
                            <span>Initialize Project</span>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="lg:col-span-5 flex flex-col">
                    <div class="flex items-center justify-between border-b border-white/5 pb-6 mb-6">
                        <h2 class="text-lg font-bold text-slate-300">History</h2>
                        <button onclick="clearAllProjects()" class="text-[10px] text-slate-500 hover:text-red-400 font-bold uppercase tracking-widest">Clear All</button>
                    </div>
                    <div id="project-list" class="space-y-4 overflow-y-auto pr-2 flex-1 max-h-[400px]"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main IDE Interface -->
    <div id="app-content" class="h-screen flex flex-col blur transition-all duration-700">
        <header class="h-14 bg-[#111] flex items-center justify-between px-5 z-50 border-b border-[#222] shrink-0">
            <div class="flex items-center gap-6">
                <button onclick="goHome()" class="text-slate-500 hover:text-white transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                    <i class="fas fa-th-large"></i>
                    <span>NixCode</span>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span id="current-project-name" class="text-xs font-semibold text-slate-300 tracking-wide">Ready</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="extractCode()" class="px-4 py-1.5 rounded-lg border border-white/10 text-[10px] font-bold text-slate-400 hover:bg-white/5 transition-all">
                    <i class="fas fa-download mr-2"></i>EXTRACT
                </button>
                <div class="flex bg-black/40 rounded-xl p-1 border border-white/5">
                    <button onclick="setTab('preview')" id="tab-preview-btn" class="px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all bg-violet-600 text-white">PREVIEW</button>
                    <button onclick="setTab('code')" id="tab-code-btn" class="px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all text-slate-500">CODE</button>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 bg-[#151515] flex flex-col border-r border-[#222] shrink-0">
                <div class="p-4 flex items-center justify-between text-[#555]">
                    <span class="text-[9px] font-black uppercase tracking-[0.2em]">Project Explorer</span>
                </div>
                <div id="file-tree" class="flex-1 overflow-y-auto px-2"></div>

                <div class="p-5 border-t border-white/5 bg-[#0d0d0d]">
                    <div class="relative group">
                        <textarea id="instruction-input" rows="3" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-xl p-4 text-xs text-slate-300 placeholder-slate-700 outline-none focus:border-violet-500 transition-all resize-none" 
                            placeholder="Refactor project..."></textarea>
                        <button onclick="executeAIInstruction()" class="absolute right-3 bottom-3 bg-violet-600 text-white w-8 h-8 rounded-lg flex items-center justify-center hover:bg-violet-500 transition-all shadow-xl">
                            <i class="fas fa-paper-plane text-[10px]"></i>
                        </button>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col min-w-0 bg-[#0d0d0d] relative">
                <div id="editor-tabs" class="h-10 bg-[#151515] flex items-end overflow-x-auto border-b border-[#222] shrink-0"></div>
                <div id="breadcrumbs" class="h-8 bg-[#0d0d0d] border-b border-[#222] flex items-center px-5 gap-2 text-[9px] text-slate-500 font-bold uppercase shrink-0">
                    <i class="fas fa-cube text-violet-500 scale-75"></i>
                    <span id="breadcrumb-filename">index.html</span>
                </div>

                <div class="flex-1 relative overflow-hidden">
                    <div id="view-preview" class="absolute inset-0 z-10 transition-all duration-500">
                        <iframe id="output-frame" class="w-full h-full border-none" src="about:blank"></iframe>
                    </div>

                    <div id="view-code" class="absolute inset-0 z-0 opacity-0 pointer-events-none flex flex-col bg-[#0d0d0d] overflow-auto">
                        <div id="code-canvas" class="flex-1 code-font py-6"></div>
                    </div>

                    <div id="builder-loader" class="hidden absolute inset-0 z-[60] bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center">
                        <div class="w-20 h-20 rounded-[2.5rem] bg-violet-600/10 border border-violet-500/20 flex items-center justify-center mb-8 loading-pulse">
                            <i class="fas fa-atom text-3xl text-violet-500 animate-spin"></i>
                        </div>
                        <h2 class="text-xs font-black text-white uppercase tracking-[0.4em]">Processing Engine</h2>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_KEY = "";
        const ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        let projects = JSON.parse(localStorage.getItem('nix-v2-projects')) || [];
        let currentProject = null;
        let activeFile = 'index.html';

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = (e.clientX - 8) + 'px';
            cursor.style.top = (e.clientY - 2) + 'px';
        });

        window.onload = () => renderProjectHistory();

        function startNewProject() {
            const prompt = document.getElementById('initial-prompt').value.trim();
            if (!prompt) return;
            currentProject = {
                id: Date.now(),
                name: prompt.slice(0, 35) + '...',
                files: { 'index.html': '<!-- Building... -->' },
                lastModified: new Date().toISOString()
            };
            hideLanding();
            buildApp(`INITIAL BUILD: ${prompt}`);
        }

        async function buildApp(instruction) {
            setLoading(true);
            
            // CONTEXT GATHERING: Bundle all existing files so the AI knows the whole project
            const projectContext = JSON.stringify(currentProject.files, null, 2);

            const systemMsg = `Act as a Senior Architect. Output ONLY a raw JSON object of files.
            The website MUST be fully responsive and scrollable. 
            Ensure index.html has: body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }
            Use Tailwind for styling.
            CURRENT PROJECT STATE: ${projectContext}
            USER INSTRUCTION: ${instruction}`;

            try {
                const response = await fetch(`${ENDPOINT}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemMsg }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const result = await response.json();
                const newFiles = JSON.parse(result.candidates[0].content.parts[0].text);
                
                // Merge or replace files
                currentProject.files = { ...currentProject.files, ...newFiles };
                currentProject.lastModified = new Date().toISOString();
                
                saveProject();
                refreshUI();
                openFile(activeFile in newFiles ? activeFile : Object.keys(newFiles)[0]);
            } catch (err) {
                console.error(err);
                alert("Generation Error. Check console.");
            } finally {
                setLoading(false);
            }
        }

        function executeAIInstruction() {
            const input = document.getElementById('instruction-input');
            if (!input.value.trim()) return;
            buildApp(input.value.trim());
            input.value = '';
        }

        function refreshUI() {
            document.getElementById('current-project-name').textContent = currentProject.name;
            
            const tree = document.getElementById('file-tree');
            tree.innerHTML = Object.keys(currentProject.files).map(name => `
                <div onclick="openFile('${name}')" class="sidebar-item px-4 py-2.5 mb-1 rounded-xl text-[11px] flex items-center gap-3 cursor-pointer group ${name === activeFile ? 'active' : 'text-slate-500 hover:bg-white/5'}">
                    <i class="fas fa-file-code"></i>
                    <span class="truncate">${name}</span>
                </div>
            `).join('');

            const tabs = document.getElementById('editor-tabs');
            tabs.innerHTML = Object.keys(currentProject.files).map(name => `
                <div onclick="openFile('${name}')" class="h-full px-5 flex items-center gap-3 text-[10px] cursor-pointer border-r border-[#222] shrink-0 ${name === activeFile ? 'tab-active' : 'text-slate-500'}">
                    ${name}
                </div>
            `).join('');

            syncPreview();
        }

        function openFile(name) {
            activeFile = name;
            document.getElementById('breadcrumb-filename').textContent = name;
            refreshUI();
            
            const canvas = document.getElementById('code-canvas');
            const code = currentProject.files[name] || '';
            
            canvas.innerHTML = code.split('\n').map((line, i) => `
                <div class="editor-line">
                    <div class="line-number">${i + 1}</div>
                    <div class="line-content">${escapeHtml(line)}</div>
                </div>
            `).join('');
        }

        function syncPreview() {
            const frame = document.getElementById('output-frame');
            let html = currentProject.files['index.html'] || "";
            
            // Inject internal assets into preview
            for (const [name, content] of Object.entries(currentProject.files)) {
                if (name.endsWith('.css')) html = html.replace('</head>', `<style>${content}</style></head>`);
                if (name.endsWith('.js')) html = html.replace('</body>', `<script>${content}<\/script></body>`);
            }
            
            const blob = new Blob([html], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        function extractCode() {
            const blob = new Blob([JSON.stringify(currentProject.files, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nixcode-project-${currentProject.id}.json`;
            a.click();
        }

        function setTab(type) {
            const p = document.getElementById('view-preview'), c = document.getElementById('view-code');
            const pb = document.getElementById('tab-preview-btn'), cb = document.getElementById('tab-code-btn');
            
            p.style.opacity = type === 'preview' ? '1' : '0';
            p.style.zIndex = type === 'preview' ? '10' : '0';
            p.style.pointerEvents = type === 'preview' ? 'auto' : 'none';
            c.style.opacity = type === 'code' ? '1' : '0';
            c.style.pointerEvents = type === 'code' ? 'auto' : 'none';
            
            pb.className = type === 'preview' ? 'px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all bg-violet-600 text-white' : 'px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all text-slate-500';
            cb.className = type === 'code' ? 'px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all bg-violet-600 text-white' : 'px-6 py-1.5 rounded-lg text-[10px] font-bold transition-all text-slate-500';
        }

        function saveProject() {
            const idx = projects.findIndex(p => p.id === currentProject.id);
            if (idx > -1) projects[idx] = currentProject;
            else projects.push(currentProject);
            localStorage.setItem('nix-v2-projects', JSON.stringify(projects));
        }

        function renderProjectHistory() {
            const container = document.getElementById('project-list');
            if (projects.length === 0) {
                container.innerHTML = `<div class="p-10 text-center border-2 border-dashed border-white/5 rounded-3xl text-slate-700 text-[10px] font-black uppercase">No History</div>`;
                return;
            }
            container.innerHTML = projects.sort((a,b) => new Date(b.lastModified) - new Date(a.lastModified)).map(p => `
                <div onclick="loadProject(${p.id})" class="glass p-5 rounded-2xl cursor-pointer hover:border-violet-500/50 transition-all flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <div class="text-sm font-bold text-slate-200 line-clamp-1">${p.name}</div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-800"></i>
                </div>
            `).join('');
        }

        function loadProject(id) {
            currentProject = projects.find(p => p.id === id);
            hideLanding();
            refreshUI();
        }

        function hideLanding() {
            document.getElementById('landing-overlay').classList.add('hidden');
            document.getElementById('app-content').classList.remove('blur');
        }

        function goHome() {
            document.getElementById('landing-overlay').classList.remove('hidden');
            document.getElementById('app-content').classList.add('blur');
            renderProjectHistory();
        }

        function clearAllProjects() {
            if(confirm("Wipe all projects?")) {
                localStorage.removeItem('nix-v2-projects');
                projects = [];
                renderProjectHistory();
            }
        }

        function setLoading(s) { document.getElementById('builder-loader').classList.toggle('hidden', !s); }
        function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    </script>
</body>
</html>
