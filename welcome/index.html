<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Codenix Studio V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-6">

    <div id="auth-container" class="w-full max-w-md hidden">
        <div class="glass p-8 rounded-3xl text-center">
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-slate-400 mb-8">Sign in to access Codenix Studio V2</p>
            <button onclick="signIn('google')" class="w-full mb-4 py-3 bg-white text-slate-900 rounded-xl font-bold hover:bg-slate-200 transition">
                <i class="fab fa-google mr-2"></i> Sign in with Google
            </button>
            <button onclick="signIn('github')" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition">
                <i class="fab fa-github mr-2"></i> Sign in with GitHub
            </button>
        </div>
    </div>

    <div id="profile-container" class="w-full max-w-md hidden">
        <div class="glass p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-4">Complete your profile</h2>
            <p class="text-slate-400 mb-6">How should we address you?</p>
            <input type="text" id="userName" placeholder="Enter your display name" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 text-white">
            <button onclick="saveName()" class="w-full bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-700">Continue to Portal</button>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://rnlwrngfgvznndlekmrz.supabase.co', 
            'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt'
        );

        async function checkAuthState() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                // If user is already signed in, go to portal
                window.location.href = '/portal/';
                return;
            }
            document.getElementById('auth-container').classList.remove('hidden');
        }

        async function signIn(provider) {
            await supabaseClient.auth.signInWithOAuth({ provider });
        }

        async function saveName() {
            const name = document.getElementById('userName').value;
            if (!name) return;
            
            const { error } = await supabaseClient.auth.updateUser({
                data: { full_name: name }
            });

            if (error) return alert('Error saving name');
            // Redirect to portal after saving
            window.location.href = '/portal/';
        }

        checkAuthState();
    </script>
</body>
</html>
