    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#20B2AA', // Light Sea Green
                        brandDark: '#198F89',
                        brandLight: '#E6F7F6',
                    }
                }

    </script>
    <style>
        /* Smooth transitions */
        .view-transition { transition: opacity 0.3s ease; }
        .hidden-view { display: none !important; opacity: 0; }
        .active-view { display: flex !important; opacity: 1; }
        
        /* Tab scrolling hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Interactive element tap highlight removal for mobile */
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Highlight classes for currently spoken sentences */
        .spoken-highlight {
            background-color: rgba(32, 178, 170, 0.15);
            border-left: 4px solid #20B2AA;
            padding-left: 8px;
            transition: all 0.3s ease;
        }

        /* Popover transition */
        #word-translation-popover {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
    </style>
</head>

    <!-- Application Logic -->
    <script>
        // --- Google Sheet Data Integration ---
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1ivTmY1ppvnc6gNfcaiOhdRyo4aoNrxbEpIeAneVSL6Q/export?format=csv';
        
        // ElevenLabs configurations
        const ELEVENLABS_API_KEY = "sk_7d4dd995a7047ec65ede329a221742ca487cdff8d7695a6f";
        const ELEVENLABS_VOICE_ID = "ErXwobaYi3019Dkyg5Vj"; // Antoni (highly realistic multilingual speaker)

        // Language mapping for translation, dictionaries, and speech logic
        const langConfig = {
            'Spanish': { code: 'es', target: 'en' },
            'English': { code: 'en', target: 'es' },
            'German': { code: 'de', target: 'en' },
            'French': { code: 'fr', target: 'en' },
            'Italian': { code: 'it', target: 'en' },
            'Turkish': { code: 'tr', target: 'en' },
            'Arabic': { code: 'ar', target: 'en' },
            'Portuguese': { code: 'pt', target: 'en' },
            'Russian': { code: 'ru', target: 'en' },
            'Japanese': { code: 'ja', target: 'en' },
            'Chinese': { code: 'zh', target: 'en' }
        };

        // --- Application State ---
        let spreadsheetData = [];
        let availableLanguages = [];
        let availableLevels = ['All', 'A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
        
        let currentAudioElement = null; // Streams ElevenLabs Binary Blob
        let isSpeakingEntire = false;
        let spokenSentenceIndex = -1;
        let originalArticleSentences = [];
        let isPopoverPinned = false;

        let appState = {
            currentView: 'onboarding',
            selectedLanguage: null,
            levelFilter: 'All',
            currentArticle: null,
            examAnswered: false,
            trainingList: JSON.parse(localStorage.getItem('lenguanix_training_list') || '[]')
        };

        // --- Training Logic ---

        function addToTraining() {
            const word = document.getElementById('popover-original-word').textContent;
            const meaning = document.getElementById('popover-translation-text').textContent;
            
            if (!appState.trainingList.find(i => i.word === word)) {
                appState.trainingList.push({ word, meaning, date: new Date().toISOString() });
                localStorage.setItem('lenguanix_training_list', JSON.stringify(appState.trainingList));
                showToast(`Added "${word}" to training!`);
            } else {
                showToast(`"${word}" is already in training.`);
            }
        }

        function fetchSheetData() {
            return new Promise((resolve, reject) => {
                Papa.parse(SHEET_CSV_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        try {
                            spreadsheetData = processRawData(results.data);
                            availableLanguages = [...new Set(spreadsheetData.map(item => item.language).filter(Boolean))];
                            resolve();
                        } catch(e) {
                            reject(e);
                        }
                    },
                    error: function(err) {
                        reject(err);
                    }
                });
            });
        }

        function processRawData(rows) {
            let processed = [];
            let idCounter = 1;
            
            for (let row of rows) {
                if (!row.Language || !row.Title) continue;

                // Normalize line endings
                const contentText = (row.Content || "").replace(/\r/g, "");
                const contentArray = contentText.split('\n')
                    .map(l => l.trim())
                    .filter(l => l !== '')
                    .map(l => ({ text: l }));

                // Robust Exam Parsing (Question & 3 Choices alignment)
                const examText = (row.Exam || "").replace(/\r/g, "");
                const answerText = (row.Answer || "").trim().toUpperCase();
                let examObj = { question: "Questions not available.", options: [], correctAnswer: answerText };
                
                const examLines = examText.split('\n').map(l => l.trim()).filter(l => l);
                if (examLines.length > 0) {
                    examObj.question = examLines[0].replace(/^\d+[\.\)]\s*/, ''); 
                    examObj.options = examLines.slice(1).map(l => {
                        let match = l.match(/^([A-Z])[\)\.]\s*(.*)/i); 
                        return match ? { letter: match[1].toUpperCase(), text: match[2] } : null;
                    }).filter(Boolean);
                }

                // Parse Vocab
                const vocabText = (row['Main Vocab'] || "").replace(/\r/g, "");
                const vocabArray = vocabText.split('\n').map(l => l.trim()).filter(l => l).map(l => {
                    let parts = l.split('=');
                    return { 
                        word: parts[0] ? parts[0].trim() : l, 
                        meaning: parts[1] ? parts[1].trim() : '' 
                    };
                });

                // Parse Grammar
                const grammarText = (row.Grammar || "").replace(/\r/g, "");
                const grammarLines = grammarText.split('\n').map(l => l.trim()).filter(l => l);
                let grammarObj = { title: "Grammar Notes", explanation: "", examples: [] };
                
                if (grammarLines.length > 0) {
                    grammarObj.title = grammarLines[0].replace(/:$/, ''); 
                    let isExampleSection = false;
                    
                    for (let i = 1; i < grammarLines.length; i++) {
                        let line = grammarLines[i];
                        if (line.toLowerCase().includes('examples:')) {
                            isExampleSection = true;
                            continue;
                        }
                        if (isExampleSection) {
                            grammarObj.examples.push(line);
                        } else {
                            grammarObj.explanation += line + " ";
                        }
                    }
                }

                processed.push({
                    id: idCounter++,
                    language: row.Language.trim(),
                    level: (row.Level || "A1").trim(),
                    dialect: (row.Dialect || "").trim(),
                    title: row.Title.trim(),
                    cover: row.Cover || "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1000&q=80",
                    content: contentArray,
                    exam: examObj,
                    vocab: vocabArray,
                    grammar: grammarObj
                });
            }
            return processed;
        }

        function navigate(viewName) {
            window.scrollTo(0, 0); 
            stopSpeech();

            document.querySelectorAll('#app-container > div').forEach(el => {
                el.classList.remove('active-view');
                el.classList.add('hidden-view');
            });
            
            const targetView = document.getElementById(`view-${viewName}`);
            if (targetView) {
                targetView.classList.remove('hidden-view');
                targetView.classList.add('active-view');
                appState.currentView = viewName;
            }

            if (viewName === 'home') renderHome();
            if (viewName === 'settings') renderSettings();
            
            lucide.createIcons();
        }

        function selectLanguage(lang) {
            appState.selectedLanguage = lang;
            appState.levelFilter = 'All'; 
            navigate('home');
        }

        function resetApp() {
            appState.selectedLanguage = null;
            appState.currentArticle = null;
            renderOnboarding();
            navigate('onboarding');
        }

        // --- Render Onboarding Screen ---

        function renderOnboarding() {
            const listEl = document.getElementById('language-selection-list');
            if (availableLanguages.length === 0) {
                 listEl.innerHTML = `<p class="text-center text-gray-500 py-4">No languages found in the database.</p>`;
                 return;
            }

            listEl.innerHTML = availableLanguages.map(lang => `
                <button onclick="selectLanguage('${lang}')" 
                        class="w-full text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-brand hover:bg-brand/5 hover:shadow-md transition-all flex justify-between items-center group">
                    <span class="font-bold text-xl text-gray-800">${lang}</span>
                    <i data-lucide="chevron-right" class="text-gray-400 group-hover:text-brand w-6 h-6"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        // --- Render Home Screen ---

        function renderHome() {
            if (!appState.selectedLanguage) return;

            const langData = spreadsheetData.filter(item => item.language === appState.selectedLanguage);
            
            // Build Dynamic Dialects list for Dialect Select
            const dialectsInLang = [...new Set(langData.map(item => item.dialect).filter(Boolean))];
            const dialectSelect = document.getElementById('dialect-filter');
            dialectSelect.innerHTML = '<option value="All">All Dialects</option>';
            dialectsInLang.forEach(dialect => {
                dialectSelect.innerHTML += `<option value="${dialect}">${dialect}</option>`;
            });

            // Level filters list setup
            const levelsInLang = [...new Set(langData.map(item => item.level))];
            const filterEl = document.getElementById('level-filters');
            const displayLevels = ['All', ...availableLevels.filter(lvl => levelsInLang.includes(lvl) || lvl === 'All')];
            
            filterEl.innerHTML = displayLevels.map(level => `
                <button onclick="setLevelFilter('${level}')" 
                        class="px-5 py-2 rounded-full text-sm font-bold transition-all border whitespace-nowrap
                        ${appState.levelFilter === level 
                            ? 'bg-brand border-brand text-white shadow-md' 
                            : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}">
                    ${level}
                </button>
            `).join('');

            triggerFilters();
        }

        function setLevelFilter(level) {
            appState.levelFilter = level;
            const buttons = document.querySelectorAll('#level-filters button');
            buttons.forEach(btn => {
                if (btn.innerText.trim() === level) {
                    btn.className = "px-5 py-2 rounded-full text-sm font-bold transition-all border whitespace-nowrap bg-brand border-brand text-white shadow-md";
                } else {
                    btn.className = "px-5 py-2 rounded-full text-sm font-bold transition-all border whitespace-nowrap bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100";
                }
            });
            triggerFilters();
        }

        // Handles live search and filtering on multiple parameters
        function triggerFilters() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const chosenDialect = document.getElementById('dialect-filter').value;
            
            let filtered = spreadsheetData.filter(item => item.language === appState.selectedLanguage);

            // Apply Level Filter
            if (appState.levelFilter !== 'All') {
                filtered = filtered.filter(item => item.level === appState.levelFilter);
            }

            // Apply Dialect Filter
            if (chosenDialect !== 'All') {
                filtered = filtered.filter(item => item.dialect === chosenDialect);
            }

            // Apply Keyword Search on Title, Vocab, and Contents
            if (searchQuery !== '') {
                filtered = filtered.filter(item => {
                    const matchesTitle = item.title.toLowerCase().includes(searchQuery);
                    const matchesContent = item.content.some(c => c.text.toLowerCase().includes(searchQuery));
                    const matchesVocab = item.vocab.some(v => v.word.toLowerCase().includes(searchQuery) || v.meaning.toLowerCase().includes(searchQuery));
                    return matchesTitle || matchesContent || matchesVocab;
                });
            }

            const listEl = document.getElementById('article-list');
            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400 bg-white rounded-3xl border border-gray-100 shadow-sm">
                        <i data-lucide="search-code" class="w-16 h-16 mb-4 opacity-50 text-brand"></i>
                        <p class="text-lg font-semibold">No results match your current filter parameters.</p>
                    </div>`;
            } else {
                listEl.innerHTML = filtered.map(article => `
                    <div onclick="openArticle(${article.id})" class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all group flex flex-col h-full">
                        <div class="h-48 sm:h-56 bg-gray-200 relative overflow-hidden shrink-0">
                            <img src="${article.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <div class="absolute top-4 right-4 bg-brand/90 backdrop-blur text-white text-xs font-black px-3 py-1.5 rounded-lg shadow-sm tracking-wider">
                                ${article.level}
                            </div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="font-extrabold text-gray-900 text-xl leading-tight mb-2 group-hover:text-brand transition-colors">${article.title}</h3>
                            <p class="text-sm font-medium text-gray-500 flex items-center gap-1.5 mt-auto pt-4 border-t border-gray-50">
                                <i data-lucide="globe" class="w-4 h-4 text-brand"></i> ${article.dialect || 'Standard'}
                            </p>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function renderSettings() {
            const listEl = document.getElementById('settings-language-list');
            listEl.innerHTML = availableLanguages.map(lang => `
                <button onclick="selectLanguage('${lang}')" 
                        class="w-full text-left p-4 rounded-2xl border-2 transition-all flex justify-between items-center
                        ${appState.selectedLanguage === lang ? 'border-brand bg-brand/5 text-brand shadow-sm' : 'border-gray-100 hover:bg-gray-50 text-gray-700'}">
                    <span class="font-bold text-lg">${lang}</span>
                    ${appState.selectedLanguage === lang ? '<i data-lucide="check-circle-2" class="w-6 h-6"></i>' : ''}
                </button>
            `).join('');
            lucide.createIcons();
        }

        // --- Article View Logic ---

        function openArticle(id) {
            const article = spreadsheetData.find(a => a.id === id);
            if (!article) return;
            
            appState.currentArticle = article;
            appState.examAnswered = false; 
            
            // Build array of plain sentences for sequential audio reader
            originalArticleSentences = article.content.map(c => c.text);

            // Populate header
            document.getElementById('article-cover').src = article.cover;
            document.getElementById('article-title').textContent = article.title;
            document.getElementById('article-level-badge').textContent = article.level;

            // Populate Tabs
            populateHistoriaTab(article);
            populateExamenTab(article);
            populatePalabrasTab(article);
            populateGramaticaTab(article);

            navigate('article');
            switchTab('historia'); 
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.dataset.tab === tabId) {
                    btn.classList.replace('text-gray-500', 'text-brand');
                    btn.classList.replace('border-transparent', 'border-brand');
                } else {
                    btn.classList.replace('text-brand', 'text-gray-500');
                    btn.classList.replace('border-brand', 'border-transparent');
                }
            });

            document.querySelectorAll('.tab-content').forEach(content => {
                if(content.id === `tab-${tabId}`) {
                    content.classList.remove('hidden');
                } else {
                    content.classList.add('hidden');
                }
            });
        }

        // Breaks down a sentence into individual interactive tokens (clickable words)
        function generateInteractiveSentence(sentenceText, sentenceIndex) {
            // Tokenize punctuation and alphanumeric text keeping whitespaces
            const tokens = sentenceText.split(/(\s+|[,.\/#!$%\^&\*;:{}=\-_`~()?¿¡"“’'”])/g);
            const spanHTML = tokens.map(token => {
                if (!token.trim()) return token; // space
                if (/^[,.\/#!$%\^&\*;:{}=\-_`~()?¿¡"“’'”]+$/.test(token)) {
                    return `<span class="text-gray-400 font-normal">${token}</span>`; // punctuation
                }
                // Cleans out punctuation preserving native multi-language characters securely
                const cleanedWord = token.replace(/[^\p{L}]/gu, '');
                return `<span onclick="handleWordClick(event, '${cleanedWord}')"
                              class="interactive-word border-b border-dashed border-gray-300 hover:border-brand hover:text-brand hover:bg-brand/10 px-0.5 rounded cursor-pointer transition-all duration-150 font-semibold text-gray-800" 
                              data-word="${cleanedWord}">${token}</span>`;
            }).join('');

            return `
                <div id="sentence-block-${sentenceIndex}" class="p-3 rounded-2xl flex items-start gap-3 transition-colors duration-200">
                    <button onclick="speakSentence(${sentenceIndex})" class="mt-1 p-2 bg-gray-100 hover:bg-brandLight hover:text-brand text-gray-500 rounded-full shrink-0 transition" title="Listen phrase via ElevenLabs">
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                    <div class="flex-1">
                        <p class="text-xl sm:text-2xl leading-relaxed">${spanHTML}</p>
                    </div>
                </div>
            `;
        }

        function populateHistoriaTab(article) {
            const container = document.getElementById('tab-historia');
            container.innerHTML = article.content.map((sentence, idx) => 
                generateInteractiveSentence(sentence.text, idx)
            ).join('');
            lucide.createIcons();
        }

        // --- Trigger Actions on Word Click ---

        function handleWordClick(event, word) {
            event.stopPropagation();
            isPopoverPinned = true;

            const rect = event.currentTarget.getBoundingClientRect();
            const targetX = rect.left + window.scrollX;
            const targetY = rect.top + window.scrollY;
            const targetHeight = rect.height;

            triggerWordPopover(targetX, targetY, targetHeight, word);
        }

        // --- Translation & Definition Popover Engine ---

        function triggerWordPopover(targetLeft, targetTop, targetHeight, word) {
            const popover = document.getElementById('word-translation-popover');
            
            // Set word
            document.getElementById('popover-original-word').textContent = word;
            document.getElementById('popover-pos-label').textContent = '...'; 
            
            // Loading State Setup
            document.getElementById('popover-loading').classList.remove('hidden');
            document.getElementById('popover-content').classList.add('hidden');
            
            popover.classList.remove('hidden');
            
            let topPosition = targetTop + targetHeight + 10;
            let leftPosition = targetLeft - 20;
            
            if (leftPosition + 320 > window.innerWidth) leftPosition = window.innerWidth - 340;
            if (leftPosition < 10) leftPosition = 10;

            popover.style.top = `${topPosition}px`;
            popover.style.left = `${leftPosition}px`;

            document.getElementById('popover-pronounce-btn').onclick = () => speakSingleText(word, appState.selectedLanguage);

            fetchWordData(word);
        }

        async function fetchWordData(word) {
            const config = langConfig[appState.selectedLanguage] || { code: 'es' };
            
            // Simplified fetch for demo dictionary data
            const translateUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${config.code}|en`;
            
            try {
                const response = await fetch(translateUrl);
                const data = await response.json();
                
                const translationResult = data?.responseData?.translatedText || "Translation unavailable";
                
                document.getElementById('popover-translation-text').textContent = translationResult;
                document.getElementById('popover-pos-label').textContent = 'Word';
                document.getElementById('popover-definition-text').textContent = `Definition from context: ${word}`;

                document.getElementById('popover-loading').classList.add('hidden');
                document.getElementById('popover-content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('popover-translation-text').textContent = "Translation unavailable";
                document.getElementById('popover-loading').classList.add('hidden');
                document.getElementById('popover-content').classList.remove('hidden');
            }
        }

        // --- ElevenLabs Text-To-Speech (TTS) Engine ---

        async function streamElevenLabsSpeech(text, languageName, onEndCallback = null) {
            // Force multilingual model for ALL languages
            const url = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`;
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "xi-api-key": ELEVENLABS_API_KEY
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2", // Optimized for ALL supported languages
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });
                
                if (!response.ok) throw new Error("ElevenLabs API limit");
                
                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                if (currentAudioElement) currentAudioElement.pause();
                currentAudioElement = new Audio(audioUrl);
                
                if (onEndCallback) {
                    currentAudioElement.onended = onEndCallback;
                    currentAudioElement.onerror = () => onEndCallback();
                }
                currentAudioElement.play();
            } catch (error) {
                console.warn("ElevenLabs TTS Error (Falling back):", error.message);
                speakWithBrowserTTS(text, langConfig[languageName]?.code || 'en', onEndCallback);
            }
        }

        // --- ElevenLabs Text-To-Speech (TTS) Engine ---

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-gray-800 text-white font-bold text-sm px-4 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto flex items-center gap-2 z-50";
            toast.innerHTML = `<i data-lucide="info" class="w-4 h-4 text-brand"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.replace('opacity-0', 'opacity-100');
                toast.classList.replace('translate-y-2', 'translate-y-0');
            }, 10);

            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Direct voice stream trigger via premium ElevenLabs API with standard TTS fallback
        async function streamElevenLabsSpeech(text, languageName, onEndCallback = null) {
            const config = langConfig[languageName] || { code: 'es' };
            const url = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`;
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "xi-api-key": ELEVENLABS_API_KEY
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2", // Premium multilingual engine
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });
                
                if (!response.ok) throw new Error("ElevenLabs quota limit reached or API call failed");
                
                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                if (currentAudioElement) {
                    currentAudioElement.pause();
                }
                currentAudioElement = new Audio(audioUrl);
                
                if (onEndCallback) {
                    currentAudioElement.onended = onEndCallback;
                    currentAudioElement.onerror = () => {
                        console.warn("Playback error, passing fallback sequence.");
                        onEndCallback();
                    };
                }
                currentAudioElement.play();
            } catch (error) {
                console.warn("ElevenLabs TTS Error:", error.message);
                // Graceful fallback to standard browser TTS speech
                speakWithBrowserTTS(text, config.code, onEndCallback);
            }
        }

        // Browser Native fallback speech synthesis
        function speakWithBrowserTTS(text, langCode, onEndCallback = null) {
            if (!('speechSynthesis' in window)) {
                showToast("This browser does not support standard text-to-speech.");
                if (onEndCallback) onEndCallback();
                return;
            }
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;

            const voices = window.speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.lang.startsWith(langCode));
            if (selectedVoice) utterance.voice = selectedVoice;

            if (onEndCallback) {
                utterance.onend = onEndCallback;
                utterance.onerror = () => onEndCallback();
            }

            window.speechSynthesis.speak(utterance);
        }

        // Speak a single word or selection
        function speakSingleText(text, languageName) {
            streamElevenLabsSpeech(text, languageName);
        }

        // Speak an entire sentence block
        function speakSentence(index) {
            stopSpeech();
            const text = originalArticleSentences[index];
            
            // Highlight block during stream
            const block = document.getElementById(`sentence-block-${index}`);
            if (block) block.classList.add('spoken-highlight');

            streamElevenLabsSpeech(text, appState.selectedLanguage, () => {
                if (block) block.classList.remove('spoken-highlight');
            });
        }

        // Plays entire article sentence after sentence sequentially
        function playEntireArticle() {
            if (!originalArticleSentences.length) return;
            stopSpeech();

            isSpeakingEntire = true;
            spokenSentenceIndex = 0;
            document.getElementById('tts-stop-btn').classList.replace('hidden', 'flex');
            
            speakSequentialLoop();
        }

        function speakSequentialLoop() {
            if (!isSpeakingEntire || spokenSentenceIndex >= originalArticleSentences.length) {
                stopSpeech();
                return;
            }

            // Clean previous highlight
            if (spokenSentenceIndex > 0) {
                const prevBlock = document.getElementById(`sentence-block-${spokenSentenceIndex - 1}`);
                if (prevBlock) prevBlock.classList.remove('spoken-highlight');
            }

            const currentBlock = document.getElementById(`sentence-block-${spokenSentenceIndex}`);
            if (currentBlock) {
                currentBlock.classList.add('spoken-highlight');
                currentBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const text = originalArticleSentences[spokenSentenceIndex];

            // Streams speech for current sentence block and continues when ended
            streamElevenLabsSpeech(text, appState.selectedLanguage, () => {
                if (currentBlock) currentBlock.classList.remove('spoken-highlight');
                if (isSpeakingEntire) {
                    spokenSentenceIndex++;
                    speakSequentialLoop();
                }
            });
        }

        // Stop all Audio and fallbacks
        function stopSpeech() {
            isSpeakingEntire = false;
            
            if (currentAudioElement) {
                currentAudioElement.pause();
                currentAudioElement = null;
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            
            // Reset highlights
            document.querySelectorAll('[id^="sentence-block-"]').forEach(el => {
                el.classList.remove('spoken-highlight');
            });
            
            const stopBtn = document.getElementById('tts-stop-btn');
            if (stopBtn) stopBtn.classList.replace('flex', 'hidden');
        }

        // --- Other Tabs Population Modules ---

        function populateExamenTab(article) {
            document.getElementById('exam-question').textContent = article.exam.question;
            const optionsContainer = document.getElementById('exam-options');
            const feedback = document.getElementById('exam-feedback');
            
            feedback.className = 'hidden mt-6 text-center text-lg font-bold p-4 rounded-xl'; 

            if (article.exam.options.length === 0) {
                optionsContainer.innerHTML = `<p class="text-gray-500 italic">No quiz available for this article.</p>`;
                return;
            }

            optionsContainer.innerHTML = article.exam.options.map(opt => `
                <button onclick="answerExam('${opt.letter}')" id="opt-btn-${opt.letter}"
                        class="w-full text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-brand hover:bg-brand/5 hover:shadow-md transition-all bg-gray-50 text-gray-800 font-medium flex gap-4 items-center group">
                    <span class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white border-2 border-gray-200 group-hover:border-brand group-hover:text-brand flex items-center justify-center font-bold text-gray-500 shrink-0 text-lg transition-colors">
                        ${opt.letter}
                    </span>
                    <span class="text-lg">${opt.text}</span>
                </button>
            `).join('');
        }

        function answerExam(selectedLetter) {
            if (appState.examAnswered) return; 
            
            appState.examAnswered = true;
            const article = appState.currentArticle;
            const isCorrect = selectedLetter === article.exam.correctAnswer;
            
            const btn = document.getElementById(`opt-btn-${selectedLetter}`);
            const feedback = document.getElementById('exam-feedback');
            
            if (isCorrect) {
                btn.classList.replace('border-gray-100', 'border-green-500');
                btn.classList.replace('bg-gray-50', 'bg-green-50');
                btn.classList.add('text-green-900');
                btn.querySelector('span').classList.add('text-green-600', 'bg-green-100');
                
                feedback.textContent = '¡Correcto! / Correct!';
                feedback.className = 'mt-6 text-center text-lg font-black p-4 rounded-xl bg-green-100 text-green-700 block transition-all';
            } else {
                btn.classList.replace('border-gray-100', 'border-red-500');
                btn.classList.replace('bg-gray-50', 'bg-red-50');
                btn.classList.add('text-red-900');
                btn.querySelector('span').classList.add('text-red-600', 'bg-red-100');
                
                const correctBtn = document.getElementById(`opt-btn-${article.exam.correctAnswer}`);
                if (correctBtn) {
                    correctBtn.classList.replace('border-gray-100', 'border-green-500');
                    correctBtn.classList.replace('bg-gray-50', 'bg-green-50');
                }

                feedback.textContent = 'Incorrecto. Inténtalo de nuevo en otra lectura.';
                feedback.className = 'mt-6 text-center text-lg font-black p-4 rounded-xl bg-red-100 text-red-700 block transition-all';
            }
        }

        function populatePalabrasTab(article) {
            const container = document.getElementById('vocab-list');
            if (article.vocab.length === 0) {
                 container.innerHTML = `<div class="p-8 text-center text-gray-500 italic">No vocabulary words list.</div>`;
                 return;
            }

            container.innerHTML = article.vocab.map(item => `
                <div class="p-6 hover:bg-gray-50 transition-colors flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <button onclick="speakSingleText('${item.word}', appState.selectedLanguage)" class="p-2 bg-gray-100 hover:bg-brandLight hover:text-brand text-gray-500 rounded-full shrink-0 transition" title="Pronounce">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                        <span class="font-black text-xl text-gray-900">${item.word}</span>
                    </div>
                    <span class="text-brand font-medium text-lg bg-brand/10 px-4 py-1.5 rounded-full inline-block sm:block w-fit">${item.meaning || '-'}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function populateGramaticaTab(article) {
            document.getElementById('grammar-title').textContent = article.grammar.title || 'Grammar';
            
            const expEl = document.getElementById('grammar-explanation');
            if (article.grammar.explanation) {
                expEl.textContent = article.grammar.explanation;
                expEl.style.display = 'block';
            } else {
                expEl.style.display = 'none';
            }
            
            const examplesContainer = document.getElementById('grammar-examples');
            if (article.grammar.examples.length > 0) {
                examplesContainer.innerHTML = article.grammar.examples.map(ex => `
                    <li class="flex items-start gap-3">
                        <i data-lucide="check" class="w-5 h-5 text-brand shrink-0 mt-0.5"></i>
                        <span>${ex}</span>
                    </li>
                `).join('');
                examplesContainer.parentElement.style.display = 'block';
                lucide.createIcons();
            } else {
                examplesContainer.parentElement.style.display = 'none';
            }
        }

        // Initialize App on DOM Load
        async function initApp() {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                await fetchSheetData();
                renderOnboarding();
                navigate('onboarding');
            } catch (err) {
                console.error("Failed to initialize:", err);
                showToast("Failed to load data. Please check your internet connection.");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Pre-fetch speech voices context
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
            initApp();
        });

    </script>
