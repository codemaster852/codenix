<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixVoice - Professional AI Voice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #overlay { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950">
        <img id="overlay-logo" src="https://scontent-hbe1-1.xx.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwGODnCy&_nc_oc=AdqdVkG_VLNmSb8AnL8cFGXEKw1SUyQivNB9lXGNwFEpnhMd_XTTsYoIeL6jSWs6fi4&_nc_zt=23&_nc_ht=scontent-hbe1-1.xx&_nc_gid=w0PkGJgmaGnhYVqM5y1NOw&_nc_ss=7c2a8&oh=00_Af97JLZ4s-2C7QFyNNYGOgK3KZq8Cv4jprCFtLoZMgqp2w&oe=6A2C4501" 
             alt="CodeNix Logo" class="w-32 h-32 rounded-full mb-6">
        <h1 id="overlay-title" class="text-4xl font-bold text-white mb-2">NixVoice</h1>
        <p class="text-slate-400">by CodeNix</p>
    </div>

    <div class="max-w-2xl w-full glass rounded-3xl p-8 shadow-2xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">NixVoice Generator</h1>
            <p class="text-slate-400 mt-2">Professional AI Voice Synthesis</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Input Text</label>
                <textarea id="text-input" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter the text you'd like to turn into professional audio..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Voice Style</label>
                    <select id="voice-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
                        <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Professional)</option>
                        <option value="EXAVITQu4vr4xnSDxMaL">Bella (Narrative)</option>
                        <option value="MF3mGyEYCl7XYWbV9V6O">Antoni (Clear)</option>
                        <option value="TxGEqnHWmrWFTfWHZg3X">Josh (Deep)</option>
                        <option value="JBFqnCBsd6RMkjVDRZzb">George (Soft)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Language</label>
                    <select id="language-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="pt">Portuguese</option>
                        <option value="zh">Chinese (Mandarin)</option>
                        <option value="ar">Arabic</option>
                        <option value="ko">Korean</option>
                        <option value="tr">Turkish</option>
                        <option value="pl">Polish</option>
                        <option value="nl">Dutch</option>
                    </select>
                </div>
            </div>

            <button id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg transition-all transform hover:scale-[1.02]">
                Generate Audio
            </button>
        </div>

        <div id="result-container" class="mt-8 hidden">
            <h3 class="text-sm font-medium text-slate-400 mb-3">Result</h3>
            <audio id="audio-player" controls class="w-full"></audio>
        </div>
    </div>

    <script>
        const API_KEY = "sk_11fa057e0d78b4158397f8d571d727a4f46832d3f1c0fc83";
        const overlay = document.getElementById('overlay');
        const overlayLogo = document.getElementById('overlay-logo');
        const overlayTitle = document.getElementById('overlay-title');
        const generateBtn = document.getElementById('generate-btn');

        // Helper: Show overlay
        const showOverlay = (title, spinning = false) => {
            overlayTitle.innerText = title;
            overlayLogo.className = `w-32 h-32 rounded-full mb-6 ${spinning ? 'spinner' : ''}`;
            overlay.classList.remove('hidden');
        };

        // Helper: Hide overlay
        const hideOverlay = () => {
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('opacity-0');
            }, 500);
        };

        // Initialize: Startup screen
        window.onload = async () => {
            showOverlay("NixVoice", false);
            await new Promise(resolve => setTimeout(resolve, 2000));
            hideOverlay();
        };

        generateBtn.addEventListener('click', async () => {
            const text = document.getElementById('text-input').value;
            const voiceId = document.getElementById('voice-select').value;

            if (!text) return alert("Please enter some text first.");

            showOverlay("Generating Audio...", true);

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': API_KEY,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });

                if (!response.ok) throw new Error('API Request failed');

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                const player = document.getElementById('audio-player');
                player.src = audioUrl;
                document.getElementById('result-container').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("Failed to generate audio. Please check your API key or connection.");
            } finally {
                hideOverlay();
            }
        });
    </script>
</body>
</html>
