<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepThinix | AI Research Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        :root { --primary: #8b5cf6; --primary-dark: #6d28d9; }
        
        /* Custom Purple Triangle Cursor */
        * { cursor: none !important; }
        #custom-cursor {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid rgba(139, 92, 246, 0.6);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease-out;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8));
            transform-origin: center;
        }
        #cursor-dot {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
        }

        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.15); }
        .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(139, 92, 246, 0.2); }
        .purple-gradient { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
        
        .loader {
            border-top-color: #8b5cf6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #main-app { display: none; }
        .research-paper { font-family: 'Inter', sans-serif; line-height: 1.8; }
        .line-counter { font-family: 'Fira Code', monospace; color: #4b5563; font-size: 0.75rem; text-align: right; padding-right: 1rem; user-select: none; }
        
        @media (max-width: 768px) {
            #custom-cursor, #cursor-dot { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body class="bg-black text-gray-100 dark:bg-black dark:text-gray-100 light:bg-slate-50 light:text-gray-900 overflow-x-hidden pb-20 md:pb-0">

    <div id="custom-cursor"></div>
    <div id="cursor-dot"></div>

    <div id="main-app">
        <!-- Desktop Sidebar -->
        <nav class="hidden md:flex fixed left-0 top-0 h-full w-20 flex-col items-center py-8 glass border-r border-purple-500/10 z-50">
            <div class="text-purple-500 text-2xl mb-12"><i class="fa-solid fa-brain"></i></div>
            <div class="space-y-8 flex-1">
                <button class="text-purple-500 hover:scale-110 transition-transform text-xl"><i class="fa-solid fa-house"></i></button>
                <button class="text-gray-500 hover:text-purple-500 transition-colors text-xl"><i class="fa-solid fa-file-pen"></i></button>
                <button class="text-gray-500 hover:text-purple-500 transition-colors text-xl"><i class="fa-solid fa-folder-open"></i></button>
            </div>
            <button onclick="toggleTheme()" class="text-gray-500 hover:text-purple-500 transition-colors text-xl mb-4">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
        </nav>

        <!-- Mobile Bottom Nav -->
        <nav class="md:hidden fixed bottom-0 left-0 w-full h-16 glass border-t border-purple-500/20 flex items-center justify-around z-50 px-4">
            <button class="text-purple-500 text-xl"><i class="fa-solid fa-house"></i></button>
            <button class="text-gray-500 text-xl"><i class="fa-solid fa-file-pen"></i></button>
            <button onclick="toggleTheme()" class="text-gray-500 text-xl"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button onclick="logout()" class="text-gray-500 text-xl"><i class="fa-solid fa-power-off"></i></button>
        </nav>

        <main class="md:pl-24 p-4 md:p-8 min-h-screen">
            <header class="flex justify-between items-center mb-8 md:mb-12">
                <div>
                    <h1 class="text-2xl md:text-4xl font-bold tracking-tight">Deep<span class="text-purple-500">Thinix</span></h1>
                    <p class="text-xs md:text-sm text-gray-500 font-mono">NODE_SESSION: ACTIVE_SECURE</p>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="logout()" class="hidden md:block text-xs text-gray-500 hover:text-red-400 uppercase tracking-widest transition-colors">Terminate</button>
                    <div class="w-10 h-10 rounded-xl purple-gradient flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i class="fa-solid fa-user-shield text-sm"></i>
                    </div>
                </div>
            </header>

            <section class="max-w-4xl mx-auto mb-10">
                <div class="glass p-5 md:p-8 rounded-2xl md:rounded-3xl border border-purple-500/20">
                    <div class="flex items-center mb-4 space-x-2">
                        <div class="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
                        <h3 class="text-sm font-semibold uppercase tracking-widest text-purple-400">Research Core</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <textarea id="research-query" rows="4" 
                            class="w-full bg-black/40 border border-purple-500/20 rounded-xl px-4 py-4 focus:outline-none focus:border-purple-500 transition-all text-base md:text-lg placeholder:text-gray-600"
                            placeholder="Describe your research topic in detail..."></textarea>
                        
                        <div class="flex flex-col md:flex-row gap-4">
                            <button onclick="startResearch()" id="search-btn"
                                class="flex-1 py-4 purple-gradient rounded-xl font-bold text-lg hover:shadow-[0_0_25px_rgba(139,92,246,0.4)] active:scale-95 transition-all flex items-center justify-center space-x-3">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                                <span>Synthesize Research</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <div id="loading-state" class="hidden max-w-2xl mx-auto text-center py-12">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-800 h-12 w-12 mb-6 mx-auto"></div>
                <div class="space-y-2">
                    <p class="text-purple-500 font-mono text-sm animate-pulse" id="status-msg">INITIALIZING NEURAL NET...</p>
                    <div class="w-full bg-gray-800 h-1 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-purple-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
            </div>

            <div id="results-area" class="max-w-5xl mx-auto hidden pb-24">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-xs font-mono text-gray-500">GEN_ID: DX-7700</span>
                    <button onclick="window.print()" class="text-xs text-purple-400 hover:text-purple-300 flex items-center">
                        <i class="fa-solid fa-download mr-2"></i> EXPORT TO PDF
                    </button>
                </div>
                <div class="glass p-6 md:p-12 rounded-3xl border-t-4 border-purple-600 shadow-2xl overflow-x-auto">
                    <div id="paper-content" class="research-paper text-gray-200 light:text-gray-800"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Custom Triangle Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        const dot = document.getElementById('cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = (e.clientX - 10) + 'px';
            cursor.style.top = (e.clientY - 15) + 'px';
            cursor.style.transform = 'rotate(-25deg)';
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        async function checkVerification() {
            const fingerprint = localStorage.getItem('thinix_fingerprint');
            console.log("Checking fingerprint:", fingerprint);

            if (!fingerprint) { 
                console.log("No fingerprint found, redirecting to auth.");
                window.location.href = 'auth.html'; 
                return; 
            }

            try {
                // Try selecting without maybeSingle first to debug
                const { data, error } = await supabaseClient
                    .from('verified_sessions')
                    .select('*')
                    .eq('device_fingerprint', fingerprint);
                
                if (error) {
                    console.error("Supabase query error:", error.message);
                    return;
                }

                if (!data || data.length === 0) {
                    console.log("Fingerprint not found in DB, redirecting to auth.");
                    localStorage.removeItem('thinix_fingerprint');
                    window.location.href = 'auth.html';
                } else {
                    console.log("Fingerprint verified. Welcome.");
                    document.getElementById('main-app').style.display = 'block';
                }
            } catch (err) {
                console.error("Supabase connection catch block:", err);
                // Don't redirect immediately on network error to allow retries
            }
        }

        async function startResearch() {
            const query = document.getElementById('research-query').value;
            if (!query) return;

            const loader = document.getElementById('loading-state');
            const results = document.getElementById('results-area');
            const btn = document.getElementById('search-btn');
            const statusMsg = document.getElementById('status-msg');
            const progressBar = document.getElementById('progress-bar');

            loader.classList.remove('hidden');
            results.classList.add('hidden');
            btn.disabled = true;

            const statuses = [
                "AUTHENTICATING WITH LONGCAT CORE...",
                "SCRAPING ACADEMIC REPOSITORIES...",
                "MAPPING NEURAL CORRELATIONS...",
                "GENERATING PROFESSIONAL SYNTHESIS...",
                "VERIFYING CITATIONS...",
                "FINALIZING DOCUMENT..."
            ];

            let p = 0;
            const statusInterval = setInterval(() => {
                p += 1;
                if(progressBar) progressBar.style.width = `${p}%`;
                if(p % 15 === 0) statusMsg.innerText = statuses[Math.floor(p/18)] || "ALMOST READY...";
                if(p >= 100) clearInterval(statusInterval);
            }, 50);

            try {
                await new Promise(r => setTimeout(r, 5500));
                generateProfessionalPaper(query);
                results.classList.remove('hidden');
                results.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                console.error(error);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function generateProfessionalPaper(topic) {
            const container = document.getElementById('paper-content');
            let html = `
                <div class="text-center mb-12">
                    <h1 class="text-3xl font-bold mb-2 uppercase tracking-tight">${topic}</h1>
                    <p class="text-purple-500 font-mono text-sm">DeepThinix AI Verified Research Paper</p>
                    <div class="w-24 h-1 bg-purple-600 mx-auto mt-6"></div>
                </div>
            `;

            const sections = [
                { title: "I. Abstract", color: "text-purple-400" },
                { title: "II. Introduction & Theoretical Framework", color: "text-purple-400" },
                { title: "III. Methodology and Data Aggregation", color: "text-purple-400" },
                { title: "IV. Core Analytical Insights", color: "text-purple-400" },
                { title: "V. Implications for Global Infrastructure", color: "text-purple-400" },
                { title: "VI. Conclusion & Future Trajectories", color: "text-purple-400" },
                { title: "References", color: "text-gray-500" }
            ];

            let lineIndex = 1;
            sections.forEach(sec => {
                html += `<h2 class="${sec.color} font-bold text-xl mt-10 mb-4 border-b border-purple-500/10 pb-2">${sec.title}</h2>`;
                for (let i = 0; i < 15; i++) {
                    const text = getDeepContent(topic, sec.title, i);
                    html += `
                        <div class="flex mb-1">
                            <div class="line-counter w-12 flex-shrink-0">${lineIndex++}</div>
                            <div class="flex-1">${text}</div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
        }

        function getDeepContent(topic, section, idx) {
            const chunks = [
                `Advanced heuristic mapping of ${topic} suggests a shift towards decentralized data validation.`,
                `The Longcat Engine confirms that ${topic} requires a multi-layered approach to analysis.`,
                `Key metrics identified in the ${section} phase indicate significant growth potential.`,
                `Researchers have noted that ${topic} frequently correlates with neural processing latency.`,
                `In terms of ${topic}, the synthesis of metadata provides a clearer path to implementation.`,
                `Historical data regarding ${topic} proves that previous theories were incomplete.`,
                `This analysis utilizes ak_2rU1Lo7PA... for deep semantic understanding of ${topic}.`,
                `Current benchmarks for ${topic} are being redefined by AI-driven discovery cycles.`,
                `Stakeholders must recognize that ${topic} is no longer a static field of study.`,
                `The technical debt associated with ${topic} is often underestimated by current models.`,
                `Our results demonstrate that ${topic} functions effectively within high-bandwidth nodes.`,
                `The correlation between ${topic} and global resource allocation is verified (99.8% confidence).`,
                `Synthesizing ${topic} requires a paradigm shift in how we perceive professional papers.`,
                `Future-proofing ${topic} involves constant monitoring of real-time market signals.`,
                `Ultimately, ${topic} represents the pinnacle of modern research inquiry in this sector.`
            ];
            return chunks[idx % chunks.length];
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light');
            document.body.className = isDark ? 'bg-black text-gray-100' : 'bg-slate-50 text-gray-900';
        }

        function logout() {
            localStorage.removeItem('thinix_fingerprint');
            window.location.href = 'auth.html';
        }

        // Initialize checking on load
        window.addEventListener('load', checkVerification);
    </script>
</body>
</html>
