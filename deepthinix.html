<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepThinix | AI Deep Research</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #9333ea;
            --accent-glow: rgba(147, 51, 234, 0.4);
        }

        * { cursor: none !important; }

        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #custom-cursor {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid var(--primary-purple);
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 8px var(--primary-purple));
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .code-input {
            letter-spacing: 0.25em;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.5);
        }

        .research-paper h1 { font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 2rem; border-left: 4px solid var(--primary-purple); padding-left: 1rem; }
        .research-paper h2 { font-size: 1.5rem; color: #a855f7; margin-top: 2.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .research-paper p { margin-bottom: 1.25rem; line-height: 1.8; color: #d1d5db; }
        
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <!-- MAIN APP INTERFACE -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-1000">
        <nav class="border-b border-purple-900/30 px-8 py-4 flex justify-between items-center glass-panel sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-900/40">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <div>
                    <span class="text-xl font-black tracking-tighter">DEEP<span class="text-purple-500">THINIX</span></span>
                    <p class="text-[10px] text-purple-400 font-mono tracking-widest uppercase">Research Node v2.5</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <span id="node-id" class="text-xs font-mono text-gray-500">NODE_CONNECTED: 0x7E4</span>
                <button onclick="handleLogout()" class="text-xs border border-red-500/30 text-red-400 px-4 py-1.5 rounded-full hover:bg-red-500/10 transition">Disconnect</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 py-12">
            <div class="grid lg:grid-cols-12 gap-8">
                <!-- Control Panel -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-panel rounded-3xl p-6">
                        <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest mb-4">Neural Parameters</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] uppercase text-gray-500 mb-1 block">Objective</label>
                                <textarea id="research-query" placeholder="Enter research domain..." class="w-full bg-black/50 border border-purple-900/50 rounded-xl p-4 text-sm focus:border-purple-500 focus:outline-none h-32 transition-all"></textarea>
                            </div>
                            <button onclick="startResearch()" id="gen-btn" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all group">
                                <span>Execute Research</span>
                                <i class="fas fa-bolt group-hover:animate-pulse"></i>
                            </button>
                        </div>
                    </div>

                    <div id="status-box" class="hidden glass-panel rounded-3xl p-6 border-l-4 border-purple-500">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-2 h-2 rounded-full bg-purple-500 animate-ping"></div>
                            <span id="status-text" class="text-xs font-mono text-purple-300">Scanning Nodes...</span>
                        </div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-purple-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Output Terminal -->
                <div class="lg:col-span-8">
                    <div id="output-area" class="glass-panel rounded-3xl p-10 min-h-[70vh] relative research-paper">
                        <div id="placeholder-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 opacity-20 pointer-events-none">
                            <i class="fas fa-atom text-8xl mb-4"></i>
                            <p class="font-mono uppercase tracking-[0.5em]">Waiting for Protocol</p>
                        </div>
                        <div id="research-content" class="relative z-10"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- PROFESSIONAL INVITE GATE -->
    <div id="invite-gate" class="fixed inset-0 z-[100] bg-[#050505] flex items-center justify-center p-6">
        <div class="max-w-lg w-full relative">
            <div class="glass-panel rounded-[40px] p-12 relative z-10 border-t-purple-500/50">
                <div class="text-center mb-10">
                    <div class="w-20 h-20 bg-purple-600/10 border border-purple-500/20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                        <i class="fas fa-fingerprint text-purple-500 text-4xl"></i>
                    </div>
                    <h1 class="text-3xl font-black mb-3 tracking-tight">Identity Required</h1>
                    <p class="text-gray-500 text-sm">Restricted research node. Enter your one-time invitation sequence.</p>
                </div>

                <div class="space-y-6">
                    <input type="text" id="invite-input" placeholder="AUTH-CODE-XXXX" class="w-full bg-black/40 border-2 border-purple-900/30 rounded-2xl p-5 text-center text-xl font-mono code-input focus:border-purple-500 focus:outline-none transition-all placeholder:text-gray-800">
                    <button onclick="verifyInvitation()" id="verify-btn" class="w-full bg-white text-black hover:bg-purple-500 hover:text-white py-5 rounded-2xl font-black text-lg transition-all shadow-xl active:scale-[0.98]">
                        INITIALIZE CONNECTION
                    </button>
                    <div class="pt-6 border-t border-white/5 text-center text-[10px]">
                        <p class="text-gray-600 uppercase tracking-widest mb-2">Request Access</p>
                        <a href="mailto:codenix.tech@gmail.com" class="text-purple-400 hover:text-purple-300 font-mono transition-colors">codenix.tech@gmail.com</a>
                    </div>
                </div>
                <div id="error-msg" class="hidden mt-6 bg-red-500/10 border border-red-500/20 text-red-400 text-xs p-3 rounded-lg text-center">
                    INVALID OR ALREADY USED CODE.
                </div>
            </div>
        </div>
    </div>

    <script>
        const LONGCAT_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        const SB_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SB_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        async function verifyInvitation() {
            const input = document.getElementById('invite-input');
            const code = input.value.trim().toUpperCase();
            const btn = document.getElementById('verify-btn');
            const error = document.getElementById('error-msg');

            if(!code) return;
            btn.disabled = true;
            btn.innerText = "VERIFYING...";
            error.classList.add('hidden');

            try {
                // 1. Check if the code exists and is NOT used
                const { data, error: sbError } = await supabaseClient
                    .from('invitation_codes')
                    .select('*')
                    .eq('code', code)
                    .eq('is_used', false)
                    .single();

                if (sbError || !data) throw new Error("Access Denied");

                // 2. Immediately mark as used so it cannot be used again
                const { error: updateError } = await supabaseClient
                    .from('invitation_codes')
                    .update({ 
                        is_used: true, 
                        used_by_ip: 'one_time_terminal_used' 
                    })
                    .eq('id', data.id);

                if (updateError) throw new Error("Verification Failed");

                // Use localStorage instead of sessionStorage to remember user "forever"
                localStorage.setItem('dt_auth', 'true');
                unlockApp();
            } catch (err) {
                error.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "INITIALIZE CONNECTION";
                input.value = "";
            }
        }

        function unlockApp() {
            document.getElementById('invite-gate').classList.add('hidden');
            const app = document.getElementById('app-content');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.add('opacity-100'), 50);
        }

        async function startResearch() {
            const query = document.getElementById('research-query').value.trim();
            if (!query) return;

            const btn = document.getElementById('gen-btn');
            const statusBox = document.getElementById('status-box');
            const output = document.getElementById('research-content');
            const placeholder = document.getElementById('placeholder-text');

            btn.disabled = true;
            statusBox.classList.remove('hidden');
            placeholder.classList.add('hidden');
            output.innerHTML = "";

            try {
                updateProgress("Analyzing Data Streams...", 30);
                const response = await fetch('https://api.longcat.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${LONGCAT_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "longcat-research-v1",
                        messages: [{ role: "system", content: "Expert research AI." }, { role: "user", content: query }]
                    })
                });
                const data = await response.json();
                updateProgress("Complete.", 100);
                await typeText(output, data.choices[0].message.content);
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                setTimeout(() => statusBox.classList.add('hidden'), 2000);
            }
        }

        async function typeText(el, text) {
            const lines = text.split('\n');
            let html = "";
            for (let line of lines) {
                html += `<p>${line}</p>`;
                el.innerHTML = html;
                await new Promise(r => setTimeout(r, 20));
            }
        }

        function updateProgress(text, pct) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function handleLogout() {
            // Remove from localStorage to fully clear remembered state
            localStorage.removeItem('dt_auth');
            location.reload();
        }

        window.onload = () => { 
            // Check localStorage to persist the session "forever"
            if (localStorage.getItem('dt_auth') === 'true') unlockApp(); 
        };
    </script>
</body>
</html>
