<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepThinix | AI Deep Research</title>
    <!-- Standard Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #9333ea;
            --accent-glow: rgba(147, 51, 234, 0.4);
        }

        * { cursor: none !important; }

        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #custom-cursor {
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 14px solid var(--primary-purple);
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 8px var(--primary-purple));
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .code-input {
            letter-spacing: 0.25em;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.5);
        }

        .research-paper h1 { font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 2rem; border-left: 4px solid var(--primary-purple); padding-left: 1rem; }
        .research-paper h2 { font-size: 1.5rem; color: #a855f7; margin-top: 2.5rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(147, 51, 234, 0.2); padding-bottom: 0.5rem; }
        .research-paper h3 { font-size: 1.1rem; color: #d1d5db; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .research-paper p { margin-bottom: 1.25rem; line-height: 1.8; color: #d1d5db; }
        .research-paper ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .research-paper li { margin-bottom: 0.5rem; }
        
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <!-- MAIN APP INTERFACE -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-1000">
        <nav class="border-b border-purple-900/30 px-8 py-4 flex justify-between items-center glass-panel sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-900/40">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <div>
                    <span class="text-xl font-black tracking-tighter">DEEP<span class="text-purple-500">THINIX</span></span>
                    <p class="text-[10px] text-purple-400 font-mono tracking-widest uppercase">Research Node v2.5</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <span id="node-id" class="text-xs font-mono text-gray-500 uppercase tracking-widest">Protocol: Secured</span>
                <button onclick="handleLogout()" class="text-xs border border-red-500/30 text-red-400 px-4 py-1.5 rounded-full hover:bg-red-500/20 transition duration-300">Disconnect Node</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 py-12">
            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-panel rounded-3xl p-6">
                        <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest mb-4">Research Parameters</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] uppercase text-gray-500 mb-1 block">Objective Domain</label>
                                <textarea id="research-query" placeholder="Describe the research target..." class="w-full bg-black/50 border border-purple-900/50 rounded-xl p-4 text-sm focus:border-purple-500 focus:outline-none h-32 transition-all placeholder:text-gray-700"></textarea>
                            </div>
                            <button onclick="startResearch()" id="gen-btn" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all group shadow-lg shadow-purple-900/20">
                                <span>Execute Deep Search</span>
                                <i class="fas fa-satellite-dish group-hover:animate-pulse"></i>
                            </button>
                        </div>
                    </div>

                    <div id="status-box" class="hidden glass-panel rounded-3xl p-6 border-l-4 border-purple-500">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-2 h-2 rounded-full bg-purple-500 animate-ping"></div>
                            <span id="status-text" class="text-xs font-mono text-purple-300">Pinging Nodes...</span>
                        </div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-purple-500 h-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div id="output-area" class="glass-panel rounded-3xl p-10 min-h-[70vh] relative research-paper">
                        <div id="placeholder-text" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 opacity-20 pointer-events-none text-center p-6">
                            <i class="fas fa-project-diagram text-8xl mb-6"></i>
                            <p class="font-mono uppercase tracking-[0.4em] text-sm">Waiting for Neural Injection</p>
                        </div>
                        <div id="research-content" class="relative z-10"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- AUTH GATE -->
    <div id="invite-gate" class="fixed inset-0 z-[100] bg-[#050505] flex items-center justify-center p-6">
        <div class="max-w-lg w-full relative">
            <div class="glass-panel rounded-[40px] p-12 relative z-10 border-t-purple-500/50">
                <div class="text-center mb-10">
                    <div class="w-20 h-20 bg-purple-600/10 border border-purple-500/20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                        <i class="fas fa-shield-halved text-purple-500 text-4xl"></i>
                    </div>
                    <h1 class="text-3xl font-black mb-3 tracking-tight">Identity Required</h1>
                    <p class="text-gray-500 text-sm">Enter the invitation sequence to access DeepThinix Node.</p>
                </div>

                <div class="space-y-6">
                    <input type="text" id="invite-input" placeholder="THINIX-XXXXXXXX" class="w-full bg-black/40 border-2 border-purple-900/30 rounded-2xl p-5 text-center text-xl font-mono code-input focus:border-purple-500 focus:outline-none transition-all placeholder:text-gray-800">
                    <button onclick="verifyInvitation()" id="verify-btn" class="w-full bg-white text-black hover:bg-purple-500 hover:text-white py-5 rounded-2xl font-black text-lg transition-all shadow-xl active:scale-[0.98]">
                        CONNECT TO NODE
                    </button>
                    <div class="pt-6 border-t border-white/5 text-center text-[10px]">
                        <p class="text-gray-600 uppercase tracking-widest mb-2">Request Access</p>
                        <a href="mailto:codenix.tech@gmail.com" class="text-purple-400 hover:text-purple-300 font-mono transition-colors">codenix.tech@gmail.com</a>
                    </div>
                </div>
                <div id="error-msg" class="hidden mt-6 bg-red-500/10 border border-red-500/20 text-red-400 text-xs p-3 rounded-lg text-center">
                    INVALID OR ALREADY EXHAUSTED CODE.
                </div>
            </div>
        </div>
    </div>

    <script>
        const LONGCAT_BASE = "https://api.longcat.chat/openai"; 
        const LONGCAT_KEY = "ak_2rU1Lo7PA23X5Is9wm3m69EY2T37J";
        const LONGCAT_MODEL = "LongCat-Flash-Chat";

        const SB_URL = "https://rnlwrngfgvznndlekmrz.supabase.co";
        const SB_KEY = "sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        async function verifyInvitation() {
            const input = document.getElementById('invite-input');
            const code = input.value.trim().toUpperCase();
            const btn = document.getElementById('verify-btn');
            const error = document.getElementById('error-msg');

            if(!code) return;
            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            error.classList.add('hidden');

            try {
                const { data, error: sbError } = await supabaseClient
                    .from('invitation_codes')
                    .select('*')
                    .eq('code', code)
                    .eq('is_used', false)
                    .single();

                if (sbError || !data) throw new Error("Access Denied");

                const { error: updateError } = await supabaseClient
                    .from('invitation_codes')
                    .update({ is_used: true, used_by_ip: 'terminal_user' })
                    .eq('id', data.id);

                if (updateError) throw new Error("Lock Failed");

                localStorage.setItem('dt_auth', 'true');
                unlockApp();
            } catch (err) {
                console.error("Auth Failure:", err);
                error.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "CONNECT TO NODE";
                input.value = "";
            }
        }

        function unlockApp() {
            document.getElementById('invite-gate').classList.add('hidden');
            const app = document.getElementById('app-content');
            app.classList.remove('hidden');
            setTimeout(() => app.classList.add('opacity-100'), 50);
        }

        async function startResearch() {
            const query = document.getElementById('research-query').value.trim();
            if (!query) return;

            const btn = document.getElementById('gen-btn');
            const statusBox = document.getElementById('status-box');
            const output = document.getElementById('research-content');
            const placeholder = document.getElementById('placeholder-text');

            btn.disabled = true;
            statusBox.classList.remove('hidden');
            placeholder.classList.add('hidden');
            output.innerHTML = `<div class="font-mono text-purple-400 text-sm italic">Infecting local cache...</div>`;

            // Professional System Prompt for Deep Research
            const DEEP_RESEARCH_SYSTEM_PROMPT = `
                You are the DeepThinix Autonomous Research Engine (v2.5). 
                Your goal is to provide elite-level, institutional-grade research reports. 
                When a user provides a topic, you must execute the following protocol:
                
                1. ANALYTICAL DEPTH: Go beyond surface-level facts. Explore root causes, historical context, technical mechanics, and future implications.
                2. STRUCTURED REPORTING: Format the response in clear Markdown with the following mandatory sections:
                   - # [Title of Research]
                   - ## Executive Summary (High-level findings)
                   - ## Core Analysis (The primary technical/conceptual dive)
                   - ## Market/Global Impact (Wider implications)
                   - ## Future Projections (Predictive modeling based on data)
                   - ## Conclusion & Strategic Recommendations
                3. TONE: Maintain a professional, objective, and authoritative tone. Use precise industry terminology.
                4. FORMATTING: Use bolding for key terms, lists for multi-point analysis, and professional headings.
                
                Input Protocol: Transform the user's prompt into a deep research objective and begin transmission.
            `.trim();

            try {
                updateProgress("Establishing Deep Link...", 25);
                
                const response = await fetch(`${LONGCAT_BASE}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${LONGCAT_KEY}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        model: LONGCAT_MODEL,
                        messages: [
                            { role: "system", content: DEEP_RESEARCH_SYSTEM_PROMPT }, 
                            { role: "user", content: `Objective: Perform exhaustive research on "${query}". Generate full report.` }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData?.error?.message || `HTTP ${response.status}`);
                }

                updateProgress("Parsing Neural Streams...", 75);
                const data = await response.json();
                
                updateProgress("Finalizing Report...", 100);
                output.innerHTML = "";
                await typeText(output, data.choices[0].message.content);
                
            } catch (e) {
                console.error("Deep Link Error:", e);
                output.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 p-6 rounded-2xl text-red-400">
                    <h3 class="font-bold mb-2">Protocol Error</h3>
                    <p class="text-sm opacity-80">${e.message}. Contact node administrator.</p>
                </div>`;
            } finally {
                btn.disabled = false;
                setTimeout(() => statusBox.classList.add('hidden'), 3000);
            }
        }

        async function typeText(el, text) {
            const lines = text.split('\n');
            let html = "";
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('###')) {
                    html += `<h3 class="text-gray-200 font-bold text-lg mt-4 mb-2">${trimmed.replace(/###/g, '').trim()}</h3>`;
                } else if (trimmed.startsWith('##')) {
                    html += `<h2 class="text-purple-400 font-bold text-xl mt-8 mb-4">${trimmed.replace(/##/g, '').trim()}</h2>`;
                } else if (trimmed.startsWith('#')) {
                    html += `<h1 class="text-white font-black text-3xl mt-10 mb-6 border-l-4 border-purple-500 pl-4">${trimmed.replace(/#/g, '').trim()}</h1>`;
                } else if (trimmed.startsWith('-') || trimmed.startsWith('*')) {
                    html += `<li class="ml-6 mb-2 text-gray-300">${trimmed.substring(1).trim()}</li>`;
                } else if (trimmed) {
                    html += `<p class="mb-4 leading-relaxed text-gray-400">${trimmed}</p>`;
                }
                el.innerHTML = html;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                await new Promise(r => setTimeout(r, 10));
            }
        }

        function updateProgress(text, pct) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function handleLogout() {
            localStorage.removeItem('dt_auth');
            location.reload();
        }

        window.onload = () => { 
            if (localStorage.getItem('dt_auth') === 'true') unlockApp(); 
        };
    </script>
</body>
</html>
