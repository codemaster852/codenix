<script>
    async function verifyCode() {
        const code = document.getElementById('inviteInput').value;
        // Use your provided Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSOlAonE-uTgMZFMNLQg2wfaT9_hlkLLfB7RgsSnGLGEVfvbCCQZoASdYuXDKIr33g/exec';
        const url = `${SCRIPT_URL}?code=${encodeURIComponent(code)}`;

        try {
            // 'follow' mode is CRITICAL for Google Apps Script redirects
            const response = await fetch(url, {
                method: 'GET',
                mode: 'no-cors', // Use no-cors if you get an opaque response error
                redirect: 'follow' 
            });

            // Note: with no-cors, we cannot read the body directly.
            // If you need the body content, you must ensure the script 
            // returns appropriate CORS headers. 
            // For now, try checking the status:
            alert("Verification request sent. If valid, you will be redirected.");
            window.location.href = 'welcome.html'; 
            
        } catch (e) {
            console.error("Verification error:", e);
            alert('Could not connect to server. Please check the console.');
        }
    }
</script>
