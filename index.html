<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Something Great</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes craneSwing { 0%, 100% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }
        @keyframes pieceDrop { 0% { transform: translateY(-300px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .crane { animation: craneSwing 3s infinite ease-in-out; transform-origin: top center; }
        .logo-build { animation: pieceDrop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .brick { opacity: 0; }
        .b1 { animation: pieceDrop 0.6s ease-out 0.2s forwards; }
        .b2 { animation: pieceDrop 0.6s ease-out 0.5s forwards; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 cursor-pointer" onclick="handleFirstInteraction()">

    <main class="animate-fade-in max-w-sm w-full bg-white rounded-3xl shadow-2xl p-8 text-center relative overflow-hidden">
        
        <!-- Crane Visual -->
        <div class="crane mx-auto mb-4 text-6xl">🏗️</div>

        <!-- Logo being built -->
        <div class="mb-8 relative h-40 flex justify-center items-center">
            <img id="mainLogo" 
                 src="https://scontent.fcai19-5.fna.fbcdn.net/v/t39.30808-6/718816493_122173678946952582_684043749236540884_n.jpg?stp=dst-jpg_tt6&cstp=mx1254x1254&ctp=s1254x1254&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=NyAhiEYLoB8Q7kNvwFbTEIO&_nc_oc=AdovsxhYERhZFj24nqRsIlMMZSN7z9WeoMJ4yLWp6AdnY_fEOKwHF9uK-dm1pUKXtP8&_nc_zt=23&_nc_ht=scontent.fcai19-5.fna&_nc_gid=WYO-Khg8S1s0IMbJNX2BLQ&_nc_ss=7c2a8&oh=00_Af9NYYv4xkKMjMvY8yRsy_h_Zlplz45_ibgivhTNY2X6kQ&oe=6A2D9681" 
                 alt="Logo" 
                 class="logo-build w-32 h-32 rounded-full shadow-lg border-4 border-slate-100"
                 onerror="this.src='https://placehold.co/128x128/slate/white?text=LOGO'">
        </div>

        <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Construction in Progress</h1>
        <p class="text-slate-600 mb-6 leading-relaxed">
            Our masterpiece is currently under development. Tap anywhere to activate the site mechanics.
        </p>

        <div id="statusIndicator" class="text-xs text-slate-400 uppercase tracking-widest font-bold">
            (Tap to start experience)
        </div>
    </main>

    <script>
        let audioCtx;
        let isStarted = false;
        let interval;

        function playHammerSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function handleFirstInteraction() {
            if (isStarted) return;
            
            // Resume/Create Audio Context
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Start hammer sound loop
            interval = setInterval(playHammerSound, 1000);
            
            // Update UI
            document.getElementById('statusIndicator').textContent = "Building Active...";
            document.getElementById('statusIndicator').classList.replace('text-slate-400', 'text-emerald-500');
            
            isStarted = true;
        }
    </script>

    <footer class="fixed bottom-4 text-slate-500 text-sm">
        &copy; 2026 Under Construction
    </footer>

</body>
</html>
