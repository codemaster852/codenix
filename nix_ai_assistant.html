<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix AI Professional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-200 flex flex-col font-sans overflow-hidden" onload="autoInit()">

    <!-- Hidden Admin Console -->
    <div id="admin-panel" class="hidden fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-white">System Configuration</h2>
            <div class="space-y-4">
                <p class="text-xs text-slate-400">Locked Configuration Mode</p>
                <input type="text" id="admin-sheet-url" disabled 
                       class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-500 cursor-not-allowed">
                <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="w-full bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-lg">Close</button>
            </div>
        </div>
    </div>

    <!-- Layout -->
    <div class="flex h-full w-full">
        <aside class="w-64 bg-black border-r border-slate-900 flex flex-col p-6">
            <div onclick="triggerAdmin()" class="cursor-pointer flex items-center gap-3 mb-10 group">
                <div class="h-10 w-10 rounded-xl bg-slate-800 overflow-hidden border border-slate-700">
                    <img src="https://i.imgur.com/k9vYf5F.png" alt="Nix Logo" class="h-full w-full object-cover">
                </div>
                <h1 class="text-white font-bold text-lg tracking-tight">Nix AI</h1>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="location.reload()" class="w-full text-left py-2.5 px-4 rounded-lg bg-purple-900/20 text-purple-400 font-medium border border-purple-500/20">
                    <i class="fa-solid fa-plus mr-2 text-xs"></i> New Conversation
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950">
            <div id="chat-container" class="flex-1 overflow-y-auto p-8 md:p-12 space-y-8">
                <div id="messages" class="max-w-3xl mx-auto space-y-6"></div>
            </div>
            
            <footer class="p-6">
                <div class="max-w-3xl mx-auto">
                    <form id="chat-form" onsubmit="sendMessage(event)" class="relative flex items-center">
                        <input id="prompt" type="text" placeholder="Message Nix AI..." 
                               class="w-full bg-slate-900 border border-slate-800 rounded-2xl pl-6 pr-14 py-4 text-sm focus:outline-none focus:border-purple-500 shadow-xl transition-all">
                        <button type="submit" class="absolute right-3 h-9 w-9 flex items-center justify-center rounded-xl bg-purple-600 hover:bg-purple-700 text-white transition-colors">
                            <i class="fa-solid fa-arrow-up text-xs"></i>
                        </button>
                    </form>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let clicks = 0;
        const LOCKED_SHEET = "https://docs.google.com/spreadsheets/d/1R0QmFOr8CEelWIseXYmcboeoOgcJnFpG8XmOiFRl5VI/export?format=csv";
        let config = { keys: [], endpoint: "https://aiapiv2.pekpik.com/v1", currentIdx: 0 };

        function triggerAdmin() {
            if (++clicks >= 5) { document.getElementById('admin-panel').classList.remove('hidden'); clicks = 0; }
        }

        async function autoInit() {
            document.getElementById('admin-sheet-url').value = LOCKED_SHEET;
            syncSystem(true);
        }

        async function syncSystem(silent = false) {
            Papa.parse(LOCKED_SHEET, {
                download: true, header: true, complete: (res) => {
                    config.keys = res.data.filter(r => r.API && r.API.startsWith("sk-"));
                    config.currentIdx = 0;
                    console.log(`Loaded ${config.keys.length} models.`);
                },
                error: (err) => console.error("CSV Load Error:", err)
            });
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('prompt');
            const msgs = document.getElementById('messages');
            if(!input.value || config.keys.length === 0) return;

            msgs.innerHTML += `<div class="text-right text-sm text-slate-300"><span class="inline-block bg-slate-800 px-4 py-2 rounded-2xl">${input.value}</span></div>`;
            const payload = input.value;
            input.value = '';

            let success = false;
            while(config.currentIdx < config.keys.length && !success) {
                try {
                    const keyObj = config.keys[config.currentIdx];
                    const res = await fetch(`${config.endpoint}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${keyObj.API}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: keyObj.Model, messages: [{role: 'user', content: payload}] })
                    });
                    
                    if(!res.ok) throw new Error();
                    
                    const data = await res.json();
                    msgs.innerHTML += `<div class="text-left text-sm text-slate-100 bg-slate-900 p-4 rounded-xl border border-slate-800">${data.choices[0].message.content}</div>`;
                    success = true;
                } catch {
                    config.currentIdx++;
                }
            }
            if(!success) msgs.innerHTML += `<div class="text-left text-red-400 text-sm italic">All models exhausted. Please verify keys in your sheet.</div>`;
        }
    </script>
</body>
</html>
