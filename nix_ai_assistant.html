<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nix AI Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papa-parse@5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-900 flex flex-col font-sans overflow-hidden">

    <!-- Admin Overlay (Hidden by Default) -->
    <div id="admin-panel" class="hidden fixed inset-0 z-[100] bg-slate-950/90 p-10 overflow-y-auto">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">System Administrator Console</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Sheet CSV URL:</label>
                    <input type="text" id="admin-sheet-url" class="w-full border rounded-lg p-2 bg-slate-50">
                </div>
                <div class="flex gap-4">
                    <button onclick="fetchAPIKeys()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Sync Keys</button>
                    <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="bg-slate-200 px-4 py-2 rounded-lg">Close</button>
                </div>
                <div id="admin-list" class="mt-6 border-t pt-4 text-xs font-mono space-y-1"></div>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="flex h-full w-full">
        <aside class="w-64 bg-slate-900 text-slate-300 p-6 flex flex-col">
            <div onclick="checkAdminTrigger()" class="cursor-pointer flex items-center gap-3 mb-10">
                <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-sm"></i>
                </div>
                <h1 class="text-white font-bold tracking-wide">Nix AI</h1>
            </div>
            <nav class="flex-1 space-y-2">
                <a href="#" class="block py-2 px-3 rounded-lg bg-indigo-600/20 text-indigo-400 font-medium">New Chat</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-white">
            <div id="chat-scroller" class="flex-1 overflow-y-auto p-12 space-y-6">
                <div id="messages-container" class="max-w-3xl mx-auto space-y-6"></div>
            </div>
            
            <footer class="p-6 border-t">
                <div class="max-w-3xl mx-auto">
                    <form id="chat-form" onsubmit="handleFormSubmit(event)" class="flex items-center gap-3 border rounded-full px-5 py-3 shadow-sm hover:shadow-md transition-shadow">
                        <input id="message-input" type="text" placeholder="How can I help you today?" class="flex-1 outline-none text-sm">
                        <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold">Send</button>
                    </form>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let adminClicks = 0;
        const state = { keys: [], endpoint: "https://aiapiv2.pekpik.com/v1", model: "smart-chat", activeKeyIndex: 0 };
        
        function checkAdminTrigger() {
            adminClicks++;
            if (adminClicks >= 5) {
                document.getElementById('admin-panel').classList.remove('hidden');
                adminClicks = 0;
            }
        }

        async function fetchAPIKeys() {
            const url = document.getElementById('admin-sheet-url').value || "https://docs.google.com/spreadsheets/d/1R0QmFOr8CEelWIseXYmcboeoOgcJnFpG8XmOiFRl5VI/export?format=csv";
            Papa.parse(url, {
                download: true, header: true, complete: (res) => {
                    state.keys = res.data.filter(r => r.API?.startsWith("sk-")).map(r => ({key: r.API, model: r.Model}));
                    document.getElementById('admin-list').textContent = `Loaded ${state.keys.length} keys securely.`;
                }
            });
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const container = document.getElementById('messages-container');
            if(!input.value) return;

            // Render User
            container.innerHTML += `<div class="text-right"><span class="bg-slate-100 p-3 rounded-2xl text-sm">${input.value}</span></div>`;
            
            const userMsg = input.value;
            input.value = '';

            try {
                const res = await fetch(`${state.endpoint}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${state.keys[state.activeKeyIndex].key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: state.keys[state.activeKeyIndex].model, messages: [{role: 'user', content: userMsg}] })
                });
                const data = await res.json();
                container.innerHTML += `<div class="text-left"><span class="bg-indigo-50 p-3 rounded-2xl text-sm">${data.choices[0].message.content}</span></div>`;
            } catch(err) {
                container.innerHTML += `<div class="text-left text-red-500 text-sm">Service temporarily unavailable.</div>`;
            }
        }
    </script>
</body>
</html>
