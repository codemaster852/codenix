<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Learn Without Limits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt'; // Add your public key here
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <div id="app">
        <!-- Navigation Bar -->
        <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-indigo-600 bg-clip-text text-transparent">Mundo.Academy</h1>
                <div id="nav-actions" class="flex gap-4"></div>
            </div>
        </nav>

        <!-- Main Viewport -->
        <main id="content" class="max-w-7xl mx-auto p-4 md:p-8">
            <div id="loader" class="hidden">Loading...</div>
            <div id="view-container"></div>
        </main>
    </div>

    <script type="module">
        // Authentication Guard
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) window.location.href = 'auth.html';
            return session;
        }

        // Router
        const render = async (view) => {
            const container = document.getElementById('view-container');
            const session = await checkSession();
            
            // Logic for switching views (Dashboard, Courses, Admin)
            switch(view) {
                case 'dashboard':
                    container.innerHTML = `<h2 class="text-3xl font-bold">Welcome Back, ${session.user.email}</h2>`;
                    break;
                // Add more routes...
            }
        };

        // Admin Access Listener
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                alert('Admin Dashboard Access Initiated');
                // verify role and redirect
            }
        });

        // Init
        checkSession().then(() => render('dashboard'));
    </script>
</body>
</html>
