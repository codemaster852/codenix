<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Free Courses & Certifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden-admin { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center px-10">
        <h1 class="text-2xl font-bold text-blue-600">Mundo.Academy</h1>
        <div id="auth-status" class="space-x-4">
            <span id="user-email" class="text-gray-600"></span>
            <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="p-10">
        <h2 class="text-3xl font-semibold mb-6">Available Courses</h2>
        <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Courses populated by JS -->
        </div>
    </main>

    <!-- Admin Dashboard -->
    <section id="admin-dashboard" class="hidden-admin bg-gray-900 text-white p-10 min-h-screen">
        <h2 class="text-4xl mb-6 text-yellow-400">Admin Panel (Nixora Engine)</h2>
        <form id="course-form" class="bg-gray-800 p-6 rounded-lg space-y-4">
            <input type="text" id="c-title" placeholder="Course Title" class="w-full p-2 text-black rounded" required>
            <input type="text" id="c-video" placeholder="Video URL" class="w-full p-2 text-black rounded" required>
            <button type="submit" class="bg-green-500 hover:bg-green-600 p-2 w-full rounded transition font-bold">Publish Course</button>
        </form>
    </section>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        
        // Ensure client is only initialized once
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check Auth
        async function checkAuth() {
            try {
                const { data: { user }, error } = await sbClient.auth.getUser();
                if (error || !user) {
                    window.location.href = 'auth.html';
                    return;
                }
                document.getElementById('user-email').innerText = user.email;
            } catch (err) {
                console.error("Auth check failed", err);
                window.location.href = 'auth.html';
            }
        }

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await sbClient.auth.signOut();
            window.location.href = 'auth.html';
        });

        // Admin Trigger: Ctrl + Shift + D
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                document.getElementById('admin-dashboard').classList.toggle('hidden-admin');
                document.getElementById('main-content').classList.toggle('hidden');
            }
        });

        checkAuth();
    </script>
</body>
</html>
