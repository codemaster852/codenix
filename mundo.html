<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Nixora Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden-admin { display: none; }
        .sidebar-item:hover { background: #1e293b; }
        /* Professional Certificate Print Style */
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans h-screen flex">

    <!-- Sidebar (Visible only when in Admin Panel) -->
    <aside id="admin-sidebar" class="hidden-admin w-64 bg-gray-900 text-white p-6 space-y-6">
        <h2 class="text-xl font-bold text-yellow-400">Nixora Engine</h2>
        <nav class="space-y-4">
            <button onclick="showPanel('dashboard')" class="sidebar-item w-full text-left p-2 rounded">Dashboard</button>
            <button onclick="showPanel('course-builder')" class="sidebar-item w-full text-left p-2 rounded">Course Builder</button>
            <button onclick="showPanel('certs')" class="sidebar-item w-full text-left p-2 rounded">Certificates</button>
            <button onclick="showPanel('community')" class="sidebar-item w-full text-left p-2 rounded">Community Mods</button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-1 overflow-y-auto">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm p-4 flex justify-between items-center px-10">
            <h1 class="text-2xl font-bold text-blue-600">Mundo.Academy</h1>
            <div id="user-info" class="flex items-center gap-4">
                <span id="user-email" class="text-gray-600"></span>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded text-sm hover:bg-red-600 transition">Logout</button>
            </div>
        </nav>

        <!-- Dynamic Panels -->
        <section id="panel-content" class="p-10">
            <!-- Default Home View -->
            <div id="view-dashboard">
                <h2 class="text-3xl font-bold mb-6">Welcome back!</h2>
                <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- Course Builder Panel -->
            <div id="view-course-builder" class="hidden">
                <h2 class="text-2xl font-bold mb-4">Course Builder</h2>
                <div class="bg-white p-6 rounded-xl shadow-lg border">
                    <input type="text" id="b-title" placeholder="Course Name" class="w-full p-3 mb-4 border rounded">
                    <textarea id="b-desc" placeholder="Course Description" class="w-full p-3 mb-4 border rounded h-32"></textarea>
                    <div class="flex gap-4">
                        <button onclick="addUnit()" class="bg-blue-600 text-white px-4 py-2 rounded">Add Unit +</button>
                        <button class="bg-green-600 text-white px-4 py-2 rounded">Save Course</button>
                    </div>
                    <div id="unit-list" class="mt-6 space-y-4"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Admin Trigger -->
    <script>
        const SUPABASE_URL = 'https://rnlwrngfgvznndlekmrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) { window.location.href = 'auth.html'; return; }
            document.getElementById('user-email').innerText = user.email;
            
            // Allow admin access
            if (user.email === 'Codenix.ai@gmail.com') {
                console.log("Admin Access Enabled");
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                document.getElementById('admin-sidebar').classList.toggle('hidden-admin');
            }
        });

        function showPanel(panel) {
            document.querySelectorAll('#panel-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`view-${panel}`).classList.remove('hidden');
        }

        function addUnit() {
            const div = document.createElement('div');
            div.className = "p-4 border rounded bg-gray-50";
            div.innerHTML = `<input class="w-full p-2" placeholder="Unit Name"> <button class="mt-2 text-blue-600">+ Add Lesson</button>`;
            document.getElementById('unit-list').appendChild(div);
        }

        checkAuth();
    </script>
</body>
</html>
