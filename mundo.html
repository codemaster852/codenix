<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo.Academy | Nixora Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Admin Sidebar (Hidden by default) -->
    <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-white">
        <div class="p-6">
            <h2 class="text-2xl font-bold mb-4">Nixora Admin Dashboard</h2>
            <div class="space-y-2">
                <button onclick="showSection('course-builder')" class="w-full text-left p-2 hover:bg-gray-100">Course Builder</button>
                <button onclick="closeAdmin()" class="text-red-500">Close Dashboard</button>
            </div>
            <div id="section-content" class="mt-6 border-t pt-4">
                <!-- Dynamic content area -->
            </div>
        </div>
    </div>

    <!-- Main App UI -->
    <nav class="bg-white shadow p-4 flex justify-between">
        <h1 class="text-xl font-bold text-blue-600">Mundo.Academy</h1>
        <div id="user-info"></div>
    </nav>

    <main id="app-container" class="p-10">
        <h2 class="text-2xl mb-4">Your Learning Journey</h2>
        <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const sbClient = supabase.createClient('https://rnlwrngfgvznndlekmrz.supabase.co', 'sb_publishable_mtI0_ZBvU_n5oRuqV58QHg_qJt3Gfyt');

        // Safer UI Toggle
        function showSection(id) {
            const container = document.getElementById('section-content');
            if (container) {
                container.innerHTML = `<div>Editing ${id}...</div>`;
            } else {
                console.error("Target container not found!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        // Admin Trigger: Ctrl + Shift + D
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                const panel = document.getElementById('admin-panel');
                if (panel) panel.classList.remove('hidden');
            }
        });

        // Initialize App
        async function init() {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            document.getElementById('user-info').innerText = user.email;
        }

        init();
    </script>
</body>
</html>
